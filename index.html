          onClick={()=>document.getElementById('gn-input').click()}>
          <input id="gn-input" type="file" accept=".pdf,image/*" onChange={e=>handleGNFile(e.target.files[0])}/>
          {gnPreview&&gnPreview.type==='image'?<img src={gnPreview.src} className="preview-thumb" alt="preview"/>:<div className="gn-icon">{gnFile?'📄':'📂'}</div>}
          {gnFile
            ?<div><div style={{fontWeight:600,fontSize:13}}>{gnFile.name}</div><div style={{fontSize:11,color:'var(--muted)',marginTop:3}}>{(gnFile.size/1024).toFixed(0)} Ko</div></div>
            :<div><div style={{fontWeight:600,fontSize:13}}>Glisser-déposer ou cliquer</div><div style={{fontSize:11,color:'var(--muted)',marginTop:3}}>PDF ou image — export GoodNotes</div></div>
          }
        </div>
        {gnError&&<div style={{color:'var(--err)',fontSize:12,marginTop:8,padding:'8px 12px',background:'#FFF0F0',borderRadius:2}}>{gnError}</div>}
        <div style={{background:'#EEF5FF',borderRadius:2,padding:'9px 12px',fontSize:12,color:'#0d4a8f',marginTop:12}}>
          💡 <strong>Export GoodNotes :</strong> Ouvrez votre note → ••• → Exporter → PDF ou Image
        </div>
        <div className="fa"><button className="btn btn-o" onClick={()=>setShowGN(false)}>Annuler</button><button className="btn btn-p" disabled={!gnFile} onClick={analyzeWithClaude}>🔍 Analyser avec Claude</button></div>
      </>}
      {gnStep==='analyzing'&&<div className="gn-analyzing">
        <div className="gn-spinner"/>
        <div style={{fontFamily:'Playfair Display,serif',fontSize:16,fontWeight:600}}>Analyse en cours…</div>
        <div style={{fontSize:13,color:'var(--muted)',textAlign:'center',maxWidth:280}}>Claude lit votre trace écrite et extrait les informations pédagogiques.</div>
      </div>}
      {gnStep==='result'&&<>
        <div style={{background:'#EEFFF6',border:'1.5px solid #2D9B6F',borderRadius:0,padding:'8px 14px',marginBottom:14,fontSize:12,color:'#1a6b46'}}>✅ Analyse terminée — vérifiez avant de publier.</div>
        <div className="fg"><label className="fl">Titre</label><input className="fi" value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/></div>
        <div className="fg"><label className="fl">Groupe / cours</label><select className="fi" value={form.coursId||''} onChange={e=>{const id=e.target.value;const c=myGroupes.find(x=>x.id===id);setForm(f=>({...f,coursId:id,...(c?{matiere:c.matiere,niveau:c.niveau}:{})}));}}><option value="">— Ressource générale (par matière) —</option>{myGroupes.map(c=><option key={c.id} value={c.id}>{c.matiere} {c.niveau} — {c.jour}{c.salle?(' · '+c.salle):''}</option>)}</select></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div className="fg"><label className="fl">Matière</label><select className="fi" value={form.matiere} onChange={e=>setForm({...form,matiere:e.target.value})}>{MATIERES.filter(m=>m!=='Toutes').map(m=><option key={m}>{m}</option>)}</select></div>
          <div className="fg"><label className="fl">Niveau</label><select className="fi" value={form.niveau} onChange={e=>setForm({...form,niveau:e.target.value})}>{NIVEAUX.filter(n=>n!=='Tous').map(n=><option key={n}>{n}</option>)}</select></div>
        </div>
        <div className="fg"><label className="fl">Description</label><textarea className="fi" value={form.desc} onChange={e=>setForm({...form,desc:e.target.value})}/></div>
        <div className="fg"><label className="fl">📌 Devoirs à faire</label><textarea className="fi" style={{minHeight:52}} value={form.devoirs} onChange={e=>setForm({...form,devoirs:e.target.value})} placeholder="Aucun devoir détecté"/></div>
        <div className="fg"><label className="fl">💬 Commentaires professeur</label><textarea className="fi" style={{minHeight:52}} value={form.commentaires} onChange={e=>setForm({...form,commentaires:e.target.value})} placeholder="Aucun commentaire détecté"/></div>
        <div className="fa"><button className="btn btn-o" onClick={()=>setGnStep('upload')}>← Réimporter</button><button className="btn btn-p" onClick={publishFromGN}>✅ Publier</button></div>
      </>}
    </Modal>}
  </>;
}

// ─── MES ÉLÈVES + APPEL ───
function MesEleves({user,users,grades,setGrades,cours,appel,setAppel,compEtats={},setCompEtats,customComps=[]}){
  const [tab,setTab]=useState('suivi');
  const eleves=users.filter(u=>u.role==='eleve');
  // ── Mes cours / mes élèves ──
  const myCours=cours.filter(c=>c.profId===user.id);
  const myEleveIds=[...new Set(myCours.flatMap(c=>c.eleveIds))];
  const myEleves=eleves.filter(e=>myEleveIds.includes(e.id));
  // Notes tab
  const [sel,setSel]=useState(null);
  const [showNote,setShowNote]=useState(false);
  const [noteForm,setNoteForm]=useState({matiere:user.matiere||'Mathématiques',note:'',max:'20',commentaire:''});

  // ── Détection automatique du créneau en cours ou imminent ──
  const autoSelectCours=(()=>{
    const now=new Date();
    const dayNames=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const todayName=dayNames[now.getDay()];
    const nowH=now.getHours()+now.getMinutes()/60;
    // 1. Cours en cours maintenant
    const enCours=myCours.find(c=>c.jour===todayName&&c.debut<=nowH&&nowH<=c.fin);
    if(enCours)return{id:enCours.id,label:'En cours'};
    // 2. Prochain cours aujourd'hui (dans les 2h à venir)
    const prochainAujourdhui=myCours
      .filter(c=>c.jour===todayName&&c.debut>nowH&&c.debut-nowH<=2)
      .sort((a,b)=>a.debut-b.debut)[0];
    if(prochainAujourdhui)return{id:prochainAujourdhui.id,label:`Dans ${Math.round((prochainAujourdhui.debut-nowH)*60)} min`};
    // 3. Premier cours du reste de la semaine
    const dayOrder=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
    const todayIdx=dayOrder.indexOf(todayName);
    const prochainSemaine=myCours
      .map(c=>({...c,idx:dayOrder.indexOf(c.jour)}))
      .filter(c=>c.idx>todayIdx||(c.idx===todayIdx&&c.debut>nowH))
      .sort((a,b)=>a.idx-b.idx||a.debut-b.debut)[0];
    if(prochainSemaine)return{id:prochainSemaine.id,label:`${prochainSemaine.jour}`};
    // 4. Fallback : premier de la liste
    return myCours[0]?{id:myCours[0].id,label:null}:null;
  })();

  const [selC,setSelC]=useState(autoSelectCours?.id||null);
  const [aDate,setADate]=useState(new Date().toISOString().split('T')[0]);

  const addNote=()=>{
    if(!noteForm.note||!sel)return;
    const g={id:'g'+Date.now(),matiere:noteForm.matiere,note:parseFloat(noteForm.note),max:parseFloat(noteForm.max),date:new Date().toISOString().split('T')[0],commentaire:noteForm.commentaire,profId:user.id};
    setGrades(p=>({...p,[sel]:[...(p[sel]||[]),g]}));
    setShowNote(false);setNoteForm({matiere:user.matiere||'Mathématiques',note:'',max:'20',commentaire:''});
  };

  const aKey=`${selC}|${aDate}`;
  const curAppel=appel[aKey]||{};
  const setStatus=(eid,status)=>setAppel(p=>({...p,[aKey]:{...curAppel,[eid]:status}}));
  const curCours=myCours.find(c=>c.id===selC);
  const coursEleves=curCours?users.filter(u=>curCours.eleveIds.includes(u.id)):[];

  // Historique appels for selected cours
  const histAppel=Object.entries(appel)
    .filter(([k])=>k.startsWith(`${selC}|`)&&k!==aKey)
    .sort(([a],[b])=>b.localeCompare(a)).slice(0,4);

  const statCount=(data,s)=>Object.values(data).filter(x=>x===s).length;

  // ── Helpers statistiques élève ──
  // Assiduité agrégée par élève sur tous les appels du prof
  const getEleveAssiduite=(eid)=>{
    let present=0,retard=0,absent=0,total=0;
    Object.entries(appel).forEach(([k,data])=>{
      const cid=k.split('|')[0];
      const c=myCours.find(x=>x.id===cid);
      if(!c||!c.eleveIds.includes(eid))return;
      const st=data[eid];
      if(st){total++;if(st==='present')present++;else if(st==='retard')retard++;else if(st==='absent')absent++;}
    });
    return{present,retard,absent,total,tauxPres:total>0?Math.round((present+retard*0.5)/total*100):null};
  };
  // Compétences par élève
  const getEleveCompStats=(eid)=>{
    const el=users.find(u=>u.id===eid);if(!el)return{total:0,valide:0,en_cours:0,a_revoir:0,pct:0};
    const myMats=new Set(cours.filter(c=>c.eleveIds.includes(eid)).map(c=>c.matiere));
    const base=(typeof COMP_TEMPLATES!=='undefined'?COMP_TEMPLATES:[]).filter(t=>myMats.has(t.matiere)&&(t.niveau===el.niveau||!t.niveau));
    const custom=customComps.filter(t=>t.eleveId===eid);
    const tpls=[...base,...custom];if(!tpls.length)return{total:0,valide:0,en_cours:0,a_revoir:0,pct:0};
    const etats=compEtats[eid]||{};
    const v=tpls.filter(t=>(etats[t.id]?.statut||'nc')==='valide').length;
    const e=tpls.filter(t=>(etats[t.id]?.statut||'nc')==='en_cours').length;
    const r=tpls.filter(t=>(etats[t.id]?.statut||'nc')==='a_revoir').length;
    return{total:tpls.length,valide:v,en_cours:e,a_revoir:r,pct:tpls.length?Math.round(v/tpls.length*100):0};
  };
  // Notes données par MOI à cet élève
  const getMyGradesFor=(eid)=>(grades[eid]||[]).filter(g=>g.profId===user.id||!g.profId);
  // Cours du prof qui incluent cet élève
  const getCoursOf=(eid)=>myCours.filter(c=>c.eleveIds.includes(eid));

  const selUser=users.find(u=>u.id===sel);
  const selGrades=grades[sel]||[];
  const selMoy=moy(selGrades);
  const selAss=sel?getEleveAssiduite(sel):null;
  const selComp=sel?getEleveCompStats(sel):null;
  const selCours=sel?getCoursOf(sel):[];

  // ── Pour l'onglet Bilan : alertes ──
  const alertes=myEleves.map(e=>{
    const ass=getEleveAssiduite(e.id);
    const g=grades[e.id]||[];const m=moy(g);
    const comp=getEleveCompStats(e.id);
    const flags=[];
    if(m&&parseFloat(m)<10)flags.push({type:'note',label:`Moy. ${m}/20`,color:'#b02020',bg:'#fff0f0'});
    if(ass.total>=3&&ass.tauxPres!==null&&ass.tauxPres<70)flags.push({type:'abs',label:`Assiduité ${ass.tauxPres}%`,color:'#c47a00',bg:'#fff8e0'});
    if(ass.absent>=3)flags.push({type:'abs3',label:`${ass.absent} absences`,color:'#b02020',bg:'#fff0f0'});
    if(comp.a_revoir>=3)flags.push({type:'comp',label:`${comp.a_revoir} à revoir`,color:'#c47a00',bg:'#fff8e0'});
    return{eleve:e,ass,moy:m,comp,flags};
  }).filter(a=>a.flags.length>0).sort((a,b)=>b.flags.length-a.flags.length);

  // Mes groupes (un cours = un groupe)
  const [selGroupe,setSelGroupe]=useState(myCours[0]?.id||null);
  const curGroupe=myCours.find(c=>c.id===selGroupe);
  const groupeEleves=curGroupe?users.filter(u=>curGroupe.eleveIds.includes(u.id)):[];

  // Email mailto pour un élève / un groupe
  const buildMailtoEleve=(e)=>{
    const parent=e.parentEmail||e.parentMail||e.email||'';
    if(!parent)return null;
    const sub=encodeURIComponent(`[Plus de bonnes notes] Suivi de ${e.name}`);
    const body=encodeURIComponent(`Bonjour,\n\nJe vous écris au sujet du suivi de ${e.name} (${e.niveau}).\n\nCordialement,\n${user.name}`);
    return `mailto:${parent}?subject=${sub}&body=${body}`;
  };
  const buildMailtoGroupe=(g)=>{
    const els=users.filter(u=>g.eleveIds.includes(u.id));
    const emails=els.map(e=>e.parentEmail||e.parentMail||e.email||'').filter(Boolean);
    if(!emails.length)return null;
    const sub=encodeURIComponent(`[Plus de bonnes notes] ${g.matiere} — ${g.niveau} (${g.jour})`);
    const body=encodeURIComponent(`Bonjour,\n\nJe vous écris au sujet du cours de ${g.matiere} (${g.niveau}, ${g.jour} ${hs(g.debut)}–${hs(g.fin)}).\n\nCordialement,\n${user.name}`);
    return `mailto:?bcc=${emails.join(',')}&subject=${sub}&body=${body}`;
  };

  // Bilan global prof
  const bilanGlobal=(()=>{
    const totalEntries=Object.entries(appel).filter(([k])=>{const cid=k.split('|')[0];return myCours.some(c=>c.id===cid);});
    let p=0,r=0,a=0,t=0;
    totalEntries.forEach(([,data])=>{Object.values(data).forEach(s=>{t++;if(s==='present')p++;else if(s==='retard')r++;else if(s==='absent')a++;});});
    const allMoys=myEleves.map(e=>moy(grades[e.id]||[])).filter(Boolean).map(parseFloat);
    const moyClasse=allMoys.length?(allMoys.reduce((s,x)=>s+x,0)/allMoys.length).toFixed(1):null;
    return{
      nbCours:myCours.length,nbEleves:myEleves.length,
      nbSeances:totalEntries.length,
      tauxAssiduite:t>0?Math.round(((p+r*0.5)/t)*100):null,
      moyClasse,
      nbAlertes:alertes.length,
      tauxComp:myEleves.length>0?Math.round(myEleves.reduce((s,e)=>s+getEleveCompStats(e.id).pct,0)/myEleves.length):0,
    };
  })();

  return <>
    <TB title="Mes élèves">
      {tab==='suivi'&&sel&&<button className="btn btn-p" onClick={()=>setShowNote(true)}>＋ Note</button>}
    </TB>
    <div className="pg">
      <div className="tabs" style={{maxWidth:560}}>
        <button className={`tab ${tab==='suivi'?'on':''}`} onClick={()=>setTab('suivi')}>🎯 Suivi élèves</button>
        <button className={`tab ${tab==='appel'?'on':''}`} onClick={()=>setTab('appel')}>📋 Faire l'appel</button>
        <button className={`tab ${tab==='groupes'?'on':''}`} onClick={()=>setTab('groupes')}>👥 Mes groupes</button>
        <button className={`tab ${tab==='bilan'?'on':''}`} onClick={()=>setTab('bilan')}>📈 Bilan</button>
      </div>

      {/* ── SUIVI ÉLÈVES TAB ── */}
      {tab==='suivi'&&<div style={{display:'grid',gridTemplateColumns:'250px 1fr',gap:18}}>
        <div>
          <div style={{fontFamily:'Playfair Display,serif',fontSize:14,fontWeight:600,marginBottom:9,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span>Mes élèves ({myEleves.length})</span>
          </div>
          <div className="epanel">{myEleves.length===0?<div style={{padding:'14px',fontSize:12,color:'var(--muted)',fontStyle:'italic'}}>Aucun élève dans vos cours.</div>:myEleves.map(e=>{
            const g=grades[e.id]||[];const mv=moy(g);
            const ass=getEleveAssiduite(e.id);
            const hasFlag=alertes.find(a=>a.eleve.id===e.id);
            return<div key={e.id} className={`eitem ${sel===e.id?'on':''}`} onClick={()=>setSel(e.id)}>
              <div style={{flex:1,minWidth:0}}>
                <div className="ei-n" style={{display:'flex',alignItems:'center',gap:4}}>{e.name}{hasFlag&&<span title="Alertes" style={{fontSize:11}}>⚠️</span>}</div>
                <div className="ei-l">{e.niveau}{ass.total>0&&<span style={{marginLeft:6,color:ass.tauxPres>=80?'var(--ok)':ass.tauxPres>=60?'#c47a00':'var(--err)',fontWeight:600}}>· {ass.tauxPres}%</span>}</div>
              </div>
              {mv&&<span style={{fontWeight:700,fontSize:12,color:sel===e.id?'var(--gold)':gcol(parseFloat(mv),20)}}>{mv}</span>}
            </div>;
          })}
          </div>
        </div>
        <div>
          {!sel?<div className="emp"><div className="emp-icon">👤</div><h3>Sélectionnez un élève</h3><p>Fiche détaillée : notes, assiduité, compétences, contact parent.</p></div>:<>
            {/* En-tête élève */}
            <div style={{background:'white',borderRadius:0,padding:'14px 18px',border:'1.5px solid var(--cream2)',marginBottom:16,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
              <div style={{width:48,height:48,borderRadius:'50%',background:'var(--navy)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>🎓</div>
              <div style={{flex:1,minWidth:160}}>
                <div style={{fontFamily:'Playfair Display,serif',fontSize:17,fontWeight:600}}>{selUser?.name}</div>
                <div style={{fontSize:12,color:'var(--muted)',display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                  <span>{selUser?.niveau}</span>
                  {selCours.length>0&&selCours.map(c=><span key={c.id} style={{...getCoursBadge(c.matiere),fontSize:10}}>{c.matiere}</span>)}
                </div>
              </div>
              {selMoy&&<div style={{textAlign:'center'}}>
                <div style={{fontFamily:'Playfair Display,serif',fontSize:26,fontWeight:700,color:gcol(parseFloat(selMoy),20)}}>{selMoy}</div>
                <div style={{fontSize:10,color:'var(--muted)'}}>Moyenne /20</div>
              </div>}
              {(selUser?.parentEmail||selUser?.parentMail||selUser?.email)&&<a href={buildMailtoEleve(selUser)} style={{padding:'6px 12px',background:'#EEF5FF',border:'1.5px solid #C8D8F5',color:'#1a4fc4',fontSize:11,textDecoration:'none',borderRadius:4,fontWeight:600,whiteSpace:'nowrap'}}>✉ Contacter parent</a>}
            </div>

            {/* Mini-KPI assiduité + compétences */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:18}}>
              <div style={{background:'#f4f7ff',border:'1.5px solid #c8d8f5',borderRadius:6,padding:'10px 12px'}}>
                <div style={{fontSize:11,color:'#6b7ab5',marginBottom:3}}>📊 Notes</div>
                <div style={{fontWeight:700,fontSize:16}}>{selGrades.length}</div>
                <div style={{fontSize:10,color:'var(--muted)'}}>évaluation{selGrades.length>1?'s':''}</div>
              </div>
              <div style={{background:selAss.tauxPres>=80?'#e8f8ee':selAss.tauxPres>=60?'#fff8e0':selAss.total>0?'#fff0f0':'#f4f7ff',border:`1.5px solid ${selAss.tauxPres>=80?'#b8dbb8':selAss.tauxPres>=60?'#f5d882':selAss.total>0?'#f5b8b8':'#c8d8f5'}`,borderRadius:6,padding:'10px 12px'}}>
                <div style={{fontSize:11,color:'#6b7ab5',marginBottom:3}}>📅 Assiduité</div>
                <div style={{fontWeight:700,fontSize:16}}>{selAss.tauxPres!==null?selAss.tauxPres+'%':'—'}</div>
                <div style={{fontSize:10,color:'var(--muted)'}}>{selAss.present}P · {selAss.retard}R · {selAss.absent}A</div>
              </div>
              <div style={{background:'#fff8e0',border:'1.5px solid #f5d882',borderRadius:6,padding:'10px 12px'}}>
                <div style={{fontSize:11,color:'#6b7ab5',marginBottom:3}}>🎯 Compétences</div>
                <div style={{fontWeight:700,fontSize:16}}>{selComp.pct}%</div>
                <div style={{fontSize:10,color:'var(--muted)'}}>{selComp.valide}/{selComp.total} validées</div>
              </div>
              <div style={{background:'#f5f3ff',border:'1.5px solid #d8d0ff',borderRadius:6,padding:'10px 12px'}}>
                <div style={{fontSize:11,color:'#6b7ab5',marginBottom:3}}>📚 Cours</div>
                <div style={{fontWeight:700,fontSize:16}}>{selCours.length}</div>
                <div style={{fontSize:10,color:'var(--muted)'}}>séance{selCours.length>1?'s':''}/sem</div>
              </div>
            </div>

            {/* Notes */}
            <div className="sh"><h2 className="st" style={{fontSize:14}}>Notes</h2></div>
            {selGrades.length===0?<div style={{padding:'14px',fontSize:12,color:'var(--muted)',background:'var(--cream)',borderRadius:4,marginBottom:14,textAlign:'center'}}>Aucune note enregistrée — Cliquez "＋ Note" pour en ajouter.</div>:(
              <table className="tbl" style={{marginBottom:18}}>
                <thead><tr><th>Matière</th><th>Note</th><th>Date</th><th>Appréciation</th><th></th></tr></thead>
                <tbody>{selGrades.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(g=><tr key={g.id}>
                  <td><strong>{g.matiere}</strong></td>
                  <td><span style={{fontWeight:700,color:gcol(g.note,g.max)}}>{g.note}/{g.max}</span></td>
                  <td style={{fontSize:12,color:'var(--muted)'}}>{g.date}</td>
                  <td style={{fontSize:12,color:'var(--muted)',fontStyle:'italic'}}>{g.commentaire}</td>
                  <td><button className="btn btn-d btn-sm" onClick={()=>setGrades(p=>({...p,[sel]:p[sel].filter(x=>x.id!==g.id)}))}>🗑️</button></td>
                </tr>)}</tbody>
              </table>
            )}

            {/* Historique séances avec ce élève */}
            {selAss.total>0&&<>
              <div className="sh"><h2 className="st" style={{fontSize:14}}>Dernières séances</h2></div>
              <div style={{background:'white',border:'1.5px solid var(--cream2)',borderRadius:4,padding:'10px 14px',marginBottom:18}}>
                {Object.entries(appel)
                  .filter(([k,data])=>{const cid=k.split('|')[0];const c=myCours.find(x=>x.id===cid);return c&&c.eleveIds.includes(sel)&&data[sel];})
                  .sort(([a],[b])=>b.localeCompare(a)).slice(0,6).map(([k,data])=>{
                    const[cid,date]=k.split('|');const c=myCours.find(x=>x.id===cid);const st=data[sel];
                    const stColor=st==='present'?'var(--ok)':st==='retard'?'#c47a00':'var(--err)';
                    const stLabel=st==='present'?'✓ Présent':st==='retard'?'⏰ Retard':'✗ Absent';
                    return<div key={k} style={{display:'flex',alignItems:'center',gap:10,padding:'6px 0',borderBottom:'1px solid var(--cream2)',fontSize:12}}>
                      <span style={{color:'var(--muted)',width:90,fontFamily:'var(--ff-mono)'}}>{date}</span>
                      {c&&<span style={{...getCoursBadge(c.matiere),fontSize:10}}>{c.matiere}</span>}
                      {c&&<span style={{fontSize:11,color:'var(--muted)'}}>{c.jour} {hs(c.debut)}</span>}
                      <span style={{marginLeft:'auto',color:stColor,fontWeight:700}}>{stLabel}</span>
                    </div>;
                  })}
              </div>
            </>}
          </>}
        </div>
      </div>}

      {/* ── APPEL TAB ── */}
      {tab==='appel'&&<>
        {/* Sélecteur cours + date */}
        <div style={{display:'flex',gap:12,marginBottom:20,flexWrap:'wrap',background:'white',padding:'16px',borderRadius:0,border:'1.5px solid var(--cream2)'}}>
          <div className="fg" style={{flex:1,minWidth:220,margin:0}}>
            <label className="fl" style={{display:'flex',alignItems:'center',gap:6}}>
              Cours / créneau
              {autoSelectCours?.label&&<span style={{padding:'1px 7px',borderRadius:0,fontSize:10,fontWeight:700,background:autoSelectCours.label==='En cours'?'#EEFFF6':'#EEF5FF',color:autoSelectCours.label==='En cours'?'var(--ok)':'var(--gold)'}}>{autoSelectCours.label==='En cours'?'🟢 En cours':'🔵 '+autoSelectCours.label}</span>}
            </label>
            <select className="fi" value={selC||''} onChange={e=>setSelC(e.target.value)}>
              {myCours.length===0&&<option value=''>Aucun cours planifié</option>}
              {myCours.map(c=>{
                const dayNames=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
                const todayName=dayNames[new Date().getDay()];
                const nowH=new Date().getHours()+new Date().getMinutes()/60;
                const isNow=c.jour===todayName&&c.debut<=nowH&&nowH<=c.fin;
                const isSoon=c.jour===todayName&&c.debut>nowH&&c.debut-nowH<=2;
                return <option key={c.id} value={c.id}>{isNow?'🟢 ':isSoon?'🔵 ':''}{c.matiere} — {c.niveau} · {c.jour} {hs(c.debut)}–{hs(c.fin)}</option>;
              })}
            </select>
          </div>
          <div className="fg" style={{margin:0}}>
            <label className="fl">Date de la séance</label>
            <input type="date" className="fi" value={aDate} onChange={e=>setADate(e.target.value)}/>
          </div>
          {curCours&&<div style={{alignSelf:'flex-end',paddingBottom:0}}>
            <span style={{...getCoursBadge(curCours.matiere),fontSize:12}}>{curCours.salle}</span>
          </div>}
        </div>

        {!selC||coursEleves.length===0?
          <div className="emp"><div className="emp-icon">📋</div><h3>Sélectionnez un cours</h3><p>Choisissez un cours pour faire l'appel.</p></div>
        :<>
          <div style={{background:'white',borderRadius:0,border:'1.5px solid var(--cream2)',overflow:'hidden',marginBottom:20}}>
            {/* Header */}
            <div style={{padding:'11px 16px',borderBottom:'1px solid var(--cream2)',display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--cream)'}}>
              <div style={{fontWeight:600,fontSize:14}}>{curCours.matiere} — {curCours.niveau}</div>
              <div style={{display:'flex',gap:14,fontSize:12}}>
                <span style={{color:'var(--ok)',fontWeight:600}}>✓ {statCount(curAppel,'present')}</span>
                <span style={{color:'#D97706',fontWeight:600}}>⏰ {statCount(curAppel,'retard')}</span>
                <span style={{color:'var(--err)',fontWeight:600}}>✗ {statCount(curAppel,'absent')}</span>
                <span style={{color:'var(--muted)'}}>— {coursEleves.length-Object.keys(curAppel).length} non renseigné{coursEleves.length-Object.keys(curAppel).length>1?'s':''}</span>
              </div>
            </div>
            {/* Élève rows */}
            {coursEleves.map(e=>{
              const status=curAppel[e.id];
              return <div key={e.id} className="appel-row">
                <div style={{display:'flex',alignItems:'center',gap:11}}>
                  <div style={{width:38,height:38,borderRadius:2,background:status==='present'?'#EEFFF6':status==='absent'?'#FFF0F0':status==='retard'?'#EEF5FF':'var(--cream2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,border:`2px solid ${status==='present'?'var(--ok)':status==='absent'?'var(--err)':status==='retard'?'#D97706':'transparent'}`,transition:'all .2s'}}>🎓</div>
                  <div>
                    <div style={{fontWeight:600,fontSize:14}}>{e.name}</div>
                    <div style={{fontSize:11,color:'var(--muted)'}}>{e.niveau}</div>
                  </div>
                </div>
                <div style={{display:'flex',gap:7}}>
                  {[
                    {s:'present',icon:'✓',label:'Présent',bg:'#EEFFF6',col:'var(--ok)'},
                    {s:'retard',icon:'⏰',label:'Retard',bg:'#EEF5FF',col:'#D97706'},
                    {s:'absent',icon:'✗',label:'Absent',bg:'#FFF0F0',col:'var(--err)'},
                  ].map(({s,icon,label,bg,col})=>(
                    <button key={s} className="appel-stat-btn" onClick={()=>setStatus(e.id,s)}
                      style={{background:status===s?bg:'white',color:status===s?col:'var(--muted)',borderColor:status===s?col:'var(--cream2)',fontWeight:status===s?700:400}}>
                      {icon} {label}
                    </button>
                  ))}
                </div>
              </div>;
            })}
            <div className="appel-footer">
              <span style={{color:'var(--muted)'}}>💾 Sauvegarde automatique</span>
            </div>
          </div>

          {/* Historique */}
          {histAppel.length>0&&<>
            <div className="sh"><h2 className="st" style={{fontSize:16}}>Séances précédentes</h2></div>
            <table className="tbl">
              <thead><tr><th>Date</th><th>Présents</th><th>Retards</th><th>Absents</th></tr></thead>
              <tbody>{histAppel.map(([k,data])=>{
                const date=k.split('|')[1];
                return <tr key={k}>
                  <td style={{fontWeight:500}}>{date}</td>
                  <td><span style={{color:'var(--ok)',fontWeight:600}}>{statCount(data,'present')}/{coursEleves.length}</span></td>
                  <td><span style={{color:'#D97706',fontWeight:600}}>{statCount(data,'retard')}</span></td>
                  <td><span style={{color:'var(--err)',fontWeight:600}}>{statCount(data,'absent')}</span></td>
                </tr>;
              })}</tbody>
            </table>
          </>}
        </>}
      </>}

      {/* ── MES GROUPES TAB ── */}
      {tab==='groupes'&&<>
        {myCours.length===0?
          <div className="emp"><div className="emp-icon">👥</div><h3>Aucun groupe</h3><p>Vous n'avez aucun cours/groupe planifié.</p></div>
        :<div style={{display:'grid',gridTemplateColumns:'260px 1fr',gap:18}}>
          {/* Liste des groupes */}
          <div>
            <div style={{fontFamily:'Playfair Display,serif',fontSize:14,fontWeight:600,marginBottom:9}}>Mes cours ({myCours.length})</div>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {myCours.map(c=>{
                const els=users.filter(u=>c.eleveIds.includes(u.id));
                const isSel=selGroupe===c.id;
                return<div key={c.id} onClick={()=>setSelGroupe(c.id)} style={{padding:'10px 12px',borderRadius:4,background:isSel?'var(--navy)':'white',border:'1.5px solid var(--cream2)',cursor:'pointer'}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                    <span style={{...getCoursBadge(c.matiere),fontSize:10}}>{c.matiere}</span>
                    <span style={{fontSize:11,fontWeight:600,color:isSel?'white':'var(--navy)'}}>{c.niveau}</span>
                  </div>
                  <div style={{fontSize:11,color:isSel?'rgba(255,255,255,.7)':'var(--muted)'}}>
                    📅 {c.jour} · {hs(c.debut)}–{hs(c.fin)} · 📍 {c.salle}
                  </div>
                  <div style={{fontSize:11,color:isSel?'rgba(255,255,255,.7)':'var(--muted)',marginTop:2}}>👤 {els.length} élève{els.length>1?'s':''}</div>
                </div>;
              })}
            </div>
          </div>
          {/* Détail groupe sélectionné */}
          <div>
            {!curGroupe?<div className="emp"><div className="emp-icon">👆</div><h3>Sélectionnez un groupe</h3></div>:<>
              <div style={{background:'white',padding:'14px 18px',border:'1.5px solid var(--cream2)',borderRadius:4,marginBottom:14,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
                <div style={{width:48,height:48,borderRadius:8,background:'var(--navy)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>👥</div>
                <div style={{flex:1,minWidth:160}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>

// ─── MODULES (admin crée, tous consultent) ───
function Modules({user,users,modules,setModules,enrollments,setEnrollments}){
  const [fm,setFm]=useState('Toutes');
  const [show,setShow]=useState(false);
  const [form,setForm]=useState({title:'',emoji:'📚',desc:'',niveau:'3ème',date:'',heure:'',places:10,lieu:'Salle A',matiere:'Mathématiques',bg:'#EEF3FF',profId:'p1'});
  const isAdmin=user.role==='admin';
  const myEnr=enrollments[user.id]||[];
  const filtered=fm==='Toutes'?modules:modules.filter(m=>m.matiere===fm);
  const isEnr=(id)=>myEnr.includes(id);
  const allProfs=users.filter(u=>u.role==='prof');

  const enroll=(id)=>{const mod=modules.find(m=>m.id===id);if(!mod||mod.inscrits>=mod.places)return;setEnrollments(p=>({...p,[user.id]:[...(p[user.id]||[]),id]}));setModules(p=>p.map(m=>m.id===id?{...m,inscrits:m.inscrits+1}:m));};
  const unenroll=(id)=>{setEnrollments(p=>({...p,[user.id]:(p[user.id]||[]).filter(x=>x!==id)}));setModules(p=>p.map(m=>m.id===id?{...m,inscrits:Math.max(0,m.inscrits-1)}:m));};
  const add=()=>{if(!form.title.trim())return;setModules(p=>[...p,{id:'m'+Date.now(),...form,places:parseInt(form.places),inscrits:0}]);setShow(false);};
  const del=(id)=>{setModules(p=>p.filter(m=>m.id!==id));setEnrollments(p=>{const n={...p};Object.keys(n).forEach(k=>{n[k]=(n[k]||[]).filter(x=>x!==id)});return n;});sbDelete('modules',id);};

  return <>
    <TB title="Modules & Activités">
      {isAdmin&&<button className="btn btn-p" onClick={()=>setShow(true)}>＋ Créer un module</button>}
    </TB>
    <div className="pg">
      {!isAdmin&&<div style={{background:'#EEF5FF',border:'1.5px solid rgba(26,111,212,.3)',borderRadius:0,padding:'9px 14px',marginBottom:16,fontSize:13,color:'#0d4a8f'}}>
        📋 Les modules sont créés et gérés par l'administration. Contactez l'admin pour toute demande d'ajout.
      </div>}
      <div className="fb">
        <span style={{fontSize:11,fontWeight:600,color:'var(--muted)',alignSelf:'center',marginRight:3}}>Matière :</span>
        {MATIERES.map(m=><button key={m} className={`chip ${fm===m?'on':''}`} onClick={()=>setFm(m)}>{m}</button>)}
      </div>
      {filtered.length===0?<div className="emp"><div className="emp-icon">🗓️</div><h3>Aucun module</h3></div>:(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(268px,1fr))',gap:16}}>
          {filtered.map(mod=>{
            const enrolled=isEnr(mod.id);
            const full=mod.inscrits>=mod.places;
            const pct=Math.min((mod.inscrits/mod.places)*100,100);
            const prof=users.find(u=>u.id===mod.profId);
            return <div key={mod.id} className="mc">
              <div className="mc-hd" style={{background:mod.bg||'#EEF3FF'}}>
                <span>{mod.emoji}</span>
                {enrolled&&<span style={{position:'absolute',top:8,right:8,background:'var(--info)',color:'white',fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:2}}>✓ Inscrit</span>}
                {full&&!enrolled&&<span style={{position:'absolute',top:8,right:8,background:'var(--err)',color:'white',fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:2}}>Complet</span>}
              </div>
              <div className="mc-bd">
                <div className="mc-ttl">{mod.title}</div>
                <div className="mc-inf">
                  <div>📅 {mod.date} · {mod.heure}</div>
                  <div>📍 {mod.lieu} · 🎯 {mod.niveau}</div>
                  {prof&&<div>👤 {prof.name.split(' ').slice(-1)[0]}</div>}
                </div>
                <p style={{fontSize:12,color:'var(--muted)',margin:'0 0 11px',lineHeight:1.5}}>{mod.desc}</p>
                <div style={{marginBottom:11}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--muted)',marginBottom:3}}><span>Places</span><span style={{fontWeight:600}}>{mod.inscrits}/{mod.places}</span></div>
                  <div className="pb"><div className="pbf" style={{width:`${pct}%`,background:pct>=100?'var(--err)':pct>70?'#D97706':'var(--ok)'}}/></div>
                </div>
                <div style={{display:'flex',gap:7}}>
                  {user.role==='eleve'&&(enrolled?
                    <button className="btn btn-o" style={{flex:1,fontSize:12}} onClick={()=>unenroll(mod.id)}>Se désinscrire</button>:
                    <button className="btn btn-p" style={{flex:1,fontSize:12}} disabled={full} onClick={()=>enroll(mod.id)}>{full?'Complet':"S'inscrire"}</button>
                  )}
                  {isAdmin&&<button className="btn btn-d btn-sm" onClick={()=>del(mod.id)}>🗑️</button>}
                </div>
              </div>
            </div>;
          })}
        </div>
      )}
    </div>
    {show&&<Modal title="Créer un module" onClose={()=>setShow(false)}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 70px',gap:10}}>
        <div className="fg"><label className="fl">Titre *</label><input className="fi" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Ex: Stage Maths Brevet"/></div>
        <div className="fg"><label className="fl">Emoji</label><input className="fi" value={form.emoji} onChange={e=>setForm({...form,emoji:e.target.value})} style={{textAlign:'center',fontSize:18}}/></div>
      </div>
      <div className="fg"><label className="fl">Professeur responsable</label>
        <select className="fi" value={form.profId} onChange={e=>setForm({...form,profId:e.target.value})}>
          {allProfs.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
      </div>
      <div className="fg"><label className="fl">Description</label><textarea className="fi" value={form.desc} onChange={e=>setForm({...form,desc:e.target.value})}/></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div className="fg"><label className="fl">Date</label><input className="fi" type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/></div>
        <div className="fg"><label className="fl">Horaires</label><input className="fi" value={form.heure} onChange={e=>setForm({...form,heure:e.target.value})} placeholder="14h00–17h00"/></div>
        <div className="fg"><label className="fl">Places</label><input className="fi" type="number" value={form.places} onChange={e=>setForm({...form,places:e.target.value})}/></div>
        <div className="fg"><label className="fl">Lieu</label><input className="fi" value={form.lieu} onChange={e=>setForm({...form,lieu:e.target.value})}/></div>
        <div className="fg"><label className="fl">Niveau</label><select className="fi" value={form.niveau} onChange={e=>setForm({...form,niveau:e.target.value})}>{NIVEAUX.filter(n=>n!=='Tous').map(n=><option key={n}>{n}</option>)}</select></div>
        <div className="fg"><label className="fl">Matière</label><select className="fi" value={form.matiere} onChange={e=>setForm({...form,matiere:e.target.value})}>{MATIERES.filter(m=>m!=='Toutes').map(m=><option key={m}>{m}</option>)}</select></div>
      </div>
      <div className="fa"><button className="btn btn-o" onClick={()=>setShow(false)}>Annuler</button><button className="btn btn-p" onClick={add}>Créer</button></div>
    </Modal>}
  </>;
}

// ─── PLANNING EDITOR ───
function PlanningEditor({users,cours,setCours}){
  const [showSlot,setShowSlot]=useState(false);
  const [editSlot,setEditSlot]=useState(null);
  const [slotForm,setSlotForm]=useState({profId:'',matiere:'Mathématiques',niveau:'3ème',jour:'Lundi',debut:'14',fin:'15.5',salle:'Salle A',eleveIds:[],recurrent:true});
  const SALLES=['Salle A','Salle B','Salle C','Salle D'];
  const PH=42;
  const PH_START=9,PH_END=20;
  const PHOURS=Array.from({length:PH_END-PH_START+1},(_,i)=>i+PH_START);
  const [dragId,setDragId]=useState(null);
  const [dragOver,setDragOver]=useState(null);
  const dragRef=React.useRef({offsetH:0});
  const eleves=users.filter(u=>u.role==='eleve');
  const profs=users.filter(u=>u.role==='prof');

  const overlapLayout=useMemo(()=>{
    const map={};
    DAYS.forEach(jour=>{
      const slots=cours.filter(c=>c.jour===jour).sort((a,b)=>a.debut-b.debut);
      const colEnd=[];
      slots.forEach(s=>{
        let col=colEnd.findIndex(end=>end<=s.debut);
        if(col===-1){col=colEnd.length;}
        colEnd[col]=s.fin;
        map[s.id]={col};
      });
      slots.forEach(s=>{
        const ov=slots.filter(o=>o.debut<s.fin&&o.fin>s.debut);
        map[s.id].total=Math.max(...ov.map(o=>map[o.id]?.col??0))+1;
      });
      slots.forEach(s=>{
        const ov=slots.filter(o=>o.debut<s.fin&&o.fin>s.debut);
        const maxT=Math.max(...ov.map(o=>map[o.id].total));
        ov.forEach(o=>{map[o.id].total=maxT;});
      });
    });
    return map;
  },[cours]);

  const conflicts=useMemo(()=>{
    const list=[];
    cours.forEach((c,i)=>{
      cours.slice(i+1).forEach(c2=>{
        if(c.jour!==c2.jour)return;
        const overlap=c.debut<c2.fin&&c2.debut<c.fin;
        if(!overlap)return;
        if(c.profId===c2.profId){
          const p=users.find(u=>u.id===c.profId);
          list.push({type:'prof',ids:[c.id,c2.id],msg:`👨‍🏫 ${p?.name.split(' ').slice(-1)[0]} est dans 2 créneaux simultanés (${c.matiere} & ${c2.matiere}) le ${c.jour} ${hs(c.debut)}–${hs(c.fin)}`});
        }
        const shared=c.eleveIds.filter(id=>c2.eleveIds.includes(id));
        shared.forEach(eid=>{
          const e=users.find(u=>u.id===eid);
          list.push({type:'eleve',ids:[c.id,c2.id],msg:`🎓 ${e?.name} est dans 2 créneaux simultanés (${c.matiere} & ${c2.matiere}) le ${c.jour} ${hs(c.debut)}–${hs(c.fin)}`});
        });
      });
    });
    return list;
  },[cours,users]);
  const conflictIds=new Set(conflicts.flatMap(c=>c.ids));

  const openNewSlot=(jour,debut)=>{
    setEditSlot(null);
    setSlotForm({profId:profs[0]?.id||'',matiere:'Mathématiques',niveau:'3ème',jour:jour||'Lundi',debut:String(debut||14),fin:String((debut||14)+1.5),salle:'Salle A',eleveIds:[],recurrent:true});

  const openEditSlot=(c)=>{
    setEditSlot(c.id);
    setSlotForm({profId:c.profId,matiere:c.matiere,niveau:c.niveau,jour:c.jour,debut:String(c.debut),fin:String(c.fin),salle:c.salle,eleveIds:[...c.eleveIds],recurrent:c.recurrent!==false});
    setShowSlot(true);
  };
  const saveSlot=()=>{
    const s={...slotForm,debut:parseFloat(slotForm.debut),fin:parseFloat(slotForm.fin)};
    if(!s.profId||s.debut>=s.fin)return;
    if(editSlot){setCours(p=>p.map(c=>c.id===editSlot?{...c,...s}:c));}
    else{setCours(p=>[...p,{id:'c'+Date.now(),...s}]);}
    setShowSlot(false);
  };
  const deleteSlot=(id)=>{if(window.confirm('Supprimer ce créneau ?'))setCours(p=>p.filter(c=>c.id!==id));};

  return <>
    <div style={{marginTop:8}}>
        {/* Conflicts banner */}
        {conflicts.length>0&&<div className="conflict-panel">
          <div style={{fontWeight:700,fontSize:13,color:'var(--err)',marginBottom:8}}>⚠️ {conflicts.length} conflit{conflicts.length>1?'s':''} détecté{conflicts.length>1?'s':''}</div>
          {conflicts.map((c,i)=><div key={i} className="conflict-item">→ {c.msg}</div>)}
        </div>}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div style={{fontSize:12,color:'var(--muted)'}}>🖱️ Glisser pour déplacer · Cliquer pour modifier · Cellule vide pour créer</div>
          <button className="btn btn-p btn-sm" onClick={()=>openNewSlot('Lundi',14)}>＋ Nouveau créneau</button>
        </div>
        {/* Planning grid */}
        <div style={{overflowX:'auto',userSelect:'none'}}>
        <div className="plan-grid" style={{minWidth:700}}>
          {/* Header */}
          <div className="plan-hd"/>
          {DAYS.map(d=><div key={d} className="plan-hd">{d.slice(0,3).toUpperCase()}</div>)}
          {/* Body */}
          {PHOURS.map(h=><React.Fragment key={h}>
            <div className="plan-time-lbl" style={{height:PH}}>{h}h</div>
            {DAYS.map(d=>{
              const isOver=dragOver&&dragOver.jour===d&&dragOver.h===h;
              // Preview slot while dragging
              const draggedC=dragId?cours.find(c=>c.id===dragId):null;
              const previewTop=0;
              const previewH=draggedC?(draggedC.fin-draggedC.debut)*PH-2:0;
              return <div key={d}
                className={`plan-day-col plan-cell${isOver?' drop-target':''}`}
                style={{height:PH,position:'relative'}}
                onDragOver={e=>{e.preventDefault();setDragOver({jour:d,h});}}
                onDragLeave={()=>setDragOver(null)}
                onDrop={e=>{
                  e.preventDefault();
                  if(!dragId||!dragOver)return;
                  const c=cours.find(x=>x.id===dragId);
                  if(!c)return;
                  const dur=c.fin-c.debut;
                  // Snap to .5h increments
                  const newDebut=Math.round((dragOver.h+dragRef.current.offsetH)*2)/2;
                  const clamped=Math.max(PH_START,Math.min(PH_END-dur,newDebut));
                  setCours(p=>p.map(x=>x.id===dragId?{...x,jour:dragOver.jour,debut:clamped,fin:Math.round((clamped+dur)*2)/2}:x));
                  setDragId(null);setDragOver(null);
                }}
                onClick={e=>{if(e.target===e.currentTarget&&!dragId)openNewSlot(d,h);}}>
                {/* Drop preview ghost */}
                {isOver&&draggedC&&<div className="drop-preview" style={{top:previewTop,height:previewH}}/>}
                {/* Slots starting this hour */}
                {cours.filter(c=>c.jour===d&&c.debut>=h&&c.debut<h+1).map(c=>{
                  const clr=nc(c.niveau);
                  const top=(c.debut-h)*PH;
                  const height=(c.fin-c.debut)*PH-2;
                  const hasConflict=conflictIds.has(c.id);
                  const p=users.find(u=>u.id===c.profId);
                  const isDragging=dragId===c.id;
                  return <div key={c.id}
                    className={`plan-slot${hasConflict?' conflict':''}${isDragging?' dragging':''}`}
                    draggable
                    style={(()=>{
                      const ol=overlapLayout[c.id]||{col:0,total:1};
                      const gap=2;
                      const pct=100/ol.total;
                      return {
                        top,height,
                        background:clr.bg,
                        borderColor:hasConflict?'var(--err)':clr.bd,
                        position:'absolute',
                        left:`calc(${ol.col*pct}% + ${gap}px)`,
                        width:`calc(${pct}% - ${gap*2}px)`,
                        right:'auto',
                        zIndex:isDragging?10:2
                      };
                    })()}
                    onDragStart={e=>{
                      // Calculate where in the slot the user grabbed
                      const rect=e.currentTarget.getBoundingClientRect();
                      const offsetPx=e.clientY-rect.top;
                      dragRef.current.offsetH=-(offsetPx/PH);
                      setDragId(c.id);
                      e.dataTransfer.effectAllowed='move';
                      // Transparent drag image
                      const ghost=document.createElement('div');
                      ghost.style.cssText='position:fixed;top:-1000px;width:80px;height:40px;background:transparent';
                      document.body.appendChild(ghost);
                      e.dataTransfer.setDragImage(ghost,0,0);
                      setTimeout(()=>document.body.removeChild(ghost),0);
                    }}
                    onDragEnd={()=>{setDragId(null);setDragOver(null);}}
                    onClick={e=>{e.stopPropagation();if(!dragId)openEditSlot(c);}}>
                    {hasConflict&&<span className="conflict-badge">⚠️</span>}
                    <div style={{fontSize:10,fontWeight:700,color:clr.tx,lineHeight:1.2}}>{c.matiere}</div>

                    {height>42&&<div style={{fontSize:9,color:'var(--muted)'}}>{hs(c.debut)}–{hs(c.fin)}</div>}
                    {height>56&&<div style={{fontSize:9,color:'var(--muted)'}}>{p?.name.split(' ').slice(-1)[0]}</div>}
                    <div style={{position:'absolute',bottom:2,right:3,fontSize:9,opacity:.4}}>{c.recurrent!==false?'↺':'📌'}</div>
                  </div>;
                })}
              </div>;
            })}
          </React.Fragment>)}
        </div>
        </div>
        {/* Legend */}
        <div style={{display:'flex',gap:16,flexWrap:'wrap',marginTop:12,fontSize:12,color:'var(--muted)'}}>
          {Object.entries(MC).map(([m,c])=><span key={m} style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,borderRadius:2,background:c.bg,border:`2px solid ${c.bd}`,display:'inline-block'}}/>{m}</span>)}
          <span style={{display:'flex',alignItems:'center',gap:4,color:'var(--err)'}}><span style={{width:10,height:10,borderRadius:2,background:'#FFF0F0',border:'2px solid var(--err)',display:'inline-block'}}/>Conflit</span>
        </div>

    </div>
    {showSlot&&<Modal title={editSlot?'Modifier le créneau':'Nouveau créneau'} onClose={()=>setShowSlot(false)}>

        </div>
        <div className="fg"><label className="fl">Jour</label>

            </button>
            <button type="button" onClick={()=>setSlotForm(p=>({...p,recurrent:false}))}

              📌 Ponctuel <span style={{fontSize:10,color:'var(--muted)',fontWeight:400}}>— Séance unique</span>
            </button>
          </div>
        </div>
        <div className="fg"><label className="fl">Début (h décimal)</label>
          <input className="fi" type="number" step="0.5" min="8" max="20" value={slotForm.debut} onChange={e=>setSlotForm({...slotForm,debut:e.target.value})}/>
          <div style={{fontSize:10,color:'var(--muted)',marginTop:3}}>Ex: 14 = 14h00, 14.5 = 14h30</div>
        </div>
        <div className="fg"><label className="fl">Fin (h décimal)</label>
          <input className="fi" type="number" step="0.5" min="8" max="21" value={slotForm.fin} onChange={e=>setSlotForm({...slotForm,fin:e.target.value})}/>
          <div style={{fontSize:10,color:'var(--muted)',marginTop:3}}>Durée : {slotForm.fin&&slotForm.debut?((parseFloat(slotForm.fin)-parseFloat(slotForm.debut))*60).toFixed(0)+' min':'—'}</div>
        </div>
      </div>
      <div className="fg">
        <label className="fl">Élèves inscrits dans ce groupe</label>
        <div style={{display:'flex',flexWrap:'wrap',gap:6,padding:'8px',border:'1.5px solid var(--cream2)',borderRadius:2,background:'white',maxHeight:120,overflowY:'auto'}}>
          {eleves.map(e=>{const on=slotForm.eleveIds.includes(e.id);return(
            <button key={e.id} onClick={()=>setSlotForm(p=>({...p,eleveIds:on?p.eleveIds.filter(x=>x!==e.id):[...p.eleveIds,e.id]}))}
              style={{padding:'3px 9px',borderRadius:2,border:`1.5px solid ${on?'var(--navy)':'var(--cream2)'}`,background:on?'var(--navy)':'white',color:on?'white':'var(--text)',fontSize:11,fontWeight:on?600:400,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>
              {e.name} <span style={{opacity:.6}}>({e.niveau})</span>
            </button>
          );})}
        </div>
      </div>
      {/* ── Panneau d'impact ── */}
      {(()=>{
        const deb=parseFloat(slotForm.debut);const fin=parseFloat(slotForm.fin);
        if(!slotForm.profId||isNaN(deb)||isNaN(fin)||deb>=fin)return null;
        const preview={...slotForm,id:editSlot||'__new__',debut:deb,fin};
        const duree=fin-deb;
        const tarifH=35; // €/h par élève (taux moyen)

        // ── Conflits simultanés ──
        const simult=cours.filter(c=>c.id!==editSlot&&c.jour===preview.jour&&deb<c.fin&&c.debut<fin);
        const conflicts=[];
        simult.forEach(c=>{
          if(c.profId===preview.profId){const p=users.find(u=>u.id===c.profId);conflicts.push({type:'err',msg:`${p?.name.split(' ').slice(-1)[0]} simultané sur ${c.matiere} ${c.niveau} (${hs(c.debut)}–${hs(c.fin)})`});}
          const shared=preview.eleveIds.filter(id=>c.eleveIds.includes(id));
          shared.forEach(id=>{const e=users.find(u=>u.id===id);conflicts.push({type:'err',msg:`${e?.name} simultané sur ${c.matiere} ${c.niveau}`});});
        });

        // ── Enchaînements serrés (<30min de battement) ──
        const nearby=cours.filter(c=>c.id!==editSlot&&c.jour===preview.jour&&(
          (c.fin<=deb&&deb-c.fin<0.5) || (c.debut>=fin&&c.debut-fin<0.5)
        ));
        nearby.forEach(c=>{
          const gap=c.debut>=fin?c.debut-fin:deb-c.fin;
          const gapMin=Math.round(gap*60);
          if(c.profId===preview.profId){const p=users.find(u=>u.id===c.profId);conflicts.push({type:'warn',msg:`${p?.name.split(' ').slice(-1)[0]} enchaîne ${c.matiere} ${c.niveau} avec seulement ${gapMin}min de battement`});}
          const shared=preview.eleveIds.filter(id=>c.eleveIds.includes(id));
          shared.forEach(id=>{const e=users.find(u=>u.id===id);conflicts.push({type:'warn',msg:`${e?.name} enchaîne avec ${c.matiere} ${c.niveau} (${gapMin}min)`});});
        });

        // ── Rentabilité prévisionnelle ──
        const nbEleves=preview.eleveIds.length;
        const revMois=nbEleves*tarifH*duree*4; // ~4 semaines/mois
        const prevC=editSlot?cours.find(c=>c.id===editSlot):null;
        const prevEleves=prevC?prevC.eleveIds.length:0;
        const prevRev=prevEleves*tarifH*(prevC?prevC.fin-prevC.debut:0)*4;
        const deltaRev=revMois-prevRev;

        return <div style={{marginTop:12,borderTop:'1.5px solid var(--cream2)',paddingTop:10}}>
          {/* Rentabilité */}
          <div style={{display:'flex',gap:10,marginBottom:8,flexWrap:'wrap'}}>
            <div style={{flex:1,background:'#F0F6FF',border:'1.5px solid #C8D8F5',borderRadius:4,padding:'10px 14px'}}>
              <div style={{fontSize:10,color:'#6b7ab5',textTransform:'uppercase',letterSpacing:.5,marginBottom:4,fontWeight:700}}>💰 Rentabilité prévisionnelle</div>
              <div style={{fontSize:18,fontWeight:700,color:'#1a3a8c'}}>{revMois}€<span style={{fontSize:11,fontWeight:400,color:'#6b7ab5'}}>/mois</span></div>
              <div style={{fontSize:11,color:'#6b7ab5',marginTop:2}}>{nbEleves} élève{nbEleves>1?'s':''} × {tarifH}€/h × {duree}h × 4 sem.</div>
              {editSlot&&prevC&&deltaRev!==0&&<div style={{marginTop:4,fontSize:12,fontWeight:700,color:deltaRev>0?'#059669':'#DC2626'}}>
                {deltaRev>0?'↑':''}{deltaRev<0?'↓':''} {deltaRev>0?'+':''}{deltaRev}€/mois vs actuel ({prevRev}€)
              </div>}
            </div>
            <div style={{flex:1,background:conflicts.length?'#FFF8E0':'#F0FDF4',border:`1.5px solid ${conflicts.length?'#F5D882':'#86EFAC'}`,borderRadius:4,padding:'10px 14px'}}>
              <div style={{fontSize:10,textTransform:'uppercase',letterSpacing:.5,marginBottom:4,fontWeight:700,color:conflicts.length?'#C47A00':'#059669'}}>
                {conflicts.length?'⚠️':'✅'} Analyse des conflits
              </div>
              <div style={{fontSize:13,fontWeight:700,color:conflicts.length?'#C47A00':'#059669'}}>
                {conflicts.filter(c=>c.type==='err').length} conflit{conflicts.filter(c=>c.type==='err').length>1?'s':''} direct{conflicts.filter(c=>c.type==='err').length>1?'s':''}
              </div>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>
                {conflicts.filter(c=>c.type==='warn').length} enchaînement{conflicts.filter(c=>c.type==='warn').length>1?'s':''} serré{conflicts.filter(c=>c.type==='warn').length>1?'s':''}
              </div>
            </div>
          </div>
          {/* Détail conflits */}
          {conflicts.length>0&&<div style={{display:'flex',flexDirection:'column',gap:4}}>
            {conflicts.map((c,i)=><div key={i} style={{display:'flex',alignItems:'flex-start',gap:7,padding:'6px 10px',background:c.type==='err'?'#FFF0F0':'#FFFCE8',border:`1px solid ${c.type==='err'?'#FECACA':'#FDE68A'}`,borderRadius:3,fontSize:12,color:c.type==='err'?'#B91C1C':'#92400E'}}>
              <span style={{flexShrink:0}}>{c.type==='err'?'🔴':'🟡'}</span>{c.msg}
            </div>)}
          </div>}
          {conflicts.length===0&&<div style={{fontSize:12,color:'#059669',padding:'4px 0'}}>✅ Aucun conflit ni enchaînement problématique détecté.</div>}
        </div>;
      })()}
      <div className="fa">
        {editSlot&&<button className="btn btn-d" onClick={()=>{deleteSlot(editSlot);setShowSlot(false);}}>🗑️ Supprimer</button>}
        <button className="btn btn-o" onClick={()=>setShowSlot(false)}>Annuler</button>
        <button className="btn btn-p" onClick={saveSlot}>{editSlot?'Enregistrer':'Créer'}</button>
      </div>
    </Modal>}
  </>;
}

// ─── HELPER : Facturation automatique à l'inscription cours ───
// Recalcule la facture auto-générée d'un élève selon ses cours actuels.
// - 0 cours : supprime sa facture auto en attente
// - sinon : crée ou met à jour la facture auto du mois suivant (échéance le 5 du mois suivant)
const TARIF_BASE_AUTO=55;
const PRIX_PALIERS=[0,65,120,165,210,245,290,335,380,425];
function tarifMensuel(n){ n=Math.max(0,n|0); if(n===0)return 0; if(n<PRIX_PALIERS.length)return PRIX_PALIERS[n]; return 425+(n-9)*45; }
function recalcAutoInvoice({eleveId,coursArr,users,setFactures}){
  if(!eleveId||!setFactures)return;
  const eleve=users.find(u=>u.id===eleveId);
  if(!eleve)return;
  const ln=eleve.name.trim().split(/\s+/).slice(-1)[0];
  const famId='fam_'+ln.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const allGroups=coursArr.filter(c=>c.eleveIds.includes(eleveId));
  const mats=[...new Set(allGroups.map(c=>c.matiere))];
  const montant=tarifMensuel(allGroups.length);
  const ed=new Date();ed.setDate(5);ed.setMonth(ed.getMonth()+1);
  const monthKey=ed.toISOString().slice(0,7);
  const mo=ed.toLocaleString('fr-FR',{month:'long',year:'numeric'});
  const libelle=`Forfait ${mats.join(' + ')} — ${eleve.name} — ${mo}`;
  setFactures(prev=>{
    const existing=prev.find(f=>f.eleveId===eleveId&&f.autoGenerated&&f.statut==='attente'&&f.echeance&&f.echeance.startsWith(monthKey));
    if(montant===0){
      return prev.filter(f=>!(f.eleveId===eleveId&&f.autoGenerated&&f.statut==='attente'));
    }
    if(existing){
      return prev.map(f=>f.id===existing.id?{...f,montant,libelle,familleId:famId,nbCreneaux:allGroups.length}:f);
    }
    return [...prev,{id:'fa'+Date.now()+'_'+eleveId.slice(-6),familleId:famId,eleveId,libelle,type:'mensuel',montant,echeance:ed.toISOString().split('T')[0],statut:'attente',datePaiement:null,nbCreneaux:allGroups.length,reduction:0,autoGenerated:true}];
  });
}

// ─── INSCRIPTIONS — Page dédiée pour gérer les nouvelles inscriptions ───
function Inscriptions({user,users,setUsers,cours,setCours,inscriptions=[],setInscriptions,setFactures,demandesWeb=[],setDemandesWeb}){
  const [selIns,setSelIns]=useState(null);
  const [showIns,setShowIns]=useState(false);
  const [showAssign,setShowAssign]=useState(false);
  const [insForm,setInsForm]=useState({prenom:'',nom:'',dateNaissance:'',niveau:'3ème',matieres:[],parentNom:'',parentTel:'',parentEmail:'',adresse:'',notes:'',statut:'nouveau'});
  const [searchIns,setSearchIns]=useState('');
  const [filterStatut,setFilterStatut]=useState('tous');
  const [filterNiveau,setFilterNiveau]=useState('tous');
  const [sortBy,setSortBy]=useState('date');
  const [tab,setTab]=useState('liste'); // liste | groupes
  const [vue,setVue]=useState('web'); // web | gestion
  const nbWebNouveau=demandesWeb.filter(d=>(d.statut||'nouveau')==='nouveau').length;
  const [insPage,setInsPage]=useState(1);
  const PAGE=30;

  const NIVEAUX_INS=['6ème','5ème','4ème','3ème','Seconde','Première','Terminale','Supérieures'];
  const MATIERES_INS=['Mathématiques','Français','Physique','Histoire','Anglais','SVT','Philosophie','Informatique'];
  const STATUT_LBL={nouveau:{l:'Nouveau',c:'#1a4fc4',bg:'#EEF3FF',border:'#c8d8f5',icon:'🆕'},
                    actif:{l:'Actif',c:'#1a7a4a',bg:'#EEFFF6',border:'#b8dbb8',icon:'✓'},
                    inactif:{l:'Inactif',c:'#b3243b',bg:'#fdecef',border:'#f3b8c2',icon:'⏸'},
                    archive:{l:'Archivé',c:'#888',bg:'#f5f5f5',border:'#ddd',icon:'📦'}};

  // KPIs
  const nbNouveau=inscriptions.filter(i=>i.statut==='nouveau').length;
  const nbActif=inscriptions.filter(i=>i.statut==='actif').length;
  const nbArchive=inscriptions.filter(i=>i.statut==='archive').length;
  const sansGroupe=inscriptions.filter(i=>i.statut==='actif'&&i.userId&&!cours.some(c=>c.eleveIds.includes(i.userId))).length;

  // Filtrage + tri
  const filteredIns=useMemo(()=>{
    const q=searchIns.toLowerCase();
    let list=inscriptions.filter(i=>{
      if(filterStatut!=='tous'&&i.statut!==filterStatut)return false;
      if(filterNiveau!=='tous'&&i.niveau!==filterNiveau)return false;
      if(!q)return true;
      return (i.prenom+' '+i.nom).toLowerCase().includes(q)
        ||(i.parentNom||'').toLowerCase().includes(q)
        ||(i.parentEmail||'').toLowerCase().includes(q)
        ||(i.parentTel||'').toLowerCase().includes(q)
        ||(i.niveau||'').toLowerCase().includes(q);
    });
    list.sort((a,b)=>{
      if(sortBy==='date')return (b.dateInscription||'').localeCompare(a.dateInscription||'');
      if(sortBy==='dateAsc')return (a.dateInscription||'').localeCompare(b.dateInscription||'');
      if(sortBy==='name')return (a.nom||'').localeCompare(b.nom||'')||(a.prenom||'').localeCompare(b.prenom||'');
      if(sortBy==='niveau')return (a.niveau||'').localeCompare(b.niveau||'');
      if(sortBy==='statut'){const o={nouveau:0,actif:1,archive:2};return (o[a.statut]??1)-(o[b.statut]??1);}
      return 0;
    });
    return list;
  },[inscriptions,searchIns,filterStatut,filterNiveau,sortBy]);

  const totalIns=filteredIns.length;
  const nbPages=Math.max(1,Math.ceil(totalIns/PAGE));
  const curPage=Math.min(insPage,nbPages);
  const visibleIns=filteredIns.slice((curPage-1)*PAGE,curPage*PAGE);

  const openNew=()=>{
    setInsForm({prenom:'',nom:'',dateNaissance:'',niveau:'3ème',matieres:[],parentNom:'',parentTel:'',parentEmail:'',adresse:'',notes:'',statut:'nouveau'});
    setSelIns(null);
    setShowIns(true);
  };

  const saveIns=()=>{
    if(!insForm.prenom.trim()||!insForm.nom.trim())return;
    if(selIns){
      setInscriptions(p=>p.map(i=>i.id===selIns.id?{...i,...insForm}:i));
      setSelIns(prev=>({...prev,...insForm}));
    }else{
      const n={id:'ins'+Date.now(),...insForm,dateInscription:new Date().toISOString().split('T')[0],userId:null};
      setInscriptions(p=>[...p,n]);
    }
    setShowIns(false);
  };

  // Activer : crée user + facture auto si déjà des cours possibles + ouvre assignation
  const [showAcces,setShowAcces]=useState(false);
  const [filAnnee,setFilAnnee]=useState('Toutes');
  const [filMat,setFilMat]=useState('Toutes');
  const [accesEmail,setAccesEmail]=useState('');
  const [accesPwd,setAccesPwd]=useState('');
  const [accesBusy,setAccesBusy]=useState(false);
  const [accesErr,setAccesErr]=useState('');
  const [accesMsg,setAccesMsg]=useState('');
  const genPwd=()=>{ const c='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789'; let s=''; for(let i=0;i<10;i++)s+=c[Math.floor(Math.random()*c.length)]; return s; };
  const slugMail=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'.').replace(/^\.+|\.+$/g,'');
  const ouvrirAcces=(eu)=>{ const base=eu.email||(slugMail(eu.name).slice(0,22)+'.'+String(eu.id||'').replace(/[^0-9]/g,'').slice(-4)+'@eleve.plusdebonnesnotes.com'); setAccesEmail(base); setAccesPwd(genPwd()); setAccesErr(''); setAccesMsg(''); setShowAcces(true); };
  const creerAcces=async(eu)=>{ setAccesErr(''); setAccesMsg(''); const mail=accesEmail.toLowerCase().trim(); if(!mail||accesPwd.length<6){ setAccesErr('Indique un identifiant (email) et un mot de passe d\'au moins 6 caractères.'); return; } setAccesBusy(true); try{ const tmp=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:false,autoRefreshToken:false}}); const {data,error}=await tmp.auth.signUp({email:mail,password:accesPwd}); if(error){ setAccesErr('Échec : '+error.message); setAccesBusy(false); return; } if(!data||!data.session){ setAccesErr('Le compte n\'est pas actif immédiatement. Dans Supabase \u2192 Authentication \u2192 Providers \u2192 Email, désactive « Confirm email » puis recommence (ou cet email est déjà utilisé).'); setAccesBusy(false); return; } const authId=data.user.id; setUsers(p=>p.map(u=>u.id===eu.id?{...u,auth_id:authId}:u)); const note='Accès élève: '+mail; setInscriptions(p=>p.map(i=>i.id===selIns.id?{...i,notes:((i.notes&&i.notes.trim())?i.notes.trim()+' · ':'')+note}:i)); setSelIns(prev=>prev?{...prev,notes:((prev.notes&&prev.notes.trim())?prev.notes.trim()+' · ':'')+note}:prev); try{await tmp.auth.signOut();}catch(_){ } setAccesMsg('Accès créé. Transmets ces identifiants à la famille.'); }catch(e){ setAccesErr('Erreur : '+((e&&e.message)||'')); } setAccesBusy(false); };
  const activerIns=ins=>{
    if(ins.userId){alert("Cet élève est déjà dans l'effectif.");return;}
    const fullName=ins.prenom+' '+ins.nom;
    const initials=(ins.prenom[0]||'')+(ins.nom[0]||'');
    const newU={id:'u'+Date.now(),name:fullName,role:'eleve',initials:initials.toUpperCase(),niveau:ins.niveau,parentNom:ins.parentNom,parentTel:ins.parentTel,parentEmail:ins.parentEmail,dateNaissance:ins.dateNaissance,adresse:ins.adresse};
    setUsers(p=>[...p,newU]);
    setInscriptions(p=>p.map(i=>i.id===ins.id?{...i,statut:'actif',userId:newU.id}:i));
    setSelIns(prev=>prev?{...prev,statut:'actif',userId:newU.id}:prev);
    // Ouvrir la modale d'assignation pour pouvoir l'inscrire immédiatement à des cours
    setTimeout(()=>setShowAssign(true),100);
  };

  const archiverIns=id=>{
    setInscriptions(p=>p.map(i=>i.id===id?{...i,statut:'archive'}:i));
    setSelIns(prev=>prev?.id===id?{...prev,statut:'archive'}:prev);
  };
  const restaurer=id=>{
    setInscriptions(p=>p.map(i=>i.id===id?{...i,statut:i.userId?'actif':'nouveau'}:i));
    setSelIns(prev=>prev?.id===id?{...prev,statut:prev.userId?'actif':'nouveau'}:prev);
  };

  // Toggle inscription à un cours + recalcul facture auto
  const toggleAssign=(coursId,eleveId)=>{
    setCours(p=>{
      const updated=p.map(c=>c.id!==coursId?c:{...c,eleveIds:c.eleveIds.includes(eleveId)?c.eleveIds.filter(x=>x!==eleveId):[...c.eleveIds,eleveId]});
      recalcAutoInvoice({eleveId,coursArr:updated,users,setFactures});
      return updated;
    });
  };

  // Cours suggérés selon matières souhaitées + niveau
  const suggestCours=(ins)=>{
    return cours.filter(c=>{
      if(c.niveau!==ins.niveau)return false;
      if(!ins.matieres||ins.matieres.length===0)return true;
      const matLower=ins.matieres.map(m=>m.toLowerCase());
      return matLower.some(m=>c.matiere.toLowerCase().includes(m)||m.includes(c.matiere.toLowerCase()));
    });
  };

  return <>
    <TB title="Inscriptions">
      {vue==='gestion'&&<button className="btn btn-p" onClick={openNew}>＋ Nouvelle inscription</button>}
    </TB>
    <div className="pg">
      <div className="tabs" style={{marginBottom:14}}>
        <button className={`tab ${vue==='web'?'on':''}`} onClick={()=>setVue('web')}>🌐 Demandes web{nbWebNouveau>0?<span style={{marginLeft:6,background:'#1a4fc4',color:'#fff',borderRadius:10,padding:'1px 7px',fontSize:10}}>{nbWebNouveau}</span>:null}</button>
        <button className={`tab ${vue==='gestion'?'on':''}`} onClick={()=>setVue('gestion')}>📋 Inscriptions gérées</button>
      </div>
      {vue==='web' && <DemandesWeb demandes={demandesWeb} setDemandes={setDemandesWeb} cours={cours} setInscriptions={setInscriptions} goGestion={()=>setVue('gestion')} users={users}/>}
      {vue==='gestion' && <>
      {/* KPIs */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:10,marginBottom:18}}>
        {[
          {icon:'🆕',val:nbNouveau,label:'À traiter',col:'#1a4fc4',bg:'#EEF3FF',border:'#c8d8f5',filter:'nouveau'},
          {icon:'✓',val:nbActif,label:'Actifs (intégrés)',col:'#1a7a4a',bg:'#EEFFF6',border:'#b8dbb8',filter:'actif'},
          {icon:'⚠️',val:sansGroupe,label:'Actifs sans groupe',col:'#c47a00',bg:'#fff8e0',border:'#f5d882',filter:null},
          {icon:'📦',val:nbArchive,label:'Archivés',col:'#888',bg:'#f5f5f5',border:'#ddd',filter:'archive'},
          {icon:'📊',val:inscriptions.length,label:'Total inscriptions',col:'#7c3aed',bg:'#f5f3ff',border:'#d8d0ff',filter:'tous'},
        ].map((k,i)=>(
          <div key={i} onClick={()=>{if(k.filter){setFilterStatut(k.filter);setInsPage(1);}}} style={{background:k.bg,border:`1.5px solid ${k.border}`,borderRadius:6,padding:'12px 14px',cursor:k.filter?'pointer':'default',transition:'all .15s',display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:22}}>{k.icon}</span>
            <div>
              <div style={{fontWeight:700,fontSize:20,color:k.col,fontFamily:'var(--ff-serif)'}}>{k.val}</div>
              <div style={{fontSize:10,color:'#6b7ab5',marginTop:1}}>{k.label}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Filtres */}
      <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center',background:'white',padding:'10px 12px',border:'1.5px solid #e0e8f5',borderRadius:6}}>
        <div style={{flex:1,minWidth:200,position:'relative'}}>
          <input value={searchIns} onChange={e=>{setSearchIns(e.target.value);setInsPage(1);}}
            placeholder="🔍 Rechercher nom, parent, email, téléphone, niveau…"
            style={{width:'100%',padding:'7px 30px 7px 12px',border:'1.5px solid #dde3f0',borderRadius:4,fontSize:12,fontFamily:'var(--ff-mono)'}}/>
          {searchIns&&<button onClick={()=>setSearchIns('')} style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'#aaa',fontSize:12}}>✕</button>}
        </div>
        <select value={filterStatut} onChange={e=>{setFilterStatut(e.target.value);setInsPage(1);}} style={{padding:'6px 10px',border:'1.5px solid #dde3f0',borderRadius:4,fontSize:11,background:'white',fontFamily:'var(--ff-mono)'}}>
          <option value="tous">Tous statuts</option>
          <option value="nouveau">🆕 À traiter</option>
          <option value="actif">✓ Actifs</option>
          <option value="archive">📦 Archivés</option>
        </select>
        <select value={filterNiveau} onChange={e=>{setFilterNiveau(e.target.value);setInsPage(1);}} style={{padding:'6px 10px',border:'1.5px solid #dde3f0',borderRadius:4,fontSize:11,background:'white',fontFamily:'var(--ff-mono)'}}>
          <option value="tous">Tous niveaux</option>
          {NIVEAUX_INS.map(n=><option key={n} value={n}>{n}</option>)}
        </select>
        <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{padding:'6px 10px',border:'1.5px solid #dde3f0',borderRadius:4,fontSize:11,background:'white',fontFamily:'var(--ff-mono)'}}>
          <option value="date">Tri : Date ↓</option>
          <option value="dateAsc">Tri : Date ↑</option>
          <option value="name">Tri : Nom A→Z</option>
          <option value="niveau">Tri : Niveau</option>
          <option value="statut">Tri : Statut</option>
        </select>
        {(searchIns||filterStatut!=='tous'||filterNiveau!=='tous')&&<button onClick={()=>{setSearchIns('');setFilterStatut('tous');setFilterNiveau('tous');setInsPage(1);}} style={{padding:'5px 10px',background:'#fff0f0',color:'#b02020',border:'1.5px solid #f5b8b8',borderRadius:4,fontSize:11,cursor:'pointer',fontWeight:600}}>✕ Reset</button>}
      </div>

      {/* Layout principal : liste + détail */}
      <div style={{display:'grid',gridTemplateColumns:selIns?'minmax(320px,420px) 1fr':'1fr',gap:18,alignItems:'start'}}>
        {/* Colonne gauche : liste */}
        <div>
          <div style={{fontSize:11,color:'var(--muted)',marginBottom:8,paddingLeft:2}}>
            <strong style={{color:'#1a2340'}}>{totalIns}</strong> inscription{totalIns>1?'s':''}
            {(searchIns||filterStatut!=='tous'||filterNiveau!=='tous')&&<span> · filtré{totalIns>1?'es':'e'} sur {inscriptions.length}</span>}
            {nbPages>1&&<span> · page {curPage}/{nbPages}</span>}
          </div>
          {totalIns===0?<div className="emp" style={{padding:'40px 20px'}}><div className="emp-icon">📝</div><h3>Aucune inscription</h3><p>Cliquez "＋ Nouvelle inscription" pour commencer.</p></div>:
          <div style={{display:'flex',flexDirection:'column',gap:5}}>
            {visibleIns.map(ins=>{
              const st=STATUT_LBL[ins.statut]||STATUT_LBL.nouveau;
              const isSel=selIns?.id===ins.id;
              const groupesOfIns=ins.userId?cours.filter(c=>c.eleveIds.includes(ins.userId)):[];
              return<div key={ins.id} onClick={()=>setSelIns(ins)} style={{padding:'10px 12px',border:`2px solid ${isSel?'var(--gold)':st.border}`,background:isSel?'#fff8e6':'white',borderRadius:4,cursor:'pointer',transition:'all .15s'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13,color:'#1a2340'}}>{ins.prenom} {ins.nom}</div>
                    <div style={{fontSize:11,color:'var(--muted)',marginTop:2,display:'flex',gap:6,flexWrap:'wrap'}}>
                      <span>{ins.niveau}</span>
                      <span>· {ins.dateInscription}</span>
                      {ins.parentNom&&<span>· 👨‍👩‍👧 {ins.parentNom.split(' ').slice(-1)[0]}</span>}
                    </div>
                  </div>
                  <span style={{padding:'2px 7px',background:st.bg,color:st.c,fontSize:10,fontWeight:700,borderRadius:3,whiteSpace:'nowrap',flexShrink:0}}>{st.icon} {st.l}</span>
                </div>
                {ins.matieres?.length>0&&<div style={{marginTop:5,display:'flex',gap:3,flexWrap:'wrap'}}>
                  {ins.matieres.slice(0,4).map(m=><span key={m} style={{...getCoursBadge(m),fontSize:9,padding:'1px 5px'}}>{m}</span>)}
                  {ins.matieres.length>4&&<span style={{fontSize:9,color:'var(--muted)'}}>+{ins.matieres.length-4}</span>}
                </div>}
                {ins.userId&&groupesOfIns.length===0&&<div style={{marginTop:5,fontSize:10,color:'#c47a00',fontWeight:600}}>⚠ Actif sans groupe assigné</div>}
                {ins.userId&&groupesOfIns.length>0&&<div style={{marginTop:5,fontSize:10,color:'#1a7a4a',fontWeight:600}}>✓ Inscrit à {groupesOfIns.length} groupe{groupesOfIns.length>1?'s':''}</div>}
              </div>;
            })}
          </div>}
          {/* Pagination */}
          {nbPages>1&&<div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:6,marginTop:14}}>
            <button onClick={()=>setInsPage(p=>Math.max(1,p-1))} disabled={curPage===1} style={{padding:'5px 10px',background:'white',border:'1.5px solid #dde3f0',borderRadius:4,fontSize:12,cursor:curPage===1?'not-allowed':'pointer',opacity:curPage===1?.4:1,color:'#1a4fc4',fontWeight:600}}>‹</button>
            <span style={{fontSize:11,color:'var(--muted)',padding:'0 8px'}}>Page {curPage} / {nbPages}</span>
            <button onClick={()=>setInsPage(p=>Math.min(nbPages,p+1))} disabled={curPage===nbPages} style={{padding:'5px 10px',background:'white',border:'1.5px solid #dde3f0',borderRadius:4,fontSize:12,cursor:curPage===nbPages?'not-allowed':'pointer',opacity:curPage===nbPages?.4:1,color:'#1a4fc4',fontWeight:600}}>›</button>
          </div>}
        </div>

        {/* Colonne droite : détail */}
        {selIns&&(()=>{
          const st=STATUT_LBL[selIns.statut]||STATUT_LBL.nouveau;
          const groupes=selIns.userId?cours.filter(c=>c.eleveIds.includes(selIns.userId)):[];
          const mats=[...new Set(groupes.map(g=>g.matiere))];
          const mrr=tarifMensuel(groupes.length);
          const sugg=suggestCours(selIns);
          return<div style={{background:'white',border:'1.5px solid var(--cream2)',borderRadius:6,padding:'18px 22px'}}>
            {/* Header */}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14,borderBottom:'2px solid var(--cream2)',paddingBottom:12,gap:10,flexWrap:'wrap'}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4,flexWrap:'wrap'}}>
                  <div style={{fontSize:20,fontWeight:700,color:'#1a2340',fontFamily:'var(--ff-serif)'}}>{selIns.prenom} {selIns.nom}</div>
                  <span style={{padding:'3px 10px',background:st.bg,color:st.c,fontSize:11,fontWeight:700,borderRadius:3}}>{st.icon} {st.l}</span>
                </div>
                <div style={{fontSize:12,color:'var(--muted)'}}>{selIns.niveau} · inscrit le {selIns.dateInscription}</div>
              </div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                <button className="btn btn-sm" style={{background:'#EEF3FF',border:'1.5px solid #C8D8F5',color:'var(--info)'}} onClick={()=>{setInsForm({prenom:selIns.prenom,nom:selIns.nom,dateNaissance:selIns.dateNaissance||'',niveau:selIns.niveau,matieres:selIns.matieres||[],parentNom:selIns.parentNom||'',parentTel:selIns.parentTel||'',parentEmail:selIns.parentEmail||'',adresse:selIns.adresse||'',notes:selIns.notes||'',statut:selIns.statut});setShowIns(true);}}>✏️ Modifier</button>
                {selIns.statut!=='archive'?
                  <button className="btn btn-sm" style={{background:'#f5f5f5',border:'1.5px solid #ddd',color:'#888'}} onClick={()=>archiverIns(selIns.id)}>📦 Archiver</button>
                  :<button className="btn btn-sm" style={{background:'#EEFFF6',border:'1.5px solid #b8dbb8',color:'#1a7a4a'}} onClick={()=>restaurer(selIns.id)}>↩ Restaurer</button>
                }
              </div>
            </div>

            {/* Matières souhaitées */}
            {selIns.matieres?.length>0&&<div style={{marginBottom:14}}>
              <div style={{fontSize:10,color:'var(--muted)',marginBottom:4,textTransform:'uppercase',letterSpacing:.5,fontWeight:700}}>Matières souhaitées</div>
              <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>{selIns.matieres.map(m=><span key={m} style={{...getCoursBadge(m),fontSize:11}}>{m}</span>)}</div>
            </div>}

            {/* Infos contact */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
              {[
                {label:'Contact parent',val:selIns.parentNom||'—'},
                {label:'Téléphone',val:selIns.parentTel||'—',mailto:selIns.parentTel?`tel:${selIns.parentTel}`:null},
                {label:'Email',val:selIns.parentEmail||'—',mailto:selIns.parentEmail?`mailto:${selIns.parentEmail}`:null},
                {label:'Adresse',val:selIns.adresse||'—'},
                {label:'Date naissance',val:selIns.dateNaissance||'—'},
              ].map(({label,val,mailto})=>(
                <div key={label} style={{background:'var(--cream)',padding:'8px 11px',borderRadius:3}}>
                  <div style={{fontSize:9,color:'var(--muted)',marginBottom:2,textTransform:'uppercase',letterSpacing:.5,fontWeight:700}}>{label}</div>
                  {mailto&&val!=='—'?<a href={mailto} style={{fontSize:12,fontWeight:500,color:'#1a4fc4',textDecoration:'none',wordBreak:'break-all'}}>{val}</a>
                  :<div style={{fontSize:12,fontWeight:500,color:'#1a2340',wordBreak:'break-all'}}>{val}</div>}
                </div>
              ))}
            </div>

            {selIns.notes&&<div style={{background:'#fff8e0',border:'1px solid #f5d882',padding:'9px 13px',marginBottom:14,fontSize:12,borderRadius:3}}>
              <div style={{fontSize:9,color:'#c47a00',marginBottom:3,textTransform:'uppercase',letterSpacing:.5,fontWeight:700}}>📌 Notes internes</div>
              {selIns.notes}
            </div>}

            {/* ACTIONS PRINCIPALES */}
            <div style={{borderTop:'2px solid var(--cream2)',paddingTop:14,marginTop:6}}>
              {!selIns.userId&&<>
                <div style={{background:'#EEF3FF',border:'1.5px solid #c8d8f5',padding:'12px 16px',borderRadius:6,marginBottom:10}}>
                  <div style={{fontWeight:700,fontSize:13,color:'#1a4fc4',marginBottom:4}}>🚀 Prêt à intégrer dans l'effectif</div>
                  <div style={{fontSize:12,color:'#4a5568',marginBottom:10}}>Cette action créera le compte élève et ouvrira la sélection des groupes. Une facture mensuelle sera générée automatiquement à chaque inscription cours.</div>
                  <button className="btn btn-p" onClick={()=>activerIns(selIns)} style={{fontWeight:600}}>✓ Intégrer à l'effectif → Assigner aux groupes</button>
                </div>
              </>}

              {selIns.userId&&<>
                {(()=>{ const ina=selIns.statut==='inactif'; return <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,background:ina?'#fdecef':'#EEFFF6',border:`1.5px solid ${ina?'#f3b8c2':'#b8dbb8'}`,padding:'10px 14px',borderRadius:6,marginBottom:12}}>
