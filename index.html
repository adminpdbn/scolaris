          const parEleve=s.nbEleves>0?(s.budgetTransportParEleve||0)+(s.budgetEntreesParEleve||0)+(s.budgetNourritureParEleve||0)+(s.budgetDiversParEleve||0):0;
          const nbAcc=s.accompagnateurs?.length||0;
          const ratio=s.nbEleves&&nbAcc?Math.round(s.nbEleves/nbAcc)+'é/1a':'—';
          const autoOk=Object.values(s.autorisations||{}).filter(v=>v==='autorise').length;
          return <div key={s.id} style={{background:'white',border:`1.5px solid ${st.color}22`,borderLeft:`4px solid ${st.color}`,borderRadius:6,padding:'14px 18px',cursor:'pointer',transition:'box-shadow .15s'}}
            onClick={()=>{setSelId(s.id);setView('fiche');setTab('general');}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                  <span style={{background:st.bg,color:st.color,borderRadius:3,padding:'2px 8px',fontSize:11,fontWeight:700}}>{st.icon} {st.label}</span>
                  {s.autoGenerated&&<span style={{fontSize:10,color:'var(--gold)',background:'#EEF5FF',borderRadius:2,padding:'1px 5px'}}>auto</span>}
                </div>
                <div style={{fontWeight:700,fontSize:15,color:'#1a2340',marginBottom:3}}>{s.nom}</div>
                <div style={{fontSize:12,color:'var(--muted)'}}>{s.date&&`📅 ${s.date}`} {s.heureDepart&&`· ${s.heureDepart}–${s.heureRetour}`} {s.lieu&&`· 📍 ${s.lieu}`}</div>
                {s.classes?.length>0&&<div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{s.classes.join(', ')} · {s.nbEleves} élève{s.nbEleves>1?'s':''}</div>}
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontSize:18,fontWeight:700,color:'var(--navy)'}}>{budgetTotal>0?budgetTotal+'€':'—'}</div>
                {parEleve>0&&<div style={{fontSize:11,color:'var(--muted)'}}>{parEleve}€/élève</div>}
                <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>Ratio {ratio} · {autoOk} autor.</div>
              </div>
            </div>
            <div style={{display:'flex',gap:8,marginTop:10}} onClick={e=>e.stopPropagation()}>
              <button className="btn btn-sm" style={{fontSize:11}} onClick={()=>{setSelId(s.id);setView('fiche');setTab('general');}}>📋 Ouvrir</button>
              <button className="btn btn-sm" style={{fontSize:11}} onClick={()=>dupliquerSortie(s)}>📋 Dupliquer</button>
              <button className="btn btn-d btn-sm" style={{fontSize:11}} onClick={()=>deleteSortie(s.id)}>🗑️</button>
            </div>
          </div>;
        })}
      </div>}
    </div>
    {showNew&&<Modal title="Nouvelle sortie" onClose={()=>setShowNew(false)}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div className="fg" style={{gridColumn:'1/-1'}}><label className="fl">Nom de la sortie *</label>
          <input className="fi" value={newForm.nom} onChange={e=>setNewForm(p=>({...p,nom:e.target.value}))} placeholder="Ex: Sortie musée des sciences"/>
        </div>
        <div className="fg" style={{gridColumn:'1/-1'}}><label className="fl">Objectif pédagogique</label>
          <input className="fi" value={newForm.objectif} onChange={e=>setNewForm(p=>({...p,objectif:e.target.value}))} placeholder="Ex: Découverte des sciences naturelles"/>
        </div>
        <div className="fg"><label className="fl">Date prévue</label>
          <input className="fi" type="date" value={newForm.date} onChange={e=>setNewForm(p=>({...p,date:e.target.value}))}/>
        </div>
        <div className="fg"><label className="fl">Nombre d'élèves</label>
          <input className="fi" type="number" min="0" value={newForm.nbEleves} onChange={e=>setNewForm(p=>({...p,nbEleves:parseInt(e.target.value)||0}))}/>
        </div>
        <div className="fg"><label className="fl">Lieu</label>
          <input className="fi" value={newForm.lieu} onChange={e=>setNewForm(p=>({...p,lieu:e.target.value}))} placeholder="Ex: Cité des sciences, Paris"/>
        </div>
        <div className="fg"><label className="fl">Classes concernées</label>
          <div style={{display:'flex',flexWrap:'wrap',gap:5,padding:'6px',border:'1.5px solid var(--cream2)',borderRadius:4}}>
            {NIVEAUX.filter(n=>n!=='Tous').map(n=>{
              const on=(newForm.classes||[]).includes(n);
              return <button key={n} type="button" onClick={()=>setNewForm(p=>({...p,classes:on?p.classes.filter(c=>c!==n):[...(p.classes||[]),n]}))}
                style={{padding:'2px 8px',borderRadius:3,border:`1.5px solid ${on?'var(--navy)':'var(--cream2)'}`,background:on?'var(--navy)':'white',color:on?'white':'var(--text)',fontSize:11,cursor:'pointer'}}>
                {n}
              </button>;
            })}
          </div>
        </div>
      </div>
      <div className="fa"><button className="btn btn-o" onClick={()=>setShowNew(false)}>Annuler</button><button className="btn btn-p" onClick={createSortie}>Créer la fiche</button></div>
    </Modal>}
  </>;

  // ── FICHE DÉTAIL ──
  if(!sel) return null;
  const st=STATUTS[sel.statut]||STATUTS.brouillon;
  // Transport ← transportCoutEstime, Nourriture ← repasBudget (source Logistique)
  const budgetPrev=(sel.transportCoutEstime||0)+(sel.budgetEntrees||0)+(sel.repasBudget||0)+(sel.budgetDivers||0);
  const budgetReel=sel.budgetReel||0;
  const parEleve=sel.nbEleves>0?Math.round(budgetPrev/sel.nbEleves):0;
  const parEleveDetail=`${Math.round((sel.transportCoutEstime||0)/Math.max(sel.nbEleves,1))}+${sel.budgetEntreesParEleve||0}+${Math.round((sel.repasBudget||0)/Math.max(sel.nbEleves,1))}+${sel.budgetDiversParEleve||0}€`;
  const financement=(sel.financementEtablissement||0)+(sel.financementFamilles||0)+(sel.financementSubventions||0);
  const deficit=budgetPrev-financement;
  const upd=(patch)=>updateSortie(sel.id,patch);

  const TABS=[
    {id:'general',label:'📋 Général'},
    {id:'logistique',label:'🚌 Logistique'},
    {id:'encadrement',label:'👩‍🏫 Encadrement'},
    {id:'budget',label:'💰 Budget'},
    {id:'autorisations',label:'📄 Autorisations'},
    {id:'checklist',label:'✅ Checklist'},
    {id:'bilan',label:'📊 Bilan'},
  ];

  return <>
    <TB title={`🚌 ${sel.nom}`}>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <span style={{background:st.bg,color:st.color,borderRadius:3,padding:'4px 10px',fontSize:12,fontWeight:700}}>{st.icon} {st.label}</span>
        <select className="fi" style={{fontSize:11,padding:'4px 8px',width:140}} value={sel.statut}
          onChange={e=>upd({statut:e.target.value})}>
          {Object.entries(STATUTS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
        </select>
        <button className="btn btn-sm" style={{fontSize:11}} onClick={()=>dupliquerSortie(sel)}>📋 Dupliquer</button>
        <button className="btn btn-o btn-sm" onClick={()=>setView('liste')}>← Retour</button>
      </div>
    </TB>

    {/* KPI rapide */}
    <div style={{padding:'0 24px 0',display:'flex',gap:12,flexWrap:'wrap',marginBottom:0,background:'white',borderBottom:'1.5px solid var(--cream2)'}}>
      {[
        {icon:'📅',val:sel.date||'—',sub:'Date'},
        {icon:'🎓',val:sel.nbEleves||0,sub:'Élèves'},
        {icon:'💰',val:budgetPrev+'€',sub:'Budget prévu'},
        {icon:'👤',val:parEleve>0?parEleve+'€/él':'—',sub:'Par élève'},
        {icon:'📊',val:deficit===0?'Équilibré':deficit>0?`-${deficit}€`:`+${Math.abs(deficit)}€`,sub:'Solde',col:deficit===0?'#059669':deficit>0?'var(--err)':'#059669'},
      ].map((k,i)=><div key={i} style={{padding:'10px 8px',textAlign:'center',minWidth:90}}>
        <div style={{fontSize:13,fontWeight:700,color:k.col||'var(--navy)'}}>{k.icon} {k.val}</div>
        <div style={{fontSize:10,color:'var(--muted)'}}>{k.sub}</div>
      </div>)}
    </div>

    <div className="pg" style={{paddingTop:12}}>
      <div className="tabs" style={{marginBottom:16}}>
        {TABS.map(t=><button key={t.id} className={`tab ${tab===t.id?'on':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
      </div>

      {/* ── GÉNÉRAL ── */}
      {tab==='general'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        <div className="fg" style={{gridColumn:'1/-1'}}><label className="fl">Nom de la sortie</label>
          <input className="fi" value={sel.nom} onChange={e=>upd({nom:e.target.value})}/>
        </div>
        <div className="fg" style={{gridColumn:'1/-1'}}><label className="fl">Objectif pédagogique</label>
          <textarea className="fi" rows={2} value={sel.objectif||''} onChange={e=>upd({objectif:e.target.value})} placeholder="Lien avec le programme scolaire..."/>
        </div>
        <div className="fg"><label className="fl">Date prévue</label>
          <input className="fi" type="date" value={sel.date||''} onChange={e=>upd({date:e.target.value})}/>
        </div>
        <div className="fg"><label className="fl">Nombre d'élèves</label>
          <input className="fi" type="number" min="0" value={sel.nbEleves||0} onChange={e=>upd({nbEleves:parseInt(e.target.value)||0})}/>
        </div>
        <div className="fg"><label className="fl">Heure de départ</label>
          <input className="fi" type="time" value={sel.heureDepart||'09:00'} onChange={e=>upd({heureDepart:e.target.value})}/>
        </div>
        <div className="fg"><label className="fl">Heure de retour</label>
          <input className="fi" type="time" value={sel.heureRetour||'17:00'} onChange={e=>upd({heureRetour:e.target.value})}/>
        </div>
        <div className="fg"><label className="fl">Lieu</label>
          <input className="fi" value={sel.lieu||''} onChange={e=>upd({lieu:e.target.value})} placeholder="Nom du lieu"/>
        </div>
        <div className="fg"><label className="fl">Adresse complète</label>
          <input className="fi" value={sel.adresse||''} onChange={e=>upd({adresse:e.target.value})} placeholder="Adresse..."/>
        </div>
        <div className="fg" style={{gridColumn:'1/-1'}}><label className="fl">Classes concernées</label>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,padding:'8px',border:'1.5px solid var(--cream2)',borderRadius:4}}>
            {NIVEAUX.filter(n=>n!=='Tous').map(n=>{
              const on=(sel.classes||[]).includes(n);
              const clr=nc(n);
              return <button key={n} type="button" onClick={()=>upd({classes:on?(sel.classes||[]).filter(c=>c!==n):[...(sel.classes||[]),n]})}
                style={{padding:'3px 10px',borderRadius:3,border:`1.5px solid ${on?clr.bd:'var(--cream2)'}`,background:on?clr.bg:'white',color:on?clr.tx:'var(--text)',fontSize:12,cursor:'pointer',fontWeight:on?700:400}}>
                {n}
              </button>;
            })}
          </div>
        </div>
        {sel.adresse&&<div className="fg" style={{gridColumn:'1/-1'}}>
          <label className="fl">📍 Carte (aperçu)</label>
          <div style={{borderRadius:6,overflow:'hidden',height:200,border:'1.5px solid var(--cream2)'}}>
            <iframe title="map" width="100%" height="200" frameBorder="0" style={{border:0}}
              src={`https://www.openstreetmap.org/export/embed.html?bbox=-0.5,48.5,3.0,49.0&layer=mapnik&marker=48.8566,2.3522`}
              allowFullScreen/>
          </div>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>
            🔗 <a href={`https://www.google.com/maps/search/${encodeURIComponent(sel.adresse||sel.lieu||'')}`} target="_blank" rel="noopener noreferrer" style={{color:'var(--info)'}}>Ouvrir dans Google Maps</a>
          </div>
        </div>}
      </div>}

      {/* ── LOGISTIQUE ── */}
      {tab==='logistique'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        <div className="sh" style={{gridColumn:'1/-1'}}><h2 className="st">🚌 Transport</h2></div>
        <div className="fg"><label className="fl">Type de transport</label>
          <select className="fi" value={sel.transportType||'bus'} onChange={e=>upd({transportType:e.target.value})}>
            <option value="bus">🚌 Bus</option><option value="metro">🚇 Métro</option>
            <option value="train">🚆 Train</option><option value="pied">🚶 À pied</option><option value="autre">Autre</option>
          </select>
        </div>
        <div className="fg"><label className="fl">Prestataire</label>
          <input className="fi" value={sel.transportPrestataire||''} onChange={e=>upd({transportPrestataire:e.target.value})} placeholder="Nom de la société"/>
        </div>
        <div className="fg"><label className="fl">Point de départ</label>
          <input className="fi" value={sel.transportDepart||''} onChange={e=>upd({transportDepart:e.target.value})} placeholder="Adresse de départ"/>
        </div>
        <div className="fg"><label className="fl">Point d'arrivée</label>
          <input className="fi" value={sel.transportArrivee||''} onChange={e=>upd({transportArrivee:e.target.value})} placeholder="Adresse d'arrivée"/>
        </div>
        <div className="fg"><label className="fl">Temps de trajet (min)</label>
          <input className="fi" type="number" min="0" value={sel.transportTemps||0} onChange={e=>upd({transportTemps:parseInt(e.target.value)||0})}/>
        </div>
        <div className="fg"><label className="fl">Coût total transport (€) <span style={{fontSize:10,color:'#059669',fontWeight:700}}>→ Budget</span></label>
          <input className="fi" type="number" min="0" value={sel.transportCoutEstime||0}
            onChange={e=>{const t=parseFloat(e.target.value)||0;upd({transportCoutEstime:t,budgetTransportParEleve:sel.nbEleves>0?Math.round(t/sel.nbEleves*100)/100:t});}}/>
          {sel.nbEleves>0&&<div style={{fontSize:11,color:'var(--muted)',marginTop:3}}>= {Math.round((sel.transportCoutEstime||0)/sel.nbEleves*100)/100}€/élève × {sel.nbEleves} élèves</div>}
        </div>
        <div className="sh" style={{gridColumn:'1/-1',marginTop:8}}><h2 className="st">🍽️ Restauration</h2></div>
        <div className="fg"><label className="fl">Type de repas</label>
          <select className="fi" value={sel.repasType||'pique-nique'} onChange={e=>upd({repasType:e.target.value})}>
            <option value="pique-nique">🧺 Pique-nique</option><option value="cantine">🏫 Cantine</option>
            <option value="restaurant">🍽️ Restaurant</option><option value="fourni">✅ Fourni</option><option value="aucun">❌ Non prévu</option>
          </select>
        </div>
        <div className="fg"><label className="fl">Responsable repas</label>
          <select className="fi" value={sel.repasResponsable||''} onChange={e=>upd({repasResponsable:e.target.value})}>
            <option value="">— Sélectionner —</option>
            {profs.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
        </div>
        <div className="fg"><label className="fl">Budget nourriture total (€) <span style={{fontSize:10,color:'#059669',fontWeight:700}}>→ Budget</span></label>
          <input className="fi" type="number" min="0" value={sel.repasBudget||0}
            onChange={e=>{const r=parseFloat(e.target.value)||0;upd({repasBudget:r,budgetNourritureParEleve:sel.nbEleves>0?Math.round(r/sel.nbEleves*100)/100:r});}}/>
          {sel.nbEleves>0&&<div style={{fontSize:11,color:'var(--muted)',marginTop:3}}>= {Math.round((sel.repasBudget||0)/sel.nbEleves*100)/100}€/élève × {sel.nbEleves} élèves</div>}
        </div>
        <div className="fg"><label className="fl">Allergies / régimes spéciaux</label>
          <input className="fi" value={sel.repasAllergies||''} onChange={e=>upd({repasAllergies:e.target.value})} placeholder="Ex: 2 végétariens, 1 allergie gluten"/>
        </div>
      </div>}

      {/* ── ENCADREMENT ── */}
      {tab==='encadrement'&&(()=>{
        const acc=sel.accompagnateurs||[];
        const ratio=sel.nbEleves&&acc.length?`${(sel.nbEleves/acc.length).toFixed(1)} él/adult` : '—';
        const addAcc=()=>{
          const id='acc'+Date.now();
          upd({accompagnateurs:[...acc,{id,nom:'',role:'accompagnateur',tel:'',email:''}]});
        };
        const updAcc=(id,patch)=>upd({accompagnateurs:acc.map(a=>a.id===id?{...a,...patch}:a)});
        const delAcc=(id)=>upd({accompagnateurs:acc.filter(a=>a.id!==id)});
        return <div>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16,padding:'10px 14px',background:'#EFF6FF',border:'1.5px solid #BFDBFE',borderRadius:6}}>
            <div style={{fontSize:14,fontWeight:700,color:'var(--navy)'}}>👥 {acc.length} accompagnateur{acc.length>1?'s':''}</div>
            <div style={{fontSize:14,fontWeight:700,color:acc.length>0&&sel.nbEleves/acc.length>8?'var(--err)':'#059669'}}>Ratio : {ratio}</div>
            {sel.nbEleves/acc.length>8&&<span style={{fontSize:12,color:'var(--err)'}}>⚠️ Ratio trop élevé (max recommandé : 8él/1adult)</span>}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:12}}>
            {acc.map((a,i)=><div key={a.id} style={{display:'grid',gridTemplateColumns:'140px 1fr 1fr 1fr auto',gap:8,alignItems:'center',background:a.role==='responsable'?'#EFF6FF':'white',border:'1.5px solid var(--cream2)',borderRadius:6,padding:'10px 12px'}}>
              <select className="fi" style={{fontSize:11}} value={a.role} onChange={e=>updAcc(a.id,{role:e.target.value})}>
                <option value="responsable">⭐ Responsable</option>
                <option value="accompagnateur">👤 Accompagnateur</option>
                <option value="secouriste">🩺 Secouriste</option>
              </select>
              <input className="fi" style={{fontSize:11}} value={a.nom} onChange={e=>updAcc(a.id,{nom:e.target.value})} placeholder="Nom"/>
              <input className="fi" style={{fontSize:11}} value={a.tel||''} onChange={e=>updAcc(a.id,{tel:e.target.value})} placeholder="Téléphone"/>
              <input className="fi" style={{fontSize:11}} value={a.email||''} onChange={e=>updAcc(a.id,{email:e.target.value})} placeholder="Email"/>
              <button className="btn btn-d btn-sm" onClick={()=>delAcc(a.id)}>✕</button>
            </div>)}
          </div>
          <button className="btn btn-sm" onClick={addAcc}>＋ Ajouter un accompagnateur</button>
        </div>;
      })()}

      {/* ── BUDGET ── */}
      {tab==='budget'&&<div>
        {/* Avertissement si nbEleves = 0 */}
        {!sel.nbEleves&&<div style={{background:'#FEF3C7',border:'1.5px solid #FDE68A',borderRadius:6,padding:'10px 14px',marginBottom:14,fontSize:13,color:'#92400E'}}>
          ⚠️ Renseignez le nombre d'élèves dans l'onglet Général pour que le calcul soit automatique.
        </div>}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,marginBottom:20}}>
          <div className="stat-section">
            <div className="stat-section-ttl">💰 Coûts prévisionnels</div>
            {/* En-tête colonnes */}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'2px solid var(--cream2)',marginBottom:4}}>
              <span style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5}}>Poste</span>
              <div style={{display:'flex',gap:10,alignItems:'center'}}>
                <span style={{fontSize:11,fontWeight:700,color:'var(--muted)',width:80,textAlign:'right',textTransform:'uppercase',letterSpacing:.5}}>Par élève</span>
                <span style={{fontSize:11,fontWeight:700,color:'var(--navy)',width:70,textAlign:'right',textTransform:'uppercase',letterSpacing:.5}}>Total</span>
              </div>
            </div>
            {/* Transport — auto depuis Logistique */}
            {(()=>{
              const total=sel.transportCoutEstime||0;
              const unit=sel.nbEleves>0?Math.round(total/sel.nbEleves*100)/100:total;
              return <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--cream2)',background:'#F0FDF4',borderRadius:4,padding:'8px 10px',marginBottom:2}}>
                <div>
                  <div style={{fontSize:13}}>🚌 Transport</div>
                  <div style={{fontSize:10,color:'#059669',fontWeight:600}}>↗ depuis Logistique</div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:12,color:'var(--muted)'}}>{unit}€/él</span>
                  <div style={{width:70,textAlign:'right',fontSize:14,fontWeight:700,color:'var(--navy)'}}>{total}€</div>
                </div>
              </div>;
            })()}
            {/* Entrées — saisie par élève */}
            {(()=>{
              const unit=sel.budgetEntreesParEleve||0;
              const total=sel.nbEleves>0?Math.round(unit*sel.nbEleves):unit;
              return <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--cream2)'}}>
                <span style={{fontSize:13,flex:1}}>🎟️ Entrées</span>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <input type="number" min="0" step="0.5" className="fi" style={{width:80,textAlign:'right',fontSize:12,padding:'4px 8px'}}
                    value={unit}
                    onChange={e=>{const u=parseFloat(e.target.value)||0;upd({budgetEntreesParEleve:u,budgetEntrees:sel.nbEleves>0?Math.round(u*sel.nbEleves):u});}}/>
                  <span style={{fontSize:11,color:'var(--muted)',width:18}}>€</span>
                  <div style={{width:70,textAlign:'right',fontSize:13,fontWeight:600,color:'var(--navy)'}}>{total}€</div>
                </div>
              </div>;
            })()}
            {/* Nourriture — auto depuis Restauration */}
            {(()=>{
              const total=sel.repasBudget||0;
              const unit=sel.nbEleves>0?Math.round(total/sel.nbEleves*100)/100:total;
              return <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--cream2)',background:'#F0FDF4',borderRadius:4,padding:'8px 10px',marginBottom:2}}>
                <div>
                  <div style={{fontSize:13}}>🍽️ Nourriture</div>

          <div className="stat-section">
            <div className="stat-section-ttl">💰 Bilan budgétaire</div>

      </div>}
    </div>
  </>;
}

      {q:'Combien ça coûte ?',r:"L'abonnement est de 65 €/mois pour un créneau hebdomadaire (2 h en groupe), soit moins de 8 €/h, avec un tarif dégressif dès le 2e créneau. Tarifs spécifiques : anglais seul ou maths expertes 30 €/mois, arabe 25 €/mois, orthophonie 20 €/h, cours particuliers 25 €/h, primaire 90 €/mois (4×1h30, soit 3,75 €/h). Le parrainage offre 20 € de réduction immédiate, cumulable. La grille complète est juste au-dessus."},
      {q:'Quand a lieu la rentrée 2026 / 2027 ?',r:"Les cours de l'année en cours se terminent le dimanche 28 juin 2026, avec un moment convivial (collège 10h-12h, lycée 13h-15h). La reprise administrative a lieu du 24 au 30 août 2026 (15h-19h), puis la rentrée pédagogique le mardi 1er septembre 2026 (planning provisoire)."},
      {q:'Que disent les familles ?',r:"La confiance des familles depuis plus de dix ans est notre plus belle récompense. Vous pouvez consulter les avis laissés par les parents et les élèves — et partager le vôtre — directement sur notre fiche Google :",link:'https://g.page/r/CSWi621Q4TVvEB0/review',linkLabel:'Lire et laisser un avis Google →'},
      {q:'Comment inscrire mon enfant ?',r:"Remplissez le formulaire d'inscription en ligne (un par enfant, même pour un élève déjà inscrit). Nous vous recontactons rapidement pour confirmer le créneau et la formule adaptée. Vous pouvez aussi nous joindre par téléphone — privilégiez le SMS pour un retour rapide."},

function encodePage(o){try{return btoa(unescape(encodeURIComponent(JSON.stringify(o)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}catch(e){return '';}}
function decodePage(s){s=String(s).replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';return JSON.parse(decodeURIComponent(escape(atob(s))));}
function pageLink(o){let base='';try{base=window.location.origin+window.location.pathname;}catch(_){}return base+'#v/'+encodePage(o);}
