        {/* KPIs projection */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:10,marginBottom:18}}>
          <div className="kpi"><div className="kpi-icon">📅</div><div className="kpi-val">{horizonMois} mois</div><div className="kpi-lbl">Horizon</div></div>
          <div className="kpi" style={{borderBottom:'3px solid #7c3aed'}}><div className="kpi-icon">💰</div><div className="kpi-val" style={{color:'#7c3aed'}}>{totalProjeMrr}€</div><div className="kpi-lbl">CA cumulé projeté</div><div className="kpi-sub" style={{color:'#7c3aed'}}>vs {mrrTotal*horizonMois}€ actuel</div></div>
          <div className="kpi" style={{borderBottom:`3px solid ${totalProjeMarge>=0?'#1a7a4a':'var(--err)'}`}}><div className="kpi-icon">{totalProjeMarge>=0?'💚':'🔴'}</div><div className="kpi-val" style={{color:totalProjeMarge>=0?'#1a7a4a':'var(--err)'}}>{totalProjeMarge>=0?'+':''}{totalProjeMarge}€</div><div className="kpi-lbl">Marge cumulée projetée</div></div>
          <div className="kpi" style={{borderBottom:'3px solid #1a4fc4'}}><div className="kpi-icon">📊</div><div className="kpi-val" style={{color:'#1a4fc4'}}>{projection.length>0?projection[projection.length-1].mrr:mrrTotal}€</div><div className="kpi-lbl">MRR fin de période</div><div className="kpi-sub" style={{color:'#1a4fc4'}}>{Math.round((projection.length>0?projection[projection.length-1].mrr:mrrTotal)/mrrTotal*100-100)>=0?'+':''}{mrrTotal>0?Math.round((projection.length>0?projection[projection.length-1].mrr:mrrTotal)/mrrTotal*100-100):0}% vs aujourd'hui</div></div>
        </div>

        {/* Graphique projection */}
        <div className="stat-section">
          <div className="stat-section-ttl">📈 Projection MRR vs Charges</div>
          {(()=>{
            const maxV=Math.max(mrrTotal,...projection.map(p=>p.mrr),...projection.map(p=>p.charges));
            return<div style={{display:'grid',gridTemplateColumns:`repeat(${projection.length+1},1fr)`,gap:6,alignItems:'flex-end',height:200,padding:'10px 4px',borderBottom:'2px solid var(--cream2)'}}>
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                <div style={{fontSize:10,fontWeight:700,color:'var(--navy)'}}>{mrrTotal}€</div>
                <div style={{position:'relative',width:'100%',height:160,display:'flex',alignItems:'flex-end',justifyContent:'center',gap:2}}>
                  <div title="MRR actuel" style={{flex:1,maxWidth:18,height:`${(mrrTotal/maxV)*100}%`,background:'linear-gradient(180deg,#a78bfa,#7c3aed)',borderRadius:'3px 3px 0 0'}}/>
                  <div title="Charges actuelles" style={{flex:1,maxWidth:18,height:`${((totalSalMensuel+monthlyChargesRounded)/maxV)*100}%`,background:'linear-gradient(180deg,#fcd34d,#c47a00)',borderRadius:'3px 3px 0 0',opacity:.85}}/>
                </div>
                <div style={{fontSize:10,fontWeight:700,color:'#1a4fc4'}}>Actuel</div>
              </div>
              {projection.map((p,i)=>(
                <div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                  <div style={{fontSize:10,fontWeight:700,color:p.marge>=0?'#1a7a4a':'var(--err)'}}>{p.mrr}€</div>
                  <div style={{position:'relative',width:'100%',height:160,display:'flex',alignItems:'flex-end',justifyContent:'center',gap:2}}>
                    <div title={`MRR mois ${i+1}: ${p.mrr}€`} style={{flex:1,maxWidth:18,height:`${(p.mrr/maxV)*100}%`,background:'linear-gradient(180deg,#a78bfa,#7c3aed)',borderRadius:'3px 3px 0 0'}}/>
                    <div title={`Charges: ${p.charges}€`} style={{flex:1,maxWidth:18,height:`${(p.charges/maxV)*100}%`,background:'linear-gradient(180deg,#fcd34d,#c47a00)',borderRadius:'3px 3px 0 0',opacity:.85}}/>
                  </div>
                  <div style={{fontSize:10,color:'var(--muted)',textTransform:'capitalize'}}>{p.label}</div>
                </div>
              ))}
            </div>;
          })()}
          <div style={{display:'flex',justifyContent:'center',gap:18,marginTop:14,fontSize:11}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}><span style={{width:10,height:10,background:'linear-gradient(180deg,#a78bfa,#7c3aed)',display:'inline-block'}}/><span style={{color:'var(--muted)'}}>MRR projeté</span></div>
            <div style={{display:'flex',alignItems:'center',gap:6}}><span style={{width:10,height:10,background:'linear-gradient(180deg,#fcd34d,#c47a00)',display:'inline-block',opacity:.85}}/><span style={{color:'var(--muted)'}}>Charges (salaires + fixes)</span></div>
          </div>
        </div>

        {/* Tableau détail */}
        <div className="stat-section" style={{marginTop:16}}>
          <div className="stat-section-ttl">📋 Détail mensuel projeté</div>
          <table className="tbl">
            <thead><tr><th>Mois</th><th>MRR projeté</th><th>Charges</th><th>Marge nette</th><th>Évolution</th></tr></thead>
            <tbody>{projection.map((p,i)=>{
              const prev=i===0?mrrTotal:projection[i-1].mrr;
              const delta=prev>0?Math.round(((p.mrr-prev)/prev)*100):0;
              return<tr key={i}>
                <td style={{fontWeight:600,textTransform:'capitalize'}}>{p.label}</td>
                <td style={{color:'#7c3aed',fontWeight:700,fontFamily:'var(--ff-serif)'}}>{p.mrr}€</td>
                <td style={{color:'#c47a00'}}>{p.charges}€</td>
                <td style={{color:p.marge>=0?'#1a7a4a':'var(--err)',fontWeight:700,fontFamily:'var(--ff-serif)'}}>{p.marge>=0?'+':''}{p.marge}€</td>
                <td style={{fontSize:11,color:delta>=0?'var(--ok)':'var(--err)',fontWeight:600}}>{delta>=0?'↑':'↓'} {Math.abs(delta)}%</td>
              </tr>;
            })}</tbody>
          </table>
        </div>
      </>}

      {/* ━━━ ONGLET ÉVOLUTION ━━━ */}
      {tab==='evolution'&&<>
        {/* Évolution CA 12 mois */}
        <div className="stat-section">
          <div className="stat-section-ttl">📊 Évolution du CA encaissé — 12 derniers mois</div>
          {(()=>{
            const maxE=Math.max(...evolution.map(m=>m.enc),1);
            const total12=evolution.reduce((a,m)=>a+m.enc,0);
            return<>
              <div style={{display:'grid',gridTemplateColumns:'repeat(12,1fr)',gap:5,alignItems:'flex-end',height:160}}>
                {evolution.map((m,i)=>(
                  <div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                    <div style={{fontSize:9,fontWeight:700,color:m.enc>0?'#1a7a4a':'var(--muted)'}}>{m.enc>0?m.enc+'€':''}</div>
                    <div title={`${m.label}: ${m.enc}€`} style={{width:'90%',maxWidth:24,height:`${(m.enc/maxE)*120}px`,background:i===evolution.length-1?'linear-gradient(180deg,#34d399,#1a7a4a)':'linear-gradient(180deg,#86efac,#2D9B6F)',borderRadius:'3px 3px 0 0',minHeight:m.enc>0?3:0}}/>
                    <div style={{fontSize:10,color:i===evolution.length-1?'#1a4fc4':'var(--muted)',fontWeight:i===evolution.length-1?700:500,textTransform:'capitalize'}}>{m.label}</div>
                  </div>
                ))}
              </div>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:10,paddingTop:10,borderTop:'1px solid var(--cream2)'}}>
                <span style={{fontSize:12,color:'var(--muted)'}}>Total 12 mois</span>
                <span style={{fontFamily:'var(--ff-serif)',fontSize:18,fontWeight:700,color:'#1a7a4a'}}>{total12}€</span>
              </div>
            </>;
          })()}
        </div>

        {/* Évolution par niveau */}
        <div className="stat-section" style={{marginTop:16}}>
          <div className="stat-section-ttl">🎓 Évolution du CA par classe / niveau — 6 derniers mois</div>
          {evolutionParNiveau.length===0?<div style={{padding:'20px',textAlign:'center',color:'var(--muted)',fontSize:13}}>Aucune donnée</div>:
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:12}}>
            {evolutionParNiveau.map(niv=><div key={niv.niveau} style={{background:'var(--cream)',padding:'12px 14px',borderRadius:4}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color:'#1a2340'}}>{niv.niveau}</div>
                  <div style={{fontSize:10,color:'var(--muted)'}}>{niv.nbEleves} élève{niv.nbEleves>1?'s':''}</div>
                </div>
                <div style={{fontFamily:'var(--ff-serif)',fontSize:15,fontWeight:700,color:'#1a7a4a'}}>{niv.total}€</div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:3,alignItems:'flex-end',height:50}}>
                {niv.months.map((m,j)=>(
                  <div key={j} title={`${m.label}: ${m.val}€`} style={{height:`${(m.val/niv.max)*45}px`,background:j===niv.months.length-1?'#1a4fc4':'#86efac',borderRadius:'2px 2px 0 0',minHeight:m.val>0?2:0,transition:'height .3s'}}/>
                ))}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:3,marginTop:3}}>
                {niv.months.map((m,j)=><div key={j} style={{fontSize:8,color:'var(--muted)',textAlign:'center',textTransform:'capitalize'}}>{m.label}</div>)}
              </div>
            </div>)}
          </div>}
        </div>

        {/* Évolution par matière */}
        <div className="stat-section" style={{marginTop:16}}>
          <div className="stat-section-ttl">📚 MRR par matière (instantané)</div>
          <table className="tbl">
            <thead><tr><th>Matière</th><th>Élèves uniques</th><th>Nb cours</th><th>MRR</th><th>Part</th></tr></thead>
            <tbody>{evolutionParMatiere.map(m=><tr key={m.matiere}>
              <td><span style={{...getCoursBadge(m.matiere)}}>{m.matiere}</span></td>
              <td>{m.nbEleves}</td>
              <td style={{color:'var(--muted)'}}>{m.nbCours}</td>
              <td style={{color:'var(--gold)',fontWeight:700,fontFamily:'var(--ff-serif)'}}>{m.mrr}€</td>
              <td><div style={{display:'flex',alignItems:'center',gap:6}}><div style={{flex:1,height:5,background:'var(--cream2)',borderRadius:3,overflow:'hidden',minWidth:60}}><div style={{height:'100%',width:`${mrrTotal>0?(m.mrr/mrrTotal)*100:0}%`,background:'var(--gold2)'}}/></div><span style={{fontSize:11,fontWeight:700,minWidth:30}}>{mrrTotal>0?Math.round((m.mrr/mrrTotal)*100):0}%</span></div></td>
            </tr>)}</tbody>
          </table>
        </div>
      </>}

      {/* ━━━ ONGLET CAPACITÉ (HEATMAP) ━━━ */}
      {tab==='capacite'&&<>
        {/* KPIs capacité */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:10,marginBottom:18}}>
          <div className="kpi" style={{borderBottom:'3px solid var(--err)'}}><div className="kpi-icon">🔴</div><div className="kpi-val" style={{color:'var(--err)'}}>{groupesSatures.length}</div><div className="kpi-lbl">Groupes saturés (≥100%)</div><div className="kpi-sub" style={{color:'var(--err)'}}>À dupliquer en priorité</div></div>
          <div className="kpi" style={{borderBottom:'3px solid #ea580c'}}><div className="kpi-icon">🟠</div><div className="kpi-val" style={{color:'#ea580c'}}>{groupesComplets.length}</div><div className="kpi-lbl">Groupes quasi-pleins</div><div className="kpi-sub" style={{color:'#ea580c'}}>85-99% remplis</div></div>
          <div className="kpi" style={{borderBottom:'3px solid var(--ok)'}}><div className="kpi-icon">🟢</div><div className="kpi-val" style={{color:'var(--ok)'}}>{coursCapacite.length-groupesSatures.length-groupesComplets.length}</div><div className="kpi-lbl">Groupes avec marge</div></div>
          <div className="kpi" style={{borderBottom:'3px solid #1a4fc4'}}><div className="kpi-icon">📊</div><div className="kpi-val" style={{color:'#1a4fc4'}}>{moyenneRemplissage}%</div><div className="kpi-lbl">Remplissage moyen</div></div>
        </div>

        {/* Alerte si saturés */}
        {groupesSatures.length>0&&<div style={{background:'#fef2f2',border:'1.5px solid #fca5a5',borderLeft:'5px solid var(--err)',borderRadius:6,padding:'14px 18px',marginBottom:18}}>
          <div style={{fontWeight:700,fontSize:14,color:'var(--err)',marginBottom:6}}>⚠ {groupesSatures.length} groupe{groupesSatures.length>1?'s':''} à dupliquer d'urgence</div>
          <div style={{fontSize:12,color:'#7a3030',marginBottom:10}}>Ces groupes ont atteint ou dépassé leur capacité maximale. Envisagez de créer un second groupe parallèle.</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {groupesSatures.map(c=>{const prof=users.find(u=>u.id===c.profId);return<span key={c.id} style={{background:'white',padding:'5px 10px',borderRadius:3,border:'1px solid #fca5a5',fontSize:11,color:'#7a3030'}}><strong>{c.matiere} {c.niveau}</strong> · {c.jour} {hs(c.debut)} · {prof?.name.split(' ').slice(-1)[0]} · <strong style={{color:'var(--err)'}}>{c.inscrits}/{c.placesMax}</strong></span>;})}
          </div>
        </div>}

        {/* Heatmap */}
        <div className="stat-section">
          <div className="stat-section-ttl">🌡️ Heatmap des groupes — Taux de remplissage</div>
          <div style={{fontSize:11,color:'var(--muted)',marginBottom:14}}>💡 Cliquez sur un groupe pour ajuster sa capacité maximale (places de la salle).</div>
          {coursCapacite.length===0?<div style={{padding:'20px',textAlign:'center',color:'var(--muted)'}}>Aucun cours</div>:
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:8}}>
            {coursCapacite.sort((a,b)=>b.pct-a.pct).map(c=>{
              const col=heatColor(c.pct);
              const prof=users.find(u=>u.id===c.profId);
              const isEdit=editPlacesId===c.id;
              return<div key={c.id} style={{background:col.bg,color:col.color,borderRadius:6,padding:'10px 12px',position:'relative',cursor:isEdit?'default':'pointer',transition:'transform .15s'}}
                onClick={()=>{if(!isEdit)setEditPlacesId(c.id);}}
                onMouseEnter={e=>{if(!isEdit)e.currentTarget.style.transform='scale(1.03)';}}
                onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:12,lineHeight:1.2}}>{c.matiere}</div>
                    <div style={{fontSize:10,opacity:.85,marginTop:2}}>{c.niveau}</div>
                  </div>
                  <div style={{fontFamily:'var(--ff-serif)',fontSize:18,fontWeight:700,lineHeight:1}}>{c.pct}%</div>
                </div>
                <div style={{fontSize:10,opacity:.85,marginBottom:6}}>{c.jour} {hs(c.debut)} · {prof?.name.split(' ').slice(-1)[0]||'—'}</div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:6}}>
                  <span style={{fontSize:10,fontWeight:600,opacity:.9}}>{col.label}</span>
                  {isEdit?<div style={{display:'flex',alignItems:'center',gap:3}} onClick={e=>e.stopPropagation()}>
                    <span style={{fontSize:11}}>{c.inscrits}/</span>
                    <input type="number" min="1" max="50" defaultValue={c.placesMax} autoFocus onBlur={e=>{updateMaxPlaces(c.id,e.target.value);setEditPlacesId(null);}} onKeyDown={e=>{if(e.key==='Enter'){updateMaxPlaces(c.id,e.target.value);setEditPlacesId(null);}if(e.key==='Escape')setEditPlacesId(null);}} style={{width:36,padding:'2px 4px',fontSize:11,border:'1.5px solid white',borderRadius:2,background:'rgba(255,255,255,.95)',color:'#1a2340',fontWeight:700}}/>
                  </div>:<span style={{fontSize:11,fontWeight:700}}>{c.inscrits}/{c.placesMax}</span>}
                </div>
                {c.pct>=100&&<div style={{position:'absolute',top:6,right:6,fontSize:14}}>⚠️</div>}
              </div>;
            })}
          </div>}
        </div>

        {/* Légende */}
        <div style={{marginTop:14,display:'flex',gap:10,flexWrap:'wrap',padding:'10px 14px',background:'var(--cream)',borderRadius:4,fontSize:11}}>
          <strong style={{color:'var(--navy)'}}>Échelle :</strong>
          {[{p:'0%',c:'#f3f4f6',col:'#6b7280'},{p:'<30%',c:'#e0e7ff',col:'#1a4fc4'},{p:'30-50%',c:'#bef264',col:'#1a2340'},{p:'50-70%',c:'#84cc16',col:'white'},{p:'70-85%',c:'#f59e0b',col:'white'},{p:'85-100%',c:'#ea580c',col:'white'},{p:'≥100%',c:'#dc2626',col:'white'},{p:'≥110%',c:'#7f1d1d',col:'white'}].map((it,i)=>(
            <span key={i} style={{background:it.c,color:it.col,padding:'3px 9px',borderRadius:3,fontWeight:600}}>{it.p}</span>
          ))}
        </div>
      </>}

      {/* ━━━ ONGLET CHARGES ━━━ */}
      {tab==='charges'&&<>
        <div style={{background:'#fff8e0',border:'1.5px solid #f5d882',borderLeft:'5px solid #c47a00',borderRadius:6,padding:'14px 18px',marginBottom:18,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
          <div>
            <div style={{fontWeight:700,fontSize:14,color:'#7a5800'}}>💰 Charges totales mensualisées</div>
            <div style={{fontSize:11,color:'#7a5800',marginTop:2}}>Inclut les charges fixes mensuelles + 1/12ᵉ des annuelles. Ponctuelles non incluses.</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontFamily:'var(--ff-serif)',fontSize:24,fontWeight:700,color:'#c47a00'}}>{monthlyChargesRounded}€<span style={{fontSize:14,fontWeight:400}}>/mois</span></div>
            <div style={{fontSize:11,color:'#c47a00'}}>≈ {annualCharges}€/an</div>
          </div>
        </div>

        {/* Tableau charges */}
        <div className="stat-section">
          <div className="stat-section-ttl">📋 Détail des charges ({charges.length})</div>
          {charges.length===0?<div style={{padding:'30px',textAlign:'center',color:'var(--muted)'}}>
            <div style={{fontSize:32,marginBottom:8}}>💰</div>
            <div style={{fontWeight:600,fontSize:14,color:'#1a2340'}}>Aucune charge enregistrée</div>
            <div style={{fontSize:12,marginTop:4}}>Cliquez sur "＋ Charge" pour ajouter loyer, assurance, fournitures...</div>
          </div>:
          <table className="tbl">
            <thead><tr><th>Charge</th><th>Catégorie</th><th>Type</th><th>Fréquence</th><th>Montant</th><th>Mensualisé</th><th></th></tr></thead>
            <tbody>{charges.map(c=>{
              const mens=c.frequence==='mensuelle'?c.montant:c.frequence==='annuelle'?Math.round(c.montant/12):0;
              return<tr key={c.id}>
                <td style={{fontWeight:600,fontSize:13}}>{c.nom}</td>
                <td style={{fontSize:12,color:'var(--muted)'}}>{c.categorie||'—'}</td>
                <td><span style={{padding:'2px 8px',borderRadius:2,fontSize:10,fontWeight:700,background:c.type==='fixe'?'#EEF5FF':'#fff8e0',color:c.type==='fixe'?'#1a4fc4':'#c47a00'}}>{c.type==='fixe'?'🔒 Fixe':'📊 Variable'}</span></td>
                <td style={{fontSize:12}}>{c.frequence==='mensuelle'?'📅 Mensuelle':c.frequence==='annuelle'?'📆 Annuelle':'⚡ Ponctuelle'}</td>
                <td style={{fontFamily:'var(--ff-serif)',fontWeight:700,color:'#1a2340'}}>{c.montant}€</td>
                <td style={{color:'#c47a00',fontWeight:600}}>{mens>0?mens+'€/mois':<span style={{color:'var(--muted)',fontStyle:'italic'}}>—</span>}</td>
                <td style={{display:'flex',gap:4}}>
                  <button className="btn btn-sm" style={{background:'#EEF5FF',border:'1.5px solid #C8D8F5',color:'#1a4fc4',fontSize:10,padding:'3px 7px'}} onClick={()=>openEditCharge(c)}>✏️</button>
                  <button className="btn btn-d btn-sm" style={{fontSize:10,padding:'3px 7px'}} onClick={()=>delCharge(c.id)}>🗑️</button>
                </td>
              </tr>;
            })}</tbody>
          </table>}
        </div>

        {/* Répartition par catégorie */}
        {charges.length>0&&<div className="stat-section" style={{marginTop:16}}>
          <div className="stat-section-ttl">🥧 Répartition par catégorie</div>
          {(()=>{
            const byCat={};
            charges.forEach(c=>{
              const mens=c.frequence==='mensuelle'?c.montant:c.frequence==='annuelle'?c.montant/12:0;
              byCat[c.categorie||'Autres']=(byCat[c.categorie||'Autres']||0)+mens;
            });
            const total=Object.values(byCat).reduce((a,v)=>a+v,0)||1;
            const cols=['#1a4fc4','#c47a00','#7c3aed','#1a7a4a','#dc2626','#0891b2','#be185d'];
            return<div style={{display:'flex',flexDirection:'column',gap:6}}>
              {Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([cat,val],i)=>{
                const pct=Math.round((val/total)*100);
                return<div key={cat} style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{width:130,fontSize:12,fontWeight:600,color:'#1a2340'}}>{cat}</span>
                  <div style={{flex:1,height:18,background:'var(--cream2)',borderRadius:3,overflow:'hidden',position:'relative'}}>
                    <div style={{height:'100%',width:`${pct}%`,background:cols[i%cols.length],display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:8,color:'white',fontSize:10,fontWeight:700,transition:'width .5s'}}>{pct>15&&pct+'%'}</div>
                  </div>
                  <span style={{minWidth:90,textAlign:'right',fontFamily:'var(--ff-serif)',fontWeight:700,color:'#1a2340'}}>{Math.round(val)}€/mois</span>
                </div>;
              })}
            </div>;
          })()}
        </div>}
      </>}
    </div>

    {/* Modal taux horaires */}
    {showSal&&<Modal title="Taux horaires des professeurs" onClose={()=>setShowSal(false)}>
      <p style={{fontSize:13,color:'var(--muted)',marginBottom:16}}>Définissez le taux horaire brut. Les heures sont calculées depuis le planning.</p>
      {profs.map(p=>{const s=salaires.find(x=>x.profId===p.id);const heures=cours.filter(c=>c.profId===p.id).reduce((a,c)=>a+(c.fin-c.debut),0);return<div key={p.id} className="fg">
        <label className="fl">{p.name} — {heures.toFixed(1)}h/semaine</label>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <input className="fi" type="number" style={{width:100}} defaultValue={s?.tauxHoraire||35} onChange={e=>setSalaires(prev=>{const ex=prev.find(x=>x.profId===p.id);if(ex)return prev.map(x=>x.profId===p.id?{...x,tauxHoraire:parseFloat(e.target.value)}:x);return[...prev,{profId:p.id,tauxHoraire:parseFloat(e.target.value)}];})}/>
          <span style={{fontSize:13,color:'var(--muted)'}}>€/h brut · ~{Math.round((s?.tauxHoraire||35)*heures*4.33)}€/mois</span>
        </div>
      </div>;})}
      <div className="fa"><button className="btn btn-p" onClick={()=>setShowSal(false)}>Fermer</button></div>
    </Modal>}

    {/* Modal ajout/édition charge */}
    {showCharge&&<Modal title={editCharge?"Modifier la charge":"Nouvelle charge"} onClose={()=>{setShowCharge(false);setEditCharge(null);}}>
      <div className="fg"><label className="fl">Nom de la charge *</label><input className="fi" value={chargeForm.nom} onChange={e=>setChargeForm(p=>({...p,nom:e.target.value}))} placeholder="Ex: Loyer local, Assurance, Internet..." autoFocus/></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div className="fg"><label className="fl">Montant (€) *</label><input className="fi" type="number" min="0" step="0.01" value={chargeForm.montant} onChange={e=>setChargeForm(p=>({...p,montant:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Fréquence</label>
          <select className="fi" value={chargeForm.frequence} onChange={e=>setChargeForm(p=>({...p,frequence:e.target.value}))}>
            <option value="mensuelle">📅 Mensuelle</option>
            <option value="annuelle">📆 Annuelle</option>
            <option value="ponctuelle">⚡ Ponctuelle (1 fois)</option>
          </select>
        </div>
        <div className="fg"><label className="fl">Type</label>
          <select className="fi" value={chargeForm.type} onChange={e=>setChargeForm(p=>({...p,type:e.target.value}))}>
            <option value="fixe">🔒 Fixe (montant garanti)</option>
            <option value="variable">📊 Variable (estimation)</option>
          </select>
        </div>
        <div className="fg"><label className="fl">Catégorie</label>
          <select className="fi" value={chargeForm.categorie} onChange={e=>setChargeForm(p=>({...p,categorie:e.target.value}))}>
            <option>Immobilier</option>
            <option>Administratif</option>
            <option>Frais généraux</option>
            <option>Pédagogie</option>
            <option>Marketing</option>
            <option>Personnel</option>
            <option>Autres</option>
          </select>
        </div>
      </div>
      <div className="fa"><button className="btn btn-o" onClick={()=>{setShowCharge(false);setEditCharge(null);}}>Annuler</button><button className="btn btn-p" onClick={saveCharge} disabled={!chargeForm.nom.trim()||!chargeForm.montant}>{editCharge?'Mettre à jour':'Créer'}</button></div>
    </Modal>}
  </>;
}



// ─── SUIVI COMPÉTENCES ───
function SuiviCompetences({user,users,cours,compEtats,setCompEtats,customComps=[],setCustomComps,awardedTrophies={},setAwardedTrophies}){
  const [selEleve,setSelEleve]=useState(null);
  const [selMat,setSelMat]=useState('Toutes');
  const [showValidModal,setShowValidModal]=useState(false);
  const [validTarget,setValidTarget]=useState(null);
  const [validForm,setValidForm]=useState({statut:'valide',commentaire:''});
  const [showAddComp,setShowAddComp]=useState(false);
  const [addCompForm,setAddCompForm]=useState({eleveId:'',matiere:'Mathématiques',chapitre:'',nom:'',tier:'base'});

  const [searchEleve,setSearchEleve]=useState('');
  const [groupFilter,setGroupFilter]=useState('tous');
  const [openGroups,setOpenGroups]=useState({});

  const eleves=users.filter(u=>u.role==='eleve');
  const viewedId=user.role==='eleve'?user.id:selEleve;

  // Groupes disponibles pour le filtre
  const allGroupes=useMemo(()=>[...new Set(cours.map(c=>c.id+':'+c.matiere+' '+c.niveau+' '+c.jour))]
    .map(s=>{const[id,...rest]=s.split(':');return{id,label:rest.join(':').trim()};}),[cours]);

  // Élèves filtrés et triés
  const filteredEleves=useMemo(()=>{
    let list=eleves;
    if(user.role==='prof') list=list.filter(e=>cours.some(c=>c.profId===user.id&&c.eleveIds.includes(e.id)));
    if(searchEleve) list=list.filter(e=>e.name.toLowerCase().includes(searchEleve.toLowerCase())||(e.niveau||'').toLowerCase().includes(searchEleve.toLowerCase()));
    if(groupFilter!=='tous') list=list.filter(e=>cours.find(c=>c.id===groupFilter&&c.eleveIds.includes(e.id)));
    return list;
  },[eleves,searchEleve,groupFilter,cours,user]);

  // All templates (base + custom)
  const allTemplates=(eleveId)=>{
    const el=users.find(u=>u.id===eleveId);
    if(!el)return[];
    const myCours=cours.filter(c=>c.eleveIds.includes(eleveId));
    const myMats=new Set(myCours.map(c=>c.matiere));
    const base=COMP_TEMPLATES.filter(t=>myMats.has(t.matiere)&&(t.niveau===el.niveau||!t.niveau));
    const custom=(customComps||[]).filter(t=>t.eleveId===eleveId);
    return [...base,...custom];
  };
  const getEtat=(eid,tid)=>(compEtats[eid]||{})[tid]||{statut:'non_commence',commentaire:'',profId:null,date:null};
  const getMatieres=(eid)=>[...new Set(allTemplates(eid).map(t=>t.matiere))];

  const getStats=(eid)=>{
    const tpls=allTemplates(eid);
    if(!tpls.length)return{total:0,valide:0,en_cours:0,a_revoir:0,pct:0};
    const etats=compEtats[eid]||{};
    const v=tpls.filter(t=>(etats[t.id]?.statut||'nc')==='valide').length;
    const e=tpls.filter(t=>(etats[t.id]?.statut||'nc')==='en_cours').length;
    const r=tpls.filter(t=>(etats[t.id]?.statut||'nc')==='a_revoir').length;
    return{total:tpls.length,valide:v,en_cours:e,a_revoir:r,pct:tpls.length?Math.round((v/tpls.length)*100):0};
  };

  const openValidModal=(eid,tid)=>{
    const cur=getEtat(eid,tid);
    setValidTarget({eid,tid});
    setValidForm({statut:cur.statut==='non_commence'?'valide':cur.statut,commentaire:cur.commentaire||''});
    setShowValidModal(true);
  };
  const doValidate=()=>{
    if(!validTarget)return;
    setCompEtats(p=>({...p,[validTarget.eid]:{...(p[validTarget.eid]||{}),[validTarget.tid]:{statut:validForm.statut,commentaire:validForm.commentaire,profId:user.id,date:new Date().toISOString().split('T')[0]}}}));
    setShowValidModal(false);
  };
  const requestWork=(tid)=>{
    setCompEtats(p=>({...p,[user.id]:{...(p[user.id]||{}),[tid]:{...getEtat(user.id,tid),statut:'en_cours',date:new Date().toISOString().split('T')[0]}}}));
  };
  const addCustomComp=()=>{
    if(!addCompForm.nom.trim()||!addCompForm.chapitre.trim())return;
    const id='cc'+Date.now();
    setCustomComps(p=>[...p,{...addCompForm,id}]);
    setShowAddComp(false);
    setAddCompForm({eleveId:viewedId||'',matiere:'Mathématiques',chapitre:'',nom:'',tier:'base'});
  };
  const deleteCustomComp=(id)=>setCustomComps(p=>p.filter(c=>c.id!==id));

  const StatBadge=({st})=>{
    const s=COMP_STATUTS[st]||COMP_STATUTS.non_commence;
    return <span style={{display:'inline-flex',alignItems:'center',gap:3,padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:600,background:s.bg,color:s.color,border:`1px solid ${s.color}28`}}>{s.icon} {s.label}</span>;
  };
  const TierPill=({tier})=>{
    const m={base:{l:'Base',c:'#6B7280',bg:'#F3F4F6'},intermediaire:{l:'Intermédiaire',c:'#D97706',bg:'#EEF5FF'},avance:{l:'Avancé',c:'#7C3AED',bg:'#F5F3FF'}}[tier]||{l:'Base',c:'#6B7280',bg:'#F3F4F6'};
    return <span style={{fontSize:10,padding:'1px 6px',borderRadius:0,background:m.bg,color:m.c,fontWeight:600}}>{m.l}</span>;
  };

  const CompView=({eid,canEdit})=>{
    const el=users.find(u=>u.id===eid);
    const mats=getMatieres(eid);
    const visibleMats=selMat==='Toutes'?mats:[selMat].filter(m=>mats.includes(m));
    const stats=getStats(eid);

    // Group by matière > chapitre
    const grouped={};
    allTemplates(eid).forEach(t=>{
      if(selMat!=='Toutes'&&t.matiere!==selMat)return;
      if(!grouped[t.matiere])grouped[t.matiere]={};
      if(!grouped[t.matiere][t.chapitre])grouped[t.matiere][t.chapitre]=[];
      grouped[t.matiere][t.chapitre].push({...t,etat:getEtat(eid,t.id),isCustom:!!(customComps||[]).find(c=>c.id===t.id)});
    });

    return <div>
      {/* Programme header */}
      {el&&<div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
        <div style={{width:42,height:42,borderRadius:0,background:'var(--navy)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🎓</div>
        <div>
          <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:18,fontWeight:600,color:'var(--navy)'}}>{el.name}</div>
          <div style={{display:'flex',gap:5,marginTop:4,flexWrap:'wrap'}}>
            <span style={{fontSize:11,padding:'1px 7px',borderRadius:0,background:'var(--cream2)',color:'var(--muted)',fontWeight:500}}>{el.niveau}</span>
            {getMatieres(eid).map(m=><span key={m} style={{...getCoursBadge(m),fontSize:10}}>{m}</span>)}
          </div>
        </div>
        {canEdit&&<button className="btn btn-p btn-sm" style={{marginLeft:'auto'}} onClick={()=>{setAddCompForm(f=>({...f,eleveId:eid}));setShowAddComp(true);}}>＋ Compétence</button>}
      </div>}

      {/* Stats + global bar */}
      <div className="sg" style={{marginBottom:16}}>
        <div className="sc c-ok"><div className="sc-v">{stats.valide}</div><div className="sc-l">Validées</div></div>
        <div className="sc c-gold"><div className="sc-v">{stats.en_cours}</div><div className="sc-l">En cours</div></div>
        <div className="sc" style={{borderColor:'#fecaca'}}><div className="sc-v" style={{color:'var(--err)'}}>{stats.a_revoir}</div><div className="sc-l">À revoir</div></div>
        <div className="sc c-navy"><div className="sc-v">{stats.pct}%</div><div className="sc-l">Progression</div></div>
      </div>
      <div style={{height:8,background:'var(--cream2)',borderRadius:4,overflow:'hidden',marginBottom:20}}>
        <div style={{height:'100%',width:`${stats.pct}%`,background:stats.pct===100?'var(--ok)':'linear-gradient(90deg,#1A6FD4,#4A90E2)',borderRadius:4,transition:'width .6s'}}/>
      </div>

      {/* Matière filter */}
      <div className="tabs" style={{marginBottom:18,flexWrap:'wrap'}}>
        {['Toutes',...mats].map(m=><button key={m} className={`tab ${selMat===m?'on':''}`} onClick={()=>setSelMat(m)} style={{fontSize:11}}>{m}</button>)}
      </div>

      {/* Matières > Chapitres > Compétences */}
      {Object.entries(grouped).map(([mat,chaps])=>(
        <div key={mat} style={{marginBottom:20}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
            <span style={{...getCoursBadge(mat)}}>{mat}</span>
            {(()=>{const all=Object.values(chaps).flat();const v=all.filter(c=>c.etat.statut==='valide').length;return<span style={{fontSize:12,color:'var(--muted)'}}>{v}/{all.length}</span>})()}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(420px,1fr))',gap:10}}>
          {Object.entries(chaps).map(([chap,comps])=>{
            const chapV=comps.filter(c=>c.etat.statut==='valide').length;
            const chapPct=Math.round((chapV/comps.length)*100);
            return <div key={chap} style={{background:'white',border:'1.5px solid var(--cream2)',borderRadius:0,overflow:'hidden'}}>
              <div style={{padding:'10px 16px',background:chapPct===100?'#ECFDF5':'var(--cream)',display:'flex',alignItems:'center',gap:12,borderBottom:'1px solid var(--cream2)'}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13,color:'var(--navy)'}}>{chap}</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{chapV}/{comps.length} validée{chapV>1?'s':''}</div>
                </div>
                <div style={{width:72}}>
                  <div style={{height:5,background:'var(--cream2)',borderRadius:3,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${chapPct}%`,background:chapPct===100?'var(--ok)':'var(--gold)',borderRadius:3}}/>
                  </div>
                  <div style={{fontSize:10,textAlign:'right',color:'var(--muted)',marginTop:2}}>{chapPct}%</div>
                </div>
                {chapPct===100&&<span style={{fontSize:16}}>🏆</span>}
              </div>
              {comps.map(c=>{
                const prof=users.find(u=>u.id===c.etat.profId);
                const st=COMP_STATUTS[c.etat.statut]||COMP_STATUTS.non_commence;
                return <div key={c.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 16px',borderBottom:'1px solid rgba(0,0,0,.035)'}}>
                  <div style={{width:24,height:24,borderRadius:2,background:st.bg,border:`2px solid ${st.color}50`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:st.color,flexShrink:0}}>{st.icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}>
                      <span style={{fontSize:13,fontWeight:500}}>{c.nom}</span>
                      <TierPill tier={c.tier}/>
                      {c.isCustom&&<span style={{fontSize:10,padding:'1px 5px',background:'#EEF5FF',color:'var(--gold)',borderRadius:2,fontWeight:600}}>Custom</span>}
                    </div>
                    {c.etat.commentaire&&<div style={{fontSize:11,color:'var(--muted)',marginTop:2,fontStyle:'italic'}}>💬 {c.etat.commentaire}</div>}
                    {c.etat.profId&&<div style={{fontSize:10,color:'var(--muted)',marginTop:1}}>par {prof?.name.split(' ').slice(-1)[0]} · {c.etat.date}</div>}
                  </div>
                  <div style={{display:'flex',gap:5,flexShrink:0}}>
                    {canEdit&&(
                      <button className="btn btn-sm" style={{fontSize:11,padding:'3px 9px',background:'#EEF5FF',border:'1.5px solid #C8D8F5',color:'var(--gold)'}}
                        onClick={()=>openValidModal(eid,c.id)}>
                        {c.etat.statut==='non_commence'?'Évaluer':'✏️'}
                      </button>
                    )}
                    {canEdit&&c.isCustom&&(
                      <button className="btn btn-d btn-sm" style={{fontSize:10,padding:'3px 7px'}} onClick={()=>deleteCustomComp(c.id)}>🗑️</button>
                    )}
                    {user.role==='eleve'&&c.etat.statut==='non_commence'&&(
                      <button className="btn btn-sm" style={{fontSize:11,padding:'3px 9px',background:'#EEF5FF',border:'1.5px solid #F0C080',color:'#D97706'}}
                        onClick={()=>requestWork(c.id)}>Je travaille ça</button>
                    )}
                  </div>
                </div>;
              })}
            </div>;
          })}
          </div>
        </div>
      ))}
      {Object.keys(grouped).length===0&&<div className="emp"><div className="emp-icon">📋</div><h3>Aucune compétence</h3><p>Inscrivez l'élève à des cours pour voir ses compétences.</p></div>}
    </div>;
  };

  return <>
    <TB title="Suivi Compétences">
      {(user.role==='prof'||user.role==='admin')&&viewedId&&<button className="btn btn-p btn-sm" onClick={()=>{setAddCompForm(f=>({...f,eleveId:viewedId}));setShowAddComp(true);}}>＋ Compétence</button>}
    </TB>
    <div className="pg">
      {user.role==='eleve'&&<CompView eid={user.id} canEdit={false}/>}
      {(user.role==='prof'||user.role==='admin')&&<div style={{display:'grid',gridTemplateColumns:'280px 1fr',gap:20,alignItems:'start'}}>
        {/* Sidebar — élèves groupés par cours/groupe */}
        <div>
          <div style={{marginBottom:8,position:'relative'}}>
            <input className="fi" placeholder="🔍 Rechercher un élève…" value={searchEleve}
              onChange={e=>setSearchEleve(e.target.value)}
              style={{fontSize:12,padding:'6px 10px',width:'100%'}}/>
            {searchEleve&&<button onClick={()=>setSearchEleve('')} style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'#aaa',fontSize:12}}>✕</button>}
          </div>
          {(()=>{
            // Scope : prof voit seulement ses cours, admin voit tous
            const myCoursList=user.role==='prof'?cours.filter(c=>c.profId===user.id):cours;
            const q=(searchEleve||'').toLowerCase();
            // Construire la liste des groupes affichables et leurs élèves
            const groupes=myCoursList.map(c=>{
              const els=users.filter(u=>u.role==='eleve'&&c.eleveIds.includes(u.id));
              const filtered=q?els.filter(e=>e.name.toLowerCase().includes(q)||(e.niveau||'').toLowerCase().includes(q)):els;
              return{cours:c,eleves:filtered};
            }).filter(g=>g.eleves.length>0);
            const totalEleves=new Set(groupes.flatMap(g=>g.eleves.map(e=>e.id))).size;
            return<>
              <div style={{fontSize:10,color:'var(--muted)',marginBottom:8,paddingLeft:2,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span>{groupes.length} groupe{groupes.length>1?'s':''} · {totalEleves} élève{totalEleves>1?'s':''}</span>
                <button onClick={()=>setOpenGroups(p=>{const all=groupes.reduce((o,g)=>{o[g.cours.id]=true;return o;},{});return Object.keys(p).length===groupes.length?{}:all;})} style={{background:'none',border:'none',color:'var(--gold)',cursor:'pointer',fontSize:10,fontWeight:600}}>↕ Tout</button>
              </div>
              {groupes.length===0&&<div style={{textAlign:'center',padding:'20px 0',color:'var(--muted)',fontSize:12}}>{user.role==='prof'?'Aucun groupe assigné.':'Aucun groupe trouvé.'}</div>}
              {groupes.map(({cours:c,eleves:gels})=>{
                const isOpen=openGroups[c.id]!==false; // ouvert par défaut
                // Stats agrégées du groupe
                const groupStats=gels.reduce((acc,e)=>{const s=getStats(e.id);acc.v+=s.valide;acc.t+=s.total;return acc;},{v:0,t:0});
                const groupPct=groupStats.t>0?Math.round(groupStats.v/groupStats.t*100):0;
                const prof=users.find(u=>u.id===c.profId);
                return<div key={c.id} style={{marginBottom:8,background:'white',border:'1.5px solid var(--cream2)',borderRadius:4,overflow:'hidden'}}>
                  <div onClick={()=>setOpenGroups(p=>({...p,[c.id]:!isOpen}))} style={{padding:'9px 11px',background:isOpen?'var(--cream)':'white',cursor:'pointer',display:'flex',alignItems:'center',gap:7,borderBottom:isOpen?'1px solid var(--cream2)':'none'}}>
                    <span style={{fontSize:10,color:'var(--muted)',width:8}}>{isOpen?'▼':'▶'}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:2}}>
                        <span style={{...getCoursBadge(c.matiere),fontSize:9,padding:'1px 5px'}}>{c.matiere}</span>
                        <span style={{fontWeight:700,fontSize:11,color:'var(--navy)'}}>{c.niveau}</span>
                      </div>
                      <div style={{fontSize:10,color:'var(--muted)'}}>{c.jour} {hs(c.debut)}–{hs(c.fin)} · {gels.length} élève{gels.length>1?'s':''}{user.role==='admin'&&prof&&` · ${prof.name.split(' ').slice(-1)[0]}`}</div>
                    </div>
                    {groupStats.t>0&&<div style={{textAlign:'right',flexShrink:0}}>
                      <div style={{fontSize:11,fontWeight:700,color:groupPct===100?'var(--ok)':groupPct>=60?'var(--gold)':'var(--err)'}}>{groupPct}%</div>
                      <div style={{fontSize:9,color:'var(--muted)'}}>{groupStats.v}/{groupStats.t}</div>
                    </div>}
                  </div>
                  {isOpen&&<div style={{padding:6}}>
                    {gels.map(e=>{
                      const s=getStats(e.id);
                      return<div key={e.id} onClick={()=>{setSelEleve(e.id);setSelMat('Toutes');}}
                        style={{padding:'7px 9px',borderRadius:3,background:selEleve===e.id?'var(--navy)':'transparent',marginBottom:3,cursor:'pointer',transition:'all .15s'}}
                        onMouseEnter={ev=>{if(selEleve!==e.id)ev.currentTarget.style.background='var(--cream)';}}
                        onMouseLeave={ev=>{if(selEleve!==e.id)ev.currentTarget.style.background='transparent';}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                          <span style={{fontWeight:600,fontSize:12,color:selEleve===e.id?'white':'var(--navy)'}}>{e.name}</span>
                          <span style={{fontSize:10,fontWeight:700,color:selEleve===e.id?'white':s.pct===100?'var(--ok)':s.pct>=60?'var(--gold)':'#999'}}>{s.pct}%</span>
                        </div>
                        <div style={{height:2,background:selEleve===e.id?'rgba(255,255,255,.15)':'var(--cream2)',borderRadius:2,overflow:'hidden'}}>
                          <div style={{height:'100%',width:`${s.pct}%`,background:s.pct===100?'var(--ok)':'#8b6b3a',borderRadius:2}}/>
                        </div>
                      </div>;
                    })}
                  </div>}
                </div>;
              })}
            </>;
          })()}
        </div>
        <div>
          {!viewedId?<div className="emp"><div className="emp-icon">👆</div><h3>Sélectionnez un élève</h3><p>Les élèves sont organisés par groupe / cours dans le panneau de gauche.</p></div>:<CompView eid={viewedId} canEdit={true}/>}
        </div>
      </div>}
    </div>

    {/* Validation modal */}
    {showValidModal&&validTarget&&(()=>{
      const tpl=[...COMP_TEMPLATES,...(customComps||[])].find(t=>t.id===validTarget.tid);
      const el=users.find(u=>u.id===validTarget.eid);
      return <Modal title="Évaluer la compétence" onClose={()=>setShowValidModal(false)}>
        <div style={{background:'var(--cream)',borderRadius:2,padding:'10px 14px',marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:13}}>{tpl?.nom}</div>
          <div style={{fontSize:12,color:'var(--muted)',marginTop:3}}>{tpl?.chapitre} · {tpl?.matiere}{el?` · ${el.name}`:''}</div>
        </div>
        <div className="fg"><label className="fl">Statut</label>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
            {Object.entries(COMP_STATUTS).filter(([k])=>k!=='non_commence').map(([k,v])=>(
              <div key={k} onClick={()=>setValidForm(f=>({...f,statut:k}))}
                style={{padding:'10px 8px',textAlign:'center',borderRadius:0,border:`2px solid ${validForm.statut===k?v.color:'var(--cream2)'}`,background:validForm.statut===k?v.bg:'white',cursor:'pointer'}}>
                <div style={{fontSize:18}}>{v.icon}</div>
                <div style={{fontSize:11,fontWeight:700,color:v.color,marginTop:4}}>{v.label}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="fg"><label className="fl">Commentaire</label>
          <textarea className="fi" rows={2} value={validForm.commentaire} onChange={e=>setValidForm(f=>({...f,commentaire:e.target.value}))} placeholder="Remarque optionnelle…"/>
        </div>
        <div className="fa"><button className="btn btn-o" onClick={()=>setShowValidModal(false)}>Annuler</button><button className="btn btn-p" onClick={doValidate}>Enregistrer</button></div>
      </Modal>;
    })()}

    {/* Ajout compétence custom */}
    {showAddComp&&<Modal title="Ajouter une compétence" onClose={()=>setShowAddComp(false)}>
      <div className="fg"><label className="fl">Élève</label>
        <select className="fi" value={addCompForm.eleveId} onChange={e=>setAddCompForm(f=>({...f,eleveId:e.target.value}))}>
          <option value="">— Sélectionner —</option>
          {eleves.map(e=><option key={e.id} value={e.id}>{e.name} ({e.niveau})</option>)}
        </select>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div className="fg"><label className="fl">Matière</label>
          <select className="fi" value={addCompForm.matiere} onChange={e=>setAddCompForm(f=>({...f,matiere:e.target.value}))}>
            {MATIERES.filter(m=>m!=='Toutes').map(m=><option key={m}>{m}</option>)}
          </select>
        </div>
        <div className="fg"><label className="fl">Niveau</label>
          <select className="fi" value={addCompForm.tier} onChange={e=>setAddCompForm(f=>({...f,tier:e.target.value}))}>
            <option value="base">Base</option>
            <option value="intermediaire">Intermédiaire</option>
            <option value="avance">Avancé</option>
          </select>
        </div>
      </div>
      <div className="fg"><label className="fl">Chapitre</label>
        <input className="fi" value={addCompForm.chapitre} onChange={e=>setAddCompForm(f=>({...f,chapitre:e.target.value}))} placeholder="Ex: Nombres et calculs"/>
      </div>
      <div className="fg"><label className="fl">Intitulé de la compétence *</label>
        <input className="fi" value={addCompForm.nom} onChange={e=>setAddCompForm(f=>({...f,nom:e.target.value}))} placeholder="Ex: Résoudre une équation du 2nd degré"/>
      </div>
      <div className="fa"><button className="btn btn-o" onClick={()=>setShowAddComp(false)}>Annuler</button><button className="btn btn-p" onClick={addCustomComp}>Ajouter</button></div>
    </Modal>}
  </>;
}


function CoursParticuliers({user,users,dispos,setDispos,demandes,setDemandes}){
  const [tab,setTab]=useState('planning');
  const [showDispo,setShowDispo]=useState(false);
  const [showDemande,setShowDemande]=useState(false);
  const [dispoForm,setDispoForm]=useState({date:'',debut:'14',fin:'15.5',mode:'presentiel',matiere:'Mathématiques',notes:'',tarifHoraire:40,fraisInfra:20});
  const [demandeForm,setDemandeForm]=useState({matiere:'Mathématiques',niveau:'3ème',datePreference:'',creneauDebut:'',creneauFin:'',notes:''});

  const profs=users.filter(u=>u.role==='prof');
  const eleves=users.filter(u=>u.role==='eleve');

  // ── Week navigation ──
  const [weekOffset,setWeekOffset]=useState(0);
  const getWeekStart=(off=0)=>{const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-d.getDay()+1+off*7);return d;};
  const weekStart=getWeekStart(weekOffset);
  const weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+6);
  const weekLabel=`${weekStart.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})} – ${weekEnd.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})}`;
  const dayToDate2=(day)=>{const idx=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'].indexOf(day);const d=new Date(weekStart);d.setDate(weekStart.getDate()+(idx===6?6:idx));return d.toISOString().split('T')[0];};
  const CP_H_START=8,CP_H_END=21,CP_CH=48;
  const CP_HOURS=Array.from({length:CP_H_END-CP_H_START},(_,i)=>i+CP_H_START);
  // Filter dispos for this week
  const weekDispos=dispos.filter(d=>{
    const ws=weekStart.toISOString().split('T')[0];
    const we=weekEnd.toISOString().split('T')[0];
    return d.date>=ws&&d.date<=we;
  });
  const visibleWeekDispos=weekDispos.filter(d=>{
    if(user.role==='prof')return d.profId===user.id;
    if(user.role==='eleve')return d.statut==='libre'||d.eleveId===user.id;
    return true;
  });
  const disposByDay2=DAYS.reduce((acc,d)=>{acc[d]=visibleWeekDispos.filter(x=>x.date===dayToDate2(d));return acc;},{});

  // ── Prof actions ──
  const addDispo=()=>{
    if(!dispoForm.date||!dispoForm.debut||!dispoForm.fin)return;
    setDispos(p=>[...p,{id:'d'+Date.now(),profId:user.id,date:dispoForm.date,debut:parseFloat(dispoForm.debut),fin:parseFloat(dispoForm.fin),mode:dispoForm.mode,matiere:dispoForm.matiere,notes:dispoForm.notes,statut:'libre',eleveId:null,demandeId:null,tarifHoraire:dispoForm.tarifHoraire||40,fraisInfra:dispoForm.fraisInfra||20}]);
    setShowDispo(false);
    setDispoForm({date:'',debut:'14',fin:'15.5',mode:'presentiel',matiere:'Mathématiques',notes:''});
  };
  const acceptDemande=(dem)=>{
    // Prof accepte une demande → crée une dispo confirmée liée
    const newId='d'+Date.now();
    setDispos(p=>[...p,{id:newId,profId:user.id,date:dem.datePreference,debut:parseFloat(dem.creneauDebut||'14'),fin:parseFloat(dem.creneauFin||'15.5'),mode:'presentiel',matiere:dem.matiere,statut:'confirme',eleveId:dem.eleveId,demandeId:dem.id,notes:dem.notes||''}]);
    setDemandes(p=>p.map(d=>d.id===dem.id?{...d,statut:'acceptee',profId:user.id,disponibiliteId:newId}:d));
  };
  const refuseDemande=(id)=>setDemandes(p=>p.map(d=>d.id===id?{...d,statut:'refusee'}:d));
  const deleteDispo=(id)=>{
    const d=dispos.find(x=>x.id===id);
    if(d?.statut==='confirme'){alert('Impossible de supprimer un créneau confirmé.');return;}
    setDispos(p=>p.filter(x=>x.id!==id));
  };

  // ── Eleve actions ──
  const addDemande=()=>{
    if(!demandeForm.matiere||!demandeForm.datePreference)return;
    setDemandes(p=>[...p,{id:'dem'+Date.now(),eleveId:user.id,matiere:demandeForm.matiere,niveau:demandeForm.niveau,datePreference:demandeForm.datePreference,creneauDebut:demandeForm.creneauDebut,creneauFin:demandeForm.creneauFin,notes:demandeForm.notes,statut:'attente',profId:null,disponibiliteId:null}]);
    setShowDemande(false);
    setDemandeForm({matiere:'Mathématiques',niveau:'3ème',datePreference:'',creneauDebut:'',creneauFin:'',notes:''});
  };
  const reserverDispo=(dispo)=>{
    setDispos(p=>p.map(d=>d.id===dispo.id?{...d,statut:'reserve',eleveId:user.id}:d));
  };
  const annulerReservation=(dispo)=>{
    if(!window.confirm('Annuler cette réservation ?'))return;
    setDispos(p=>p.map(d=>d.id===dispo.id?{...d,statut:'libre',eleveId:null}:d));
  };
  const cancelDemande=(id)=>setDemandes(p=>p.filter(d=>d.id!==id));

  // ── Computed ──
  const myDispos=user.role==='prof'?dispos.filter(d=>d.profId===user.id):dispos;
  const pendingDemandes=demandes.filter(d=>d.statut==='attente');
  const myDemandes=user.role==='eleve'?demandes.filter(d=>d.eleveId===user.id):demandes;
  const libresDispos=dispos.filter(d=>d.statut==='libre'&&d.profId!==user.id);

  const StatusBadge=({s,mode})=>{
    const map={libre:{bg:'#EEFFF6',color:'#2D9B6F',label:'Disponible'},reserve:{bg:'#FFF3E0',color:'#D97706',label:'Réservé'},confirme:{bg:'#EEF5FF',color:'var(--gold)',label:'Confirmé'},attente:{bg:'#EEF5FF',color:'#D97706',label:'En attente'},acceptee:{bg:'#EEFFF6',color:'#2D9B6F',label:'Acceptée'},refusee:{bg:'#FFF0F0',color:'#C94A4A',label:'Refusée'}};
    const m=map[s]||map['attente'];
    return <span style={{...m,padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:600,display:'inline-flex',alignItems:'center',gap:4}}>
      {s==='libre'?'✓':s==='confirme'?'🎉':s==='reserve'?'⏳':s==='acceptee'?'✅':s==='refusee'?'✗':'⏳'} {m.label}
      {mode&&<span style={{marginLeft:4,opacity:.7}}>{mode==='presentiel'?'🏫':'💻'}</span>}
    </span>;
  };

  const DispoCard=({d,showActions=true})=>{
    const prof=users.find(u=>u.id===d.profId);
    const eleve=users.find(u=>u.id===d.eleveId);
    const clr=mc(d.matiere);
    return <div style={{background:'white',border:'1.5px solid var(--cream2)',borderRadius:0,padding:'16px 20px',marginBottom:10,position:'relative',borderLeft:`4px solid ${clr.bd}`}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
            <span style={{...getCoursBadge(d.matiere),fontSize:12}}>{d.matiere}</span>
            <StatusBadge s={d.statut} mode={d.mode}/>
          </div>
          <div style={{fontWeight:600,fontSize:14,marginBottom:3}}>
            {new Date(d.date).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}
            {' '}{hs(d.debut)}–{hs(d.fin)}
          </div>
          {prof&&user.role!=='prof'&&<div style={{fontSize:12,color:'var(--muted)',marginBottom:2}}>👨‍🏫 {prof.name}</div>}
          {eleve&&<div style={{fontSize:12,color:'var(--muted)',marginBottom:2}}>🎓 {eleve.name}</div>}
          {d.notes&&<div style={{fontSize:12,color:'var(--muted)',fontStyle:'italic',marginTop:4}}>"{d.notes}"</div>}
        </div>
        {showActions&&<div style={{display:'flex',gap:6,flexShrink:0,flexDirection:'column',alignItems:'flex-end'}}>
          {/* Eleve : réserver un libre */}
          {user.role==='eleve'&&d.statut==='libre'&&d.profId!==user.id&&(
            <button className="btn btn-p btn-sm" onClick={()=>reserverDispo(d)}>Réserver</button>
          )}
          {/* Eleve : annuler sa réservation */}
          {user.role==='eleve'&&d.statut==='reserve'&&d.eleveId===user.id&&(
            <button className="btn btn-d btn-sm" onClick={()=>annulerReservation(d)}>Annuler</button>
          )}
          {/* Prof : supprimer sa dispo */}
          {user.role==='prof'&&d.profId===user.id&&d.statut!=='confirme'&&(
            <button className="btn btn-d btn-sm" onClick={()=>deleteDispo(d.id)}>🗑️</button>
          )}
          {/* Admin */}
          {user.role==='admin'&&<button className="btn btn-d btn-sm" onClick={()=>setDispos(p=>p.filter(x=>x.id!==d.id))}>🗑️</button>}
        </div>}
      </div>
    </div>;
  };

  const DemandeCard=({d,showActions=true})=>{
    const eleve=users.find(u=>u.id===d.eleveId);
    const prof=users.find(u=>u.id===d.profId);
    const clr=mc(d.matiere);
    return <div style={{background:'white',border:'1.5px solid var(--cream2)',borderRadius:0,padding:'16px 20px',marginBottom:10,borderLeft:`4px solid ${clr.bd}`}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
            <span style={{...getCoursBadge(d.matiere),fontSize:12}}>{d.matiere}</span>
            <span style={{background:'#F3F4F8',color:'var(--muted)',padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:600}}>{d.niveau}</span>
            <StatusBadge s={d.statut}/>
          </div>
          <div style={{fontWeight:600,fontSize:14,marginBottom:3}}>
            Souhait : {d.datePreference?new Date(d.datePreference).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}):'Date flexible'}
            {d.creneauDebut&&d.creneauFin&&<span style={{color:'var(--muted)',fontWeight:400}}> · {hs(parseFloat(d.creneauDebut))}–{hs(parseFloat(d.creneauFin))}</span>}
          </div>
          {eleve&&user.role!=='eleve'&&<div style={{fontSize:12,color:'var(--muted)',marginBottom:2}}>🎓 {eleve.name}</div>}
          {prof&&<div style={{fontSize:12,color:'var(--ok)',marginBottom:2}}>✅ Acceptée par {prof.name}</div>}
          {d.notes&&<div style={{fontSize:12,color:'var(--muted)',fontStyle:'italic',marginTop:4}}>"{d.notes}"</div>}
        </div>
        {showActions&&<div style={{display:'flex',gap:6,flexShrink:0,flexDirection:'column',alignItems:'flex-end'}}>
          {user.role==='prof'&&d.statut==='attente'&&<>
            <button className="btn btn-p btn-sm" onClick={()=>acceptDemande(d)}>✓ Accepter</button>
            <button className="btn btn-d btn-sm" onClick={()=>refuseDemande(d.id)}>✗ Refuser</button>
          </>}
          {user.role==='eleve'&&d.eleveId===user.id&&d.statut==='attente'&&(
            <button className="btn btn-d btn-sm" onClick={()=>cancelDemande(d.id)}>Annuler</button>
          )}
          {user.role==='admin'&&<button className="btn btn-d btn-sm" onClick={()=>setDemandes(p=>p.filter(x=>x.id!==d.id))}>🗑️</button>}
        </div>}
      </div>
    </div>;
  };

  // Build tabs by role
  const tabs=[];
  tabs.push({id:'planning',label:'🗓️ Planning'});
  if(user.role==='prof'){
    tabs.push({id:'mesdispos',label:'📋 Mes disponibilités'});
    tabs.push({id:'demandes',label:`📬 Demandes${pendingDemandes.length>0?` (${pendingDemandes.length})`:''}`});
  }
  if(user.role==='eleve'){
    tabs.push({id:'trouver',label:'🔍 Créneaux libres'});
    tabs.push({id:'mesdemandes',label:'📋 Mes demandes'});
  }
  if(user.role==='admin'){
    tabs.push({id:'suivi',label:'📊 Suivi'});
    tabs.push({id:'demandes',label:`📬 Demandes (${pendingDemandes.length})`});
  }

  return <>
    <TB title="Cours particuliers">
      {user.role==='prof'&&<button className="btn btn-p btn-sm" onClick={()=>setShowDispo(true)}>＋ Ajouter une dispo</button>}
      {user.role==='eleve'&&<button className="btn btn-p btn-sm" onClick={()=>setShowDemande(true)}>＋ Faire une demande</button>}
    </TB>
    <div className="pg">
      <div className="tabs" style={{marginBottom:20}}>
        {tabs.map(t=><button key={t.id} className={`tab ${tab===t.id?'on':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
      </div>

      {/* ── PLANNING TAB ── */}
      {tab==='planning'&&<>
        {/* Week nav */}
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
          <button className="btn btn-sm" style={{background:'#f0f4ff',border:'1.5px solid #c8d8f5',color:'var(--info)',padding:'5px 12px'}} onClick={()=>setWeekOffset(w=>w-1)}>◀</button>
          <div style={{fontWeight:600,fontSize:13,flex:1,textAlign:'center',color:'var(--navy)'}}>{weekLabel}</div>
          <button className="btn btn-sm" style={{background:'#f0f4ff',border:'1.5px solid #c8d8f5',color:'var(--info)',padding:'5px 12px'}} onClick={()=>setWeekOffset(w=>w+1)}>▶</button>
          {weekOffset!==0&&<button className="btn btn-sm" style={{background:'var(--cream2)',border:'none',fontSize:11,color:'var(--muted)',padding:'5px 10px'}} onClick={()=>setWeekOffset(0)}>Aujourd'hui</button>}
          {user.role==='prof'&&<button className="btn btn-p btn-sm" style={{marginLeft:8}} onClick={()=>setShowDispo(true)}>＋ Dispo</button>}
          {user.role==='eleve'&&<button className="btn btn-p btn-sm" style={{marginLeft:8}} onClick={()=>setShowDemande(true)}>＋ Demande</button>}
        </div>
        {/* Legend */}
        <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:12,fontSize:12,alignItems:'center'}}>
          <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:11,height:11,borderRadius:3,background:'#EEFFF6',border:'1.5px dashed #10B981'}}/><span style={{color:'var(--muted)'}}>Dispo libre</span></div>
          <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:11,height:11,borderRadius:3,background:'#EEF5FF',border:'1.5px dashed #D97706'}}/><span style={{color:'var(--muted)'}}>Réservé</span></div>
          <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:11,height:11,borderRadius:3,background:'#EEF5FF',border:'1.5px dashed #1A6FD4'}}/><span style={{color:'var(--muted)'}}>Confirmé</span></div>
          <span style={{color:'var(--muted)',fontSize:11}}>· 🏫 présentiel · 💻 visio</span>
        </div>
        {/* Grid */}
        <div style={{overflowX:'auto'}}>
          <div style={{display:'grid',gridTemplateColumns:`48px repeat(6,1fr)`,minWidth:700,background:'white',border:'1.5px solid var(--cream2)',borderRadius:0,overflow:'hidden'}}>
            {/* Header */}
            <div style={{padding:'8px 4px',background:'var(--cream)',borderBottom:'2px solid var(--cream2)',borderRight:'1px solid var(--cream2)'}}/>
            {DAYS.map(d=>{
              const date=dayToDate2(d);
              const isToday=date===new Date().toISOString().split('T')[0];
              const cnt=disposByDay2[d]?.length||0;
              return <div key={d} style={{padding:'8px 6px',background:'var(--cream)',borderBottom:'2px solid var(--cream2)',borderRight:'1px solid var(--cream2)',textAlign:'center',position:'relative'}}>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:.5,color:isToday?'var(--gold)':'var(--navy)'}}>{d.slice(0,3).toUpperCase()}</div>
                <div style={{fontSize:10,color:isToday?'var(--gold)':'var(--muted)'}}>{new Date(date+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</div>
                {cnt>0&&<span style={{position:'absolute',top:4,right:4,width:14,height:14,borderRadius:2,background:'#10B981',color:'white',fontSize:8,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{cnt}</span>}
                {isToday&&<div style={{position:'absolute',bottom:0,left:0,right:0,height:2,background:'var(--gold)'}}/>}
              </div>;
            })}
            {/* Body rows */}
            {CP_HOURS.map(h=>(
              <React.Fragment key={h}>
                <div style={{height:CP_CH,fontSize:9,color:'var(--muted)',textAlign:'right',paddingRight:6,paddingTop:3,borderRight:'1px solid var(--cream2)',borderBottom:'1px solid rgba(0,0,0,.04)'}}>{h}h</div>
                {DAYS.map(d=>{
                  const date=dayToDate2(d);
                  const slotsHere=disposByDay2[d]?.filter(dsp=>Math.floor(dsp.debut)<=h&&dsp.fin>h)||[];
                  return <div key={d} style={{height:CP_CH,position:'relative',borderRight:'1px solid var(--cream2)',borderBottom:'1px solid rgba(0,0,0,.04)',background:slotsHere.length?'rgba(16,185,129,.02)':'white'}}
                    onClick={e=>{if(e.target===e.currentTarget&&user.role==='prof'){setDispoForm(f=>({...f,date,debut:String(h),fin:String(h+1)}));setShowDispo(true);}}}>
                    {disposByDay2[d]?.filter(dsp=>dsp.debut>=h&&dsp.debut<h+1).map(dsp=>{
                      const prof=users.find(u=>u.id===dsp.profId);
                      const isMyDispo=dsp.profId===user.id||dsp.eleveId===user.id;
                      const top=(dsp.debut-h)*CP_CH;
                      const height=(dsp.fin-dsp.debut)*CP_CH-2;
                      const statColor=dsp.statut==='confirme'?'var(--gold)':dsp.statut==='reserve'?'#D97706':'#10B981';
                      const statBg=dsp.statut==='confirme'?'#EEF5FF':dsp.statut==='reserve'?'#EEF5FF':'#EEFFF6';
                      return <div key={dsp.id} style={{
                        position:'absolute',top,left:2,right:2,height,
                        background:statBg,border:`1.5px dashed ${statColor}`,borderRadius:2,
                        padding:'4px 7px',overflow:'hidden',cursor:'pointer',zIndex:2
                      }} onClick={e=>{
                        e.stopPropagation();
                        // Eleve can book/cancel, prof can delete
                        if(user.role==='eleve'&&dsp.statut==='libre')reserverDispo(dsp);
                        else if(user.role==='eleve'&&dsp.statut==='reserve'&&dsp.eleveId===user.id)annulerReservation(dsp);
                        else if(user.role==='prof'&&dsp.profId===user.id&&dsp.statut!=='confirme')deleteDispo(dsp.id);
                      }}>
                        <div style={{fontSize:10,fontWeight:700,color:statColor,display:'flex',gap:3,alignItems:'center'}}>
                          <span>{dsp.mode==='visio'?'💻':dsp.mode==='both'?'🏫💻':'🏫'}</span>
                          <span>{dsp.matiere}</span>
                        </div>
                        {height>32&&prof&&user.role!=='prof'&&<div style={{fontSize:9,color:'var(--muted)'}}>{prof.name.split(' ').slice(-1)[0]}</div>}
                        {height>32&&<div style={{fontSize:9,color:'var(--muted)'}}>{hs(dsp.debut)}–{hs(dsp.fin)}</div>}
                        {height>50&&<div style={{fontSize:9,color:statColor,fontWeight:600,marginTop:2}}>
                          {dsp.statut==='libre'?(user.role==='eleve'?'👆 Cliquer pour réserver':'Disponible'):
                           dsp.statut==='reserve'?(dsp.eleveId===user.id?'👆 Cliquer pour annuler':'En attente'):
                           '✓ Confirmé'}
                        </div>}
                        {dsp.tarifHoraire&&height>60&&<div style={{fontSize:9,color:statColor,fontWeight:700}}>{dsp.tarifHoraire}€/h</div>}
                        {dsp.notes&&height>68&&<div style={{fontSize:9,color:'var(--muted)',fontStyle:'italic',marginTop:1,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{dsp.notes}</div>}
                      </div>;
                    })}
                  </div>;
                })}
              </React.Fragment>
            ))}
          </div>
        </div>
        {visibleWeekDispos.length===0&&<div style={{textAlign:'center',padding:'28px 0',color:'var(--muted)',fontSize:13,marginTop:12}}>
          {user.role==='prof'?'Aucune disponibilité cette semaine. Cliquez sur une cellule pour en ajouter, ou utilisez le bouton ＋ Dispo.':
           user.role==='eleve'?'Aucune dispo de prof cette semaine. Essayez une autre semaine ou faites une demande.':
           'Aucune disponibilité cette semaine.'}
        </div>}
      </>}

      {/* ── PROF: Mes dispos ── */}
      {tab==='mesdispos'&&<>
        {myDispos.length===0
          ?<div className="emp"><div className="emp-icon">📅</div><h3>Aucune disponibilité postée</h3><p>Ajoutez vos créneaux libres pour que les élèves puissent les réserver.</p></div>
          :<div>{myDispos.sort((a,b)=>a.date.localeCompare(b.date)).map(d=><DispoCard key={d.id} d={d}/>)}</div>
        }
      </>}

      {/* ── PROF + ADMIN: Demandes élèves ── */}
      {tab==='demandes'&&<>
        <div style={{fontSize:13,fontWeight:600,marginBottom:12,color:'var(--navy)'}}>En attente de prise en charge</div>
        {pendingDemandes.length===0
          ?<div className="emp"><div className="emp-icon">📬</div><h3>Aucune demande en attente</h3><p>Les demandes des élèves apparaîtront ici.</p></div>
          :<div>{pendingDemandes.sort((a,b)=>a.datePreference.localeCompare(b.datePreference)).map(d=><DemandeCard key={d.id} d={d}/>)}</div>
        }
        {demandes.filter(d=>d.statut!=='attente').length>0&&<>
          <div style={{fontSize:13,fontWeight:600,marginTop:24,marginBottom:12,color:'var(--muted)'}}>Traitées</div>
          {demandes.filter(d=>d.statut!=='attente').map(d=><DemandeCard key={d.id} d={d}/>)}
        </>}
      </>}

      {/* ── ELEVE: Trouver un créneau ── */}
      {tab==='trouver'&&<>
        <div style={{fontSize:13,color:'var(--muted)',marginBottom:16}}>Créneaux disponibles postés par les professeurs</div>
        {libresDispos.length===0
          ?<div className="emp"><div className="emp-icon">🔍</div><h3>Aucun créneau disponible</h3><p>Revenez plus tard ou faites une demande directe.</p></div>
          :<div>{libresDispos.sort((a,b)=>a.date.localeCompare(b.date)).map(d=><DispoCard key={d.id} d={d}/>)}</div>
        }
        <div style={{marginTop:24,padding:'16px 20px',background:'#F0F6FF',border:'1.5px solid #C8D8F5',borderRadius:0}}>
          <div style={{fontWeight:600,marginBottom:6}}>Vous ne trouvez pas ce que vous cherchez ?</div>
          <div style={{fontSize:13,color:'var(--muted)',marginBottom:12}}>Faites une demande directe : renseignez la matière, la date souhaitée et un prof disponible vous répondra.</div>
          <button className="btn btn-p btn-sm" onClick={()=>setShowDemande(true)}>📬 Faire une demande de cours</button>
        </div>
      </>}

      {/* ── ELEVE: Mes demandes ── */}
      {tab==='mesdemandes'&&<>
        {myDemandes.length===0
          ?<div className="emp"><div className="emp-icon">📋</div><h3>Aucune demande</h3><p>Vos demandes de cours particuliers apparaîtront ici.</p></div>
          :<div>{myDemandes.sort((a,b)=>b.id.localeCompare(a.id)).map(d=><DemandeCard key={d.id} d={d}/>)}</div>
        }
        {/* Mes réservations sur dispos libres */}
        {dispos.filter(d=>d.eleveId===user.id).length>0&&<>
          <div style={{fontSize:13,fontWeight:600,marginTop:24,marginBottom:12,color:'var(--navy)'}}>Mes réservations</div>
          {dispos.filter(d=>d.eleveId===user.id).map(d=><DispoCard key={d.id} d={d}/>)}
        </>}
      </>}

      {/* ── ADMIN: Suivi global ── */}
      {tab==='suivi'&&<>
        <div className="sg" style={{marginBottom:20}}>
          <div className="sc c-ok"><div className="sc-ic">📅</div><div className="sc-v">{dispos.length}</div><div className="sc-l">Dispos postées</div></div>
          <div className="sc c-gold"><div className="sc-ic">⏳</div><div className="sc-v">{dispos.filter(d=>d.statut==='reserve').length}</div><div className="sc-l">Réservées</div></div>
          <div className="sc c-navy"><div className="sc-ic">🎉</div><div className="sc-v">{dispos.filter(d=>d.statut==='confirme').length}</div><div className="sc-l">Confirmées</div></div>
          <div className="sc"><div className="sc-ic">📬</div><div className="sc-v">{demandes.length}</div><div className="sc-l">Demandes total</div></div>
        </div>
        <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>Toutes les disponibilités</div>
        {dispos.length===0?<div style={{color:'var(--muted)',fontSize:13,marginBottom:20}}>Aucune dispo postée.</div>:dispos.sort((a,b)=>a.date.localeCompare(b.date)).map(d=><DispoCard key={d.id} d={d}/>)}
        <div style={{fontSize:13,fontWeight:600,marginTop:24,marginBottom:12}}>Toutes les demandes</div>
        {demandes.length===0?<div style={{color:'var(--muted)',fontSize:13}}>Aucune demande.</div>:demandes.sort((a,b)=>b.id.localeCompare(a.id)).map(d=><DemandeCard key={d.id} d={d}/>)}
      </>}
    </div>

    {/* ── Modal Dispo (Prof) ── */}
    {showDispo&&<Modal title="Ajouter une disponibilité" onClose={()=>setShowDispo(false)}>
      <div style={{background:'#F0F6FF',border:'1px solid #C8D8F5',borderRadius:2,padding:'10px 14px',marginBottom:12,fontSize:12,color:'var(--info)'}}>
        📢 Ce créneau sera visible par tous les élèves qui pourront le réserver.
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div className="fg" style={{gridColumn:'1/-1'}}><label className="fl">Date *</label><input className="fi" type="date" value={dispoForm.date} onChange={e=>setDispoForm({...dispoForm,date:e.target.value})}/></div>
        <div className="fg"><label className="fl">Début</label>
          <select className="fi" value={dispoForm.debut} onChange={e=>setDispoForm({...dispoForm,debut:e.target.value})}>
            {Array.from({length:23},(_,i)=>{const h=8+i*0.5;return<option key={h} value={h}>{hs(h)}</option>;})}
          </select>
        </div>
        <div className="fg"><label className="fl">Fin</label>
          <select className="fi" value={dispoForm.fin} onChange={e=>setDispoForm({...dispoForm,fin:e.target.value})}>
            {Array.from({length:23},(_,i)=>{const h=8.5+i*0.5;return<option key={h} value={h}>{hs(h)}</option>;})}
          </select>
        </div>
        <div className="fg"><label className="fl">Matière</label>
          <select className="fi" value={dispoForm.matiere} onChange={e=>setDispoForm({...dispoForm,matiere:e.target.value})}>
            {MATIERES.filter(m=>m!=='Toutes').map(m=><option key={m}>{m}</option>)}
          </select>
        </div>
        <div className="fg"><label className="fl">Mode</label>
          <select className="fi" value={dispoForm.mode} onChange={e=>setDispoForm({...dispoForm,mode:e.target.value})}>
            <option value="presentiel">🏫 Présentiel</option>
            <option value="visio">💻 Visio</option>
            <option value="both">🏫💻 Les deux</option>
          </select>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div className="fg">
          <label className="fl">Tarif horaire affiché (€/h)</label>
          <input className="fi" type="number" min="0" step="5" value={dispoForm.tarifHoraire} onChange={e=>setDispoForm({...dispoForm,tarifHoraire:parseFloat(e.target.value)||0})}/>
          <div style={{fontSize:10,color:'var(--muted)',marginTop:3}}>Visible par les élèves</div>
        </div>
        <div className="fg">
          <label className="fl">Frais infrastructure (%)</label>
          <input className="fi" type="number" min="0" max="100" step="5" value={dispoForm.fraisInfra} onChange={e=>setDispoForm({...dispoForm,fraisInfra:parseFloat(e.target.value)||0})}/>
          <div style={{fontSize:10,color:'var(--muted)',marginTop:3}}>Part PlusDeBonnesNotes — Prof perçoit {Math.round(dispoForm.tarifHoraire*(1-dispoForm.fraisInfra/100))}€/h</div>
        </div>
      </div>
      <div className="fg"><label className="fl">Notes (optionnel)</label><input className="fi" value={dispoForm.notes} onChange={e=>setDispoForm({...dispoForm,notes:e.target.value})} placeholder="Ex: disponible en centre ou en visio Zoom"/></div>
      <div className="fa"><button className="btn btn-o" onClick={()=>setShowDispo(false)}>Annuler</button><button className="btn btn-p" onClick={addDispo}>Publier</button></div>
    </Modal>}

    {/* ── Modal Demande (Eleve) ── */}
    {showDemande&&<Modal title="Demande de cours particulier" onClose={()=>setShowDemande(false)}>
      <div style={{background:'#F0F6FF',border:'1px solid #C8D8F5',borderRadius:2,padding:'10px 14px',marginBottom:12,fontSize:12,color:'var(--info)'}}>
        📬 Votre demande sera visible par tous les professeurs. Le premier disponible vous contactera.
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div className="fg"><label className="fl">Matière *</label>
          <select className="fi" value={demandeForm.matiere} onChange={e=>setDemandeForm({...demandeForm,matiere:e.target.value})}>
            {MATIERES.filter(m=>m!=='Toutes').map(m=><option key={m}>{m}</option>)}
          </select>
        </div>
        <div className="fg"><label className="fl">Niveau</label>
          <select className="fi" value={demandeForm.niveau} onChange={e=>setDemandeForm({...demandeForm,niveau:e.target.value})}>
            {NIVEAUX.filter(n=>n!=='Tous').map(n=><option key={n}>{n}</option>)}
          </select>
        </div>
        <div className="fg"><label className="fl">Date souhaitée *</label><input className="fi" type="date" value={demandeForm.datePreference} onChange={e=>setDemandeForm({...demandeForm,datePreference:e.target.value})}/></div>
        <div className="fg"><label className="fl">Créneau de préférence</label>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <select className="fi" style={{flex:1}} value={demandeForm.creneauDebut} onChange={e=>setDemandeForm({...demandeForm,creneauDebut:e.target.value})}>
              <option value="">Début</option>
              {Array.from({length:23},(_,i)=>{const h=8+i*0.5;return<option key={h} value={h}>{hs(h)}</option>;})}
            </select>
            <span style={{color:'var(--muted)',fontSize:12}}>–</span>
            <select className="fi" style={{flex:1}} value={demandeForm.creneauFin} onChange={e=>setDemandeForm({...demandeForm,creneauFin:e.target.value})}>
              <option value="">Fin</option>
              {Array.from({length:23},(_,i)=>{const h=8.5+i*0.5;return<option key={h} value={h}>{hs(h)}</option>;})}
            </select>
          </div>
        </div>
      </div>
      <div className="fg"><label className="fl">Ce que vous souhaitez travailler</label><textarea className="fi" value={demandeForm.notes} onChange={e=>setDemandeForm({...demandeForm,notes:e.target.value})} placeholder="Ex: révisions brevet blanc, exercices sur les fonctions, aide devoir maison..." rows={3}/></div>
      <div className="fa"><button className="btn btn-o" onClick={()=>setShowDemande(false)}>Annuler</button><button className="btn btn-p" onClick={addDemande}>Envoyer la demande</button></div>
    </Modal>}
  </>;
}


// ─── FACTURATION ───
// ═══════════════════════════════════════════════════════════════
// PDF INVOICE — jsPDF  (version professionnelle / devis)
// ═══════════════════════════════════════════════════════════════
function generateInvoicePDF(data){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=210,H=297;

  // Palette strictement sobre
  const BLACK  =[20,20,20];
  const DARK   =[50,50,50];
  const MID    =[120,120,120];
  const LIGHT  =[200,200,200];
  const XLIGHT =[240,240,240];
  const WHITE  =[255,255,255];

  const M=18; // marge gauche/droite

  // ── BANDE HAUTE (filet fin + entête) ──
  // Ligne déco haut de page
  doc.setFillColor(...BLACK);
  doc.rect(0,0,W,3,'F');

  // Nom de l'association — haut gauche
  doc.setFont('helvetica','bold');
  doc.setFontSize(15);
  doc.setTextColor(...BLACK);
  doc.text(data.assocNom||'Plus de bonnes notes',M,18);

  doc.setFont('helvetica','normal');
  doc.setFontSize(8);
  doc.setTextColor(...MID);
  doc.text(data.assocAdresse||'Soutien scolaire — La Courneuve',M,24);
