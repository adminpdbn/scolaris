function Inscription({onBack,onLogin}){
  const NIV=['CP','CE1','CE2','CM1','CM2','6ème','5ème','4ème','3ème','Seconde','Première','Terminale','Supérieur / Post-bac'];
  const MAT=['Mathématiques','Maths expertes','Physique-Chimie','Français','Histoire-Géo','SVT','Philosophie','Anglais','Anglais Cambridge','Arabe','Tamoul','Orthophonie','Aide aux devoirs','Prépa scientifique'];
  const OBJ=['Remise à niveau','Perfectionnement / approfondissement','Préparation examen (Brevet, Bac…)','Aide aux devoirs','Cours particuliers','Autre'];
  const SRC=['Bouche à oreille','Recherche Google','Réseaux sociaux','Élève / ancien élève','Flyer / affiche','Autre'];
  const LIEN=['Mère','Père','Frère','Sœur','Tuteur légal','Autre'];
  const [f,setF]=useState({prenom:'',nom:'',date_naissance:'',niveau:'3ème',etablissement:'',matieres:[],parent_nom:'',parent_prenom:'',tuteur1_lien:'',parent_tel:'',parent_email:'',t2_nom:'',t2_prenom:'',t2_lien:'',t2_tel:'',t2_email:'',adresse:'',ville:'',code_postal:'',objectif:'',source:'',creneau_souhaite:'',message:'',hp:''});
  const [sent,setSent]=useState(false);
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const [fileDom,setFileDom]=useState(null);
  const [fileBul,setFileBul]=useState(null);
  const upd=(k,v)=>setF(p=>({...p,[k]:v}));
  const toggleM=m=>setF(p=>({...p,matieres:p.matieres.includes(m)?p.matieres.filter(x=>x!==m):[...p.matieres,m]}));
  const submit=async()=>{
    setErr('');
    if(f.hp) { setSent(true); return; } // anti-spam (honeypot)
    if(!f.prenom.trim()||!f.nom.trim()||!f.parent_tel.trim()){setErr('Merci de renseigner au minimum le prénom, le nom et un numéro de téléphone.');return;}
    setBusy(true);
    const rec={
      id:'web'+Date.now(),
      prenom:f.prenom.trim(),nom:f.nom.trim(),niveau:f.niveau,matieres:f.matieres,
      parent_nom:f.parent_nom.trim(),parent_tel:f.parent_tel.trim(),parent_email:f.parent_email.trim(),
      creneau_souhaite:f.creneau_souhaite.trim(),message:f.message.trim(),statut:'nouveau',
      details:{date_naissance:f.date_naissance,etablissement:f.etablissement.trim(),parent_prenom:f.parent_prenom.trim(),tuteur1_lien:f.tuteur1_lien,t2_nom:f.t2_nom.trim(),t2_prenom:f.t2_prenom.trim(),t2_lien:f.t2_lien,t2_tel:f.t2_tel.trim(),t2_email:f.t2_email.trim(),adresse:f.adresse.trim(),ville:f.ville.trim(),code_postal:f.code_postal.trim(),objectif:f.objectif,source:f.source},
    };
    try{
      const upOne=async(fl,key)=>{ if(!fl) return; try{ const safe=fl.name.replace(/[^a-zA-Z0-9._-]/g,'_'); const path=rec.id+'_'+key+'_'+safe; const up=await sb.storage.from('justificatifs').upload(path,fl,{upsert:true}); if(!(up&&up.error)){ rec.details[key+'_path']=path; rec.details[key+'_nom']=fl.name; } }catch(_){ } }; await upOne(fileDom,'domicile'); await upOne(fileBul,'bulletin');
      const {error}=await sb.from('inscriptions_web').insert([rec]);
      if(error){console.error("[inscription] Supabase:",error);setErr("L'envoi a échoué : "+(error.message||"erreur inconnue")+". Réessayez ou contactez-nous par téléphone.");setBusy(false);return;}
      setSent(true);
      try{window.scrollTo(0,0);}catch(_){ }
    }catch(e){ console.error("[inscription] exception:",e); setErr("Connexion impossible : "+(e&&e.message||"")+". Vérifiez votre connexion."); }
    setBusy(false);
  };
  return <div className="lp">
    <nav className="lp-nav">
      <div className="lp-nav-brand">
        <svg width="22" height="22" viewBox="0 0 52 52" fill="none"><circle cx="26" cy="26" r="24" fill="var(--gold2)" opacity="0.2"/><path d="M26 8 L38 18 L38 34 L26 42 L14 34 L14 18 Z" fill="var(--gold)" opacity="0.9"/><path d="M20 24 L26 18 L32 24 L26 30 Z" fill="white"/></svg>
        PlusdeBonnesNotes
      </div>
      <button className="lp-btn lp-btn-o" onClick={onBack}>← Accueil</button>
    </nav>
    {sent ? (
      <div className="lp-ok">
        <div className="lp-ok-ic">✓</div>
        <h2>Demande envoyée !</h2>
        <p>Merci, votre demande a bien été enregistrée. Vous serez prochainement contacté par nos services de secrétariat et de comptabilité, et vos identifiants de connexion (identifiant et mot de passe) vous seront transmis.</p>
        <p style={{marginTop:12}}>S'il s'agit d'une première inscription chez nous, nous vous contacterons pour convenir d'un premier rendez-vous obligatoire de présentation de l'établissement, afin de finaliser et sécuriser le paiement.</p>
        <p style={{marginTop:12}}>Pour un retour plus rapide, privilégiez le SMS à l'un de nos contacts :</p>
        <p style={{marginTop:4,fontFamily:'var(--ff-mono)',fontSize:13,lineHeight:1.9}}>Raja&nbsp;: 06 64 09 48 81<br/>Sipi&nbsp;: 07 51 62 31 62<br/>Youssef&nbsp;: 06 37 23 88 50</p>
        <button className="lp-btn" onClick={onBack}>Retour à l'accueil</button>
      </div>
    ) : (
      <section className="lp-sec">
        <div className="lp-kicker">Inscription 2026 / 2027</div>
        <h2 className="lp-h2">Inscrire votre enfant</h2>
        <p className="lp-lead">Un formulaire par enfant — même pour les élèves déjà inscrits. Plus vous nous en dites, mieux nous préparons un créneau adapté. Nous vous recontactons rapidement. Champs marqués d'un * obligatoires.</p>
        <div className="lp-form">
          {err?<div className="lp-err">{err}</div>:null}

          <div className="lp-form-sec">1 · L'élève</div>
          <div className="lp-form-grid">
            <div className="lp-fg"><label>Prénom *</label><input className="lp-in" value={f.prenom} onChange={e=>upd('prenom',e.target.value)}/></div>
            <div className="lp-fg"><label>Nom *</label><input className="lp-in" value={f.nom} onChange={e=>upd('nom',e.target.value)}/></div>
            <div className="lp-fg"><label>Date de naissance</label><input className="lp-in" type="date" value={f.date_naissance} onChange={e=>upd('date_naissance',e.target.value)}/></div>
            <div className="lp-fg"><label>Niveau (rentrée 2026)</label><select className="lp-in" value={f.niveau} onChange={e=>upd('niveau',e.target.value)}>{NIV.map(n=><option key={n} value={n}>{n}</option>)}</select></div>
            <div className="lp-fg full"><label>Établissement scolaire actuel</label><input className="lp-in" value={f.etablissement} onChange={e=>upd('etablissement',e.target.value)} placeholder="Nom du collège / lycée"/></div>
          </div>
          <div className="lp-fg full"><label>Matières souhaitées</label>
            <div className="lp-chips" style={{marginTop:4}}>{MAT.map(m=><span key={m} className={"lp-chip"+(f.matieres.includes(m)?" lp-chip-sel":"")} style={{cursor:'pointer'}} onClick={()=>toggleM(m)}>{m}</span>)}</div>
          </div>

          <div className="lp-form-sec">2 · Tuteur légal 1 *</div>
          <div className="lp-form-grid">
            <div className="lp-fg"><label>Nom *</label><input className="lp-in" value={f.parent_nom} onChange={e=>upd('parent_nom',e.target.value)}/></div>
            <div className="lp-fg"><label>Prénom</label><input className="lp-in" value={f.parent_prenom} onChange={e=>upd('parent_prenom',e.target.value)}/></div>
            <div className="lp-fg"><label>Lien avec l'élève</label><select className="lp-in" value={f.tuteur1_lien} onChange={e=>upd('tuteur1_lien',e.target.value)}><option value="">— Choisir —</option>{LIEN.map(o=><option key={o} value={o}>{o}</option>)}</select></div>
            <div className="lp-fg"><label>Téléphone *</label><input className="lp-in" type="tel" value={f.parent_tel} onChange={e=>upd('parent_tel',e.target.value)}/></div>
            <div className="lp-fg full"><label>Email</label><input className="lp-in" type="email" value={f.parent_email} onChange={e=>upd('parent_email',e.target.value)}/></div>
          </div>

          <div className="lp-form-sec">3 · Tuteur légal 2 (facultatif)</div>
          <div className="lp-form-grid">
            <div className="lp-fg"><label>Nom</label><input className="lp-in" value={f.t2_nom} onChange={e=>upd('t2_nom',e.target.value)}/></div>
            <div className="lp-fg"><label>Prénom</label><input className="lp-in" value={f.t2_prenom} onChange={e=>upd('t2_prenom',e.target.value)}/></div>
            <div className="lp-fg"><label>Lien avec l'élève</label><select className="lp-in" value={f.t2_lien} onChange={e=>upd('t2_lien',e.target.value)}><option value="">— Choisir —</option>{LIEN.map(o=><option key={o} value={o}>{o}</option>)}</select></div>
            <div className="lp-fg"><label>Téléphone</label><input className="lp-in" type="tel" value={f.t2_tel} onChange={e=>upd('t2_tel',e.target.value)}/></div>
            <div className="lp-fg full"><label>Email</label><input className="lp-in" type="email" value={f.t2_email} onChange={e=>upd('t2_email',e.target.value)}/></div>
          </div>

          <div className="lp-form-sec">4 · Adresse du foyer</div>
          <div className="lp-form-grid">
            <div className="lp-fg full"><label>Adresse complète</label><input className="lp-in" value={f.adresse} onChange={e=>upd('adresse',e.target.value)} placeholder="N° et nom de rue, complément…"/></div>
            <div className="lp-fg"><label>Code postal</label><input className="lp-in" value={f.code_postal} onChange={e=>upd('code_postal',e.target.value)}/></div>
            <div className="lp-fg"><label>Ville</label><input className="lp-in" value={f.ville} onChange={e=>upd('ville',e.target.value)}/></div>
          </div>

          <div className="lp-form-sec">5 · Besoin</div>
          <div className="lp-form-grid">
            <div className="lp-fg"><label>Objectif principal</label><select className="lp-in" value={f.objectif} onChange={e=>upd('objectif',e.target.value)}><option value="">— Choisir —</option>{OBJ.map(o=><option key={o} value={o}>{o}</option>)}</select></div>
            <div className="lp-fg"><label>Comment nous avez-vous connus ?</label><select className="lp-in" value={f.source} onChange={e=>upd('source',e.target.value)}><option value="">— Choisir —</option>{SRC.map(o=><option key={o} value={o}>{o}</option>)}</select></div>
            
            <div className="lp-fg full"><label>Message (facultatif)</label><textarea className="lp-in" rows={3} value={f.message} onChange={e=>upd('message',e.target.value)} placeholder="Objectifs, difficultés, questions…"/></div>
          </div>

          <div className="lp-form-sec">6 · Pièces justificatives (facultatif)</div>
          <div className="lp-form-grid">
            <div className="lp-fg full"><label>Justificatif de domicile (PDF ou image)</label>
              <input className="lp-in" type="file" accept=".pdf,image/*" onChange={e=>{const x=e.target.files&&e.target.files[0]; if(x&&x.size>8*1024*1024){setErr('Fichier trop volumineux (8 Mo maximum).'); e.target.value=''; setFileDom(null); return;} setErr(''); setFileDom(x||null);}}/>
              {fileDom?<div style={{fontFamily:'var(--ff-mono)',fontSize:11.5,color:'var(--muted)',marginTop:6}}>📎 {fileDom.name}</div>:null}
            </div>
            <div className="lp-fg full"><label>Dernier bulletin scolaire (PDF ou image)</label>
              <input className="lp-in" type="file" accept=".pdf,image/*" onChange={e=>{const x=e.target.files&&e.target.files[0]; if(x&&x.size>8*1024*1024){setErr('Fichier trop volumineux (8 Mo maximum).'); e.target.value=''; setFileBul(null); return;} setErr(''); setFileBul(x||null);}}/>
              {fileBul?<div style={{fontFamily:'var(--ff-mono)',fontSize:11.5,color:'var(--muted)',marginTop:6}}>📎 {fileBul.name}</div>:null}
            </div>
          </div>

          {/* anti-spam : champ caché */}
          <input value={f.hp} onChange={e=>upd('hp',e.target.value)} tabIndex={-1} autoComplete="off" style={{position:'absolute',left:'-9999px',width:1,height:1,opacity:0}} aria-hidden="true"/>

          <button className="lp-btn" style={{width:'100%',marginTop:8,opacity:busy?.6:1}} disabled={busy} onClick={submit}>{busy?'Envoi…':'Envoyer ma demande d\u2019inscription'}</button>
          <p style={{fontFamily:'var(--ff-mono)',fontSize:12,color:'var(--muted)',textAlign:'center',marginTop:14}}>Déjà inscrit ? <a onClick={onLogin} style={{color:'var(--gold)',cursor:'pointer'}}>Accéder à l'espace membre</a></p>
        </div>
      </section>
    )}
    <footer className="lp-footer">© {new Date().getFullYear()} PlusdeBonnesNotes — Soutien scolaire à La Courneuve</footer>
  </div>;
}

// ═══════════════════ GESTION DES DEMANDES WEB (admin) ═══════════════════
function DemandesWeb({demandes=[],setDemandes,cours=[],setInscriptions,goGestion,users=[]}){
  const [filt,setFilt]=useState('tous');
  const [busy,setBusy]=useState(false);
  const ST={
    nouveau:{l:'Nouveau',c:'#1a4fc4',bg:'#EEF3FF',bd:'#c8d8f5',icon:'🆕'},
    valide:{l:'Validé',c:'#1a7a4a',bg:'#EEFFF6',bd:'#b8dbb8',icon:'✓'},
    creneau:{l:'Créneau attribué',c:'#7c3aed',bg:'#F3EEFF',bd:'#d8d0ff',icon:'📅'},
    attente:{l:"En attente d'offre",c:'#c47a00',bg:'#fff8e0',bd:'#f5d882',icon:'⏳'},
    autre:{l:'Autre / Clos',c:'#888',bg:'#f5f5f5',bd:'#ddd',icon:'•'},
  };
  const order=['nouveau','valide','creneau','attente','autre'];
  const count=s=>demandes.filter(d=>(d.statut||'nouveau')===s).length;
  const refresh=async()=>{ setBusy(true); try{ const r=await sb.from('inscriptions_web').select('*'); if(!r.error&&r.data) setDemandes(r.data);}catch(_){ } setBusy(false); };
  const patch=async(id,fields)=>{ setDemandes(p=>p.map(d=>d.id===id?{...d,...fields}:d)); try{ await sb.from('inscriptions_web').update(fields).eq('id',id);}catch(_){ } };
  const del=async(id)=>{ if(!window.confirm('Supprimer définitivement cette demande ?'))return; setDemandes(p=>p.filter(d=>d.id!==id)); try{ await sb.from('inscriptions_web').delete().eq('id',id);}catch(_){ } };
  const convertir=async(d)=>{ if(d.details&&d.details.transfere){ if(!window.confirm('Cette demande a déjà été transférée. Recréer une inscription ?'))return; } if(!setInscriptions)return; const ins={ id:'ins'+Date.now(), prenom:d.prenom||'', nom:d.nom||'', dateNaissance:(d.details&&d.details.date_naissance)||'', niveau:d.niveau||'3ème', matieres:d.matieres||[], parentNom:d.parent_nom||'', parentTel:d.parent_tel||'', parentEmail:d.parent_email||'', adresse:[(d.details&&d.details.code_postal)||'',(d.details&&d.details.ville)||''].filter(Boolean).join(' '), notes:['(Demande web)', d.creneau_souhaite&&('Souhait: '+d.creneau_souhaite), d.message||'', (d.details&&d.details.etablissement)&&('Étab: '+d.details.etablissement), (d.details&&d.details.objectif)&&('Objectif: '+d.details.objectif)].filter(Boolean).join(' · '), statut:'nouveau', dateInscription:new Date().toISOString().split('T')[0] }; setInscriptions(p=>[...p, ins]); patch(d.id,{statut:'valide', details:{...(d.details||{}), transfere:true}}); if(goGestion)goGestion(); };
  const list=demandes.filter(d=>filt==='tous'||(d.statut||'nouveau')===filt).sort((a,b)=>(b.created_at||b.id||'').localeCompare(a.created_at||a.id||''));
  const fmtH=h=>{ if(h==null||isNaN(h))return''; const hh=Math.floor(h),mm=Math.round((h-hh)*60); return hh+'h'+(mm?String(mm).padStart(2,'0'):''); };
  const coursLabel=c=>c?`${c.matiere} — ${c.jour} ${fmtH(c.debut)}${c.fin?'-'+fmtH(c.fin):''}${c.niveau?' ('+c.niveau+')':''}${c.salle?' · '+c.salle:''}`:'';
  const coursById=id=>cours.find(c=>c.id===id);
  const [planFor,setPlanFor]=useState(null);
  const fmtDate=d=>{ if(!d.created_at)return''; try{return new Date(d.created_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});}catch(_){return'';} };
  return <div>
    <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center',marginBottom:14}}>
      <div onClick={()=>setFilt('tous')} style={{cursor:'pointer',padding:'7px 12px',borderRadius:6,fontSize:12,fontWeight:700,border:`1.5px solid ${filt==='tous'?'var(--navy)':'#ddd'}`,background:filt==='tous'?'var(--navy)':'#fff',color:filt==='tous'?'#fff':'var(--navy)'}}>Tous · {demandes.length}</div>
      {order.map(k=><div key={k} onClick={()=>setFilt(k)} style={{cursor:'pointer',padding:'7px 12px',borderRadius:6,fontSize:12,fontWeight:700,border:`1.5px solid ${filt===k?ST[k].c:ST[k].bd}`,background:ST[k].bg,color:ST[k].c}}>{ST[k].icon} {ST[k].l} · {count(k)}</div>)}
      <button className="btn btn-o btn-sm" onClick={refresh} disabled={busy} style={{marginLeft:'auto'}}>{busy?'…':'⟳ Actualiser'}</button>
    </div>
    {list.length===0
      ? <div className="emp"><div className="emp-icon">🌐</div><h3>Aucune demande</h3><p>Les demandes envoyées depuis la page d'accueil publique apparaîtront ici.</p></div>
      : <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {list.map(d=>{ const st=ST[d.statut||'nouveau']||ST.nouveau; return (
          <div key={d.id} style={{background:'#fff',border:`1.5px solid ${st.bd}`,borderLeft:`4px solid ${st.c}`,borderRadius:6,padding:'14px 16px'}}>
            <div style={{display:'flex',justifyContent:'space-between',gap:10,flexWrap:'wrap',alignItems:'baseline'}}>
              <div style={{fontWeight:700,fontSize:15,fontFamily:'var(--ff-serif)'}}>{d.prenom} {d.nom} <span style={{fontSize:12,color:'var(--muted)',fontFamily:'var(--ff-mono)'}}>· {d.niveau||'—'}</span></div>
              <span style={{fontSize:11,color:'var(--muted)'}}>{fmtDate(d)}</span>
            </div>
            {Array.isArray(d.matieres)&&d.matieres.length>0&&<div style={{display:'flex',gap:5,flexWrap:'wrap',margin:'8px 0'}}>{d.matieres.map((m,i)=><span key={i} style={{fontSize:11,padding:'2px 8px',background:'#EEF3FF',border:'1px solid #c8d8f5',borderRadius:4,color:'#1a4fc4'}}>{m}</span>)}</div>}
            <div style={{fontSize:12.5,color:'#444',margin:'6px 0',lineHeight:1.6}}>
              {d.parent_nom?<span>👤 {d.parent_nom} &nbsp;</span>:null}
              {d.parent_tel?<a href={"tel:"+(d.parent_tel||'').replace(/\s/g,'')} style={{color:'var(--gold)'}}>📞 {d.parent_tel}</a>:null}
              {d.parent_email?<a href={"mailto:"+d.parent_email} style={{color:'var(--gold)',marginLeft:10}}>✉️ {d.parent_email}</a>:null}
            </div>
            {d.details&&(d.details.date_naissance||d.details.etablissement||d.details.ville||d.details.objectif||d.details.source||d.details.parent_tel2||d.details.parent_prenom)?<div style={{fontSize:11.5,color:'#666',margin:'4px 0',display:'flex',flexWrap:'wrap',gap:'2px 14px'}}>
              {d.details.parent_prenom?<span>👤 {d.details.parent_prenom}</span>:null}
              {d.details.tuteur1_lien?<span>👪 T1&nbsp;: {d.details.tuteur1_lien}</span>:null}
              {d.details.t2_nom?<span>👤 T2&nbsp;: {d.details.t2_prenom} {d.details.t2_nom}{d.details.t2_lien?' ('+d.details.t2_lien+')':''}</span>:null}
              {d.details.t2_tel?<span>📞 T2&nbsp;{d.details.t2_tel}</span>:null}
              {d.details.date_naissance?<span>🎂 {d.details.date_naissance}</span>:null}
              {d.details.etablissement?<span>🏫 {d.details.etablissement}</span>:null}
              {(d.details.adresse||d.details.ville||d.details.code_postal)?<span>📍 {d.details.adresse?d.details.adresse+', ':''}{d.details.code_postal} {d.details.ville}</span>:null}
              {d.details.objectif?<span>🎯 {d.details.objectif}</span>:null}
              {d.details.source?<span>👋 {d.details.source}</span>:null}{d.details&&(d.details.domicile_path||d.details.bulletin_path||d.details.justificatif_path)?<>{d.details.domicile_path?<button onClick={async()=>{try{const r=await sb.storage.from('justificatifs').createSignedUrl(d.details.domicile_path,3600);if(r.data&&r.data.signedUrl)window.open(r.data.signedUrl,'_blank');else alert('Document indisponible (vérifiez le bucket Storage justificatifs).');}catch(e){alert('Document indisponible.');}}} style={{background:'none',border:'none',color:'#1a4fc4',cursor:'pointer',fontFamily:'inherit',fontSize:'inherit',padding:0,textDecoration:'underline',marginRight:10}}>📎 Domicile</button>:null}{d.details.bulletin_path?<button onClick={async()=>{try{const r=await sb.storage.from('justificatifs').createSignedUrl(d.details.bulletin_path,3600);if(r.data&&r.data.signedUrl)window.open(r.data.signedUrl,'_blank');else alert('Document indisponible (vérifiez le bucket Storage justificatifs).');}catch(e){alert('Document indisponible.');}}} style={{background:'none',border:'none',color:'#1a4fc4',cursor:'pointer',fontFamily:'inherit',fontSize:'inherit',padding:0,textDecoration:'underline',marginRight:10}}>📎 Bulletin</button>:null}{d.details.justificatif_path?<button onClick={async()=>{try{const r=await sb.storage.from('justificatifs').createSignedUrl(d.details.justificatif_path,3600);if(r.data&&r.data.signedUrl)window.open(r.data.signedUrl,'_blank');else alert('Document indisponible (vérifiez le bucket Storage justificatifs).');}catch(e){alert('Document indisponible.');}}} style={{background:'none',border:'none',color:'#1a4fc4',cursor:'pointer',fontFamily:'inherit',fontSize:'inherit',padding:0,textDecoration:'underline',marginRight:10}}>📎 {d.details.justificatif_nom||'Justificatif'}</button>:null}</>:null}
            </div>:null}
            {d.creneau_souhaite?<div style={{fontSize:12,color:'#555'}}>🕒 Souhait : {d.creneau_souhaite}</div>:null}
            {d.creneau&&coursById(d.creneau)?<div style={{fontSize:12,color:'#7c3aed',fontWeight:600,marginTop:4}}>📅 Créneau attribué : {coursLabel(coursById(d.creneau))}</div>:null}
            {d.message?<div style={{fontSize:12,color:'#555',marginTop:4,fontStyle:'italic'}}>« {d.message} »</div>:null}
            <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'flex-end',marginTop:12,borderTop:'1px dotted #e0e0e0',paddingTop:12}}>
              <div style={{display:'flex',flexDirection:'column',gap:4}}>
                <label style={{fontSize:10,textTransform:'uppercase',color:'var(--muted)',letterSpacing:.5}}>Statut</label>
                <select value={d.statut||'nouveau'} onChange={e=>patch(d.id,{statut:e.target.value})} style={{padding:'6px 10px',border:'1.5px solid #dde3f0',borderRadius:4,fontSize:12,fontFamily:'var(--ff-mono)'}}>
                  {order.map(k=><option key={k} value={k}>{ST[k].icon} {ST[k].l}</option>)}
                </select>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:4,flex:1,minWidth:160}}>
                <label style={{fontSize:10,textTransform:'uppercase',color:'var(--muted)',letterSpacing:.5}}>Créneau attribué</label>
                <button onClick={()=>setPlanFor(d)} style={{padding:'6px 10px',border:'1.5px solid #dde3f0',borderRadius:4,fontSize:12,fontFamily:'var(--ff-mono)',background:'white',cursor:'pointer',textAlign:'left',maxWidth:'100%'}}>📅 {d.creneau&&coursById(d.creneau)?coursLabel(coursById(d.creneau)):'Choisir un créneau…'}</button>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:4,flex:1,minWidth:160}}>
                <label style={{fontSize:10,textTransform:'uppercase',color:'var(--muted)',letterSpacing:.5}}>Note interne</label>
                <input defaultValue={d.notes||''} onBlur={e=>{if(e.target.value!==(d.notes||''))patch(d.id,{notes:e.target.value});}} placeholder="Remarque…" style={{padding:'6px 10px',border:'1.5px solid #dde3f0',borderRadius:4,fontSize:12,fontFamily:'var(--ff-mono)'}}/>
              </div>
              {(d.details&&d.details.transfere)?<span style={{fontSize:11,color:'#1a7a4a',fontWeight:700,alignSelf:'center'}} title="Déjà transférée">✓ Transférée</span>:<button className="btn btn-p btn-sm" onClick={()=>convertir(d)} title="Créer une inscription à partir de cette demande">→ Inscription</button>}
              <button className="btn btn-d btn-sm" onClick={()=>del(d.id)} title="Supprimer">🗑</button>
            </div>
          </div>
        );})}
      </div>}
      {planFor&&<Modal title="Attribuer un créneau" onClose={()=>setPlanFor(null)} width="min(1100px, 94vw)">
        <div style={{fontSize:12,color:'var(--muted)',marginBottom:10}}>Clique sur le créneau à attribuer à <strong>{planFor.prenom} {planFor.nom}</strong>. Cela passe la demande en « Créneau attribué ».</div>
        <PlanningPicker cours={cours} users={users} niveauHint={planFor.niveau} isSelected={c=>c.id===planFor.creneau} onPick={c=>{patch(planFor.id,{creneau:c.id,statut:'creneau'}); setPlanFor(null);}}/>
      </Modal>}
  </div>;
}

// ═══════════════════ STAGES & RÉSEAU PRO (admin) ═══════════════════
function StagesReseau({user,users=[],entreprises=[],setEntreprises,stages=[],setStages}){
  const [tab,setTab]=useState('entreprises');
  const [showEnt,setShowEnt]=useState(false);
  const [selEnt,setSelEnt]=useState(null);
  const [showStg,setShowStg]=useState(false);
  const [selStg,setSelStg]=useState(null);
  const [q,setQ]=useState('');
  const [fStatutEnt,setFStatutEnt]=useState('tous');
  const [fStatutStg,setFStatutStg]=useState('tous');

  const TYPES=['Stage de 3ème','Stage de 2nde',"Stage d'observation",'Mini-stage / immersion','Job d\u2019été','Alternance','Autre'];
  const SECTEURS=['Santé','Droit / Justice','Finance / Banque','Ingénierie / Industrie','Informatique / Tech','Architecture / BTP','Médias / Communication','Commerce','Administration / Public','Recherche / Université','Artisanat','Autre'];

  const ENT_ST={
    prospect:{l:'Prospect',c:'#c47a00',bg:'#fff8e0',bd:'#f5d882',icon:'🔎'},
    contacte:{l:'Contacté',c:'#1a4fc4',bg:'#EEF3FF',bd:'#c8d8f5',icon:'✉️'},
    partenaire:{l:'Partenaire actif',c:'#1a7a4a',bg:'#EEFFF6',bd:'#b8dbb8',icon:'🤝'},
    inactif:{l:'Inactif',c:'#888',bg:'#f5f5f5',bd:'#ddd',icon:'💤'},
  };
  const STG_ST={
    recherche:{l:'En recherche',c:'#c47a00',bg:'#fff8e0',bd:'#f5d882',icon:'🔍'},
    propose:{l:'Proposé',c:'#1a4fc4',bg:'#EEF3FF',bd:'#c8d8f5',icon:'📨'},
    confirme:{l:'Confirmé',c:'#7c3aed',bg:'#F3EEFF',bd:'#d8d0ff',icon:'📅'},
    realise:{l:'Réalisé',c:'#1a7a4a',bg:'#EEFFF6',bd:'#b8dbb8',icon:'✓'},
    annule:{l:'Annulé',c:'#888',bg:'#f5f5f5',bd:'#ddd',icon:'✕'},
  };
  const eleves=users.filter(u=>u.role==='eleve');
  const entName=id=>{const e=entreprises.find(x=>x.id===id);return e?e.nom:'—';};

  // KPIs
  const nbPartenaires=entreprises.filter(e=>e.statut==='partenaire').length;
  const nbPlaces=entreprises.filter(e=>e.statut==='partenaire').reduce((a,e)=>a+(parseInt(e.places)||0),0);
  const nbPlaces2=stages.filter(s=>s.statut==='confirme'||s.statut==='realise').length;
  const nbRecherche=stages.filter(s=>s.statut==='recherche').length;

  // ── Entreprise form ──
  const EMPTY_ENT={nom:'',secteur:'',ville:'',contact_nom:'',contact_role:'',contact_email:'',contact_tel:'',types:[],places:'',statut:'prospect',notes:''};
  const [eForm,setEForm]=useState(EMPTY_ENT);
  const openEnt=(e)=>{ if(e){setSelEnt(e);setEForm({...EMPTY_ENT,...e,types:e.types||[]});}else{setSelEnt(null);setEForm(EMPTY_ENT);} setShowEnt(true); };
  const saveEnt=()=>{
    if(!eForm.nom.trim())return;
    if(selEnt){ setEntreprises(p=>p.map(x=>x.id===selEnt.id?{...x,...eForm}:x)); }
    else{ setEntreprises(p=>[...p,{id:'ent'+Date.now(),...eForm,dateAjout:new Date().toISOString().split('T')[0]}]); }
    setShowEnt(false);
  };
  const delEnt=(id)=>{ if(window.confirm('Supprimer cette entreprise ?')) setEntreprises(p=>p.filter(x=>x.id!==id)); };
  const toggleType=ty=>setEForm(p=>({...p,types:p.types.includes(ty)?p.types.filter(x=>x!==ty):[...p.types,ty]}));

  // ── Placement form ──
  const EMPTY_STG={eleve:'',entrepriseId:'',type:'Stage de 3ème',periode:'',tuteur:'',statut:'recherche',notes:''};
  const [sForm,setSForm]=useState(EMPTY_STG);
  const openStg=(s)=>{ if(s){setSelStg(s);setSForm({...EMPTY_STG,...s});}else{setSelStg(null);setSForm(EMPTY_STG);} setShowStg(true); };
  const saveStg=()=>{
    if(!sForm.eleve.trim())return;
    if(selStg){ setStages(p=>p.map(x=>x.id===selStg.id?{...x,...sForm}:x)); }
    else{ setStages(p=>[...p,{id:'stg'+Date.now(),...sForm,dateAjout:new Date().toISOString().split('T')[0]}]); }
    setShowStg(false);
  };
  const delStg=(id)=>{ if(window.confirm('Supprimer ce placement ?')) setStages(p=>p.filter(x=>x.id!==id)); };

  const entList=entreprises.filter(e=>{
    if(fStatutEnt!=='tous'&&e.statut!==fStatutEnt)return false;
    if(!q)return true;const s=q.toLowerCase();
    return (e.nom||'').toLowerCase().includes(s)||(e.secteur||'').toLowerCase().includes(s)||(e.ville||'').toLowerCase().includes(s)||(e.contact_nom||'').toLowerCase().includes(s);
  });
  const stgList=stages.filter(s=>fStatutStg==='tous'||s.statut===fStatutStg);

  const fld={padding:'8px 10px',border:'1.5px solid #dde3f0',borderRadius:4,fontSize:13,fontFamily:'var(--ff-mono)',width:'100%'};

  return <>
    <TB title="Stages & Réseau Pro">
      {tab==='entreprises'?<button className="btn btn-p" onClick={()=>openEnt(null)}>＋ Entreprise</button>:<button className="btn btn-p" onClick={()=>openStg(null)}>＋ Placement</button>}
    </TB>
    <div className="pg">
      {/* Mission */}
      <div style={{background:'#111',color:'var(--cream)',borderRadius:6,padding:'14px 18px',marginBottom:16,fontFamily:'var(--ff-mono)',fontSize:12.5,lineHeight:1.6,borderLeft:'4px solid var(--gold2)'}}>
        🎯 <strong>Égalité des chances.</strong> En zone d'éducation prioritaire, le réseau ne doit pas rester un privilège. Ce module recense nos entreprises partenaires et place nos élèves dans des stages de qualité, pour qu'ils découvrent le monde du travail dans les meilleures conditions — quel que soit leur milieu d'origine.
      </div>

      {/* KPIs */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:10,marginBottom:16}}>
        {[
          {ic:'🤝',v:nbPartenaires,l:'Partenaires actifs',c:'#1a7a4a',bg:'#EEFFF6'},
          {ic:'🎟️',v:nbPlaces,l:'Places annoncées',c:'#1a4fc4',bg:'#EEF3FF'},
          {ic:'✓',v:nbPlaces2,l:'Élèves placés',c:'#7c3aed',bg:'#F3EEFF'},
          {ic:'🔍',v:nbRecherche,l:'En recherche',c:'#c47a00',bg:'#fff8e0'},
        ].map((k,i)=><div key={i} style={{background:k.bg,borderRadius:6,padding:'12px 14px',display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:20}}>{k.ic}</span>
          <div><div style={{fontWeight:700,fontSize:20,color:k.c,fontFamily:'var(--ff-serif)'}}>{k.v}</div><div style={{fontSize:10,color:'#6b7ab5'}}>{k.l}</div></div>
        </div>)}
      </div>

      {/* Tabs */}
      <div className="tabs" style={{marginBottom:14}}>
        <button className={`tab ${tab==='entreprises'?'on':''}`} onClick={()=>setTab('entreprises')}>🏢 Entreprises ({entreprises.length})</button>
        <button className={`tab ${tab==='placements'?'on':''}`} onClick={()=>setTab('placements')}>🎓 Placements ({stages.length})</button>
      </div>

      {tab==='entreprises' && <>
        <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Rechercher (nom, secteur, ville, contact)…" style={{...fld,flex:1,minWidth:200}}/>
          <select value={fStatutEnt} onChange={e=>setFStatutEnt(e.target.value)} style={{...fld,width:'auto'}}>
            <option value="tous">Tous statuts</option>
            {Object.keys(ENT_ST).map(k=><option key={k} value={k}>{ENT_ST[k].icon} {ENT_ST[k].l}</option>)}
          </select>
        </div>
        {entList.length===0
          ? <div className="emp"><div className="emp-icon">🏢</div><h3>Aucune entreprise</h3><p>Ajoutez vos premiers contacts d'entreprises pour bâtir le réseau.</p></div>
          : <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}}>
            {entList.map(e=>{const st=ENT_ST[e.statut||'prospect']||ENT_ST.prospect;return(
              <div key={e.id} style={{background:'#fff',border:`1.5px solid ${st.bd}`,borderTop:`4px solid ${st.c}`,borderRadius:6,padding:14}}>
                <div style={{display:'flex',justifyContent:'space-between',gap:8,alignItems:'baseline'}}>
                  <div style={{fontWeight:700,fontSize:15,fontFamily:'var(--ff-serif)'}}>{e.nom}</div>
                  <span style={{fontSize:10,fontWeight:700,color:st.c,background:st.bg,padding:'2px 7px',borderRadius:4,whiteSpace:'nowrap'}}>{st.icon} {st.l}</span>
                </div>
                <div style={{fontSize:12,color:'var(--muted)',margin:'3px 0 8px'}}>{e.secteur||'—'}{e.ville?' · '+e.ville:''}</div>
                {e.contact_nom&&<div style={{fontSize:12.5,color:'#444',lineHeight:1.6}}>👤 {e.contact_nom}{e.contact_role?' — '+e.contact_role:''}</div>}
                <div style={{fontSize:12.5,lineHeight:1.6}}>
                  {e.contact_tel&&<a href={"tel:"+(e.contact_tel||'').replace(/\s/g,'')} style={{color:'var(--gold)'}}>📞 {e.contact_tel}</a>}
                  {e.contact_email&&<a href={"mailto:"+e.contact_email} style={{color:'var(--gold)',marginLeft:8}}>✉️</a>}
                </div>
                {Array.isArray(e.types)&&e.types.length>0&&<div style={{display:'flex',gap:4,flexWrap:'wrap',marginTop:8}}>{e.types.map((ty,i)=><span key={i} style={{fontSize:10,padding:'2px 7px',background:'#EEF3FF',border:'1px solid #c8d8f5',borderRadius:4,color:'#1a4fc4'}}>{ty}</span>)}</div>}
                {e.places&&<div style={{fontSize:11,color:'var(--muted)',marginTop:6}}>🎟️ {e.places} place(s)</div>}
                {e.notes&&<div style={{fontSize:11.5,color:'#666',marginTop:6,fontStyle:'italic'}}>{e.notes}</div>}
                <div style={{display:'flex',gap:6,marginTop:10}}>
                  <button className="btn btn-o btn-sm" style={{flex:1}} onClick={()=>openEnt(e)}>Modifier</button>
                  <button className="btn btn-d btn-sm" onClick={()=>delEnt(e.id)}>🗑</button>
                </div>
              </div>
            );})}
          </div>}
      </>}

      {tab==='placements' && <>
        <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
          <select value={fStatutStg} onChange={e=>setFStatutStg(e.target.value)} style={{...fld,width:'auto'}}>
            <option value="tous">Tous statuts</option>
            {Object.keys(STG_ST).map(k=><option key={k} value={k}>{STG_ST[k].icon} {STG_ST[k].l}</option>)}
          </select>
        </div>
        {stgList.length===0
          ? <div className="emp"><div className="emp-icon">🎓</div><h3>Aucun placement</h3><p>Créez un placement pour suivre la recherche de stage d'un élève.</p></div>
          : <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {stgList.map(s=>{const st=STG_ST[s.statut||'recherche']||STG_ST.recherche;return(
              <div key={s.id} style={{background:'#fff',border:`1.5px solid ${st.bd}`,borderLeft:`4px solid ${st.c}`,borderRadius:6,padding:'12px 14px',display:'flex',justifyContent:'space-between',gap:10,flexWrap:'wrap',alignItems:'center'}}>
                <div style={{flex:1,minWidth:200}}>
                  <div style={{fontWeight:700,fontSize:14}}>🎓 {s.eleve} <span style={{fontSize:12,color:'var(--muted)',fontWeight:400}}>· {s.type}</span></div>
                  <div style={{fontSize:12.5,color:'#444',marginTop:3}}>🏢 {entName(s.entrepriseId)}{s.periode?' · '+s.periode:''}{s.tuteur?' · tuteur : '+s.tuteur:''}</div>
                  {s.notes&&<div style={{fontSize:11.5,color:'#666',marginTop:3,fontStyle:'italic'}}>{s.notes}</div>}
                </div>
                <div style={{display:'flex',gap:6,alignItems:'center'}}>
                  <select value={s.statut||'recherche'} onChange={e=>setStages(p=>p.map(x=>x.id===s.id?{...x,statut:e.target.value}:x))} style={{...fld,width:'auto',fontSize:12}}>
                    {Object.keys(STG_ST).map(k=><option key={k} value={k}>{STG_ST[k].icon} {STG_ST[k].l}</option>)}
                  </select>
                  <button className="btn btn-o btn-sm" onClick={()=>openStg(s)}>Modifier</button>
                  <button className="btn btn-d btn-sm" onClick={()=>delStg(s.id)}>🗑</button>
                </div>
              </div>
            );})}
          </div>}
      </>}
    </div>

    {/* Modal Entreprise */}
    {showEnt&&<Modal title={selEnt?'Modifier l\u2019entreprise':'Nouvelle entreprise partenaire'} onClose={()=>setShowEnt(false)}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div className="fg" style={{gridColumn:'1/-1'}}><label className="fl">Nom de l'entreprise *</label><input className="fi" value={eForm.nom} onChange={e=>setEForm(p=>({...p,nom:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Secteur</label><select className="fi" value={eForm.secteur} onChange={e=>setEForm(p=>({...p,secteur:e.target.value}))}><option value="">—</option>{SECTEURS.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
        <div className="fg"><label className="fl">Ville</label><input className="fi" value={eForm.ville} onChange={e=>setEForm(p=>({...p,ville:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Contact (nom)</label><input className="fi" value={eForm.contact_nom} onChange={e=>setEForm(p=>({...p,contact_nom:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Fonction du contact</label><input className="fi" value={eForm.contact_role} onChange={e=>setEForm(p=>({...p,contact_role:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Email</label><input className="fi" type="email" value={eForm.contact_email} onChange={e=>setEForm(p=>({...p,contact_email:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Téléphone</label><input className="fi" type="tel" value={eForm.contact_tel} onChange={e=>setEForm(p=>({...p,contact_tel:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Places proposées</label><input className="fi" type="number" min="0" value={eForm.places} onChange={e=>setEForm(p=>({...p,places:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Statut</label><select className="fi" value={eForm.statut} onChange={e=>setEForm(p=>({...p,statut:e.target.value}))}>{Object.keys(ENT_ST).map(k=><option key={k} value={k}>{ENT_ST[k].l}</option>)}</select></div>
      </div>
      <div className="fg" style={{marginTop:4}}><label className="fl">Types de stage proposés</label>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:4}}>{TYPES.map(ty=><span key={ty} onClick={()=>toggleType(ty)} style={{fontSize:11,padding:'4px 10px',borderRadius:4,cursor:'pointer',border:eForm.types.includes(ty)?'2px solid var(--gold)':'1.5px solid #ddd',background:eForm.types.includes(ty)?'#EEF3FF':'#fff',color:eForm.types.includes(ty)?'#1a4fc4':'#666'}}>{ty}</span>)}</div>
      </div>
      <div className="fg" style={{marginTop:4}}><label className="fl">Notes</label><textarea className="fi" rows={2} value={eForm.notes} onChange={e=>setEForm(p=>({...p,notes:e.target.value}))} placeholder="Historique des échanges, conditions, contact privilégié…"/></div>
      <div className="fa"><button className="btn btn-o" onClick={()=>setShowEnt(false)}>Annuler</button><button className="btn btn-p" onClick={saveEnt}>{selEnt?'Enregistrer':'Ajouter'}</button></div>
    </Modal>}

    {/* Modal Placement */}
    {showStg&&<Modal title={selStg?'Modifier le placement':'Nouveau placement en stage'} onClose={()=>setShowStg(false)}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div className="fg" style={{gridColumn:'1/-1'}}><label className="fl">Élève *</label>
          <input className="fi" list="stg_eleves" value={sForm.eleve} onChange={e=>setSForm(p=>({...p,eleve:e.target.value}))} placeholder="Nom de l'élève"/>
          <datalist id="stg_eleves">{eleves.map(e=><option key={e.id} value={e.name}/>)}</datalist>
        </div>
        <div className="fg"><label className="fl">Type</label><select className="fi" value={sForm.type} onChange={e=>setSForm(p=>({...p,type:e.target.value}))}>{TYPES.map(ty=><option key={ty} value={ty}>{ty}</option>)}</select></div>
        <div className="fg"><label className="fl">Statut</label><select className="fi" value={sForm.statut} onChange={e=>setSForm(p=>({...p,statut:e.target.value}))}>{Object.keys(STG_ST).map(k=><option key={k} value={k}>{STG_ST[k].l}</option>)}</select></div>
        <div className="fg" style={{gridColumn:'1/-1'}}><label className="fl">Entreprise</label><select className="fi" value={sForm.entrepriseId} onChange={e=>setSForm(p=>({...p,entrepriseId:e.target.value}))}><option value="">— À définir —</option>{entreprises.map(e=><option key={e.id} value={e.id}>{e.nom}{e.ville?' ('+e.ville+')':''}</option>)}</select></div>
        <div className="fg"><label className="fl">Période</label><input className="fi" value={sForm.periode} onChange={e=>setSForm(p=>({...p,periode:e.target.value}))} placeholder="Ex : 16–20 juin 2026"/></div>
        <div className="fg"><label className="fl">Tuteur / référent</label><input className="fi" value={sForm.tuteur} onChange={e=>setSForm(p=>({...p,tuteur:e.target.value}))}/></div>
      </div>
      <div className="fg" style={{marginTop:4}}><label className="fl">Notes</label><textarea className="fi" rows={2} value={sForm.notes} onChange={e=>setSForm(p=>({...p,notes:e.target.value}))}/></div>
      <div className="fa"><button className="btn btn-o" onClick={()=>setShowStg(false)}>Annuler</button><button className="btn btn-p" onClick={saveStg}>{selStg?'Enregistrer':'Ajouter'}</button></div>
    </Modal>}
  </>;
}

function Paiement(){
  const LBL={display:'block',fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5,marginBottom:5};
  const BTN={background:'#fff',border:'1px solid var(--cream2)',borderRadius:5,width:30,height:30,cursor:'pointer',fontSize:14};
  const [cfg,setCfg]=useState({actif:false,intro:'',offres:[]});
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState('');
  useEffect(()=>{(async()=>{try{const r=await sb.from('site_content').select('data').eq('id','paiement').maybeSingle();if(r&&r.data&&r.data.data)setCfg(p=>({...p,...r.data.data,offres:(r.data.data.offres||[])}));}catch(_){}setLoading(false);})();},[]);
  const upd=(k,v)=>setCfg(p=>({...p,[k]:v}));
  const updO=(id,k,v)=>setCfg(p=>({...p,offres:p.offres.map(o=>o.id===id?{...o,[k]:v}:o)}));
  const addO=()=>setCfg(p=>({...p,offres:[...p.offres,{id:'o'+Date.now()+Math.floor(Math.random()*999),label:'',prix:'',lien:''}]}));
  const delO=(id)=>{if(window.confirm('Supprimer cette offre ?'))setCfg(p=>({...p,offres:p.offres.filter(o=>o.id!==id)}));};
  const move=(i,dir)=>setCfg(p=>{const n=[...p.offres];const k=i+dir;if(k<0||k>=n.length)return p;const tmp=n[i];n[i]=n[k];n[k]=tmp;return {...p,offres:n};});
  const save=async()=>{setSaving(true);setMsg('');try{const r=await sb.from('site_content').upsert({id:'paiement',data:cfg});if(r.error)setMsg('❌ '+(r.error.message||'Erreur'));else setMsg(cfg.actif?'✅ Enregistré et activé sur le site.':'✅ Enregistré (paiement masqué).');}catch(e){setMsg('❌ '+(e&&e.message||'Erreur'));}setSaving(false);};
  return <div style={{padding:'24px 28px',maxWidth:980}}>
    <h1 style={{fontFamily:'var(--ff-serif)',fontSize:24,color:'var(--navy)',margin:'0 0 4px'}}>💳 Paiement en ligne</h1>
    <p style={{color:'var(--muted)',fontSize:13,margin:'0 0 14px',maxWidth:720}}>Affichez une section « S'abonner en ligne » sur l'accueil. Collez ici les liens de paiement Stripe (un par formule). Le paiement est géré entièrement par Stripe (carte, prélèvement mensuel, résiliation).</p>
    <div style={{background:'#fff',border:'1px solid var(--cream2)',borderRadius:8,padding:'14px 16px',marginBottom:16,fontSize:12.5,color:'var(--muted)',maxWidth:720}}>
      <b style={{color:'var(--navy)'}}>Comment obtenir un lien Stripe :</b> dans Stripe → <b>Produits</b> → ajoutez un produit (ex. « Abonnement 1 créneau », prix 65 €, <b>récurrent · mensuel</b>) → bouton <b>… → Créer un lien de paiement</b> → copiez l'URL (https://buy.stripe.com/…). Répétez pour chaque formule.
    </div>
    <label style={{display:'flex',alignItems:'center',gap:10,marginBottom:16,cursor:'pointer',fontSize:14}}>
      <input type="checkbox" checked={!!cfg.actif} onChange={e=>upd('actif',e.target.checked)} style={{width:18,height:18}}/>
      <span><b>Afficher le paiement sur le site</b> <span style={{color:'var(--muted)',fontSize:12.5}}>(décoché = masqué)</span></span>
    </label>
    <div style={{maxWidth:720,marginBottom:16}}><label style={LBL}>Texte d'introduction (facultatif)</label><textarea className="lp-in" rows={2} value={cfg.intro||''} onChange={e=>upd('intro',e.target.value)} placeholder="Réglez votre abonnement mensuel en ligne, en toute sécurité."/></div>
    <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}>
      <button className="lp-btn lp-btn-o" onClick={addO}>+ Ajouter une formule</button>
      <button className="lp-btn" onClick={save} disabled={saving} style={{opacity:saving?.6:1}}>{saving?'Enregistrement…':'Enregistrer'}</button>
      {msg?<span style={{fontSize:13,alignSelf:'center'}}>{msg}</span>:null}
    </div>
    {loading?<p style={{color:'var(--muted)'}}>Chargement…</p>:(cfg.offres||[]).length===0?<p style={{color:'var(--muted)'}}>Aucune formule. Cliquez « + Ajouter une formule ».</p>:(cfg.offres||[]).map((o,i)=><div key={o.id} style={{background:'#fff',border:'1px solid var(--cream2)',borderRadius:8,padding:'14px 16px',marginBottom:12,display:'flex',gap:12,flexWrap:'wrap',alignItems:'flex-end'}}>
      <div style={{flex:'1 1 200px'}}><label style={LBL}>Libellé</label><input className="lp-in" value={o.label||''} onChange={e=>updO(o.id,'label',e.target.value)} placeholder="1 créneau / mois"/></div>
      <div style={{flex:'0 0 130px'}}><label style={LBL}>Prix affiché</label><input className="lp-in" value={o.prix||''} onChange={e=>updO(o.id,'prix',e.target.value)} placeholder="65 €/mois"/></div>
      <div style={{flex:'2 1 280px'}}><label style={LBL}>Lien Stripe</label><input className="lp-in" value={o.lien||''} onChange={e=>updO(o.id,'lien',e.target.value)} placeholder="https://buy.stripe.com/…"/></div>
      <div style={{display:'flex',gap:6,paddingBottom:2}}>
        <button onClick={()=>move(i,-1)} title="Monter" style={BTN}>↑</button>
        <button onClick={()=>move(i,1)} title="Descendre" style={BTN}>↓</button>
        <button onClick={()=>delO(o.id)} title="Supprimer" style={{...BTN,color:'#b3243b'}}>🗑</button>
      </div>
    </div>)}
  </div>;
}

function Pages(){
  const LBL={display:'block',fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5,marginBottom:5};
  const edRef=React.useRef(null);
  const fileRef=React.useRef(null);
  const [pages,setPages]=useState([]);
  const [sel,setSel]=useState(null);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState('');
  useEffect(()=>{(async()=>{try{const r=await sb.from('site_content').select('data').eq('id','pages').maybeSingle();const it=(r&&r.data&&r.data.data&&r.data.data.items)||[];setPages(it);if(it.length)setSel(it[0].id);}catch(_){}setLoading(false);})();},[]);
  const current=pages.find(p=>p.id===sel)||null;
  const initial=React.useMemo(()=>current?(current.html||''):'',[sel]);
  const capture=(list)=>{ const L=list||pages; if(sel&&edRef.current){ return L.map(x=>x.id===sel?{...x,html:edRef.current.innerHTML}:x); } return L; };
  const selectPage=(id)=>{ setPages(capture()); setSel(id); };
  const addPage=()=>{ const np=capture(); const id='p'+Date.now(); setPages([...np,{id,titre:'Nouvelle page',html:'<p>Votre contenu…</p>',actif:true}]); setSel(id); };
  const delPage=(id)=>{ if(window.confirm('Supprimer cette page ?')){ const np=pages.filter(x=>x.id!==id); setPages(np); setSel(np.length?np[0].id:null); } };
  const updMeta=(k,v)=>setPages(p=>p.map(x=>x.id===sel?{...x,[k]:v}:x));
  const slugify=(s)=>(((s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')).slice(0,60))||('page'+Date.now());
  const setTitre=(v)=>setPages(p=>p.map(x=>x.id===sel?{...x,titre:v,slug:(x.slug?x.slug:slugify(v))}:x));
  const regenSlug=()=>setPages(p=>p.map(x=>x.id===sel?{...x,slug:slugify(x.titre||'')}:x));
  const fullLink=(slug)=>{try{return window.location.origin+window.location.pathname+'#page/'+slug;}catch(_){return '#page/'+slug;}};
  const copyLink=(slug)=>{try{navigator.clipboard.writeText(fullLink(slug));setMsg('✅ Lien copié dans le presse-papier');setTimeout(()=>setMsg(''),1800);}catch(_){}};
  const buildPriv=()=>{const html=(edRef.current&&edRef.current.innerHTML)||(current&&current.html)||'';return pageLink({titre:(current&&current.titre)||'Page',html});};
  const copyPrivate=()=>{const l=buildPriv();try{navigator.clipboard.writeText(l);setMsg('✅ Lien privé copié ('+l.length+' caractères)');setTimeout(()=>setMsg(''),2600);}catch(_){}};
  const previewPrivate=()=>{const l=buildPriv();try{window.open(l,'_blank');}catch(_){}};
  const exec=(cmd,val)=>{ document.execCommand(cmd,false,(val===undefined?null:val)); edRef.current&&edRef.current.focus(); };
  const insertTable=()=>{ const r=parseInt(prompt('Nombre de lignes ?','3'),10); const c=parseInt(prompt('Nombre de colonnes ?','3'),10); if(!r||!c)return; let h='<table class="pg-tbl"><tbody>'; for(let i=0;i<r;i++){ h+='<tr>'; for(let j=0;j<c;j++){ h+=(i===0?'<th>Titre</th>':'<td>—</td>'); } h+='</tr>'; } h+='</tbody></table><p></p>'; exec('insertHTML',h); };
  const insertLink=()=>{ const u=prompt('Adresse du lien (https://…)'); if(u)exec('createLink',u); };
  const insertImgUrl=()=>{ const u=prompt('URL de l\'image (https://…)'); if(u)exec('insertImage',u); };
  const onPickImg=async(e)=>{ const f=e.target.files&&e.target.files[0]; e.target.value=''; if(!f)return; try{ const safe=f.name.replace(/[^a-zA-Z0-9._-]/g,'_'); const path='img_'+Date.now()+'_'+safe; const up=await sb.storage.from('pages-media').upload(path,f,{upsert:true}); if(up.error){ alert('Upload impossible ('+(up.error.message||'')+'). Astuce : créez un bucket public « pages-media », ou utilisez « Image (lien) ».'); return; } const pub=sb.storage.from('pages-media').getPublicUrl(path); const url=pub&&pub.data&&pub.data.publicUrl; if(url)exec('insertImage',url); }catch(err){ alert('Erreur upload image.'); } };
  const save=async()=>{ setSaving(true); setMsg(''); try{ let items=capture(); items=items.map(x=>({...x,slug:(x.slug||slugify(x.titre||x.id))})); setPages(items); const r=await sb.from('site_content').upsert({id:'pages',data:{items}}); if(r.error)setMsg('❌ '+(r.error.message||'Erreur')); else setMsg('✅ Enregistré — '+items.filter(p=>p.actif).length+' page(s) visible(s) dans le menu.'); }catch(e){ setMsg('❌ '+(e&&e.message||'Erreur')); } setSaving(false); };
  const T=(cmd,label,val)=><button onMouseDown={e=>{e.preventDefault();exec(cmd,val);}} title={label}>{label}</button>;
  return <div style={{padding:'24px 28px',maxWidth:1100}}>
    <h1 style={{fontFamily:'var(--ff-serif)',fontSize:24,color:'var(--navy)',margin:'0 0 4px'}}>📄 Pages du site</h1>
    <p style={{color:'var(--muted)',fontSize:13,margin:'0 0 16px',maxWidth:720}}>Créez des pages d'information (communiqué, infos rentrée…) avec titres, images et tableaux, dans le style du site. Elles apparaissent dans le menu du haut. Cochez « Visible » pour publier.</p>
    <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}>
      <button className="lp-btn lp-btn-o" onClick={addPage}>+ Nouvelle page</button>
      <button className="lp-btn" onClick={save} disabled={saving} style={{opacity:saving?.6:1}}>{saving?'Enregistrement…':'Enregistrer'}</button>
      {msg?<span style={{fontSize:13,alignSelf:'center'}}>{msg}</span>:null}
    </div>
    {loading?<p style={{color:'var(--muted)'}}>Chargement…</p>:pages.length===0?<p style={{color:'var(--muted)'}}>Aucune page pour le moment. Cliquez « + Nouvelle page ».</p>:<div style={{display:'grid',gridTemplateColumns:'220px 1fr',gap:20,alignItems:'start'}}>
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {pages.map(p=><button key={p.id} onClick={()=>selectPage(p.id)} style={{textAlign:'left',background:p.id===sel?'var(--navy)':'#fff',color:p.id===sel?'#fff':'var(--navy)',border:'1px solid var(--cream2)',borderRadius:6,padding:'10px 12px',cursor:'pointer',fontSize:13}}>{p.actif?'':'🚫 '}{p.titre||'(sans titre)'}</button>)}
      </div>
      {current?<div>
        <div style={{display:'flex',gap:14,flexWrap:'wrap',alignItems:'flex-end',marginBottom:12}}>
          <div style={{flex:'1 1 280px'}}><label style={LBL}>Titre / libellé dans le menu</label><input className="lp-in" value={current.titre||''} onChange={e=>setTitre(e.target.value)}/></div>
          <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,fontWeight:700,cursor:'pointer',paddingBottom:8}}><input type="checkbox" checked={!!current.actif} onChange={e=>updMeta('actif',e.target.checked)} style={{width:17,height:17}}/>{current.actif?'Visible':'Masquée'}</label>
          <button onClick={()=>delPage(current.id)} className="lp-btn lp-btn-o" style={{color:'#b3243b',borderColor:'#b3243b',paddingBottom:8}}>🗑 Supprimer</button>
        </div>
        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap',marginBottom:6,fontSize:12.5,color:'var(--muted)'}}><span>Lien privé (autonome) :</span><button className="lp-btn" style={{padding:'5px 12px',fontSize:12.5}} onClick={copyPrivate}>🔗 Copier le lien privé</button><button className="lp-btn lp-btn-o" style={{padding:'5px 12px',fontSize:12}} onClick={previewPrivate}>👁 Prévisualiser</button></div><div style={{marginBottom:14,fontSize:11.5,color:'var(--muted)',lineHeight:1.5}}>Le lien contient toute la page (titre + mise en forme) — rien n'est publié dans le menu. Colle-le dans une annonce ou envoie-le à qui tu veux ; la page s'ouvre au style du site. Le contenu voyage dans le lien (non listé), pas besoin de publier.</div>
        <div className="pg-tools">
          {T('formatBlock','H2','<h2>')}{T('formatBlock','H3','<h3>')}{T('formatBlock','¶','<p>')}
          <span className="sep"/>
          {T('bold','G')}{T('italic','I')}{T('underline','S')}
          <span className="sep"/>
          {T('insertUnorderedList','• Liste')}{T('insertOrderedList','1. Liste')}
          <span className="sep"/>
          <button onMouseDown={e=>{e.preventDefault();insertLink();}} title="Lien">🔗 Lien</button>
          <button onMouseDown={e=>{e.preventDefault();insertImgUrl();}} title="Image par URL">🖼 Image (lien)</button>
          <button onMouseDown={e=>{e.preventDefault();fileRef.current&&fileRef.current.click();}} title="Téléverser une image">⬆ Image</button>
          <button onMouseDown={e=>{e.preventDefault();insertTable();}} title="Tableau">▦ Tableau</button>
          <span className="sep"/>
          {T('removeFormat','Tx')}
        </div>
        <div className="pg-editor" contentEditable suppressContentEditableWarning ref={edRef} key={sel} dangerouslySetInnerHTML={{__html:initial}}/>
        <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={onPickImg}/>
        <p style={{fontSize:11.5,color:'var(--muted)',marginTop:8}}>Astuce : sélectionnez du texte puis cliquez sur un bouton (G = gras, I = italique, S = souligné, Tx = effacer le style). Pensez à Enregistrer.</p>
      </div>:<p style={{color:'var(--muted)'}}>Sélectionnez une page à gauche.</p>}
    </div>}
  </div>;
}

  const updItem=(id,k,v)=>setItems(p=>p.map(a=>a.id===id?{...a,[k]:v}:a));
  const addItem=()=>setItems(p=>[...p,{id:'a'+Date.now()+Math.floor(Math.random()*999),tag:'Annonce',titre:'',corps:'',cta_label:'',cta_url:'',actif:true}]);
  const delItem=(id)=>{if(window.confirm('Supprimer cette annonce ?'))setItems(p=>p.filter(a=>a.id!==id));};
  const move=(i,dir)=>setItems(p=>{const n=[...p];const k=i+dir;if(k<0||k>=n.length)return p;const tmp=n[i];n[i]=n[k];n[k]=tmp;return n;});
  const save=async()=>{setSaving(true);setMsg('');try{const r=await sb.from('site_content').upsert({id:'annonces',data:{items}});if(r.error)setMsg('❌ '+(r.error.message||'Erreur'));else setMsg('✅ Enregistré — '+items.filter(a=>a.actif).length+' annonce(s) visible(s) sur le site.');}catch(e){setMsg('❌ '+(e&&e.message||'Erreur'));}setSaving(false);};
  return <div style={{padding:'24px 28px',maxWidth:980}}>
    <h1 style={{fontFamily:'var(--ff-serif)',fontSize:24,color:'var(--navy)',margin:'0 0 4px'}}>📢 Annonces du site</h1>
    <p style={{color:'var(--muted)',fontSize:13,margin:'0 0 18px',maxWidth:680}}>Gérez les messages affichés en haut de la page d'accueil : communiqué de rentrée, stages, actualités… Cochez « Visible » pour publier, réordonnez avec ↑ ↓, puis Enregistrer.</p>
    <div style={{display:'flex',gap:12,marginBottom:18,flexWrap:'wrap'}}>
      <button className="lp-btn lp-btn-o" onClick={addItem}>+ Ajouter une annonce</button>
      <button className="lp-btn" onClick={save} disabled={saving} style={{opacity:saving?.6:1}}>{saving?'Enregistrement…':'Enregistrer'}</button>
      {msg?<span style={{fontSize:13,alignSelf:'center'}}>{msg}</span>:null}
    </div>
    {loading?<p style={{color:'var(--muted)'}}>Chargement…</p>:items.length===0?<p style={{color:'var(--muted)'}}>Aucune annonce pour le moment. Cliquez « + Ajouter une annonce ».</p>:items.map((a,i)=><div key={a.id} style={{background:'#fff',border:'1px solid var(--cream2)',borderLeft:'4px solid '+(a.actif?'var(--gold)':'#ccc'),borderRadius:8,padding:'18px 20px',marginBottom:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,gap:10,flexWrap:'wrap'}}>
        <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,fontWeight:700,cursor:'pointer'}}><input type="checkbox" checked={!!a.actif} onChange={e=>updItem(a.id,'actif',e.target.checked)} style={{width:17,height:17}}/> {a.actif?'Visible sur le site':'Masquée'}</label>
        <div style={{display:'flex',gap:6}}>
          <button onClick={()=>move(i,-1)} title="Monter" style={BTN}>↑</button>
          <button onClick={()=>move(i,1)} title="Descendre" style={BTN}>↓</button>
          <button onClick={()=>delItem(a.id)} title="Supprimer" style={{...BTN,color:'#b3243b'}}>🗑</button>
        </div>
      </div>
      <div style={{display:'flex',gap:14,flexWrap:'wrap'}}>
        <div style={{flex:'0 0 170px'}}><label style={LBL}>Étiquette</label><input className="lp-in" value={a.tag||''} onChange={e=>updItem(a.id,'tag',e.target.value)} placeholder="Communiqué / Stages…"/></div>
        <div style={{flex:'1 1 300px'}}><label style={LBL}>Titre</label><input className="lp-in" value={a.titre||''} onChange={e=>updItem(a.id,'titre',e.target.value)} placeholder="Titre de l'annonce"/></div>
      </div>
      <label style={{...LBL,marginTop:12}}>Message</label>
      <textarea className="lp-in" rows={3} value={a.corps||''} onChange={e=>updItem(a.id,'corps',e.target.value)} placeholder="Texte de l'annonce…"/>
      <div style={{display:'flex',gap:14,flexWrap:'wrap',marginTop:12}}>
        <div style={{flex:'1 1 200px'}}><label style={LBL}>Texte du bouton (option)</label><input className="lp-in" value={a.cta_label||''} onChange={e=>updItem(a.id,'cta_label',e.target.value)} placeholder="En savoir plus"/></div>
        <div style={{flex:'1 1 250px'}}><label style={LBL}>Lien du bouton (option)</label><input className="lp-in" value={a.cta_url||''} onChange={e=>updItem(a.id,'cta_url',e.target.value)} placeholder="https://…  (vide = formulaire)"/></div>
      </div>
    </div>)}
    {items.length?<button className="lp-btn" onClick={save} disabled={saving} style={{opacity:saving?.6:1,marginTop:4}}>{saving?'Enregistrement…':'Enregistrer'}</button>:null}
  </div>;
}

function App(){
  const [cu,setCu]=useState(null);
  const [page,setPage]=useState('dashboard');
  const [sidebarPinned,setSidebarPinned]=useState(false);
  const [appReady,setAppReady]=useState(false); // true quand session vérifiée
  const [pub,setPub]=useState('landing'); // landing | login | inscription
  const [demandesWeb,setDemandesWeb]=useState([]);
  useEffect(()=>{ try{window.scrollTo(0,0);}catch(_){ } },[pub]);
  const openPub=(v)=>{ try{window.history.pushState({pubView:v},'');}catch(_){ } setPub(v); };
  const backPub=()=>{ try{ if(window.history.state&&window.history.state.pubView){window.history.back();}else{setPub('landing');} }catch(_){ setPub('landing'); } };
  const skipPushRef=React.useRef(false);
  useEffect(()=>{ if(!cu)return; if(skipPushRef.current){skipPushRef.current=false;return;} try{window.history.pushState({appPage:page},'');}catch(_){ } },[page,cu]);
  useEffect(()=>{ const onPop=(e)=>{ const st=(e&&e.state)||{}; if(st.appPage){ skipPushRef.current=true; setPage(st.appPage); } else if(st.pubView){ setPub(st.pubView); } else { setPub('landing'); } }; window.addEventListener('popstate',onPop); return ()=>window.removeEventListener('popstate',onPop); },[]);
  const [dataReady,setDataReady]=useState(false); // true quand données chargées

  const [users,setUsers]=useState(SEED_USERS);
  const [resources,setResources]=useState(SEED_RES);
  const [modules,setModules]=useState(SEED_MOD);
  const [grades,setGrades]=useState(SEED_GRADES);
  const [enrollments,setEnrollments]=useState(SEED_ENR);
  const [cours,setCours]=useState(SEED_COURS);
  const [appel,setAppel]=useState(SEED_APPEL);
  const [factures,setFactures]=useState(SEED_FACTURES);
  const [salaires,setSalaires]=useState(SEED_SALAIRES);
  const [dispos,setDispos]=useState([]);
  const [demandes,setDemandes]=useState([]);
  const [inscriptions,setInscriptions]=useState([]);
  const [sorties,setSorties]=useState([]);
  const [entreprises,setEntreprises]=useState([]);
  const [stages,setStages]=useState([]);
  const [charges,setCharges]=useState([
    {id:'ch_loyer',nom:'Loyer local',montant:850,frequence:'mensuelle',categorie:'Immobilier',type:'fixe'},
    {id:'ch_assur',nom:'Assurance association',montant:240,frequence:'annuelle',categorie:'Administratif',type:'fixe'},
    {id:'ch_internet',nom:'Internet & téléphonie',montant:35,frequence:'mensuelle',categorie:'Frais généraux',type:'fixe'},
    {id:'ch_fourn',nom:'Fournitures pédagogiques',montant:120,frequence:'mensuelle',categorie:'Pédagogie',type:'variable'},
  ]);
  const [compEtats,setCompEtats]=useState({});
  const [customComps,setCustomComps]=useState([]);
  const [customTrophies,setCustomTrophies]=useState([]);
  const [awardedTrophies,setAwardedTrophies]=useState({});

  // ── Vérification session Supabase au démarrage ──
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session){
        sb.from('users').select('*').eq('auth_id',session.user.id).single()
          .then(({data:profile})=>{ if(profile) setCu(profile); })
          .finally(()=>setAppReady(true));
      } else { setAppReady(true); }
    });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_event,session)=>{
      if(!session){ setCu(null); setDataReady(false); }
    });
    return ()=>subscription.unsubscribe();
  },[]);

  // ── Chargement des données Supabase quand l'utilisateur est connecté ──
  // Stratégie :
  //   • tables "tableau"  (users, cours, ressources, modules, factures, dispos, demandes, trophees_custom)
  //     → sbLoad()  : rows Supabase ↔ tableau JS  ✓
  //   • données "objet" (appel, grades, enrollments, salaires, awardedTrophies)
  //     → kv_store  : JSONB brut, préserve le format attendu par l'app  ✓
  useEffect(()=>{
    if(!cu) return;
    (async()=>{
      try {
        setDataReady(false);
        const [u,r,mo,fa,di,de,ct,
               ap,g,en,sa,at,ce,cc] = await Promise.all([
          // tableaux normalisés
          sbLoad('users',            SEED_USERS),
          sbLoad('ressources',       SEED_RES),
          sbLoad('modules',          SEED_MOD),
          sbLoad('factures',         SEED_FACTURES),
          sbLoad('dispos',           []),
          sbLoad('demandes',         []),
          sbLoad('trophees_custom',  []),
          // objets JSON stockés dans kv_store
          sbLoadKV('appel',           'global', SEED_APPEL),
          sbLoadKV('grades',          'global', SEED_GRADES),
          sbLoadKV('enrollments',     'global', SEED_ENR),
          sbLoadKV('salaires',        'global', SEED_SALAIRES),
          sbLoadKV('trophees_awarded','global', {}),
          sbLoadKV('inscriptions',     'global', []),
          sbLoadKV('comp_etats',      cu.id,    {}),
          sbLoadKV('custom_comps',    cu.id,    []),
        ]);
        // cours + sorties dans kv_store (eleveIds est un tableau JSON)
        const [co,ins_data] = await Promise.all([
          sbLoadKV('cours','global',SEED_COURS),
          sbLoadKV('inscriptions','global',[]),
        ]);
        // sorties + charges dans kv_store (chargés séparément pour isoler les erreurs)
        let so = [];
        try { so = await sbLoadKV('sorties','global',[]); } catch(_) { so = []; }
        let ents=[],stgs=[];
        try { ents = await sbLoadKV('entreprises','global',[]); } catch(_) { ents=[]; }
        try { stgs = await sbLoadKV('stages','global',[]); } catch(_) { stgs=[]; }
        let ch = charges; // garde les charges seed actuelles en fallback
        try { ch = await sbLoadKV('charges','global',charges); } catch(_) {}
        let dw = [];
        try { dw = await sbLoad('inscriptions_web', []); } catch(_) { dw = []; }
        setUsers(u); setResources(r); setModules(mo); setFactures(fa);
        setDispos(di); setDemandes(de); setCustomTrophies(ct);
        setAppel(ap); setGrades(g); setEnrollments(en); setSalaires(sa);
        setAwardedTrophies(at); setCompEtats(ce); setCustomComps(cc);
        setCours(co); setInscriptions(ins_data); setSorties(so); setCharges(ch); setDemandesWeb(dw); setEntreprises(ents); setStages(stgs);
        setDataReady(true);
      } catch(loadErr) {
        console.error('[App] Erreur chargement données:', loadErr);
        // Charger les données seed en cas d'erreur pour ne pas bloquer
        setUsers(SEED_USERS); setCours(SEED_COURS); setFactures(SEED_FACTURES);
        setDataReady(true);
      }
    })();
  },[cu?.id]);

  // ── Sync retour vers Supabase ──
  // ── Sync Supabase avec debounce 1.5s ──
  useEffect(()=>{ if(dataReady) sbDebounce('sv_users', ()=>sbSave('users',           users));           },[users]);
  useEffect(()=>{ if(dataReady) sbDebounce('sv_res',   ()=>sbSave('ressources',      resources));       },[resources]);
  useEffect(()=>{ if(dataReady) sbDebounce('sv_mod',   ()=>sbSave('modules',         modules));         },[modules]);
  useEffect(()=>{ if(dataReady) sbDebounce('sv_fact',  ()=>sbSave('factures',        factures));        },[factures]);
  useEffect(()=>{ if(dataReady) sbDebounce('sv_dispo', ()=>sbSave('dispos',          dispos));          },[dispos]);
  useEffect(()=>{ if(dataReady) sbDebounce('sv_dem',   ()=>sbSave('demandes',        demandes));        },[demandes]);
  useEffect(()=>{ if(dataReady) sbDebounce('sv_troph', ()=>sbSave('trophees_custom', customTrophies));  },[customTrophies]);
  useEffect(()=>{ if(dataReady) sbDebounce('sv_cours', ()=>sbSaveKV('cours',            cours,          'global')); },[cours]);
  useEffect(()=>{ if(dataReady) sbDebounce('sv_appel', ()=>sbSaveKV('appel',            appel,          'global')); },[appel]);
  useEffect(()=>{ if(dataReady) sbDebounce('sv_grd',   ()=>sbSaveKV('grades',           grades,         'global')); },[grades]);
  useEffect(()=>{ if(dataReady) sbDebounce('sv_enr',   ()=>sbSaveKV('enrollments',      enrollments,    'global')); },[enrollments]);
  useEffect(()=>{ if(dataReady) sbDebounce('sv_sal',   ()=>sbSaveKV('salaires',         salaires,       'global')); },[salaires]);
  useEffect(()=>{ if(dataReady) sbDebounce('sv_traw',  ()=>sbSaveKV('trophees_awarded', awardedTrophies,'global')); },[awardedTrophies]);
  useEffect(()=>{ if(dataReady&&cu) sbDebounce('sv_ce',()=>sbSaveKV('comp_etats',   compEtats,  cu.id)); },[compEtats]);
  useEffect(()=>{ if(dataReady&&cu) sbDebounce('sv_cc',()=>sbSaveKV('custom_comps', customComps,cu.id)); },[customComps]);
  useEffect(()=>{ if(dataReady) sbDebounce('sv_sor',   ()=>sbSaveKV('sorties',      sorties,     'global')); },[sorties]);
  useEffect(()=>{ if(dataReady) sbDebounce('sv_ent', ()=>sbSaveKV('entreprises', entreprises,'global')); },[entreprises]);
  useEffect(()=>{ if(dataReady) sbDebounce('sv_stg', ()=>sbSaveKV('stages', stages,'global')); },[stages]);
  useEffect(()=>{ if(dataReady) sbDebounce('sv_ins',   ()=>sbSaveKV('inscriptions', inscriptions,'global')); },[inscriptions]);
  useEffect(()=>{ if(dataReady) sbDebounce('sv_chg',   ()=>sbSaveKV('charges',      charges,     'global')); },[charges]);

  const login=(u)=>{ setCu(u); setPage('dashboard'); };
  const logout=async()=>{ await sb.auth.signOut(); setCu(null); setPub('landing'); };

  if(!appReady) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'#111',color:'var(--gold)',fontFamily:'var(--ff-mono)',fontSize:14,letterSpacing:1}}>⟳ Chargement…</div>;

  if(!cu){ if(pub==='login') return <Login onLogin={login} onBack={backPub}/>; if(pub==='inscription') return <Inscription onBack={backPub} onLogin={()=>openPub('login')}/>; if(pub==='paiement') return <Abonnement onBack={backPub} onInscription={()=>openPub('inscription')}/>; return <Landing onLogin={()=>openPub('login')} onInscription={()=>openPub('inscription')} onPaiement={()=>openPub('paiement')}/>; }

  if(!dataReady) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'var(--cream2)',color:'var(--navy)',fontFamily:'var(--ff-mono)',fontSize:13,letterSpacing:.5}}>
    <div style={{textAlign:'center'}}>
      <div style={{fontSize:28,marginBottom:12}}>📚</div>
      <div>Chargement des données…</div>
    </div>
  </div>;

  const props={user:cu,users,setUsers,resources,setResources,modules,setModules,grades,setGrades,enrollments,setEnrollments,cours,setCours,appel,setAppel,factures,setFactures,salaires,setSalaires,dispos,setDispos,demandes,setDemandes,compEtats,setCompEtats,customComps,setCustomComps,customTrophies,setCustomTrophies,awardedTrophies,setAwardedTrophies,inscriptions,setInscriptions,sorties,setSorties,charges,setCharges};

  const renderPage=()=>{switch(page){
    case'dashboard':return<Dashboard {...props}/>;
    case'programme':return<MonProgramme {...props} customComps={props.customComps}/>;
    case'bibliotheque':return<Bibliotheque {...props} cours={props.cours} compEtats={props.compEtats}/>;
    case'emploidutemps':return<EmploiDuTemps {...props} setCours={props.setCours} dispos={props.dispos}/>;
    case'modules':return<Modules {...props}/>;
    case'monespace':return<MonEspace {...props}/>;
    case'meseleves':return<MesEleves {...props} compEtats={props.compEtats} setCompEtats={props.setCompEtats} customComps={props.customComps}/>;
    case'statistiques':return<Statistiques {...props}/>;
    case'facturation':return<Facturation {...props} cours={props.cours}/>;
    case'inscriptions':return<Inscriptions {...props} setFactures={props.setFactures} demandesWeb={demandesWeb} setDemandesWeb={setDemandesWeb}/>;
    case'suivi':return<SuiviCompetences {...props} customComps={props.customComps} setCustomComps={props.setCustomComps} awardedTrophies={props.awardedTrophies} setAwardedTrophies={props.setAwardedTrophies}/>;
    case'coursparticuliers':return<CoursParticuliers {...props}/>;
    case'paiement':return<Paiement/>;
    case'pages':return<Pages/>;
    case'annonces':return<Annonces/>;
    case'admin':return<Admin {...props} factures={props.factures} setFactures={props.setFactures} customTrophies={props.customTrophies} setCustomTrophies={props.setCustomTrophies} awardedTrophies={props.awardedTrophies} setAwardedTrophies={props.setAwardedTrophies} inscriptions={props.inscriptions} setInscriptions={props.setInscriptions}/>;
    case'sorties':return<Sorties sorties={props.sorties} setSorties={props.setSorties} users={props.users} cours={props.cours}/>;
    case'stages':return<StagesReseau user={cu} users={props.users} entreprises={entreprises} setEntreprises={setEntreprises} stages={stages} setStages={setStages}/>;
    default:return<Dashboard {...props}/>;
  }};

  return <div className={`app ${sidebarPinned?'sidebar-pinned':''}`}>
    <Sidebar user={cu} page={page} setPage={setPage} onLogout={logout} pinned={sidebarPinned} setPinned={setSidebarPinned}/>
    <div className="main">{renderPage()}</div>
  </div>;
}
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(err){return {err};}
  componentDidCatch(err,info){try{console.error('App error:',err,info);}catch(_){}}
  render(){ if(this.state.err){ return <div style={{padding:'28px',fontFamily:'monospace',color:'#8b2222',whiteSpace:'pre-wrap',fontSize:13,lineHeight:1.5}}>⚠️ Une erreur est survenue :{"\n\n"}{String((this.state.err&&this.state.err.message)||this.state.err)}{"\n\n"}{String((this.state.err&&this.state.err.stack)||'')}</div>; } return this.props.children; }
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>


</body></html>
