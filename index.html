  const contact=[(data.assocTel||''),(data.assocEmail||'admin@educenter.fr')].filter(Boolean).join('  ·  ');
  doc.text(contact,M,29);

  // Numéro de facture — haut droite
  doc.setFont('helvetica','normal');
  doc.setFontSize(8);
  doc.setTextColor(...MID);
  doc.text('FACTURE N°',W-M,12,{align:'right'});
  doc.setFont('helvetica','bold');
  doc.setFontSize(20);
  doc.setTextColor(...BLACK);
  doc.text(data.id.toUpperCase(),W-M,22,{align:'right'});
  doc.setFont('helvetica','normal');
  doc.setFontSize(8);
  doc.setTextColor(...MID);
  doc.text('Émise le '+data.dateEmission,W-M,28,{align:'right'});
  if(data.echeance) doc.text('Échéance : '+data.echeance,W-M,33,{align:'right'});

  // Filet séparateur
  doc.setDrawColor(...LIGHT);
  doc.setLineWidth(0.3);
  doc.line(M,36,W-M,36);

  // ── BLOC DESTINATAIRE (à gauche) ──
  const blkY=42;
  doc.setFont('helvetica','bold');
  doc.setFontSize(7);
  doc.setTextColor(...MID);
  doc.text('DESTINATAIRE',M,blkY);

  doc.setFont('helvetica','bold');
  doc.setFontSize(12);
  doc.setTextColor(...BLACK);
  doc.text(data.eleveName||'—',M,blkY+8);

  doc.setFont('helvetica','normal');
  doc.setFontSize(9);
  doc.setTextColor(...DARK);
  const detLines=[];
  if(data.eleveNiveau) detLines.push('Niveau : '+data.eleveNiveau);
  if(data.matieres&&data.matieres.length) detLines.push('Matières : '+data.matieres.join(', '));
  if(data.parentNom) detLines.push('Responsable : '+data.parentNom+(data.parentTel?' — '+data.parentTel:''));
  detLines.forEach((l,i)=>doc.text(l,M,blkY+14+i*5));

  // ── RÉCAPITULATIF FINANCIER (à droite) ──
  const rX=115;
  doc.setFillColor(...XLIGHT);
  doc.rect(rX,blkY-4,W-M-rX,Math.max(detLines.length*5+26,30),'F');
  doc.setFont('helvetica','bold');
  doc.setFontSize(7);
  doc.setTextColor(...MID);
  doc.text('RÉCAPITULATIF',rX+5,blkY+2);
  doc.setFont('helvetica','normal');
  doc.setFontSize(9);
  doc.setTextColor(...DARK);
  doc.text('Type :',rX+5,blkY+10);
  doc.setFont('helvetica','bold');
  doc.text(data.type||'Forfait mensuel',rX+30,blkY+10);
  doc.setFont('helvetica','normal');
  if(data.nbCreneaux>0){
    doc.text('Créneaux :',rX+5,blkY+16);
    doc.setFont('helvetica','bold');
    doc.text(String(data.nbCreneaux)+' / mois',rX+30,blkY+16);
    doc.setFont('helvetica','normal');
  }
  doc.text('Montant :',rX+5,blkY+22);
  doc.setFont('helvetica','bold');
  doc.setFontSize(13);
  doc.setTextColor(...BLACK);
  doc.text(data.montant+'€',rX+30,blkY+22);

  // Filet
  const tableStartY=blkY+detLines.length*5+26;
  doc.setDrawColor(...LIGHT);
  doc.setLineWidth(0.3);
  doc.line(M,tableStartY,W-M,tableStartY);

  // ── TABLEAU DÉTAIL ──
  const tY=tableStartY+6;
  doc.setFont('helvetica','bold');
  doc.setFontSize(7);
  doc.setTextColor(...MID);
  doc.text('DÉTAIL DE LA PRESTATION',M,tY);

  const rows=[];
  rows.push([
    data.libelle||'Forfait soutien scolaire',
    data.echeance||data.dateEmission,
    data.nbCreneaux>0 ? data.nbCreneaux+' créneau'+(data.nbCreneaux>1?'x':'') : '—',
    data.montant+'€'
  ]);
  if(data.sessions&&data.sessions.length){
    data.sessions.forEach(s=>{
      rows.push(['    '+s.matiere+' · '+s.jour+' '+s.debut+'–'+s.fin, s.salle||'','','']);
    });
  }
  if(data.notes) rows.push(['Note : '+data.notes,'','','']);

  doc.autoTable({
    startY:tY+4,
    head:[['Désignation','Période','Créneaux','Montant']],
    body:rows,
    margin:{left:M,right:M},
    headStyles:{
      fillColor:BLACK,
      textColor:WHITE,
      fontSize:8,
      fontStyle:'bold',
      cellPadding:{top:4,bottom:4,left:4,right:4},
    },
    bodyStyles:{
      fontSize:9,
      textColor:DARK,
      cellPadding:{top:4,bottom:4,left:4,right:4},
    },
    columnStyles:{
      0:{cellWidth:'auto'},
      1:{cellWidth:30},
      2:{cellWidth:22,halign:'center'},
      3:{cellWidth:22,halign:'right',fontStyle:'bold'},
    },
    alternateRowStyles:{fillColor:XLIGHT},
    tableLineColor:LIGHT,
    tableLineWidth:0.2,
  });

  const afterTable=doc.lastAutoTable.finalY;

  // ── TOTAL ──
  // Filet double avant total
  doc.setDrawColor(...LIGHT);
  doc.setLineWidth(0.3);
  doc.line(M,afterTable+4,W-M,afterTable+4);
  doc.setDrawColor(...BLACK);
  doc.setLineWidth(0.6);
  doc.line(M,afterTable+6,W-M,afterTable+6);

  doc.setFont('helvetica','bold');
  doc.setFontSize(10);
  doc.setTextColor(...BLACK);
  doc.text('TOTAL À RÉGLER',M,afterTable+14);
  doc.setFontSize(16);
  doc.text(data.montant+'€',W-M,afterTable+14,{align:'right'});

  // ── STATUT ──
  const sY=afterTable+24;
  // Cadre statut sobre (juste un filet coloré à gauche)
  const sMap={
    paye:   {label:'PAYÉ',     r:26, g:110, b:60},
    attente:{label:'EN ATTENTE',r:140,g:100,b:0},
    retard: {label:'EN RETARD', r:160,g:30, b:30},
  };
  const sm=sMap[data.statut]||{label:'—',r:100,g:100,b:100};
  doc.setFillColor(sm.r,sm.g,sm.b);
  doc.rect(M,sY,2,10,'F');
  doc.setFont('helvetica','bold');
  doc.setFontSize(9);
  doc.setTextColor(sm.r,sm.g,sm.b);
  doc.text(sm.label,M+5,sY+7);
  if(data.datePaiement){
    doc.setFont('helvetica','normal');
    doc.setFontSize(8);
    doc.setTextColor(...MID);
    doc.text('Règlement reçu le '+data.datePaiement,M+40,sY+7);
  }

  // ── NOTES LIBRES ──
  let noteY=sY+18;
  if(data.notesLibres){
    doc.setDrawColor(...LIGHT);
    doc.setLineWidth(0.3);
    doc.rect(M,noteY,W-M*2,18,'S');
    doc.setFont('helvetica','bold');
    doc.setFontSize(7);
    doc.setTextColor(...MID);
    doc.text('OBSERVATIONS',M+4,noteY+5);
    doc.setFont('helvetica','normal');
    doc.setFontSize(8.5);
    doc.setTextColor(...DARK);
    const lines=doc.splitTextToSize(data.notesLibres,W-M*2-10);
    doc.text(lines,M+4,noteY+11);
    noteY+=22;
  }

  // ── PIED DE PAGE ──
  // Filet noir fin
  doc.setFillColor(...BLACK);
  doc.rect(0,H-14,W,1,'F');
  doc.setFont('helvetica','normal');
  doc.setFontSize(7.5);
  doc.setTextColor(...MID);
  doc.text(
    (data.assocNom||'Plus de bonnes notes')+
    '  ·  '+(data.assocAdresse||'La Courneuve')+
    '  ·  '+(data.assocEmail||'admin@educenter.fr'),
    W/2,H-8,{align:'center'}
  );
  doc.setFontSize(7);
  doc.text(data.id.toUpperCase()+' — Généré le '+data.dateEmission,W/2,H-4,{align:'center'});

  doc.save('facture-'+data.id+'.pdf');
}


// ═══════════════════════════════════════════════════════════════
// FACTURATION COMPONENT
// ═══════════════════════════════════════════════════════════════
function InvoiceEditor({facture, eleve, cours, users, onSave, onClose}){
  const sessions = cours.filter(c=>c.eleveIds.includes(eleve?.id||''));
  const [form, setForm] = useState({
    libelle: facture.libelle||'',
    montant: String(facture.montant||''),
    echeance: facture.echeance||'',
    statut: facture.statut||'attente',
    nbCreneaux: facture.nbCreneaux||0,
    type: facture.type||'mensuel',
    notes: facture.notes||'',
  });
  const [assoc, setAssoc] = useState({
    nom: 'Plus de bonnes notes',
    adresse: 'La Courneuve',
    email: 'admin@educenter.fr',
    tel: '',
  });
  const [generating, setGenerating] = useState(false);

  const handleDownload = ()=>{
    setGenerating(true);
    try {
      const sessions=cours.filter(c=>c.eleveIds.includes(eleve?.id||''));
      const matieres=[...new Set(sessions.map(c=>c.matiere))];
      const data={
        id:facture.id,
        libelle:form.libelle,
        montant:parseFloat(form.montant)||0,
        echeance:form.echeance,
        statut:form.statut,
        nbCreneaux:form.nbCreneaux||0,
        type:form.type,
        notes:form.notes,
        notesLibres:form.notes,
        dateEmission:new Date().toLocaleDateString('fr-FR'),
        datePaiement:facture.datePaiement||null,
        eleveName:eleve?.name||'',
        eleveNiveau:eleve?.niveau||'',
        matieres,
        parentNom:eleve?.parentNom||'',
        parentTel:eleve?.parentTel||'',
        sessions:sessions.map(c=>({matiere:c.matiere,jour:c.jour,debut:hs(c.debut),fin:hs(c.fin),salle:c.salle})),
        assocNom:assoc.nom, assocAdresse:assoc.adresse, assocEmail:assoc.email, assocTel:assoc.tel,
      };
      generateInvoicePDF(data);
    }catch(e){alert('Erreur PDF : '+e.message);console.error(e);}
    setTimeout(()=>setGenerating(false),1200);
  };

  const handleSave = ()=>{
    onSave({...facture, ...form, montant:parseFloat(form.montant)||facture.montant});
    onClose();
  };

  return <div style={{position:'fixed',inset:0,background:'rgba(10,20,60,.72)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div style={{background:'white',borderRadius:8,width:'100%',maxWidth:660,maxHeight:'94vh',overflowY:'auto',boxShadow:'0 24px 80px rgba(0,0,0,.35)',display:'flex',flexDirection:'column'}}>
      {/* Header */}
      <div style={{background:'linear-gradient(135deg,#1a3a8c,#2a5bd4)',padding:'18px 24px',borderRadius:'8px 8px 0 0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{color:'rgba(255,255,255,.65)',fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',marginBottom:2}}>Facture</div>
          <div style={{color:'white',fontSize:18,fontWeight:700}}>{facture.id.toUpperCase()}{eleve?' · '+eleve.name:''}</div>
        </div>
        <button onClick={onClose} style={{background:'rgba(255,255,255,.15)',border:'none',color:'white',width:32,height:32,borderRadius:6,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
      </div>

      <div style={{padding:'22px 24px',flex:1}}>
        {/* Association info */}
        <div style={{marginBottom:18}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:1,color:'#6b7ab5',textTransform:'uppercase',marginBottom:8}}>Émetteur (votre association)</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <div className="fg"><label className="fl" style={{fontSize:11}}>Nom association</label><input className="fi" style={{fontSize:12}} value={assoc.nom} onChange={e=>setAssoc(p=>({...p,nom:e.target.value}))}/></div>
            <div className="fg"><label className="fl" style={{fontSize:11}}>Adresse</label><input className="fi" style={{fontSize:12}} value={assoc.adresse} onChange={e=>setAssoc(p=>({...p,adresse:e.target.value}))}/></div>
            <div className="fg"><label className="fl" style={{fontSize:11}}>Email</label><input className="fi" style={{fontSize:12}} value={assoc.email} onChange={e=>setAssoc(p=>({...p,email:e.target.value}))}/></div>
            <div className="fg"><label className="fl" style={{fontSize:11}}>Téléphone</label><input className="fi" style={{fontSize:12}} value={assoc.tel} onChange={e=>setAssoc(p=>({...p,tel:e.target.value}))}/></div>
          </div>
        </div>

        <div style={{height:1,background:'#e8ecf5',marginBottom:18}}/>

        {/* Eleve info */}
        {eleve&&<div style={{background:'#f4f7ff',borderRadius:6,padding:'12px 14px',marginBottom:18,display:'flex',alignItems:'center',gap:14}}>
          <div style={{width:40,height:40,borderRadius:8,background:'linear-gradient(135deg,#1a3a8c,#2a5bd4)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:18,flexShrink:0}}>🎓</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:14,color:'#1a2340'}}>{eleve.name}</div>
            <div style={{fontSize:12,color:'#6b7ab5',marginTop:2}}>{eleve.niveau}</div>
            {sessions.length>0&&<div style={{marginTop:4,display:'flex',gap:6,flexWrap:'wrap'}}>
              {sessions.map(c=><span key={c.id} style={{...getCoursBadge(c.matiere),fontSize:10}}>{c.matiere} · {c.jour} {hs(c.debut)}–{hs(c.fin)}</span>)}
            </div>}
          </div>
        </div>}

        {/* Prestation */}
        <div style={{fontSize:10,fontWeight:700,letterSpacing:1,color:'#6b7ab5',textTransform:'uppercase',marginBottom:8}}>Prestation</div>
        <div className="fg" style={{marginBottom:10}}><label className="fl">Libellé de la facture</label>
          <input className="fi" value={form.libelle} onChange={e=>setForm(p=>({...p,libelle:e.target.value}))} placeholder="Ex: Forfait Mathématiques — Lucas Moreau — Mai 2025"/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:10}}>
          <div className="fg"><label className="fl">Montant (€)</label><input className="fi" type="number" min="0" step="5" value={form.montant} onChange={e=>setForm(p=>({...p,montant:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Réduction (€)</label><input className="fi" type="number" min="0" step="5" value={form.reduction||0} onChange={e=>setForm(p=>({...p,reduction:parseFloat(e.target.value)||0}))}/></div>
          <div className="fg"><label className="fl">Type</label>
            <select className="fi" value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))}>
              <option value="mensuel">Mensuel</option><option value="trimestriel">Trimestriel</option><option value="annuel">Annuel</option><option value="ponctuel">Ponctuel</option>
            </select>
          </div>
          <div className="fg"><label className="fl">Créneaux/mois</label><input className="fi" type="number" min="0" value={form.nbCreneaux} onChange={e=>setForm(p=>({...p,nbCreneaux:parseInt(e.target.value)||0}))}/></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
          <div className="fg"><label className="fl">Date d'échéance</label><input className="fi" type="date" value={form.echeance} onChange={e=>setForm(p=>({...p,echeance:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Statut</label>
            <select className="fi" value={form.statut} onChange={e=>setForm(p=>({...p,statut:e.target.value}))}>
              <option value="attente">⏳ En attente</option><option value="paye">✓ Payé</option><option value="retard">⚠️ En retard</option>
            </select>
          </div>
        </div>
        <div className="fg" style={{marginBottom:10}}><label className="fl">Notes (apparaissent sur la facture)</label>
          <textarea className="fi" rows={2} value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} placeholder="Conditions de paiement, références, mentions légales..." style={{resize:'vertical',fontSize:12,fontFamily:'var(--ff-mono)'}}/>
        </div>
      </div>

      {/* Footer actions */}
      <div style={{padding:'14px 24px',borderTop:'1.5px solid #e8ecf5',display:'flex',gap:10,justifyContent:'flex-end',background:'#fafbff',borderRadius:'0 0 8px 8px'}}>
        <button className="btn btn-o btn-sm" onClick={onClose}>Annuler</button>
        <button className="btn btn-sm" style={{background:'white',border:'1.5px solid #c0ccee',color:'#1a4fc4'}} onClick={handleSave}>💾 Enregistrer</button>
        <button className="btn btn-p btn-sm" style={{background:'#1a3a8c',border:'none',padding:'8px 18px',fontSize:12}} onClick={handleDownload} disabled={generating}>
          {generating?'⏳ Génération…':'⬇️ Télécharger PDF'}
        </button>
      </div>
    </div>
  </div>;
}

function Facturation({user,users,factures,setFactures,cours}){
  const [tab,setTab]=useState('echeancier');
  const [open,setOpen]=useState({});
  const [showFact,setShowFact]=useState(false);
  const [editingFact,setEditingFact]=useState(null); // {facture, eleve} → opens InvoiceEditor
  const [factForm,setFactForm]=useState({familleId:'',eleveId:'',libelle:'',type:'mensuel',montant:'',echeance:'',statut:'attente',nbCreneaux:0,notes:'',reduction:0});
  const [searchEleve,setSearchEleve]=useState('');
  const [filterStatut,setFilterStatut]=useState('tous');
  const [searchFacture,setSearchFacture]=useState('');
  const [sortBy,setSortBy]=useState('famille');
  const [famOverrides,setFamOverrides]=useState({});
  const [showDissocier,setShowDissocier]=useState(null);
  const [famOverridesReady,setFamOverridesReady]=useState(false);
  // Intendance & échéancier
  const [moisCible,setMoisCible]=useState(()=>new Date().toISOString().slice(0,7)); // YYYY-MM
  const [selected,setSelected]=useState({}); // multi-select facture ids
  const [periode,setPeriode]=useState('mois'); // mois | trimestre | annee | tout

  // Charger les overrides familles depuis kv_store
  useEffect(()=>{
    sbLoadKV('famille_overrides','global',{}).then(v=>{setFamOverrides(v||{});setFamOverridesReady(true);});
  },[]);
  // Sauvegarder les overrides quand ils changent
  useEffect(()=>{ if(famOverridesReady) sbSaveKV('famille_overrides',famOverrides,'global'); },[famOverrides,famOverridesReady]);

  const familles=useMemo(()=>{
    const eleves=users.filter(u=>u.role==='eleve');
    const map={};
    eleves.forEach(e=>{
      const ln=e.name.trim().split(/\s+/).slice(-1)[0];
      const autoId='fam_'+ln.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      const id=famOverrides[e.id]||autoId;
      const prenom=e.name.trim().split(/\s+/)[0];
      const nom=famOverrides[e.id]?'Famille '+ln+' ('+prenom+')':'Famille '+ln;
      if(!map[id]){map[id]={id,nom,lastName:ln,eleveIds:[e.id]};}
      else if(!map[id].eleveIds.includes(e.id)){map[id].eleveIds.push(e.id);}
    });
    return Object.values(map).sort((a,b)=>a.lastName.localeCompare(b.lastName));
  },[users,famOverrides]);

  const getSessions=eid=>cours.filter(c=>c.eleveIds.includes(eid));
  const getMontant=eid=>tarifMensuel(getSessions(eid).length);
  const getLabel=eid=>{const e=users.find(u=>u.id===eid);const mats=[...new Set(getSessions(eid).map(c=>c.matiere))];const mo=new Date().toLocaleString('fr-FR',{month:'long',year:'numeric'});return e?`Forfait ${mats.join(' + ')} — ${e.name} — ${mo}`:'';}; 
  const getFamMats=fam=>[...new Set(cours.filter(c=>c.eleveIds.some(id=>fam.eleveIds.includes(id))).map(c=>c.matiere))];
  const getFamTarif=fam=>(fam.eleveIds||[]).reduce((a,id)=>a+getMontant(id),0);
  const famFacts=fid=>factures.filter(f=>f.familleId===fid);
  const totalFam=fid=>famFacts(fid).reduce((a,f)=>a+f.montant,0);
  const payeFam=fid=>famFacts(fid).filter(f=>f.statut==='paye').reduce((a,f)=>a+f.montant,0);
  const pendingFam=fid=>famFacts(fid).filter(f=>f.statut!=='paye').length;
  const toggle=id=>setOpen(p=>({...p,[id]:!p[id]}));
  const setStatut=(id,s)=>setFactures(p=>p.map(f=>f.id===id?{...f,statut:s,datePaiement:s==='paye'?new Date().toISOString().split('T')[0]:null}:f));
  const delFact=id=>{if(window.confirm('Supprimer cette facture ?')){setFactures(p=>p.filter(f=>f.id!==id));sbDelete('factures',id);}};
  const addFact=()=>{
    if(!factForm.libelle||!factForm.montant||!factForm.familleId)return;
    const newF={id:'fc'+Date.now(),...factForm,montant:parseFloat(factForm.montant),reduction:factForm.reduction||0,eleveId:factForm.eleveId||null,nbCreneaux:factForm.nbCreneaux||0,datePaiement:factForm.statut==='paye'?new Date().toISOString().split('T')[0]:null};
    setFactures(p=>[...p,newF]);
    setShowFact(false);setFactForm({familleId:'',eleveId:'',libelle:'',type:'mensuel',montant:'',echeance:'',statut:'attente',nbCreneaux:0,notes:'',reduction:0});setSearchEleve('');
    // Open editor immediately for PDF
    const eleveF=users.find(u=>u.id===factForm.eleveId);
    setEditingFact({facture:newF, eleve:eleveF});
  };
  const saveEditedFact=updated=>{setFactures(p=>p.map(f=>f.id===updated.id?updated:f));};

  // ── Export CSV ──
  const exportCSV=()=>{
    const rows=[['ID','Famille','Élève','Niveau','Libellé','Type','Montant','Réduction','Net','Statut','Échéance','Date paiement','Notes']];
    factures.forEach(f=>{
      const fam=familles.find(x=>x.id===f.familleId);
      const elv=users.find(u=>u.id===f.eleveId);
      const net=f.montant-(f.reduction||0);
      rows.push([
        f.id,fam?.nom||f.familleId,elv?.name||'',elv?.niveau||'',f.libelle,f.type||'',f.montant,f.reduction||0,net,
        f.statut,f.echeance||'',f.datePaiement||'',(f.notes||'').replace(/[\r\n]/g,' ')
      ]);
    });
    const csv=rows.map(r=>r.map(c=>{const s=String(c??'');return /[,;"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(';')).join('\r\n');
    const bom='\ufeff';
    const blob=new Blob([bom+csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`facturation_${new Date().toISOString().split('T')[0]}.csv`;a.click();
    setTimeout(()=>URL.revokeObjectURL(url),100);
  };

  // ── Génération factures du mois pour toutes les familles ──
  const generateMonthlyFactures=()=>{
    const now=new Date();
    const mo=now.toLocaleString('fr-FR',{month:'long',year:'numeric'});
    const ech=new Date(now.getFullYear(),now.getMonth(),5).toISOString().split('T')[0];
    let created=0;
    const newFacts=[];
    familles.forEach(fam=>{
      // Vérifier si une facture existe déjà ce mois pour cette famille
      const already=factures.find(f=>f.familleId===fam.id&&f.echeance&&f.echeance.startsWith(now.toISOString().slice(0,7)));
      if(already)return;
      const famEleves=users.filter(u=>fam.eleveIds.includes(u.id));
      famEleves.forEach(e=>{
        const mats=[...new Set(cours.filter(c=>c.eleveIds.includes(e.id)).map(c=>c.matiere))];
        if(mats.length===0)return;
        const montant=tarifMensuel(cours.filter(c=>c.eleveIds.includes(e.id)).length);
        newFacts.push({
          id:'fc'+Date.now()+'_'+e.id,
          familleId:fam.id,eleveId:e.id,
          libelle:`Forfait ${mats.join(' + ')} — ${e.name} — ${mo}`,
          type:'mensuel',montant,reduction:0,
          echeance:ech,statut:'attente',
          nbCreneaux:cours.filter(c=>c.eleveIds.includes(e.id)).length,
          datePaiement:null,autoGenerated:true,
        });
        created++;
      });
    });
    if(created===0){alert(`Aucune nouvelle facture à générer pour ${mo} — toutes les familles ont déjà été facturées ce mois.`);return;}
    if(window.confirm(`Générer ${created} facture(s) pour ${mo} ? (Les familles déjà facturées sont ignorées.)`)){
      setFactures(p=>[...p,...newFacts]);
      alert(`✓ ${created} facture(s) créée(s) pour ${mo}`);
    }
  };

  // ── Relance par email (mailto) ──
  const buildRelance=(f)=>{
    const fam=familles.find(x=>x.id===f.familleId);
    const elv=users.find(u=>u.id===f.eleveId);
    const email=elv?.parentEmail||elv?.parentMail||elv?.email||'';
    const net=f.montant-(f.reduction||0);
    const sub=encodeURIComponent(`Relance facture — ${f.libelle}`);
    const body=encodeURIComponent(
      `Bonjour,\n\nNous vous prions de bien vouloir régler la facture suivante :\n\n`+
      `• Référence : ${f.id.toUpperCase()}\n`+
      `• ${f.libelle}\n`+
      `• Montant : ${net}€\n`+
      (f.echeance?`• Échéance : ${f.echeance}\n`:'')+
      `• Statut : ${f.statut==='retard'?'EN RETARD':'En attente'}\n\n`+
      `Merci de procéder au règlement dans les meilleurs délais.\n\n`+
      `Cordialement,\nPlus de bonnes notes`
    );
    return email?`mailto:${email}?subject=${sub}&body=${body}`:`mailto:?subject=${sub}&body=${body}`;
  };

  // ── Helpers intendance / CA ──
  const netOf=(f)=>f.montant-(f.reduction||0);
  const today=new Date();today.setHours(0,0,0,0);
  const toDate=(s)=>s?new Date(s+'T00:00:00'):null;
  const daysBetween=(d1,d2)=>Math.round((d1-d2)/(1000*60*60*24));

  // Période active (mois courant par défaut, navigable)
  const[yYear,yMonth]=moisCible.split('-').map(Number);
  const moisStart=new Date(yYear,yMonth-1,1);
  const moisEnd=new Date(yYear,yMonth,0,23,59,59);
  const moisLabel=moisStart.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
  const navMonth=(delta)=>{const d=new Date(yYear,yMonth-1+delta,1);setMoisCible(d.toISOString().slice(0,7));};

  // Catégorisation temporelle d'une facture pour l'échéancier
  const ageOf=(f)=>{
    if(f.statut==='paye'){
      const dp=toDate(f.datePaiement);if(!dp)return{cat:'paye_old',jours:0};
      const days=daysBetween(today,dp);
      return days<=30?{cat:'paye_recent',jours:days}:{cat:'paye_old',jours:days};
    }
    const ech=toDate(f.echeance);
    if(!ech)return{cat:'sans_echeance',jours:null};
    const days=daysBetween(ech,today);
    if(days<0)return{cat:'retard',jours:-days};
    if(days<=7)return{cat:'semaine',jours:days};
    if(days<=30)return{cat:'mois',jours:days};
    return{cat:'futur',jours:days};
  };

  // Filtrage temporel pour les vues intendance
  const facturesPeriode=useMemo(()=>{
    if(periode==='tout')return factures;
    return factures.filter(f=>{
      const ref=f.datePaiement?toDate(f.datePaiement):toDate(f.echeance);
      if(!ref)return periode==='tout';
      if(periode==='mois')return ref>=moisStart&&ref<=moisEnd;
      if(periode==='trimestre'){
        const trStart=new Date(yYear,Math.floor((yMonth-1)/3)*3,1);
        const trEnd=new Date(yYear,Math.floor((yMonth-1)/3)*3+3,0,23,59,59);
        return ref>=trStart&&ref<=trEnd;
      }
      if(periode==='annee'){
        return ref.getFullYear()===yYear;
      }
      return true;
    });
  },[factures,periode,moisCible]);

  // Évolution CA 12 derniers mois
  const evolution=useMemo(()=>{
    const out=[];
    for(let i=11;i>=0;i--){
      const d=new Date(today.getFullYear(),today.getMonth()-i,1);
      const ms=d.toISOString().slice(0,7);
      const enc=factures.filter(f=>f.statut==='paye'&&f.datePaiement&&f.datePaiement.startsWith(ms)).reduce((a,f)=>a+netOf(f),0);
      const dueAtt=factures.filter(f=>f.statut!=='paye'&&f.echeance&&f.echeance.startsWith(ms)).reduce((a,f)=>a+netOf(f),0);
      out.push({label:d.toLocaleDateString('fr-FR',{month:'short'}).replace('.',''),ms,enc,due:dueAtt});
    }
    return out;
  },[factures]);

  // KPIs période
  const kpiEncaisse=facturesPeriode.filter(f=>f.statut==='paye').reduce((a,f)=>a+netOf(f),0);
  const kpiAttente=facturesPeriode.filter(f=>f.statut==='attente').reduce((a,f)=>a+netOf(f),0);
  const kpiRetard=facturesPeriode.filter(f=>f.statut==='retard').reduce((a,f)=>a+netOf(f),0);
  const kpiTotal=kpiEncaisse+kpiAttente+kpiRetard;
  const kpiTauxRec=kpiTotal>0?Math.round(kpiEncaisse/kpiTotal*100):0;

  // Top débiteurs (familles avec plus d'impayés)
  const topDebiteurs=useMemo(()=>{
    return familles.map(fam=>{
      const ff=factures.filter(f=>f.familleId===fam.id&&f.statut!=='paye');
      const total=ff.reduce((a,f)=>a+netOf(f),0);
      const nb=ff.length;
      const nbRetard=ff.filter(f=>f.statut==='retard').length;
      return{fam,total,nb,nbRetard};
    }).filter(x=>x.total>0).sort((a,b)=>b.total-a.total).slice(0,8);
  },[factures,familles]);

  // Top payeurs (familles ayant le mieux payé sur la période)
  const topPayeurs=useMemo(()=>{
    return familles.map(fam=>{
      const ff=facturesPeriode.filter(f=>f.familleId===fam.id&&f.statut==='paye');
      const total=ff.reduce((a,f)=>a+netOf(f),0);
      return{fam,total,nb:ff.length};
    }).filter(x=>x.total>0).sort((a,b)=>b.total-a.total).slice(0,5);
  },[facturesPeriode,familles]);

  // Action de masse : relancer toutes les factures en retard
  const relancerTousRetards=()=>{
    const retards=factures.filter(f=>f.statut==='retard');
    if(retards.length===0){alert('Aucune facture en retard.');return;}
    // Collecter tous les emails uniques
    const emailsMap={};
    retards.forEach(f=>{
      const elv=users.find(u=>u.id===f.eleveId);
      const email=elv?.parentEmail||elv?.parentMail||elv?.email;
      if(!email)return;
      if(!emailsMap[email])emailsMap[email]=[];
      emailsMap[email].push({f,elv});
    });
    const uniqueEmails=Object.keys(emailsMap);
    if(uniqueEmails.length===0){alert('Aucun email parent renseigné pour les familles en retard.');return;}
    // Construire un mailto bcc avec tous les destinataires
    const sub=encodeURIComponent(`Relance — Factures en retard`);
    const body=encodeURIComponent(
      `Bonjour,\n\nCet email concerne une ou plusieurs factures en retard de paiement nous concernant.\n\n`+
      `Veuillez consulter votre espace ou nous contacter pour régulariser la situation.\n\n`+
      `Cordialement,\nPlus de bonnes notes`
    );
    window.location.href=`mailto:?bcc=${uniqueEmails.join(',')}&subject=${sub}&body=${body}`;
  };
  // Action de masse : marquer toutes les factures sélectionnées comme payées
  const marquerSelectionPaye=()=>{
    const ids=Object.keys(selected).filter(id=>selected[id]);
    if(ids.length===0)return;
    if(!window.confirm(`Marquer ${ids.length} facture(s) comme payée(s) ?`))return;
    setFactures(p=>p.map(f=>ids.includes(f.id)?{...f,statut:'paye',datePaiement:new Date().toISOString().split('T')[0]}:f));
    setSelected({});
  };
  const toggleSelect=(id)=>setSelected(p=>({...p,[id]:!p[id]}));
  const nbSelected=Object.values(selected).filter(Boolean).length;

  const totalGlobal=factures.reduce((a,f)=>a+f.montant,0);
  const totalPaye=factures.filter(f=>f.statut==='paye').reduce((a,f)=>a+f.montant,0);
  const totalAttente=factures.filter(f=>f.statut==='attente').reduce((a,f)=>a+f.montant,0);
  const totalRetard=factures.filter(f=>f.statut==='retard').reduce((a,f)=>a+f.montant,0);
  const nbRetard=factures.filter(f=>f.statut==='retard').length;
  const tauxEncaissement=totalGlobal>0?Math.round((totalPaye/totalGlobal)*100):0;
  const filteredEleves=useMemo(()=>users.filter(u=>u.role==='eleve'&&(searchEleve===''||u.name.toLowerCase().includes(searchEleve.toLowerCase())||(u.niveau||'').toLowerCase().includes(searchEleve.toLowerCase()))),[users,searchEleve]);

  const SBadge=({s})=>{const m={paye:{c:'s-paye',i:'✓',l:'Payé'},attente:{c:'s-attente',i:'⏳',l:'En attente'},retard:{c:'s-retard',i:'⚠️',l:'En retard'}}[s]||{c:'s-attente',i:'⏳',l:'En attente'};return <span className={`stat-badge ${m.c}`}>{m.i} {m.l}</span>;};

  const FactRow=({f})=>{
    const eleveF=users.find(u=>u.id===f.eleveId);
    return <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'white',border:'1px solid #e8ecf5',borderRadius:4,marginBottom:4}}
      onMouseEnter={e=>e.currentTarget.style.boxShadow='0 2px 8px rgba(26,79,196,.08)'}
      onMouseLeave={e=>e.currentTarget.style.boxShadow='none'}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:13,fontWeight:500,color:'#1a2340',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.libelle}</div>
        <div style={{fontSize:11,color:'#8892b0',marginTop:2,display:'flex',gap:8}}>
          {f.echeance&&<span>📅 {f.echeance}</span>}
          {f.nbCreneaux>0&&<span>⏱ {f.nbCreneaux} créneau{f.nbCreneaux>1?'x':''}</span>}
          {f.datePaiement&&<span style={{color:'#2D9B6F'}}>✓ {f.datePaiement}</span>}
        </div>
      </div>
      <div style={{textAlign:'right',minWidth:60}}>
        <div style={{fontWeight:700,fontSize:15,color:'#1a2340'}}>{f.reduction>0?f.montant-f.reduction:f.montant}€</div>
        {f.reduction>0&&<div style={{fontSize:10,color:'#059669',textDecoration:'line-through'}}>{f.montant}€ <span style={{textDecoration:'none',fontWeight:600}}>-{f.reduction}€</span></div>}
      </div>
      <SBadge s={f.statut}/>
      <div style={{display:'flex',gap:4,flexShrink:0}}>
        {f.statut!=='paye'&&<button className="btn btn-sm" title="Marquer payé" style={{background:'#e8f8ee',border:'1.5px solid #b8dbb8',color:'#2D9B6F',fontSize:10,padding:'4px 8px'}} onClick={()=>setStatut(f.id,'paye')}>✓ Payé</button>}
        {f.statut!=='paye'&&<a href={buildRelance(f)} title="Envoyer une relance par email" style={{background:'#fff8e0',border:'1.5px solid #f5d882',color:'#c47a00',fontSize:10,padding:'4px 8px',borderRadius:4,textDecoration:'none',fontWeight:600,display:'inline-flex',alignItems:'center'}}>✉ Relancer</a>}
        <button className="btn btn-sm" title="Modifier / Télécharger PDF" style={{background:'#f0f5ff',border:'1.5px solid #c0d0f0',color:'#1a4fc4',fontSize:11,padding:'4px 9px'}} onClick={()=>setEditingFact({facture:f,eleve:eleveF})}>📄 Facture</button>
        <button className="btn btn-d btn-sm" onClick={()=>delFact(f.id)}>🗑️</button>
      </div>
    </div>;
  };

  return <>
    <TB title="Facturation">
      <button className="btn btn-sm" style={{background:'var(--cream2)',border:'none',color:'var(--muted)',fontSize:11}} onClick={()=>{if(window.confirm('Reset demo ?'))setFactures(SEED_FACTURES);}}>↺</button>
      <button className="btn btn-sm" title="Exporter toutes les factures en CSV (Excel)" style={{background:'white',border:'1.5px solid #c0ccee',color:'#1a4fc4',fontSize:11}} onClick={exportCSV}>📥 Export CSV</button>
      <button className="btn btn-sm" title="Générer automatiquement les factures du mois courant pour toutes les familles" style={{background:'#EEFFF6',border:'1.5px solid #b8dbb8',color:'#1a7a4a',fontSize:11}} onClick={generateMonthlyFactures}>⚡ Générer le mois</button>
      <button className="btn btn-p btn-sm" onClick={()=>setShowFact(true)}>＋ Nouvelle facture</button>
    </TB>
    <div className="pg">
      {/* ── Bandeau Période + KPI dynamiques ── */}
      <div style={{background:'white',border:'1.5px solid #e0e8f5',borderRadius:8,padding:'14px 18px',marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,flexWrap:'wrap',gap:10}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.6}}>Période :</span>
            {[{v:'mois',l:'Mois'},{v:'trimestre',l:'Trimestre'},{v:'annee',l:'Année'},{v:'tout',l:'Tout'}].map(p=>(
              <button key={p.v} onClick={()=>setPeriode(p.v)} style={{padding:'5px 12px',border:`1.5px solid ${periode===p.v?'#1a4fc4':'#dde3f0'}`,borderRadius:4,background:periode===p.v?'#1a4fc4':'white',color:periode===p.v?'white':'#6b7ab5',fontSize:11,fontWeight:periode===p.v?700:500,cursor:'pointer'}}>{p.l}</button>
            ))}
          </div>
          {periode!=='tout'&&<div style={{display:'flex',alignItems:'center',gap:8,background:'#f4f7ff',padding:'4px 4px 4px 14px',borderRadius:20}}>
            <button onClick={()=>navMonth(-1)} title="Mois précédent" style={{background:'white',border:'1.5px solid #c8d8f5',width:26,height:26,borderRadius:'50%',cursor:'pointer',fontSize:13,color:'#1a4fc4',display:'inline-flex',alignItems:'center',justifyContent:'center'}}>‹</button>
            <span style={{fontWeight:700,fontSize:13,color:'#1a2340',minWidth:120,textAlign:'center',textTransform:'capitalize'}}>{moisLabel}</span>
            <button onClick={()=>navMonth(1)} title="Mois suivant" style={{background:'white',border:'1.5px solid #c8d8f5',width:26,height:26,borderRadius:'50%',cursor:'pointer',fontSize:13,color:'#1a4fc4',display:'inline-flex',alignItems:'center',justifyContent:'center'}}>›</button>
            <button onClick={()=>setMoisCible(new Date().toISOString().slice(0,7))} title="Mois courant" style={{background:'#1a4fc4',color:'white',border:'none',padding:'4px 10px',borderRadius:14,fontSize:10,fontWeight:700,cursor:'pointer'}}>Aujourd'hui</button>
          </div>}
        </div>
        {/* KPIs */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:10}}>
          {[
            {icon:'💶',val:kpiTotal+'€',label:'CA facturé',color:'#1a2340',bg:'#f4f7ff',border:'#c8d8f5'},
            {icon:'✅',val:kpiEncaisse+'€',label:`Encaissé · ${kpiTauxRec}%`,color:'#1a7a4a',bg:'#e8f8ee',border:'#b8dbb8'},
            {icon:'⏳',val:kpiAttente+'€',label:`${facturesPeriode.filter(f=>f.statut==='attente').length} en attente`,color:'#c47a00',bg:'#fff8e0',border:'#f5d882'},
            {icon:'⚠️',val:kpiRetard+'€',label:`${facturesPeriode.filter(f=>f.statut==='retard').length} en retard`,color:'#b02020',bg:'#fff0f0',border:'#f5b8b8'},
          ].map((k,i)=>(
            <div key={i} style={{background:k.bg,border:`1.5px solid ${k.border}`,borderRadius:6,padding:'12px 14px',display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:22}}>{k.icon}</span>
              <div style={{minWidth:0}}><div style={{fontSize:18,fontWeight:700,color:k.color,fontFamily:'var(--ff-serif)'}}>{k.val}</div><div style={{fontSize:10,color:'#6b7ab5',marginTop:1}}>{k.label}</div></div>
            </div>
          ))}
        </div>
      </div>

      {/* Tabs + recherche + filtre + actions groupées */}
      <div style={{marginBottom:14}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,flexWrap:'wrap'}}>
          <div className="tabs" style={{maxWidth:480,marginBottom:0}}>
            <button className={`tab ${tab==='echeancier'?'on':''}`} onClick={()=>setTab('echeancier')}>🗓️ Échéancier</button>
            <button className={`tab ${tab==='vue'?'on':''}`} onClick={()=>setTab('vue')}>👨‍👩‍👧 Familles</button>
            <button className={`tab ${tab==='liste'?'on':''}`} onClick={()=>setTab('liste')}>📋 Liste</button>
            <button className={`tab ${tab==='intendance'?'on':''}`} onClick={()=>setTab('intendance')}>📊 CA & Intendance</button>
          </div>
          <div style={{flex:1,minWidth:180,position:'relative'}}>
            <input
              style={{width:'100%',padding:'6px 12px 6px 32px',border:'1.5px solid #dde3f0',borderRadius:4,fontSize:12,fontFamily:'var(--ff-mono)',color:'#1a2340',background:'white'}}
              placeholder="Rechercher famille, élève, libellé…"
              value={searchFacture}
              onChange={e=>setSearchFacture(e.target.value)}
            />
            <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:13,opacity:.4}}>🔍</span>
            {searchFacture&&<button onClick={()=>setSearchFacture('')} style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:13,color:'#aaa'}}>✕</button>}
          </div>
          {tab==='liste'&&<div style={{display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
            <span style={{fontSize:11,color:'var(--muted)'}}>Trier par :</span>
            <select style={{fontSize:11,padding:'5px 8px',border:'1.5px solid #dde3f0',borderRadius:4,background:'white',color:'#1a2340',fontFamily:'var(--ff-mono)'}}
              value={sortBy} onChange={e=>setSortBy(e.target.value)}>
              <option value="famille">Famille</option>
              <option value="niveau">Classe / Niveau</option>
              <option value="matiere">Matière</option>
              <option value="statut">Statut</option>
              <option value="montant">Montant</option>
              <option value="echeance">Échéance</option>
            </select>
          </div>}
          {tab!=='intendance'&&tab!=='echeancier'&&<div style={{display:'flex',gap:6}}>
            {['tous','paye','attente','retard'].map(s=>(
              <button key={s} onClick={()=>setFilterStatut(s)} style={{padding:'5px 11px',border:`1.5px solid ${filterStatut===s?'#1a4fc4':'#dde3f0'}`,borderRadius:4,background:filterStatut===s?'#1a4fc4':'white',color:filterStatut===s?'white':'#6b7ab5',fontSize:11,fontWeight:filterStatut===s?700:400,cursor:'pointer'}}>
                {s==='tous'?'Tous':s==='paye'?'✓ Payé':s==='attente'?'⏳ Attente':'⚠️ Retard'}
              </button>
            ))}
          </div>}
        </div>
        {/* Bandeau actions de masse */}
        {nbSelected>0&&<div style={{background:'#1a4fc4',color:'white',padding:'8px 14px',borderRadius:4,display:'flex',alignItems:'center',gap:10,fontSize:12,fontWeight:600}}>
          <span>✓ {nbSelected} sélectionnée{nbSelected>1?'s':''}</span>
          <button onClick={marquerSelectionPaye} style={{background:'rgba(255,255,255,.2)',border:'1px solid rgba(255,255,255,.3)',color:'white',padding:'4px 10px',borderRadius:3,fontSize:11,cursor:'pointer',fontWeight:600}}>✓ Marquer payées</button>
          <button onClick={()=>setSelected({})} style={{background:'none',border:'1px solid rgba(255,255,255,.3)',color:'white',padding:'4px 10px',borderRadius:3,fontSize:11,cursor:'pointer'}}>✕ Tout désélectionner</button>
        </div>}
      </div>

      {/* ─── ÉCHÉANCIER TAB ─── */}
      {tab==='echeancier'&&(()=>{
        // Filtrer par recherche
        const matchesSearch=(f)=>{
          if(!searchFacture)return true;
          const q=searchFacture.toLowerCase();
          const fam=familles.find(x=>x.id===f.familleId);
          const elv=users.find(u=>u.id===f.eleveId);
          return f.libelle.toLowerCase().includes(q)||(fam?.nom||'').toLowerCase().includes(q)||(elv?.name||'').toLowerCase().includes(q);
        };
        const all=factures.filter(matchesSearch);
        const groups={
          retard:all.filter(f=>ageOf(f).cat==='retard').sort((a,b)=>ageOf(b).jours-ageOf(a).jours),
          semaine:all.filter(f=>ageOf(f).cat==='semaine').sort((a,b)=>(a.echeance||'').localeCompare(b.echeance||'')),
          mois:all.filter(f=>ageOf(f).cat==='mois').sort((a,b)=>(a.echeance||'').localeCompare(b.echeance||'')),
          futur:all.filter(f=>ageOf(f).cat==='futur').sort((a,b)=>(a.echeance||'').localeCompare(b.echeance||'')),
          paye_recent:all.filter(f=>ageOf(f).cat==='paye_recent').sort((a,b)=>(b.datePaiement||'').localeCompare(a.datePaiement||'')),
          sans_echeance:all.filter(f=>ageOf(f).cat==='sans_echeance'&&f.statut!=='paye'),
        };
        const sections=[
          {key:'retard',label:'🔴 EN RETARD',desc:'À régulariser en urgence',color:'#b02020',bg:'#fff0f0',border:'#f5b8b8',list:groups.retard},
          {key:'semaine',label:'🟡 CETTE SEMAINE',desc:'Échéance ≤ 7 jours',color:'#c47a00',bg:'#fff8e0',border:'#f5d882',list:groups.semaine},
          {key:'mois',label:'🟢 CE MOIS-CI',desc:'Échéance 8–30 jours',color:'#1a7a4a',bg:'#e8f8ee',border:'#b8dbb8',list:groups.mois},
          {key:'futur',label:'⚪ PLUS TARD',desc:'Échéance > 30 jours',color:'#6b7ab5',bg:'#f4f7ff',border:'#c8d8f5',list:groups.futur},
          {key:'sans_echeance',label:'⚙️ SANS ÉCHÉANCE',desc:'À configurer',color:'#7c3aed',bg:'#f5f3ff',border:'#d8d0ff',list:groups.sans_echeance},
          {key:'paye_recent',label:'✅ PAYÉES RÉCEMMENT',desc:'30 derniers jours',color:'#1a7a4a',bg:'#f8f8f8',border:'#e0e0e0',list:groups.paye_recent},
        ].filter(s=>s.list.length>0);
        return<>
          {/* Action en masse rapide */}
          {groups.retard.length>0&&<div style={{background:'#fff0f0',border:'1.5px solid #f5b8b8',borderLeft:'5px solid #b02020',borderRadius:6,padding:'12px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
            <div style={{flex:1,minWidth:200}}>
              <div style={{fontWeight:700,fontSize:14,color:'#b02020'}}>⚠ {groups.retard.length} facture{groups.retard.length>1?'s':''} en retard — {groups.retard.reduce((a,f)=>a+netOf(f),0)}€ impayés</div>
              <div style={{fontSize:11,color:'#7a3030',marginTop:2}}>Envoyez une relance groupée à toutes les familles concernées.</div>
            </div>
            <button onClick={relancerTousRetards} style={{background:'#b02020',color:'white',border:'none',padding:'8px 16px',borderRadius:4,fontWeight:700,fontSize:12,cursor:'pointer'}}>✉ Relancer tous les retards</button>
          </div>}

          {sections.length===0&&<div className="emp"><div className="emp-icon">🗓️</div><h3>Échéancier vide</h3><p>Aucune facture ne correspond à votre recherche.</p></div>}

          {sections.map(sec=>(
            <div key={sec.key} style={{background:'white',border:`1.5px solid ${sec.border}`,borderLeft:`5px solid ${sec.color}`,borderRadius:6,marginBottom:14,overflow:'hidden'}}>
              <div style={{padding:'10px 16px',background:sec.bg,display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:`1px solid ${sec.border}`}}>
                <div>
                  <span style={{fontWeight:700,fontSize:13,color:sec.color,letterSpacing:.4}}>{sec.label}</span>
                  <span style={{marginLeft:10,fontSize:11,color:'var(--muted)'}}>{sec.desc}</span>
                </div>
                <div style={{display:'flex',gap:14,alignItems:'center',fontSize:12}}>
                  <span style={{color:sec.color,fontWeight:700}}>{sec.list.length} facture{sec.list.length>1?'s':''}</span>
                  <span style={{fontWeight:700,fontSize:14,color:sec.color,fontFamily:'var(--ff-serif)'}}>{sec.list.reduce((a,f)=>a+netOf(f),0)}€</span>
                </div>
              </div>
              <div>
                {sec.list.map(f=>{
                  const fam=familles.find(x=>x.id===f.familleId);
                  const elv=users.find(u=>u.id===f.eleveId);
                  const age=ageOf(f);
                  const net=netOf(f);
                  const isSel=!!selected[f.id];
                  return<div key={f.id} style={{padding:'10px 16px',display:'flex',alignItems:'center',gap:12,borderBottom:'1px solid var(--cream2)',background:isSel?'#f0f5ff':'white',cursor:'default'}}
                    onMouseEnter={e=>{if(!isSel)e.currentTarget.style.background='#fafbff';}}
                    onMouseLeave={e=>{if(!isSel)e.currentTarget.style.background='white';}}>
                    {f.statut!=='paye'&&<input type="checkbox" checked={isSel} onChange={()=>toggleSelect(f.id)} style={{cursor:'pointer',accentColor:'#1a4fc4',width:14,height:14}}/>}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:2,flexWrap:'wrap'}}>
                        <span style={{fontWeight:700,fontSize:13,color:'#1a2340'}}>{fam?.nom||f.familleId}</span>
                        {elv&&<span style={{fontSize:11,color:'var(--muted)'}}>· {elv.name}</span>}
                        {elv&&<span style={{fontSize:10,padding:'1px 6px',background:'var(--cream2)',color:'var(--muted)',borderRadius:2,fontWeight:600}}>{elv.niveau}</span>}
                      </div>
                      <div style={{fontSize:12,color:'#4a5568',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.libelle}</div>
                    </div>
                    <div style={{minWidth:110,textAlign:'right',fontSize:11,color:'var(--muted)'}}>
                      {f.statut==='paye'&&f.datePaiement&&<><div style={{color:'#1a7a4a',fontWeight:700}}>✓ Payé</div><div>le {f.datePaiement}</div></>}
                      {f.statut!=='paye'&&age.cat==='retard'&&<><div style={{color:'#b02020',fontWeight:700}}>⚠ +{age.jours}j retard</div>{f.echeance&&<div>éch. {f.echeance}</div>}</>}
                      {f.statut!=='paye'&&age.cat==='semaine'&&<><div style={{color:'#c47a00',fontWeight:700}}>⏰ dans {age.jours}j</div><div>{f.echeance}</div></>}
                      {f.statut!=='paye'&&age.cat==='mois'&&<><div>📅 dans {age.jours}j</div><div>{f.echeance}</div></>}
                      {f.statut!=='paye'&&age.cat==='futur'&&<><div>📅 dans {age.jours}j</div><div>{f.echeance}</div></>}
                      {f.statut!=='paye'&&age.cat==='sans_echeance'&&<div style={{color:'#7c3aed'}}>Sans date</div>}
                    </div>
                    <div style={{minWidth:70,textAlign:'right'}}>
                      <div style={{fontWeight:700,fontSize:15,color:'#1a2340',fontFamily:'var(--ff-serif)'}}>{net}€</div>
                      {f.reduction>0&&<div style={{fontSize:9,color:'#059669'}}>-{f.reduction}€</div>}
                    </div>
                    <div style={{display:'flex',gap:4,flexShrink:0}}>
                      {f.statut!=='paye'&&<button className="btn btn-sm" title="Marquer payé" style={{background:'#e8f8ee',border:'1.5px solid #b8dbb8',color:'#2D9B6F',fontSize:10,padding:'4px 8px'}} onClick={()=>setStatut(f.id,'paye')}>✓ Payé</button>}
                      {f.statut!=='paye'&&<a href={buildRelance(f)} title="Relance par email" style={{background:'#fff8e0',border:'1.5px solid #f5d882',color:'#c47a00',fontSize:10,padding:'4px 8px',borderRadius:4,textDecoration:'none',fontWeight:600,display:'inline-flex',alignItems:'center'}}>✉</a>}
                      <button className="btn btn-sm" title="Voir / éditer" style={{background:'#f0f5ff',border:'1.5px solid #c0d0f0',color:'#1a4fc4',fontSize:10,padding:'4px 8px'}} onClick={()=>setEditingFact({facture:f,eleve:elv})}>📄</button>
                    </div>
                  </div>;
                })}
              </div>
            </div>
          ))}
        </>;
      })()}

      {/* ─── INTENDANCE / CA TAB ─── */}
      {tab==='intendance'&&(()=>{
        const maxEvol=Math.max(...evolution.map(e=>Math.max(e.enc,e.due)),1);
        const curMonthEnc=evolution[evolution.length-1].enc;
        const prevMonthEnc=evolution[evolution.length-2]?.enc||0;
        const delta=prevMonthEnc>0?Math.round((curMonthEnc-prevMonthEnc)/prevMonthEnc*100):null;
        const total12m=evolution.reduce((a,e)=>a+e.enc,0);
        const moyMensuelle=Math.round(total12m/12);
        return<>
          {/* Bloc évolution CA */}
          <div style={{background:'white',border:'1.5px solid #e0e8f5',borderRadius:8,padding:'16px 20px',marginBottom:16}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14,flexWrap:'wrap',gap:10}}>
              <div>
                <div style={{fontFamily:'var(--ff-serif)',fontSize:16,fontWeight:700,color:'#1a2340'}}>📈 Évolution du chiffre d'affaires</div>
                <div style={{fontSize:11,color:'var(--muted)',marginTop:3}}>12 derniers mois · Encaissements vs Dues</div>
              </div>
              <div style={{display:'flex',gap:14,fontSize:12}}>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5}}>Total 12m</div>
                  <div style={{fontWeight:700,fontSize:18,color:'#1a7a4a',fontFamily:'var(--ff-serif)'}}>{total12m}€</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5}}>Moyenne</div>
                  <div style={{fontWeight:700,fontSize:18,color:'#1a4fc4',fontFamily:'var(--ff-serif)'}}>{moyMensuelle}€/mois</div>
                </div>
                {delta!==null&&<div style={{textAlign:'right'}}>
                  <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5}}>vs mois préc.</div>
                  <div style={{fontWeight:700,fontSize:18,color:delta>=0?'#1a7a4a':'#b02020',fontFamily:'var(--ff-serif)'}}>{delta>=0?'↑':'↓'} {Math.abs(delta)}%</div>
                </div>}
              </div>
            </div>
            {/* Graphique barres */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(12,1fr)',gap:6,alignItems:'flex-end',height:140,padding:'0 4px'}}>
              {evolution.map((m,i)=>{
                const hEnc=Math.round((m.enc/maxEvol)*100);
                const hDue=Math.round((m.due/maxEvol)*100);
                const isCurrent=i===evolution.length-1;
                return<div key={m.ms} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                  <div style={{fontSize:9,fontWeight:700,color:m.enc>0?'#1a7a4a':'var(--muted)'}}>{m.enc>0?m.enc+'€':''}</div>
                  <div style={{position:'relative',width:'100%',height:100,display:'flex',alignItems:'flex-end',justifyContent:'center',gap:2}}>
                    {m.enc>0&&<div title={`Encaissé: ${m.enc}€`} style={{flex:1,maxWidth:14,height:hEnc+'%',background:isCurrent?'linear-gradient(180deg,#34d399,#1a7a4a)':'linear-gradient(180deg,#86efac,#2D9B6F)',borderRadius:'3px 3px 0 0',minHeight:m.enc>0?3:0,transition:'all .3s'}}/>}
                    {m.due>0&&<div title={`En attente: ${m.due}€`} style={{flex:1,maxWidth:14,height:hDue+'%',background:'linear-gradient(180deg,#fcd34d,#c47a00)',borderRadius:'3px 3px 0 0',minHeight:m.due>0?3:0,opacity:.7}}/>}
                  </div>
                  <div style={{fontSize:10,color:isCurrent?'#1a4fc4':'var(--muted)',fontWeight:isCurrent?700:500,textTransform:'capitalize'}}>{m.label}</div>
                </div>;
              })}
            </div>
            <div style={{display:'flex',justifyContent:'center',gap:18,marginTop:14,fontSize:11,paddingTop:10,borderTop:'1px solid var(--cream2)'}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}><span style={{width:10,height:10,borderRadius:2,background:'linear-gradient(180deg,#86efac,#2D9B6F)',display:'inline-block'}}/><span style={{color:'var(--muted)'}}>Encaissé</span></div>
              <div style={{display:'flex',alignItems:'center',gap:6}}><span style={{width:10,height:10,borderRadius:2,background:'linear-gradient(180deg,#fcd34d,#c47a00)',display:'inline-block',opacity:.7}}/><span style={{color:'var(--muted)'}}>En attente</span></div>
            </div>
          </div>

          {/* Grid Top débiteurs / Top payeurs */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:16}}>
            {/* Top débiteurs */}
            <div style={{background:'white',border:'1.5px solid #f5b8b8',borderLeft:'5px solid #b02020',borderRadius:6,padding:'14px 16px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <div style={{fontFamily:'var(--ff-serif)',fontSize:14,fontWeight:700,color:'#b02020'}}>⚠️ Top familles débitrices</div>
                <span style={{fontSize:10,color:'var(--muted)'}}>{topDebiteurs.length} fam.</span>
              </div>
              {topDebiteurs.length===0?<div style={{textAlign:'center',padding:'20px',color:'#1a7a4a',fontSize:13,fontWeight:600}}>✓ Aucun impayé en cours !</div>:
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {topDebiteurs.map(({fam,total,nb,nbRetard})=><div key={fam.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:nbRetard>0?'#fff5f5':'#fffbf0',borderRadius:4,border:`1px solid ${nbRetard>0?'#f5b8b8':'#f5d882'}`}}>
                  <div style={{width:30,height:30,borderRadius:'50%',background:nbRetard>0?'#fff0f0':'#fff8e0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0}}>{nbRetard>0?'⚠️':'⏳'}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:13,color:'#1a2340',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{fam.nom}</div>
                    <div style={{fontSize:10,color:'var(--muted)'}}>{nb} facture{nb>1?'s':''}{nbRetard>0&&<span style={{color:'#b02020',marginLeft:6}}>· {nbRetard} en retard</span>}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontWeight:700,fontSize:14,color:'#b02020',fontFamily:'var(--ff-serif)'}}>{total}€</div>
                  </div>
                  <button onClick={()=>{setTab('vue');setOpen(p=>({...p,[fam.id]:true}));}} title="Voir la famille" style={{background:'white',border:'1.5px solid #c0d0f0',color:'#1a4fc4',fontSize:10,padding:'3px 8px',borderRadius:3,cursor:'pointer',fontWeight:600}}>→</button>
                </div>)}
              </div>}
            </div>
            {/* Top payeurs */}
            <div style={{background:'white',border:'1.5px solid #b8dbb8',borderLeft:'5px solid #1a7a4a',borderRadius:6,padding:'14px 16px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <div style={{fontFamily:'var(--ff-serif)',fontSize:14,fontWeight:700,color:'#1a7a4a'}}>🌟 Top payeurs · {moisLabel}</div>
              </div>
              {topPayeurs.length===0?<div style={{textAlign:'center',padding:'20px',color:'var(--muted)',fontSize:12,fontStyle:'italic'}}>Aucun paiement enregistré sur cette période.</div>:
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {topPayeurs.map(({fam,total,nb},i)=><div key={fam.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:'#f8fff8',borderRadius:4,border:'1px solid #d0ecd0'}}>
                  <span style={{width:24,textAlign:'center',fontWeight:700,fontSize:14}}>{i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:13,color:'#1a2340',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{fam.nom}</div>
                    <div style={{fontSize:10,color:'var(--muted)'}}>{nb} paiement{nb>1?'s':''}</div>
                  </div>
                  <div style={{fontWeight:700,fontSize:14,color:'#1a7a4a',fontFamily:'var(--ff-serif)'}}>{total}€</div>
                </div>)}
              </div>}
            </div>
          </div>

          {/* Indicateurs supplémentaires */}
          <div style={{background:'white',border:'1.5px solid #e0e8f5',borderRadius:6,padding:'14px 16px'}}>
            <div style={{fontFamily:'var(--ff-serif)',fontSize:14,fontWeight:700,color:'#1a2340',marginBottom:12}}>📋 Indicateurs clés · {moisLabel}</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:14}}>
              {[
                {label:'Nb factures émises',val:facturesPeriode.length,sub:'sur la période',color:'#1a4fc4'},
                {label:'Panier moyen',val:facturesPeriode.length>0?Math.round(facturesPeriode.reduce((a,f)=>a+netOf(f),0)/facturesPeriode.length)+'€':'—',sub:'par facture',color:'#7c3aed'},
                {label:'Familles actives',val:new Set(facturesPeriode.map(f=>f.familleId)).size,sub:`sur ${familles.length} totales`,color:'#1a7a4a'},
                {label:'Taux recouvrement',val:kpiTauxRec+'%',sub:`${kpiEncaisse}€ / ${kpiTotal}€`,color:kpiTauxRec>=80?'#1a7a4a':kpiTauxRec>=60?'#c47a00':'#b02020'},
                {label:'Délai moyen',val:(()=>{const paid=facturesPeriode.filter(f=>f.statut==='paye'&&f.echeance&&f.datePaiement);if(!paid.length)return'—';const avg=paid.reduce((a,f)=>a+daysBetween(toDate(f.datePaiement),toDate(f.echeance)),0)/paid.length;return Math.round(avg)+'j';})(),sub:'paiement après échéance',color:'#1a4fc4'},
              ].map((k,i)=>(
                <div key={i} style={{padding:'10px 12px',background:'var(--cream)',borderRadius:4,borderLeft:`3px solid ${k.color}`}}>
                  <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5}}>{k.label}</div>
                  <div style={{fontSize:20,fontWeight:700,color:k.color,fontFamily:'var(--ff-serif)',marginTop:2}}>{k.val}</div>
                  <div style={{fontSize:10,color:'var(--muted)'}}>{k.sub}</div>
                </div>
              ))}
            </div>
          </div>
        </>;
      })()}

      {tab==='vue'&&<div style={{display:'flex',flexDirection:'column',gap:10}}>
        {familles.length===0&&<div className="emp"><div className="emp-icon">👨‍👩‍👧</div><h3>Aucun élève inscrit</h3></div>}
        {familles.filter(fam=>{
          if(!searchFacture)return true;
          const q=searchFacture.toLowerCase();
          const famEleves=users.filter(u=>fam.eleveIds.includes(u.id));
          return fam.nom.toLowerCase().includes(q)||famEleves.some(e=>e.name.toLowerCase().includes(q))||famFacts(fam.id).some(f=>f.libelle.toLowerCase().includes(q));
        }).map(fam=>{
          const facts=famFacts(fam.id).filter(f=>filterStatut==='tous'||f.statut===filterStatut);
          const allFacts=famFacts(fam.id);
          const tp=totalFam(fam.id);const pp=payeFam(fam.id);const pend=pendingFam(fam.id);const pct=tp>0?Math.round((pp/tp)*100):0;
          const famEleves=users.filter(u=>fam.eleveIds.includes(u.id));
          const hasRetard=allFacts.some(f=>f.statut==='retard');
          if(filterStatut!=='tous'&&facts.length===0)return null;
          return <div key={fam.id} style={{background:'white',border:'1.5px solid #e0e8f5',borderRadius:6,overflow:'hidden'}}>
            <div onClick={()=>toggle(fam.id)} style={{padding:'14px 18px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',background:open[fam.id]?'#f8faff':'white'}}>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <div style={{width:40,height:40,borderRadius:8,background:'linear-gradient(135deg,#1a3a8c,#2a5bd4)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>👨‍👩‍👧</div>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color:'#1a2340'}}>{fam.nom}</div>
                  <div style={{fontSize:12,color:'#6b82b5',marginTop:2}}>{famEleves.map(e=><span key={e.id} style={{marginRight:8}}>🎓 {e.name} <span style={{opacity:.6}}>({e.niveau})</span></span>)}</div>
                  {getFamMats(fam).length>0&&<div style={{marginTop:4,display:'flex',gap:4,flexWrap:'wrap'}}>{getFamMats(fam).map(m=><span key={m} style={{...getCoursBadge(m),fontSize:10}}>{m}</span>)}<span style={{fontSize:11,fontWeight:700,color:'#1a4fc4',marginLeft:4}}>{getFamTarif(fam)}€/mois</span></div>}
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                {famEleves.length>1&&<button className="btn btn-sm" title="Dissocier des élèves de cette famille" onClick={e=>{e.stopPropagation();setShowDissocier(fam.id);}} style={{background:'#fff8e0',border:'1.5px solid #f5d882',color:'#c47a00',fontSize:10,padding:'3px 8px',flexShrink:0}}>✂️ Dissocier</button>}
                {pend>0&&<span style={{padding:'4px 10px',borderRadius:20,fontSize:11,fontWeight:700,background:hasRetard?'#fff0f0':'#fff8e0',color:hasRetard?'#b02020':'#c47a00',border:`1.5px solid ${hasRetard?'#f5b8b8':'#f5d882'}`}}>⚠ {pend} impayée{pend>1?'s':''}</span>}
                {tp>0&&<div style={{textAlign:'right'}}><div style={{fontWeight:700,fontSize:14}}>{pp}€ <span style={{fontSize:11,fontWeight:400,color:'#8892b0'}}>/ {tp}€</span></div><div style={{height:4,width:80,background:'#e8ecf5',borderRadius:2,marginTop:4}}><div style={{height:'100%',width:`${pct}%`,background:pct===100?'#2D9B6F':pct>60?'#1a4fc4':'#D97706',borderRadius:2}}/></div></div>}
                <span style={{color:'#8892b0',fontSize:12}}>{open[fam.id]?'▲':'▼'}</span>
              </div>
            </div>
            {open[fam.id]&&<div style={{padding:'14px 18px',borderTop:'1px solid #e8ecf5'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
                <span style={{fontSize:11,color:'#8892b0'}}>{facts.length} facture{facts.length!==1?'s':''}</span>
                <button className="btn btn-p btn-sm" style={{fontSize:11}} onClick={()=>{setFactForm(p=>({...p,familleId:fam.id}));setShowFact(true);}}>＋ Facture</button>
              </div>
              {facts.length===0?<div style={{textAlign:'center',padding:'10px',color:'#8892b0',fontSize:12}}>Aucune facture{filterStatut!=='tous'?' pour ce filtre':''}</div>:facts.map(f=><FactRow key={f.id} f={f}/>)}
              {allFacts.length>0&&<div style={{display:'flex',justifyContent:'flex-end',gap:16,paddingTop:8,borderTop:'1px solid #e8ecf5',marginTop:6,fontSize:13}}>
                <span style={{color:'#2D9B6F',fontWeight:700}}>✓ {pp}€</span>
                {(tp-pp)>0&&<span style={{color:'#b02020',fontWeight:700}}>✗ {tp-pp}€</span>}
                <span style={{fontWeight:700,color:'#1a2340'}}>{tp}€</span>
              </div>}
            </div>}
          </div>;
        })}
      </div>}

      {tab==='liste'&&<div style={{borderRadius:6,overflow:'hidden',border:'1.5px solid #e0e8f5'}}>
        <div style={{display:'grid',gridTemplateColumns:'150px 100px 1fr 80px 100px 160px',gap:0,padding:'8px 14px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:.8,color:'#8892b0',borderBottom:'2px solid #e8ecf5',background:'#f8faff'}}>
          <span>Famille</span><span>Élève/Classe</span><span>Libellé</span><span>Montant</span><span>Statut</span><span>Actions</span>
        </div>
        {(()=>{const listFiltered=[...factures].filter(f=>{
          if(filterStatut!=='tous'&&f.statut!==filterStatut)return false;
          if(!searchFacture)return true;
          const q=searchFacture.toLowerCase();
          const fam=familles.find(x=>x.id===f.familleId);
          const elv=users.find(u=>u.id===f.eleveId);
          return f.libelle.toLowerCase().includes(q)||(fam?.nom||'').toLowerCase().includes(q)||(elv?.name||'').toLowerCase().includes(q);
        }).sort((a,b)=>{
          const fam_a=familles.find(x=>x.id===a.familleId);const fam_b=familles.find(x=>x.id===b.familleId);
          const elv_a=users.find(u=>u.id===a.eleveId);const elv_b=users.find(u=>u.id===b.eleveId);
          if(sortBy==='famille')return(fam_a?.nom||'').localeCompare(fam_b?.nom||'');
          if(sortBy==='niveau')return(elv_a?.niveau||'').localeCompare(elv_b?.niveau||'');
          if(sortBy==='matiere')return(a.libelle||'').localeCompare(b.libelle||'');
          if(sortBy==='statut'){const o={retard:0,attente:1,paye:2};return(o[a.statut]??1)-(o[b.statut]??1);}
          if(sortBy==='montant')return(b.montant-(b.reduction||0))-(a.montant-(a.reduction||0));
          if(sortBy==='echeance')return(a.echeance||'').localeCompare(b.echeance||'');
          const ord={retard:0,attente:1,paye:2};return(ord[a.statut]??1)-(ord[b.statut]??1);
        });
        return listFiltered.length===0
          ?<div style={{padding:'30px',textAlign:'center',color:'#8892b0'}}>Aucune facture{searchFacture?' pour cette recherche':''}</div>
          :listFiltered.map(f=>{
              const fam=familles.find(x=>x.id===f.familleId);const eleveF=users.find(u=>u.id===f.eleveId);
              return <div key={f.id} style={{display:'grid',gridTemplateColumns:'150px 100px 1fr 80px 100px 160px',gap:0,alignItems:'center',padding:'9px 14px',borderBottom:'1px solid #f0f4fc',background:'white',cursor:'default'}}
                onMouseEnter={e=>e.currentTarget.style.background='#f8faff'}
                onMouseLeave={e=>e.currentTarget.style.background='white'}>
                <span style={{fontWeight:600,fontSize:12,color:'#1a2340',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{fam?.nom||f.familleId}</span>
                <span style={{fontSize:11,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{eleveF?eleveF.name.split(' ').slice(-1)[0]+' · '+eleveF.niveau:'—'}{f.autoGenerated&&<span style={{marginLeft:4,fontSize:9,background:'#EEF5FF',color:'var(--gold)',borderRadius:2,padding:'0 3px'}}>auto</span>}</span>
                <span style={{fontSize:12,color:'#4a5568',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',paddingRight:8}}>{f.libelle}</span>
                <div style={{textAlign:'right'}}>
                  <div style={{fontWeight:700,fontSize:13,color:'#1a2340'}}>{f.reduction>0?f.montant-f.reduction:f.montant}€</div>
                  {f.reduction>0&&<div style={{fontSize:10,color:'#059669',textDecoration:'line-through'}}>{f.montant}€</div>}
                </div>
                <span>{f.statut==='paye'?<span style={{color:'#1a7a4a',fontWeight:700,fontSize:11}}>✓ Payé</span>:f.statut==='retard'?<span style={{color:'#b02020',fontWeight:700,fontSize:11}}>⚠ Retard</span>:<span style={{color:'#c47a00',fontSize:11}}>⏳ Attente</span>}</span>
                <div style={{display:'flex',gap:4}}>
                  {f.statut!=='paye'&&<button className="btn btn-sm" style={{background:'#e8f8ee',border:'1.5px solid #b8dbb8',color:'#2D9B6F',fontSize:10,padding:'3px 7px'}} onClick={()=>setStatut(f.id,'paye')}>✓</button>}
                  <button className="btn btn-sm" style={{background:'#f0f5ff',border:'1.5px solid #c0d0f0',color:'#1a4fc4',fontSize:11,padding:'3px 9px'}} onClick={()=>setEditingFact({facture:f,eleve:eleveF})}>📄 Facture</button>
                  <button className="btn btn-d btn-sm" onClick={()=>delFact(f.id)}>🗑️</button>
                </div>
              </div>;
            });})()} 
      </div>}
    </div>

    {/* Invoice Editor Modal */}
    {editingFact&&<InvoiceEditor facture={editingFact.facture} eleve={editingFact.eleve} cours={cours} users={users} onSave={saveEditedFact} onClose={()=>setEditingFact(null)}/>}

    {/* New Facture */}
    {showFact&&<Modal title="Nouvelle facture" onClose={()=>{setShowFact(false);setSearchEleve('');}}>
      <div className="fg">
        <label className="fl">Rechercher un élève *</label>
        <input className="fi" placeholder="Nom, niveau..." value={searchEleve} onChange={e=>setSearchEleve(e.target.value)} autoFocus style={{fontSize:13,marginBottom:6}}/>
        <div style={{border:'1.5px solid var(--cream2)',borderRadius:4,maxHeight:150,overflowY:'auto',background:'white'}}>
          {filteredEleves.length===0&&<div style={{padding:'10px 12px',color:'var(--muted)',fontSize:12,fontStyle:'italic'}}>Aucun élève trouvé</div>}
          {filteredEleves.map(e=>{
            const nc=getSessions(e.id).length;const mt=getMontant(e.id);const sel=factForm.eleveId===e.id;
            return <div key={e.id} onClick={()=>{
              const ln=e.name.trim().split(/\s+/).slice(-1)[0];
              const fid='fam_'+ln.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
              const ed=new Date();ed.setDate(1);ed.setMonth(ed.getMonth()+1);
              setFactForm({...factForm,eleveId:e.id,familleId:fid,libelle:getLabel(e.id),montant:String(mt),nbCreneaux:nc,echeance:ed.toISOString().split('T')[0]});
            }} style={{padding:'9px 12px',cursor:'pointer',borderBottom:'1px solid var(--cream2)',background:sel?'#EEF5FF':'white',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div><div style={{fontSize:13,fontWeight:sel?700:500}}>{sel?'✓ ':''}{e.name}</div><div style={{fontSize:11,color:'var(--muted)'}}>{e.niveau} · {nc} créneau{nc>1?'x':''}</div></div>
              <span style={{fontWeight:700,fontSize:13,color:'var(--gold)'}}>{mt}€/mois</span>
            </div>;
          })}
        </div>
      </div>
      {factForm.eleveId&&<div style={{background:'#EEF5FF',border:'1px solid #C8D8F5',borderRadius:4,padding:'10px 14px',marginBottom:4,fontSize:12}}>
        <div style={{fontWeight:600,marginBottom:5,color:'var(--navy)'}}>📅 Créneaux</div>
        {getSessions(factForm.eleveId).map(c=><div key={c.id} style={{display:'flex',alignItems:'center',gap:8,marginBottom:2}}><span style={{...getCoursBadge(c.matiere),fontSize:10,padding:'1px 6px'}}>{c.matiere}</span><span style={{color:'var(--muted)'}}>{c.jour} {hs(c.debut)}–{hs(c.fin)}</span></div>)}
      </div>}
      <div className="fg"><label className="fl">Libellé *</label><input className="fi" value={factForm.libelle} onChange={e=>setFactForm({...factForm,libelle:e.target.value})}/></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
        <div className="fg"><label className="fl">Montant (€) *</label><input className="fi" type="number" value={factForm.montant} onChange={e=>setFactForm({...factForm,montant:e.target.value})}/></div>
        <div className="fg"><label className="fl">Réduction (€)</label><input className="fi" type="number" min="0" value={factForm.reduction} onChange={e=>setFactForm({...factForm,reduction:parseFloat(e.target.value)||0})} placeholder="0"/></div>
        <div className="fg"><label className="fl">Échéance</label><input className="fi" type="date" value={factForm.echeance} onChange={e=>setFactForm({...factForm,echeance:e.target.value})}/></div>
      </div>
      <div className="fa"><button className="btn btn-o" onClick={()=>{setShowFact(false);setSearchEleve('');}}>Annuler</button><button className="btn btn-p" onClick={addFact} disabled={!factForm.libelle||!factForm.montant||!factForm.familleId}>Créer → Ouvrir éditeur</button></div>
    </Modal>}

    {/* ── Modale Dissocier ── */}
    {showDissocier&&(()=>{
      const fam=familles.find(f=>f.id===showDissocier);
      if(!fam)return null;
      const famEleves=users.filter(u=>fam.eleveIds.includes(u.id));
      return <Modal title="✂️ Dissocier des élèves" onClose={()=>setShowDissocier(null)}>
        <div style={{background:'#fff8e0',border:'1px solid #f5d882',borderRadius:4,padding:'9px 13px',marginBottom:14,fontSize:12,color:'#7a5800'}}>
          💡 Les élèves dissociés obtiendront leur propre dossier de facturation indépendant.
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5,marginBottom:8}}>Famille actuelle : {fam.nom}</div>
          {famEleves.map(e=>{
            const isOverridden=!!famOverrides[e.id];
            return <div key={e.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',background:'white',border:'1.5px solid var(--cream2)',borderRadius:4,marginBottom:6}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:13}}>{e.name}</div>
                <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{e.niveau}</div>
                {isOverridden&&<div style={{fontSize:10,color:'#059669',fontWeight:600,marginTop:2}}>✓ Dossier séparé</div>}
              </div>
              {isOverridden
                ?<button className="btn btn-sm" style={{background:'#EEFFF6',border:'1.5px solid #b8dbb8',color:'#1a7a4a',fontSize:11}} onClick={()=>setFamOverrides(p=>{const n={...p};delete n[e.id];return n;})}>↩ Réunifier</button>
                :<button className="btn btn-sm" style={{background:'#fff8e0',border:'1.5px solid #f5d882',color:'#c47a00',fontSize:11}} onClick={()=>{
                  const ln=e.name.trim().split(/\s+/).slice(-1)[0];
                  const customId='fam_'+ln.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')+'_'+e.id;
                  setFamOverrides(p=>({...p,[e.id]:customId}));
                }}>✂️ Dissocier</button>
              }
            </div>;
          })}
        </div>
        <div className="fa"><button className="btn btn-p" onClick={()=>setShowDissocier(null)}>Fermer</button></div>
      </Modal>;
    })()}
  </>;
}

// ─── FACTURATION ───

// ─── APP ───
// ─── MODULE SORTIES SCOLAIRES ───────────────────────────────────────────────
function Sorties({sorties,setSorties,users,cours}){
  const STATUTS={
    brouillon:{label:'Brouillon',color:'#6B7280',bg:'#F3F4F6',icon:'📝'},
    validation:{label:'En validation',color:'#D97706',bg:'#FEF3C7',icon:'⏳'},
    validee:{label:'Validée',color:'#059669',bg:'#D1FAE5',icon:'✅'},
    realisee:{label:'Réalisée',color:'#1D4ED8',bg:'#DBEAFE',icon:'🎉'},
    annulee:{label:'Annulée',color:'#9CA3AF',bg:'#F3F4F6',icon:'❌'},
  };
  const CHECKLIST_BASE=[
    {id:'transport',label:'Transport réservé'},
    {id:'autorisations',label:'Autorisations récupérées'},
    {id:'paiement',label:'Paiement effectué'},
    {id:'assurance',label:'Assurance vérifiée'},
    {id:'programme',label:'Programme finalisé'},
    {id:'repas',label:'Repas organisé'},
    {id:'urgence',label:'Contacts d\'urgence établis'},
  ];

  const [view,setView]=useState('liste'); // liste | fiche
  const [selId,setSelId]=useState(null);
  const [tab,setTab]=useState('general');
  const [showNew,setShowNew]=useState(false);
  const [newForm,setNewForm]=useState({nom:'',objectif:'',classes:[],nbEleves:0,date:'',heureDepart:'09:00',heureRetour:'17:00',lieu:'',adresse:'',statut:'brouillon'});

  const profs=users.filter(u=>u.role==='prof');
  const sel=sorties.find(s=>s.id===selId);

  const createSortie=()=>{
    if(!newForm.nom.trim())return;
    const s={
      id:'sor'+Date.now(),
      ...newForm,
      // Transport
      transportType:'bus',transportPrestataire:'',transportCoutEstime:0,transportCoutReel:0,
      transportDepart:'',transportArrivee:'',transportTemps:0,
      // Repas
      repasType:'pique-nique',repasAllergies:'',repasBudget:0,repasResponsable:'',
      // Encadrement
      accompagnateurs:[],
      // Budget prévisionnel
      budgetTransportParEleve:0,budgetEntreesParEleve:0,budgetNourritureParEleve:0,budgetDiversParEleve:0,
      budgetTransport:0,budgetEntrees:0,budgetNourriture:0,budgetDivers:0,
      budgetReel:0,
      financementEtablissement:0,financementFamilles:0,financementSubventions:0,
      // Autorisations par élève
      autorisations:{},
      // Checklist
      checklist:{},
      // Bilan
      bilanPedago:'',bilanIncidents:'',bilanEcartBudget:'',
      // Timeline
      dateCreation:new Date().toISOString().split('T')[0],
      dateValidation:'',dateTransportResa:'',datePaiement:'',
    };
    setSorties(p=>[s,...p]);
    setSelId(s.id);setView('fiche');setTab('general');setShowNew(false);
  };

  const updateSortie=(id,patch)=>setSorties(p=>p.map(s=>s.id===id?{...s,...patch}:s));
  const deleteSortie=id=>{if(window.confirm('Supprimer cette sortie ?')){setSorties(p=>p.filter(s=>s.id!==id));if(selId===id){setView('liste');setSelId(null);}}};
  const dupliquerSortie=s=>{
    const d={...s,id:'sor'+Date.now(),nom:s.nom+' (copie)',statut:'brouillon',dateCreation:new Date().toISOString().split('T')[0],dateValidation:'',checklist:{}};
    setSorties(p=>[d,...p]);setSelId(d.id);setView('fiche');
  };

  // ── LISTE ──
  if(view==='liste') return <>
    <TB title="🚌 Sorties scolaires">
      <button className="btn btn-p" onClick={()=>setShowNew(true)}>＋ Nouvelle sortie</button>
    </TB>
    <div className="pg">
      {/* Dashboard rapide */}
      <div className="sg" style={{marginBottom:20}}>
        {Object.entries(STATUTS).map(([k,v])=>{
          const n=sorties.filter(s=>s.statut===k).length;
          return n>0?<div key={k} className="sc" style={{borderBottom:`3px solid ${v.color}`}}>
            <div className="sc-ic">{v.icon}</div><div className="sc-v">{n}</div><div className="sc-l">{v.label}</div>
          </div>:null;
        })}
        <div className="sc c-gold">
          <div className="sc-ic">💰</div>
          <div className="sc-v">{sorties.reduce((a,s)=>a+(s.transportCoutEstime||0)+(s.budgetEntrees||0)+(s.repasBudget||0)+(s.budgetDivers||0),0)}€</div>
          <div className="sc-l">Budget total prévu</div>
        </div>
      </div>
      {sorties.length===0?<div className="emp"><div className="emp-icon">🚌</div><h3>Aucune sortie planifiée</h3><p>Créez votre première fiche de sortie scolaire.</p></div>:
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {sorties.map(s=>{
          const st=STATUTS[s.statut]||STATUTS.brouillon;
          const budgetTotal=(s.transportCoutEstime||0)+(s.budgetEntrees||0)+(s.repasBudget||0)+(s.budgetDivers||0);
