<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Plus de bonnes notes — Soutien Scolaire v4</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Caveat:wght@400;600&display=swap" rel="stylesheet"/>
<style>
/* ── LO-FI THEME ── */
:root{
  --navy:#1a1a1a;
  --navy2:#2a2a2a;
  --gold:#8b6200;
  --gold2:#c9a84c;
  --cream:#f5f0e8;
  --cream2:#e8e0d0;
  --text:#1a1a1a;
  --muted:#666;
  --white:#faf7f2;
  --ok:#3a6b3a;
  --err:#8b2222;
  --info:#1a3d6b;
  --sw:210px;
  --ff-mono:'Courier Prime',monospace;
  --ff-serif:'Special Elite',serif;
  --ff-hand:'Caveat',cursive;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--ff-mono);background:var(--cream);color:var(--text);min-height:100vh;
  background-image:repeating-linear-gradient(0deg,rgba(0,0,0,.025) 0,rgba(0,0,0,.025) 1px,transparent 1px,transparent 28px);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--cream2);}::-webkit-scrollbar-thumb{background:#aaa;border-radius:0;}

/* LOGIN */
.ls{display:flex;min-height:100vh;background:#111;}
.ls-left{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:52px 60px;position:relative;overflow:hidden;background:#111;}
.ls-left::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.52);pointer-events:none;z-index:1;}
.ls-classroom{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:85%;max-width:600px;pointer-events:none;z-index:0;opacity:.22;filter:none;}
.ls-inner{position:relative;z-index:2;padding-bottom:8px;}
.ls-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:2px;padding:4px 12px 4px 8px;margin-bottom:28px;}
.ls-badge-dot{width:6px;height:6px;border-radius:50%;background:#c9a84c;animation:pulse 2s ease infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ls-badge-txt{font-family:var(--ff-mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.6);}
.ls-tag{font-family:var(--ff-serif);font-size:52px;color:#f5f0e8;font-weight:400;line-height:1.05;letter-spacing:1px;margin-bottom:20px;}
.ls-tag strong{color:#c9a84c;}
.ls-tag em{color:#aaa;font-style:italic;}
.ls-desc{color:rgba(255,255,255,.4);font-family:var(--ff-mono);font-size:13px;line-height:1.8;max-width:360px;margin-bottom:44px;}
.ls-stats{display:flex;gap:0;border-top:1px solid rgba(255,255,255,.1);padding-top:28px;}
.ls-stat{flex:1;padding-right:24px;}
.ls-stat:not(:last-child){border-right:1px solid rgba(255,255,255,.1);margin-right:24px;}
.ls-stat-n{font-family:var(--ff-serif);font-size:32px;color:#f5f0e8;line-height:1;}
.ls-stat-l{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:4px;}
.ls-brand-top{position:absolute;top:48px;left:60px;z-index:3;display:flex;align-items:center;gap:10px;}
.ls-brand-top-name{font-family:var(--ff-mono);font-size:12px;color:rgba(255,255,255,.5);letter-spacing:.5px;}
.ls-right{width:420px;background:var(--cream);display:flex;flex-direction:column;justify-content:center;padding:52px 44px;position:relative;border-left:2px solid #333;}
.ls-right-head{margin-bottom:32px;}
.ls-right-head h2{font-family:var(--ff-serif);font-size:28px;color:var(--navy);line-height:1.2;margin-bottom:6px;}
.ls-right-head p{font-size:12px;color:var(--muted);}

/* Profile cards */
.rc-card{border:1.5px solid var(--cream2);border-radius:2px;padding:13px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px;background:var(--white);margin-bottom:8px;position:relative;}
.rc-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;}
.rc-card:hover{border-color:#aaa;background:#f0ebe0;}
.rc-card:hover::before{background:var(--gold2);}
.rc-card.on{border-color:#aaa;background:#f0ebe0;}
.rc-card.on::before{background:var(--gold2);}
.rc-card.on .rn{color:var(--navy);}
.rc-icon-wrap{width:38px;height:38px;border-radius:2px;background:var(--cream2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ri{font-size:18px;line-height:1;}
.rn{font-family:var(--ff-mono);font-weight:700;font-size:13px;color:var(--navy);}
.rd{font-size:11px;color:var(--muted);margin-top:2px;}
.rc-check{width:16px;height:16px;border-radius:0;border:1.5px solid #bbb;margin-left:auto;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.rc-card.on .rc-check{background:var(--navy);border-color:var(--navy);}
.rc-check-inner{width:5px;height:5px;background:var(--cream);opacity:0;}
.rc-card.on .rc-check-inner{opacity:1;}
.ls-btn{width:100%;padding:12px;background:var(--navy);color:var(--cream);border:none;border-radius:2px;font-size:13px;font-family:var(--ff-mono);letter-spacing:.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;transition:all .15s;}
.ls-btn:hover:not(:disabled){background:#333;}
.ls-btn:disabled{opacity:.3;cursor:not-allowed;}
.ls-btn-arrow{font-size:14px;}
.ls-right-footer{position:absolute;bottom:24px;left:44px;right:44px;display:flex;align-items:center;justify-content:center;}
.ls-right-footer-txt{font-size:10px;color:#bbb;letter-spacing:.5px;}

/* LAYOUT */
.app{display:flex;min-height:100vh;}
.sidebar{width:var(--sw);background:#1a1a1a;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;border-right:2px solid #333;}
.sb-brand{padding:18px 14px 14px;border-bottom:1px solid #333;}
.sb-logo{font-size:18px;margin-bottom:2px;}
.sb-title{font-family:var(--ff-serif);font-size:15px;color:#f5f0e8;letter-spacing:.5px;}
.sb-sub{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto;}
.sb-sec{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#444;padding:10px 8px 4px;}
.ni{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:0;cursor:pointer;color:#666;font-size:11px;font-family:var(--ff-mono);transition:all .1s;margin-bottom:1px;border-left:2px solid transparent;}
.ni:hover{background:rgba(255,255,255,.05);color:#ccc;border-left-color:#555;}
.ni.on{background:#2a2a2a;color:#f5f0e8;border-left:2px solid var(--gold2);font-weight:700;}
.ni-ic{font-size:13px;width:16px;text-align:center;}
.sb-user{padding:12px 14px;border-top:1px solid #333;display:flex;align-items:center;gap:8px;}
.sb-av{width:30px;height:30px;border-radius:2px;background:#333;border:1px solid #555;display:flex;align-items:center;justify-content:center;font-size:11px;font-family:var(--ff-mono);color:var(--gold2);flex-shrink:0;}
.sb-uname{font-size:12px;font-family:var(--ff-mono);color:#ccc;}
.sb-urole{font-size:9px;color:#555;letter-spacing:.5px;}
.sb-out{margin-left:auto;background:none;border:none;color:#444;cursor:pointer;font-size:15px;padding:3px;transition:color .15s;}
.sb-out:hover{color:var(--err);}
.main{margin-left:var(--sw);flex:1;min-height:100vh;}

/* TOPBAR */
.topbar{background:var(--cream);border-bottom:2px solid #2a2a2a;padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.tb-ttl{font-family:var(--ff-serif);font-size:17px;color:var(--navy);letter-spacing:.5px;}
.tb-act{display:flex;align-items:center;gap:8px;}

/* PAGE */
.pg{padding:20px 24px;}

/* BUTTONS */
.btn{padding:6px 13px;border-radius:2px;border:1.5px solid var(--navy);font-family:var(--ff-mono);font-size:11px;cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:5px;background:transparent;color:var(--navy);}
.btn-p{background:var(--navy);color:var(--cream);border-color:var(--navy);}
.btn-p:hover{background:#333;}
.btn-o{background:transparent;border-color:var(--cream2);color:var(--text);}
.btn-o:hover{border-color:var(--navy);}
.btn-d{background:transparent;color:var(--err);border:1.5px solid #d5a0a0;}
.btn-d:hover{background:var(--err);color:var(--cream);}
.btn-sm{padding:4px 9px;font-size:10px;}
.btn:disabled{opacity:.35;cursor:not-allowed;}

/* STAT CARDS */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:20px;}
.sc{background:var(--white);border-radius:0;padding:16px;position:relative;overflow:hidden;border:1.5px solid #ccc;border-bottom:3px solid var(--navy);}
.sc::before{display:none;}
.sc-ic{font-size:20px;margin-bottom:8px;opacity:.7;}
.sc-v{font-family:var(--ff-serif);font-size:26px;font-weight:400;line-height:1;margin-bottom:2px;}
.sc-l{font-size:10px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;}
.c-gold .sc-v{color:var(--gold);}
.c-navy .sc-v{color:var(--navy);}
.c-ok .sc-v{color:var(--ok);}
.c-info .sc-v{color:var(--info);}

/* RESOURCE CARDS */
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;}
.res-card{background:var(--white);border-radius:0;padding:15px;border:1.5px solid var(--cream2);transition:all .15s;}
.res-card:hover{border-color:#aaa;}
.rtag{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:0;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;border:1px solid;}
.t-f{background:#dde6f0;color:#1a3d6b;border-color:#1a3d6b;}
.t-e{background:#f5ede0;color:#6b3a1a;border-color:#6b3a1a;}
.t-t{background:#ddf0e4;color:#1a5c3a;border-color:#1a5c3a;}
.t-c{background:#ede0f5;color:#4a1a6b;border-color:#4a1a6b;}
.rc-ttl{font-family:var(--ff-mono);font-weight:700;font-size:13px;margin-bottom:5px;line-height:1.4;}
.rc-meta{font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;}
.rc-foot{margin-top:10px;padding-top:8px;border-top:1px solid var(--cream2);display:flex;justify-content:space-between;align-items:center;}

/* FILTERS */
.fb{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.chip{padding:4px 10px;border-radius:0;border:1.5px solid var(--cream2);background:var(--white);font-size:11px;cursor:pointer;transition:all .1s;font-family:var(--ff-mono);color:var(--muted);}
.chip:hover,.chip.on{border-color:var(--navy);background:var(--navy);color:var(--cream);}

/* TABLES */
.tbl{width:100%;border-collapse:collapse;background:var(--white);border-radius:0;overflow:hidden;border:1.5px solid #bbb;}
.tbl th{background:var(--navy);color:rgba(245,240,232,.85);text-align:left;padding:9px 13px;font-size:10px;font-family:var(--ff-mono);text-transform:uppercase;letter-spacing:.8px;font-weight:400;}
.tbl td{padding:9px 13px;border-bottom:1px solid var(--cream2);font-size:12px;font-family:var(--ff-mono);}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:#f0ebe0;}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.mo-box{background:var(--cream);border-radius:0;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;border:2px solid var(--navy);}
.mo-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;border-bottom:1px solid var(--cream2);padding-bottom:12px;}
.mo-ttl{font-family:var(--ff-serif);font-size:17px;letter-spacing:.5px;}
.mo-x{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);line-height:1;font-family:var(--ff-mono);}

/* FORMS */
.fg{margin-bottom:12px;}
.fl{display:block;font-size:10px;font-weight:700;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-family:var(--ff-mono);}
.fi{width:100%;padding:7px 10px;border:1.5px solid var(--cream2);border-radius:0;font-family:var(--ff-mono);font-size:12px;background:var(--white);color:var(--text);}
.fi:focus{outline:none;border-color:var(--navy);}
textarea.fi{resize:vertical;min-height:68px;}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}

/* TROPHIES */
.trg{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:10px;}
.tr-card{background:var(--white);border-radius:0;padding:14px 12px;text-align:center;border:1.5px solid var(--cream2);transition:all .15s;}
.tr-card.earned{border-color:var(--gold2);background:#f5f0e0;}
.tr-card.locked{opacity:.3;filter:grayscale(1);}
.tr-icon{font-size:28px;margin-bottom:6px;}
.tr-name{font-size:11px;font-family:var(--ff-mono);font-weight:700;margin-bottom:3px;}
.tr-desc{font-size:10px;color:var(--muted);line-height:1.4;}
.tr-badge{margin-top:5px;font-size:9px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}

/* MODULE CARDS */
.mc{background:var(--white);border-radius:0;overflow:hidden;border:1.5px solid var(--cream2);transition:all .15s;}
.mc:hover{border-color:#aaa;}
.mc-hd{height:80px;display:flex;align-items:center;justify-content:center;font-size:38px;position:relative;background:var(--cream2);}
.mc-bd{padding:12px;}
.mc-ttl{font-family:var(--ff-mono);font-weight:700;font-size:13px;margin-bottom:4px;}
.mc-inf{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:10px;}

/* WELCOME BANNER */
.wb{background:var(--navy);border-radius:0;padding:22px 26px;color:var(--cream);margin-bottom:20px;position:relative;overflow:hidden;border-left:4px solid var(--gold2);}
.wb::before{content:'//';position:absolute;right:30px;top:16px;font-size:60px;color:rgba(201,168,76,.12);font-family:var(--ff-mono);}
.wb h2{font-family:var(--ff-serif);font-size:20px;margin-bottom:4px;letter-spacing:.5px;}
.wb p{color:rgba(245,240,232,.45);font-size:12px;}
.gold{color:var(--gold2);}

/* NOTE CARDS */
.nc{background:var(--white);border-radius:0;padding:14px;border:1.5px solid var(--cream2);text-align:center;}
.nc-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:8px;font-family:var(--ff-mono);}
.nc-v{font-family:var(--ff-serif);font-size:30px;font-weight:400;line-height:1;margin-bottom:2px;}
.nc-max{font-size:11px;color:var(--muted);}
.nc-note{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4;font-style:italic;}

/* TABS */
.tabs{display:flex;gap:0;background:transparent;padding:0;border-bottom:2px solid var(--navy);margin-bottom:18px;}
.tab{flex:1;padding:7px 12px;text-align:center;border-radius:0;cursor:pointer;font-size:11px;transition:all .1s;color:var(--muted);border:none;background:transparent;font-family:var(--ff-mono);border-bottom:2px solid transparent;margin-bottom:-2px;letter-spacing:.3px;}
.tab.on{background:var(--cream);color:var(--navy);font-weight:700;border-bottom:2px solid var(--cream);border-top:1.5px solid var(--navy);border-left:1.5px solid var(--navy);border-right:1.5px solid var(--navy);}

/* EMPTY */
.emp{text-align:center;padding:48px 20px;color:var(--muted);}
.emp-icon{font-size:36px;margin-bottom:12px;opacity:.3;}
.emp h3{font-family:var(--ff-serif);font-size:16px;color:var(--text);margin-bottom:6px;}
.emp p{font-size:12px;max-width:260px;margin:0 auto 14px;font-family:var(--ff-mono);}

/* PROGRESS */
.pb{height:4px;background:var(--cream2);border-radius:0;overflow:hidden;}
.pbf{height:100%;border-radius:0;background:var(--ok);transition:width .5s;}

/* SEARCH */
.sw{position:relative;}
.sw::before{content:'>>';position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:10px;z-index:1;color:var(--muted);font-family:var(--ff-mono);}
.si{padding:7px 10px 7px 28px;border:1.5px solid var(--cream2);border-radius:0;font-family:var(--ff-mono);font-size:12px;background:var(--white);}
.si:focus{outline:none;border-color:var(--navy);}

/* SECTION HEADER */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.st{font-family:var(--ff-serif);font-size:16px;letter-spacing:.5px;}

/* ELEVE PANEL */
.epanel{background:var(--white);border-radius:0;border:1.5px solid var(--cream2);overflow:hidden;}
.eitem{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--cream2);display:flex;align-items:center;justify-content:space-between;transition:background .1s;}
.eitem:last-child{border-bottom:none;}
.eitem:hover{background:#f0ebe0;}
.eitem.on{background:var(--navy);}
.eitem.on .ei-n{color:var(--cream);}
.eitem.on .ei-l{color:rgba(245,240,232,.4);}
.ei-n{font-size:12px;font-family:var(--ff-mono);font-weight:700;}
.ei-l{font-size:10px;color:var(--muted);}

/* TIMETABLE */
.tt-wrap{background:var(--white);border-radius:0;border:1.5px solid #bbb;overflow:hidden;margin-bottom:20px;}
.tt-head{display:flex;border-bottom:2px solid var(--navy);}
.tt-time-col{width:48px;flex-shrink:0;border-right:1px solid var(--cream2);}
.tt-day-hd{flex:1;text-align:center;padding:8px 5px;border-right:1px solid var(--cream2);font-size:10px;font-family:var(--ff-mono);font-weight:700;color:var(--navy);background:var(--cream);letter-spacing:1px;}
.tt-body{display:flex;overflow-x:auto;}
.tt-times{width:48px;flex-shrink:0;border-right:1px solid var(--cream2);}
.tt-hour-lbl{display:flex;align-items:flex-start;justify-content:flex-end;padding:2px 5px 0 0;font-size:9px;color:var(--muted);border-bottom:1px solid var(--cream2);font-family:var(--ff-mono);}
.tt-days{display:flex;flex:1;}
.tt-day-col{flex:1;min-width:86px;position:relative;border-right:1px solid var(--cream2);}
.tt-day-col:last-child{border-right:none;}
.tt-cell{border-bottom:1px solid rgba(0,0,0,.05);}
.tt-event{position:absolute;left:2px;right:2px;border-radius:0;padding:3px 5px;overflow:hidden;cursor:default;z-index:1;border-left:3px solid;}
.tt-ev-ttl{font-size:10px;font-weight:700;line-height:1.3;font-family:var(--ff-mono);}
.tt-ev-sub{font-size:9px;opacity:.8;}
.tt-ev-time{font-size:8px;opacity:.6;margin-top:1px;}

/* APPEL */
.appel-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--cream2);justify-content:space-between;font-family:var(--ff-mono);}
.appel-row:last-child{border-bottom:none;}
.appel-stat-btn{padding:4px 9px;border-radius:0;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--ff-mono);transition:all .1s;border:1.5px solid transparent;}
.appel-footer{padding:8px 14px;background:var(--cream2);display:flex;gap:12px;font-size:11px;font-family:var(--ff-mono);}

/* MBADGE */
.mbadge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:0;font-size:9px;font-weight:700;font-family:var(--ff-mono);border:1px solid;}
.mb-ok{background:#e8f3e8;color:var(--ok);border-color:var(--ok);}
.mb-full{background:#f3e8e8;color:var(--err);border-color:var(--err);}
.mb-enr{background:#dde6f0;color:var(--info);border-color:var(--info);}

/* FACTURATION */
.fam-card{background:var(--white);border-radius:0;border:1.5px solid var(--cream2);overflow:hidden;transition:all .15s;}
.fam-card:hover{border-color:#aaa;}
.fam-hd{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--cream2);cursor:pointer;}
.fam-hd:hover{background:#f0ebe0;}

async function sbLoad(table, fallback = []) {
  try {
    const { data, error } = await sb.from(table).select('*');
    if (error) { console.warn('[sb] load', table, error.message); return fallback; }
    return (data && data.length > 0) ? data : fallback;
  } catch(e) { console.warn('[sb] load', table, e); return fallback; }
}
// Helper : upsert un tableau de lignes
async function sbSave(table, rows) {
  if (!rows || rows.length === 0) return;
  try { await sb.from(table).upsert(rows, { onConflict: 'id' }); }
  catch(e) { console.warn('[sb] save', table, e); }
}
// Helper : upsert objet JSON (table kv_store avec colonnes key TEXT, value JSONB, user_id UUID)

// ─── MODAL ───
function Modal({title,onClose,children}){
  return <div className="mo" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="mo-box">
      <div className="mo-hd"><h2 className="mo-ttl">{title}</h2><button className="mo-x" onClick={onClose}>✕</button></div>
      {children}
    </div>
  </div>;
}

// ─── LOGIN ───
function Login({onLogin}){
  const [email,setEmail]=useState('');
  const [password,setPassword]=useState('');
  const [error,setError]=useState('');
  const [loading,setLoading]=useState(false);
  const [showPwd,setShowPwd]=useState(false);

  const handleLogin=async(e)=>{
    if(e&&e.preventDefault)e.preventDefault();
    setError('');
    setLoading(true);
    try {
      // 1. Authentification Supabase
      const {data:authData, error:authErr} = await sb.auth.signInWithPassword({
        email: email.toLowerCase().trim(),
        password
      });
      if(authErr){
        setError(authErr.message==='Invalid login credentials'
          ? 'Email ou mot de passe incorrect.'
          : authErr.message);
        setLoading(false);
        return;
      }
      // 2. Récupérer le profil dans la table users
      const {data:profile, error:profErr} = await sb
        .from('users')
        .select('*')
        .eq('auth_id', authData.user.id)
        .single();
      if(profErr || !profile){
        setError('Profil introuvable. Contactez l\'administration.');
        await sb.auth.signOut();
        setLoading(false);
        return;
      }
      setLoading(false);
      onLogin(profile);
    } catch(err) {
      setError('Erreur de connexion. Vérifiez votre connexion internet.');
      setLoading(false);
    }
  };

          <input
            className="fi"
            type={showPwd?'text':'password'}
            placeholder="••••••••"
            value={password}
            onChange={e=>setPassword(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handleLogin(e)}
            style={{fontSize:13,padding:'10px 38px 10px 12px',paddingRight:38}}
          />
          <button onClick={()=>setShowPwd(p=>!p)}
            style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:14,color:'#999',padding:2}}>
            {showPwd?'🙈':'👁'}
          </button>
        </div>
      </div>

      {error&&<div style={{background:'#FFF0F0',border:'1px solid #f5b8b8',borderRadius:2,padding:'8px 12px',fontSize:12,color:'#c0392b',marginBottom:10}}>
        ⚠️ {error}
      </div>}

      <button className="ls-btn" disabled={loading||!email||!password} onClick={handleLogin} style={{marginTop:18}}>
        {loading
          ? <><span style={{fontSize:12,letterSpacing:1}}>Connexion…</span></>
          : <><span>Accéder à mon espace</span><span className="ls-btn-arrow">→</span></>
        }
      </button>

      <div style={{margin:'22px 0 10px',borderTop:'1px solid #e0dcd4'}}/>
      <div style={{fontSize:10,color:'#bbb',textAlign:'center',letterSpacing:.5,lineHeight:1.7}}>
        Mot de passe oublié ? Contactez l'administration.<br/>
        <span style={{color:'#ccc'}}>admin@educenter.fr</span>
      </div>

      <div className="ls-right-footer">
        <span className="ls-right-footer-txt">© 2025 Plus de bonnes notes · La Courneuve</span>
      </div>
    </div>
  </div>;
}

// ─── TIMETABLE COMPONENT ───

function EmploiDuTemps({user,users,cours,setCours,modules,enrollments,dispos=[]}){
  // Filter cours by role
  const myCours = user.role==='eleve'
    ? cours.filter(c=>c.eleveIds.includes(user.id))
    : user.role==='admin'
    ? cours
    : cours.filter(c=>c.profId===user.id);

  const enr=enrollments[user.id]||[];
  const myMods=user.role==='eleve'
    ? modules.filter(m=>enr.includes(m.id))
    : user.role==='admin'
    ? modules
    : modules.filter(m=>m.profId===user.id);

  const byDay=DAYS.reduce((acc,d)=>{acc[d]=myCours.filter(c=>c.jour===d);return acc;},{});

  const Legend=()=><div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:14,alignItems:'center'}}>
    {Object.entries(MC).map(([m,c])=>(
      <div key={m} style={{display:'flex',alignItems:'center',gap:5,fontSize:12}}>
        <div style={{width:11,height:11,borderRadius:3,background:c.bg,border:`2px solid ${c.bd}`}}/>
        <span style={{color:'var(--muted)'}}>{m}</span>
      </div>
    ))}
    <div style={{marginLeft:8,paddingLeft:8,borderLeft:'1px solid var(--cream2)',display:'flex',gap:8}}>
      <div style={{display:'flex',alignItems:'center',gap:4,fontSize:12}}><div style={{width:11,height:11,borderRadius:3,background:'#EEFFF6',border:'1.5px dashed #10B981'}}/><span style={{color:'var(--muted)'}}>Dispo libre</span></div>
      <div style={{display:'flex',alignItems:'center',gap:4,fontSize:12}}><div style={{width:11,height:11,borderRadius:3,background:'#FFF8EE',border:'1.5px dashed #D97706'}}/><span style={{color:'var(--muted)'}}>Réservé</span></div>
      <div style={{display:'flex',alignItems:'center',gap:4,fontSize:12}}><div style={{width:11,height:11,borderRadius:3,background:'#EEF5FF',border:'1.5px dashed #1A6FD4'}}/><span style={{color:'var(--muted)'}}>Confirmé</span></div>
    </div>
  </div>;

  const hasData=myCours.length>0||myMods.length>0;

  // ── Week navigation for dispos ──
  const [weekOffset,setWeekOffset]=useState(0);
  const getWeekStart=(offset=0)=>{
    const d=new Date();
    d.setHours(0,0,0,0);
    d.setDate(d.getDate()-d.getDay()+1+offset*7); // Monday
    return d;
  };
  const weekStart=getWeekStart(weekOffset);
  const weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+6);
  const weekLabel=`${weekStart.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})} – ${weekEnd.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})}`;

  // Map DAYS to actual dates in the displayed week
  const dayToDate=(day)=>{
    const idx=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'].indexOf(day);
    const d=new Date(weekStart);
    d.setDate(weekStart.getDate()+idx);
    return d.toISOString().split('T')[0];
  };

  // Dispos visible to this user, filtered to displayed week
  const visibleDispos=dispos.filter(d=>{
    if(d.date<weekStart.toISOString().split('T')[0]||d.date>weekEnd.toISOString().split('T')[0])return false;
    if(user.role==='prof')return d.profId===user.id; // prof sees only own
    if(user.role==='eleve')return d.statut==='libre'||d.eleveId===user.id; // eleve sees libre + their reservations
    return true; // admin sees all
  });
  // Group dispos by day
  const disposByDay=DAYS.reduce((acc,d)=>{
    const date=dayToDate(d);
    acc[d]=visibleDispos.filter(x=>x.date===date);
    return acc;
  },{});
  const hasDispos=visibleDispos.length>0;

  const [edtTab,setEdtTab]=useState('vue');
  return <>
    <TB title="Emploi du Temps"/>
    <div className="pg">
    {user.role==='admin'&&<div className="tabs" style={{marginBottom:18,maxWidth:300}}>
      <button className={`tab ${edtTab==='vue'?'on':''}`} onClick={()=>setEdtTab('vue')}>📅 Visualiser</button>
      <button className={`tab ${edtTab==='edit'?'on':''}`} onClick={()=>setEdtTab('edit')}>⚙️ Modifier</button>
    </div>}
    {(edtTab==='vue'||user.role!=='admin')&&<div>
      {/* Week navigation */}
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <button className="btn btn-sm" style={{background:'#f0f4ff',border:'1.5px solid #c8d8f5',color:'var(--info)',padding:'5px 10px'}} onClick={()=>setWeekOffset(w=>w-1)}>◀</button>
        <div style={{fontWeight:600,fontSize:13,flex:1,textAlign:'center',color:'var(--navy)'}}>{weekLabel}</div>
        <button className="btn btn-sm" style={{background:'#f0f4ff',border:'1.5px solid #c8d8f5',color:'var(--info)',padding:'5px 10px'}} onClick={()=>setWeekOffset(w=>w+1)}>▶</button>
        {weekOffset!==0&&<button className="btn btn-sm" style={{background:'var(--cream2)',border:'none',fontSize:11,color:'var(--muted)',padding:'5px 10px'}} onClick={()=>setWeekOffset(0)}>Aujourd'hui</button>}
      </div>
      {!hasData&&!hasDispos ? (
        <div className="emp"><div className="emp-icon">📅</div><h3>Aucun cours planifié</h3><p>Votre emploi du temps apparaîtra ici.</p></div>
      ) : <>
        <Legend/>
        {/* Weekly grid */}
        <div className="tt-wrap">
          {/* Day headers */}
          <div className="tt-head">
            <div className="tt-time-col" style={{height:44}}/>
            {DAYS.map(d=>{
              const count=byDay[d].length;
              const dateStr=dayToDate(d);
              const isToday=dateStr===new Date().toISOString().split('T')[0];
              const dispoCount=disposByDay[d]?.length||0;
              return <div key={d} className="tt-day-hd" style={{position:'relative',height:44,flexDirection:'column',gap:1,justifyContent:'center'}}>
                <div style={{fontWeight:700,fontSize:11,letterSpacing:.5,color:isToday?'var(--gold)':'var(--navy)'}}>{d.slice(0,3).toUpperCase()}</div>
                <div style={{fontSize:10,color:isToday?'var(--gold)':'var(--muted)'}}>{new Date(dateStr+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</div>
                {(count>0||dispoCount>0)&&<div style={{position:'absolute',top:6,right:6,display:'flex',gap:2}}>
                  {count>0&&<span style={{width:15,height:15,borderRadius:2,background:'var(--navy)',color:'white',fontSize:8,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{count}</span>}
                  {dispoCount>0&&<span style={{width:15,height:15,borderRadius:2,background:'#10B981',color:'white',fontSize:8,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{dispoCount}</span>}
                </div>}
                {isToday&&<div style={{position:'absolute',bottom:0,left:0,right:0,height:2,background:'var(--gold)',borderRadius:2}}/>}
              </div>;
            })}
          </div>
          {/* Body */}
          <div className="tt-body">
            {/* Time labels */}
            <div className="tt-times">
              {HOURS.map(h=><div key={h} className="tt-hour-lbl" style={{height:CH}}>{h}h</div>)}
            </div>
            {/* Day columns */}
            <div className="tt-days">
              {DAYS.map(d=>(
                <div key={d} className="tt-day-col">
                  {HOURS.map(h=><div key={h} className="tt-cell" style={{height:CH}}/>)}
                  {byDay[d].map(c=>{
                    const clr=mc(c.matiere);
                    const top=(c.debut-H_START)*CH+1;
                    const height=(c.fin-c.debut)*CH-2;
                    const eleveNames=users.filter(u=>c.eleveIds.includes(u.id)).map(u=>u.name.split(' ').slice(-1)[0]);
                    const profName=users.find(u=>u.id===c.profId)?.name.split(' ').slice(-1)[0];
                    return <div key={c.id} className="tt-event" style={{top,height,background:clr.bg,border:`1.5px solid ${clr.bd}`}}>
                      <div className="tt-ev-ttl" style={{color:clr.tx}}>{c.matiere}</div>
                      <div className="tt-ev-sub" style={{color:'var(--text)'}}>{c.niveau}</div>
                      <div className="tt-ev-time" style={{color:'var(--muted)'}}>{hs(c.debut)}–{hs(c.fin)}</div>
                      {height>55&&<div className="tt-ev-time" style={{color:'var(--muted)'}}>{c.salle}{(user.role==='prof'||user.role==='admin')?` · ${c.eleveIds.length} élève${c.eleveIds.length>1?'s':''}`:''}</div>}
                      {user.role==='admin'&&height>75&&<div className="tt-ev-time" style={{color:clr.tx,fontWeight:700,marginTop:1}}>{profName}</div>}
                      {user.role==='prof'&&height>90&&<div className="tt-ev-time" style={{color:'var(--muted)',marginTop:2}}>
                        {eleveNames.join(', ')}
                      </div>}
                    </div>;
                  })}
                  {/* Dispo slots */}
                  {(disposByDay[d]||[]).map(dispo=>{
                    const prof=users.find(u=>u.id===dispo.profId);
                    const top=(dispo.debut-H_START)*CH+1;
                    const height=(dispo.fin-dispo.debut)*CH-2;
                    const isOwn=user.role==='prof'&&dispo.profId===user.id;
                    const isReservedByMe=dispo.eleveId===user.id;
                    const statColor=dispo.statut==='confirme'?'var(--gold)':dispo.statut==='reserve'?'#D97706':'#10B981';
                    const statBg=dispo.statut==='confirme'?'#EEF5FF':dispo.statut==='reserve'?'#FFF8EE':'#EEFFF6';
                    return <div key={dispo.id} style={{
                      position:'absolute',top,height,
                      left:'2px',right:'2px',
                      background:statBg,
                      border:`1.5px dashed ${statColor}`,
                      borderRadius:2,
                      padding:'4px 7px',
                      overflow:'hidden',
                      zIndex:2,
                      cursor:'default'
                    }}>
                      <div style={{fontSize:10,fontWeight:700,color:statColor,lineHeight:1.2,display:'flex',alignItems:'center',gap:3}}>
                        <span>{dispo.mode==='visio'?'💻':dispo.mode==='both'?'🏫💻':'🏫'}</span>
                        <span>Cours particulier</span>
                      </div>
                      {height>28&&<div style={{fontSize:9,color:'var(--muted)',marginTop:1}}>{dispo.matiere}</div>}
                      {height>42&&prof&&!isOwn&&<div style={{fontSize:9,color:'var(--muted)'}}>{prof.name.split(' ').slice(-1)[0]}</div>}
                      {height>42&&<div style={{fontSize:9,color:'var(--muted)'}}>{hs(dispo.debut)}–{hs(dispo.fin)}</div>}
                      {height>56&&<div style={{fontSize:9,color:statColor,fontWeight:600}}>
                        {dispo.statut==='libre'?'Disponible':dispo.statut==='reserve'?isReservedByMe?'✓ Réservé':'En attente':'✓ Confirmé'}
                      </div>}
                    </div>;
                  })}
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Summary below grid */}
        {(user.role==='prof'||user.role==='admin')&&<>
          <div className="sh" style={{marginBottom:10}}><h2 className="st">{user.role==='admin'?'Tous les cours planifiés':'Récap. de mes cours'}</h2></div>
          <table className="tbl" style={{marginBottom:24}}>
            <thead><tr><th>Cours</th><th>Classe</th>{user.role==='admin'&&<th>Professeur</th>}<th>Créneau</th><th>Salle</th><th>Effectif</th></tr></thead>
            <tbody>{myCours.sort((a,b)=>DAYS.indexOf(a.jour)-DAYS.indexOf(b.jour)||a.debut-b.debut).map(c=>{
              const p=users.find(u=>u.id===c.profId);
              return <tr key={c.id}>
                <td><span style={{...getCoursBadge(c.matiere)}}>{c.matiere}</span></td>
                <td style={{fontWeight:600}}>{c.niveau}</td>
                {user.role==='admin'&&<td style={{fontSize:12}}>{p?.name}</td>}
                <td>{c.jour} · {hs(c.debut)}–{hs(c.fin)}</td>
                <td style={{color:'var(--muted)'}}>{c.salle}</td>
                <td>{c.eleveIds.length} élève{c.eleveIds.length>1?'s':''}</td>
              </tr>;
            })}</tbody>
          </table>
        </>}

        {/* Modules */}
        {myMods.length>0&&<>
          <div className="sh"><h2 className="st">{user.role==='eleve'?'Modules inscrits':'Modules programmés'}</h2></div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:12}}>
            {myMods.map(m=>(
              <div key={m.id} className="res-card" style={{borderLeft:`3px solid ${mc(m.matiere).bd}`}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:7}}>
                  <span style={{fontSize:26}}>{m.emoji}</span>
                  <div><div style={{fontWeight:600,fontSize:14}}>{m.title}</div><div style={{fontSize:11,color:'var(--muted)'}}>{m.matiere} · {m.niveau}</div></div>
                </div>
                <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.6}}>
                  <div>📅 {m.date} · {m.heure}</div>
                  <div>📍 {m.lieu}</div>
                </div>
                <div style={{marginTop:8}}><span className="mbadge mb-enr">{user.role==='eleve'?'✓ Inscrit':'📋 Mon module'}</span></div>
              </div>
            ))}
          </div>
        </>}
      </>}
    </div>}
    {user.role==='admin'&&edtTab==='edit'&&<PlanningEditor users={users} cours={cours} setCours={setCours}/>}
    </div>
  </>;
}
function getCoursBadge(matiere){const c=mc(matiere);return{background:c.bg,color:c.tx,padding:'2px 8px',borderRadius:2,fontSize:11,fontWeight:700};}

// ─── DASHBOARD ───
function Dashboard({user,users,resources,modules,grades,enrollments,cours}){
  const eg=grades[user.id]||[];
  const ee=enrollments[user.id]||[];
  const m=moy(eg);
  const eleves=users.filter(u=>u.role==='eleve');
  const profs=users.filter(u=>u.role==='prof');

  const myMod=modules.filter(m=>m.profId===user.id);
  const myCours=cours.filter(c=>c.profId===user.id);

  if(user.role==='eleve'){
    const enrMods=modules.filter(mod=>ee.includes(mod.id));
    const myCoursList=cours.filter(c=>c.eleveIds.includes(user.id));

    const earnedIds=new Set(TROPHIES.filter(t=>t.cond(tData)).map(t=>t.id));
    const nbTrophies=earnedIds.size;

    // ── Radar chart data ──
    const radarAxes=[
      {label:'Notes',value:m?Math.round((parseFloat(m)/20)*100):0},
      {label:'Assiduité',value:Math.min(100,Math.round((myCoursList.length/Math.max(cours.length,1))*100))},
      {label:'Modules',value:Math.min(100,enrMods.length*25)},
      {label:'Trophées',value:Math.round((nbTrophies/TROPHIES.length)*100)},
      {label:'Comportement',value:100},
      {label:'Ancienneté',value:40},
    ];
    const cx=160,cy=160,R=120;
    const n=radarAxes.length;
    const pts=radarAxes.map((ax,i)=>{
      const angle=(i/n)*2*Math.PI-Math.PI/2;
      const r=(ax.value/100)*R;
      return {x:cx+r*Math.cos(angle),y:cy+r*Math.sin(angle),lx:cx+(R+28)*Math.cos(angle),ly:cy+(R+28)*Math.sin(angle)};
    });
    const gridPts=(pct)=>radarAxes.map((_,i)=>{
      const angle=(i/n)*2*Math.PI-Math.PI/2;
      return `${cx+pct*R*Math.cos(angle)},${cy+pct*R*Math.sin(angle)}`;
    }).join(' ');
    const dataPath=pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ')+'Z';

    // Trophy categories for the board

      {key:'debut',icon:'🎒',label:'Démarrage'},
      {key:'assiduite',icon:'📅',label:'Assiduité'},
      {key:'module',icon:'🎯',label:'Modules'},
      {key:'notes',icon:'📊',label:'Notes'},
      {key:'matiere',icon:'📚',label:'Matières'},
      {key:'progression',icon:'📈',label:'Progression'},
      {key:'comportement',icon:'😇',label:'Comportement'},
      {key:'anciennete',icon:'🌱',label:'Ancienneté'},
      {key:'bonus',icon:'💡',label:'Bonus'},
    ];

    return <div className="fa-in">
      <div style={{padding:'22px 26px 0'}}>
        <div className="wb">
          <h2>Bonjour, <span className="gold">{user.name.split(' ')[0]}</span> 👋</h2>
          <p>{user.niveau} · {myCoursList.length} cours hebdo · {enrMods.length} module{enrMods.length!==1?'s':''}</p>
        </div>
        <div className="sg">
          <div className="sc c-gold"><div className="sc-ic">📊</div><div className="sc-v">{m||'—'}</div><div className="sc-l">Moyenne /20</div></div>
          <div className="sc c-info"><div className="sc-ic">📅</div><div className="sc-v">{myCoursList.length}</div><div className="sc-l">Cours/semaine</div></div>
          <div className="sc c-ok"><div className="sc-ic">🗓️</div><div className="sc-v">{enrMods.length}</div><div className="sc-l">Modules inscrits</div></div>
          <div className="sc c-navy"><div className="sc-ic">🏆</div><div className="sc-v">{nbTrophies}</div><div className="sc-l">Trophées</div></div>
        </div>
      </div>
      <div className="pg" style={{paddingTop:0}}>
        {/* ── RADAR + NOTES ── */}
        <div style={{display:'grid',gridTemplateColumns:'320px 1fr',gap:24,marginBottom:28,alignItems:'start'}}>
          {/* Radar chart */}
          <div style={{background:'white',border:'1.5px solid var(--cream2)',borderRadius:0,padding:'20px',textAlign:'center'}}>
            <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:16,fontWeight:600,marginBottom:14,color:'var(--navy)'}}>Profil de compétences</div>
            <svg viewBox="0 0 320 320" style={{width:'100%',maxWidth:280,margin:'0 auto',display:'block'}}>
              {/* Grid rings */}
              {[0.25,0.5,0.75,1].map(pct=>(
                <polygon key={pct} points={gridPts(pct)} fill="none" stroke={pct===1?'var(--cream2)':'var(--cream2)'} strokeWidth={pct===1?1.5:1} strokeDasharray={pct===1?'none':'4 3'}/>
              ))}
              {/* Axes */}
              {radarAxes.map((_,i)=>{
                const angle=(i/n)*2*Math.PI-Math.PI/2;
                return <line key={i} x1={cx} y1={cy} x2={cx+R*Math.cos(angle)} y2={cy+R*Math.sin(angle)} stroke="var(--cream2)" strokeWidth="1"/>;
              })}
              {/* Data area */}
              <path d={dataPath} fill="rgba(26,111,212,0.12)" stroke="var(--gold)" strokeWidth="2" strokeLinejoin="round"/>
              {/* Data points */}
              {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="4" fill="var(--gold)" stroke="white" strokeWidth="1.5"/>)}
              {/* Labels */}
              {radarAxes.map((ax,i)=>{
                const p=pts[i];
                const anchor=p.lx<cx-5?'end':p.lx>cx+5?'start':'middle';
                return <text key={i} x={p.lx} y={p.ly} textAnchor={anchor} dominantBaseline="middle" fontSize="11" fontFamily="Space Grotesk,sans-serif" fill="var(--muted)" fontWeight="500">{ax.label}</text>;
              })}
              {/* Center value */}
              {m&&<text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle" fontSize="20" fontFamily="Cormorant Garamond,serif" fontWeight="600" fill="var(--navy)">{m}</text>}
            </svg>
            <div style={{display:'flex',flexWrap:'wrap',gap:6,justifyContent:'center',marginTop:10}}>
              {radarAxes.map((ax,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'var(--muted)'}}>
                  <div style={{width:8,height:8,borderRadius:2,background:'var(--gold)',opacity:0.3+ax.value/150}}/>
                  <span>{ax.label} {ax.value}%</span>
                </div>
              ))}
            </div>
          </div>
          {/* Notes récentes */}
          <div>
            <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:16,fontWeight:600,marginBottom:12,color:'var(--navy)'}}>Dernières notes</div>
            {eg.length===0?<div style={{color:'var(--muted)',fontSize:13}}>Aucune note enregistrée.</div>:
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:10}}>
              {eg.map((g,i)=><div key={i} className="nc">
                <div className="nc-sub">{g.matiere}</div>
                <div className="nc-v" style={{color:gcol(g.note,g.max)}}>{g.note}</div>
                <div className="nc-max">/ {g.max}</div>
                <div className="nc-note">{g.commentaire}</div>
              </div>)}
            </div>}
            {myCoursList.length>0&&<>
              <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:16,fontWeight:600,margin:'18px 0 10px',color:'var(--navy)'}}>Mes cours</div>
              <div style={{display:'flex',flexDirection:'column',gap:7}}>
                {myCoursList.map(c=><div key={c.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background:'white',border:'1.5px solid var(--cream2)',borderRadius:0}}>
                  <span style={{...getCoursBadge(c.matiere),flexShrink:0}}>{c.matiere}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:13}}>{c.niveau}</div>
                    <div style={{fontSize:11,color:'var(--muted)'}}>{c.jour} · {hs(c.debut)}–{hs(c.fin)} · {c.salle}</div>
                  </div>
                </div>)}
              </div>
            </>}
          </div>
        </div>

        {/* ── TROPHY BOARD ── */}
        <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:18,fontWeight:600,marginBottom:4,color:'var(--navy)'}}>Tableau des réussites</div>
        <div style={{fontSize:12,color:'var(--muted)',marginBottom:18}}>{nbTrophies} trophée{nbTrophies>1?'s':''} obtenu{nbTrophies>1?'s':''} sur {TROPHIES.length}</div>
        {/* Progress bar */}
        <div style={{height:6,background:'var(--cream2)',borderRadius:3,marginBottom:24,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${Math.round((nbTrophies/TROPHIES.length)*100)}%`,background:'var(--ok)',borderRadius:3,transition:'width .8s ease'}}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:16}}>
          {trophysCats.map(cat=>{
            const catTrophies=TROPHIES.filter(t=>t.cat===cat.key);
            const earned=catTrophies.filter(t=>earnedIds.has(t.id));
            return <div key={cat.key} style={{background:'white',border:'1.5px solid var(--cream2)',borderRadius:0,padding:'16px 18px'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
                <div style={{display:'flex',alignItems:'center',gap:7}}>
                  <span style={{fontSize:20}}>{cat.icon}</span>
                  <span style={{fontWeight:700,fontSize:13,color:'var(--navy)'}}>{cat.label}</span>
                </div>
                <span style={{fontSize:11,fontWeight:600,color:earned.length===catTrophies.length?'var(--ok)':'var(--muted)'}}>
                  {earned.length}/{catTrophies.length}
                </span>
              </div>
              <div style={{height:3,background:'var(--cream2)',borderRadius:2,marginBottom:12,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${catTrophies.length>0?Math.round((earned.length/catTrophies.length)*100):0}%`,background:earned.length===catTrophies.length?'var(--ok)':'var(--gold)',borderRadius:2}}/>
              </div>
              <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
                {catTrophies.map(t=>{
                  const has=earnedIds.has(t.id);
                  return <div key={t.id} title={t.desc} style={{
                    display:'flex',alignItems:'center',gap:5,
                    padding:'5px 10px',borderRadius:20,fontSize:11,
                    background:has?'#EEF5FF':'var(--cream)',
                    border:has?'1.5px solid rgba(26,111,212,.3)':'1.5px solid var(--cream2)',
                    color:has?'var(--navy)':'var(--muted)',
                    fontWeight:has?600:400,
                    opacity:has?1:.6,
                    cursor:'help',
                    transition:'all .15s'
                  }}>
                    <span style={{fontSize:14,filter:has?'none':'grayscale(1)'}}>{t.icon}</span>
                    <span>{t.name}</span>
                    {has&&<span style={{color:'var(--ok)',fontSize:10}}>✓</span>}
                  </div>;
                })}
              </div>
            </div>;
          })}
        </div>
      </div>
    </div>;
  }

  if(user.role==='prof') return <div className="fa-in">
    <div style={{padding:'22px 26px 0'}}>
      <div className="wb">
        <h2>Bonjour, <span className="gold">{user.name.split(' ').slice(-1)[0]}</span> 👋</h2>
        <p>{user.matiere} · {myCours.length} cours hebdo · {myRes.length} ressource{myRes.length!==1?'s':''}</p>
      </div>
      <div className="sg">
        <div className="sc c-info"><div className="sc-ic">📅</div><div className="sc-v">{myCours.length}</div><div className="sc-l">Cours/semaine</div></div>
        <div className="sc c-gold"><div className="sc-ic">📚</div><div className="sc-v">{myRes.length}</div><div className="sc-l">Mes ressources</div></div>
        <div className="sc c-ok"><div className="sc-ic">🗓️</div><div className="sc-v">{myMod.length}</div><div className="sc-l">Mes modules</div></div>
        <div className="sc c-navy"><div className="sc-ic">👥</div><div className="sc-v">{[...new Set(myCours.flatMap(c=>c.eleveIds))].length}</div><div className="sc-l">Élèves suivis</div></div>
      </div>
    </div>
    <div className="pg" style={{paddingTop:0}}>
      <div className="sh"><h2 className="st">Mes cours</h2></div>
      <table className="tbl" style={{marginBottom:24}}>
        <thead><tr><th>Matière</th><th>Niveau</th><th>Créneau</th><th>Salle</th><th>Effectif</th></tr></thead>

          <td style={{fontWeight:600}}>{c.niveau}</td>

          <td>{c.eleveIds.length} élève{c.eleveIds.length>1?'s':''}</td>
        </tr>)}</tbody>
      </table>

  </div>;

  // admin
  return <div className="fa-in">
    <div style={{padding:'22px 26px 0'}}>
      <div className="wb">
        <h2>Bonjour, <span className="gold">{user.name.split(' ').slice(-1)[0]}</span> 👋</h2>
        <p>Vue d'ensemble — EduCenter</p>
      </div>
      <div className="sg">
        <div className="sc c-info"><div className="sc-ic">🎓</div><div className="sc-v">{eleves.length}</div><div className="sc-l">Élèves</div></div>
        <div className="sc c-navy"><div className="sc-ic">👨‍🏫</div><div className="sc-v">{profs.length}</div><div className="sc-l">Professeurs</div></div>
        <div className="sc c-gold"><div className="sc-ic">📚</div><div className="sc-v">{resources.length}</div><div className="sc-l">Ressources</div></div>
        <div className="sc c-ok"><div className="sc-ic">🗓️</div><div className="sc-v">{modules.length}</div><div className="sc-l">Modules</div></div>
      </div>
    </div>
    <div className="pg" style={{paddingTop:0,display:'grid',gridTemplateColumns:'1fr 1fr',gap:22}}>
      <div>
        <div className="sh"><h2 className="st">Élèves</h2></div>
        <table className="tbl">
          <thead><tr><th>Élève</th><th>Niveau</th><th>Moyenne</th></tr></thead>
          <tbody>{eleves.map(e=>{const g=grades[e.id]||[];const mv=moy(g);return<tr key={e.id}><td><strong>{e.name}</strong></td><td>{e.niveau}</td><td>{mv?<span style={{fontWeight:700,color:gcol(parseFloat(mv),20)}}>{mv}/20</span>:<span style={{color:'#9ca3af'}}>—</span>}</td></tr>;})}</tbody>
        </table>

        <table className="tbl">

          <tbody>{cours.map(c=>{const p=users.find(u=>u.id===c.profId);return<tr key={c.id}><td><span style={getCoursBadge(c.matiere)}>{c.matiere}</span> <span style={{fontSize:12}}>{c.niveau}</span></td><td style={{fontSize:12,color:'var(--muted)'}}>{c.jour}</td><td style={{fontSize:12}}>{p?.name.split(' ').slice(-1)[0]}</td></tr>;})}

}

// ─── MON PROGRAMME (Élève : fusion Suivi + Bibliothèque) ───
function MonProgramme({user,users,cours,resources,compEtats,setCompEtats,customComps=[]}){
  const [selMat,setSelMat]=useState('Toutes');
  const [expandedChaps,setExpandedChaps]=useState({});
  const toggleChap=(key)=>setExpandedChaps(p=>({...p,[key]:!p[key]}));

  const myCours=cours.filter(c=>c.eleveIds.includes(user.id));
  const myMats=new Set(myCours.map(c=>c.matiere));

  // All templates for this student
  const myTemplates=[
    ...COMP_TEMPLATES.filter(t=>myMats.has(t.matiere)&&t.niveau===user.niveau),
    ...(customComps||[]).filter(t=>t.eleveId===user.id),
  ];

  // Resources filtered by student's matières
  const myResources=resources.filter(r=>myMats.has(r.matiere)||r.matiere==='Multi');

  const getEtat=(tid)=>(compEtats[user.id]||{})[tid]||{statut:'non_commence'};
  const requestWork=(tid)=>setCompEtats(p=>({...p,[user.id]:{...(p[user.id]||{}),[tid]:{...getEtat(tid),statut:'en_cours',date:new Date().toISOString().split('T')[0]}}}));

  const mats=['Toutes',...Array.from(myMats)];
  const visibleTemplates=selMat==='Toutes'?myTemplates:myTemplates.filter(t=>t.matiere===selMat);
  const visibleResources=selMat==='Toutes'?myResources:myResources.filter(r=>r.matiere===selMat||r.matiere==='Multi');

  // Stats
  const valide=myTemplates.filter(t=>getEtat(t.id).statut==='valide').length;
  const pct=myTemplates.length?Math.round((valide/myTemplates.length)*100):0;

  // Group competences by matière > chapitre
  const grouped={};
  visibleTemplates.forEach(t=>{
    if(!grouped[t.matiere])grouped[t.matiere]={};
    if(!grouped[t.matiere][t.chapitre])grouped[t.matiere][t.chapitre]=[];
    grouped[t.matiere][t.chapitre].push({...t,etat:getEtat(t.id)});
  });

  const StatDot=({st})=>{
    const s=COMP_STATUTS[st]||COMP_STATUTS.non_commence;
    return <span title={s.label} style={{width:18,height:18,borderRadius:2,background:s.bg,border:`2px solid ${s.color}60`,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:10,color:s.color,fontWeight:700,flexShrink:0}}>{s.icon}</span>;
  };

  return <>
    <TB title="Mon Programme"/>
    <div className="pg">
      {/* Welcome + global progress */}
      <div style={{background:'linear-gradient(135deg,var(--navy) 0%,#1A4080 100%)',borderRadius:0,padding:'20px 24px',marginBottom:20,color:'white'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:16}}>
          <div>
            <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:22,fontWeight:600}}>{user.name.split(' ')[0]} — {user.niveau}</div>
            <div style={{fontSize:13,opacity:.7,marginTop:4}}>{Array.from(myMats).join(' · ')} · {myTemplates.length} compétences</div>
          </div>
          <div style={{textAlign:'center',flexShrink:0}}>
            <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:36,fontWeight:600,lineHeight:1}}>{pct}%</div>
            <div style={{fontSize:11,opacity:.6,marginTop:2}}>{valide}/{myTemplates.length} validées</div>
          </div>
        </div>
        <div style={{height:6,background:'rgba(255,255,255,.15)',borderRadius:3,marginTop:16,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${pct}%`,background:pct===100?'#10B981':'#8b6b3a',borderRadius:3,transition:'width .8s'}}/>
        </div>
      </div>

      {/* Matière tabs */}
      <div className="tabs" style={{marginBottom:20,flexWrap:'wrap'}}>
        {mats.map(m=><button key={m} className={`tab ${selMat===m?'on':''}`} onClick={()=>setSelMat(m)} style={{fontSize:12}}>{m}</button>)}
      </div>

      {myMats.size===0&&<div className="emp"><div className="emp-icon">📖</div><h3>Aucun cours inscrit</h3><p>Demandez à votre administrateur de vous inscrire à des cours.</p></div>}

      {/* Matières > Chapitres */}
      {Object.entries(grouped).map(([mat,chaps])=>(
        <div key={mat} style={{marginBottom:24}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
            <span style={{...getCoursBadge(mat),fontSize:13}}>{mat}</span>
            {(()=>{const all=Object.values(chaps).flat();const v=all.filter(c=>c.etat.statut==='valide').length;return<span style={{fontSize:12,color:'var(--muted)'}}>{v}/{all.length}</span>})()}
          </div>
          {Object.entries(chaps).map(([chap,comps])=>{
            const chapKey=mat+'__'+chap;
            const isOpen=expandedChaps[chapKey]!==false; // open by default
            const chapV=comps.filter(c=>c.etat.statut==='valide').length;
            const chapPct=Math.round((chapV/comps.length)*100);
            // Resources matching this chapter (by matière)
            const chapRes=myResources.filter(r=>r.matiere===mat&&(r.chapitre===chap||!r.chapitre));
            return <div key={chap} style={{background:'white',border:'1.5px solid var(--cream2)',borderRadius:0,marginBottom:10,overflow:'hidden'}}>
              {/* Chapter header — clickable */}
              <div onClick={()=>toggleChap(chapKey)} style={{padding:'12px 16px',background:chapPct===100?'#ECFDF5':'var(--cream)',display:'flex',alignItems:'center',gap:12,cursor:'pointer',userSelect:'none'}}>
                <span style={{fontSize:13,opacity:.5,transition:'transform .2s',transform:isOpen?'rotate(90deg)':'rotate(0deg)'}}>▶</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13,color:'var(--navy)'}}>{chap}</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{chapV}/{comps.length} validée{chapV>1?'s':''}{chapRes.length>0?` · ${chapRes.length} ressource${chapRes.length>1?'s':''}`:''}
                  </div>
                </div>
                <div style={{width:80}}>
                  <div style={{height:5,background:'var(--cream2)',borderRadius:3,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${chapPct}%`,background:chapPct===100?'var(--ok)':'var(--gold)',borderRadius:3}}/>
                  </div>
                  <div style={{fontSize:10,textAlign:'right',color:'var(--muted)',marginTop:2}}>{chapPct}%</div>
                </div>
                {chapPct===100&&<span style={{fontSize:18}}>🏆</span>}
              </div>

              {isOpen&&<div>
                {/* Competences */}
                {comps.map(c=>{
                  const st=COMP_STATUTS[c.etat.statut]||COMP_STATUTS.non_commence;
                  return <div key={c.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 16px',borderBottom:'1px solid rgba(0,0,0,.035)'}}>
                    <StatDot st={c.etat.statut}/>
                    <div style={{flex:1,minWidth:0}}>
                      <span style={{fontSize:13,fontWeight:500}}>{c.nom}</span>
                      {c.etat.commentaire&&<div style={{fontSize:11,color:'var(--muted)',fontStyle:'italic',marginTop:2}}>💬 {c.etat.commentaire}</div>}
                    </div>
                    {c.etat.statut==='non_commence'&&<button className="btn btn-sm" style={{fontSize:11,padding:'3px 9px',background:'#FFF8EE',border:'1.5px solid #F0C080',color:'#D97706',flexShrink:0}} onClick={()=>requestWork(c.id)}>Je travaille ça</button>}
                    {c.etat.statut==='valide'&&<span style={{fontSize:11,color:'var(--ok)',fontWeight:600,flexShrink:0}}>✓ Validé</span>}
                    {c.etat.statut==='a_revoir'&&<span style={{fontSize:11,color:'var(--err)',fontWeight:600,flexShrink:0}}>↺ À revoir</span>}
                    {c.etat.statut==='en_cours'&&<span style={{fontSize:11,color:'#D97706',fontWeight:600,flexShrink:0}}>◑ En cours</span>}
                  </div>;
                })}

                {/* Inline resources for this chapter */}
                {chapRes.length>0&&<div style={{padding:'10px 16px',background:'#F7FAFF',borderTop:'1px solid #E8F0FE'}}>
                  <div style={{fontSize:11,fontWeight:700,color:'var(--gold)',marginBottom:8,display:'flex',alignItems:'center',gap:5}}>
                    <span>📚</span> Ressources associées
                  </div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                    {chapRes.slice(0,4).map(r=>(
                      <div key={r.id} style={{background:'white',border:'1.5px solid #C8D8F5',borderRadius:2,padding:'7px 11px',display:'flex',alignItems:'center',gap:8,maxWidth:280}}>
                        <span style={{fontSize:16,flexShrink:0}}>{r.type==='fiche'?'📄':r.type==='exercice'?'✏️':r.type==='cours'?'📘':'📝'}</span>
                        <div style={{minWidth:0}}>
                          <div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.title}</div>
                          <div style={{fontSize:10,color:'var(--muted)'}}>{r.niveau}</div>
                        </div>
                      </div>
                    ))}
                    {chapRes.length>4&&<div style={{fontSize:11,color:'var(--muted)',padding:'7px 0',alignSelf:'center'}}>+{chapRes.length-4} autres…</div>}
                  </div>
                </div>}
              </div>}
            </div>;
          })}

          {/* Resources not attached to a specific chapter */}
          {(()=>{
            const matRes=visibleResources.filter(r=>(r.matiere===mat||r.matiere==='Multi')&&!Object.keys(chaps).includes(r.chapitre||''));
            if(matRes.length===0)return null;
            return <div style={{background:'#F7FAFF',border:'1.5px dashed #C8D8F5',borderRadius:0,padding:'12px 16px',marginBottom:8}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--gold)',marginBottom:8}}>📚 Autres ressources — {mat}</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:8}}>
                {matRes.slice(0,6).map(r=>(
                  <div key={r.id} style={{background:'white',border:'1.5px solid #C8D8F5',borderRadius:2,padding:'8px 12px',display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:16,flexShrink:0}}>{r.type==='fiche'?'📄':r.type==='exercice'?'✏️':r.type==='cours'?'📘':'📝'}</span>
                    <div style={{minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.title}</div>
                      <div style={{fontSize:10,color:'var(--muted)'}}>{r.type} · {r.niveau}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>;
          })()}
        </div>
      ))}
    </div>
  </>;
}


function Bibliotheque({user,users,resources,setResources,cours=[],compEtats={}}){
  const [ft,setFt]=useState('Tous');
  const [fm,setFm]=useState('Toutes');
  const [q,setQ]=useState('');
  const [show,setShow]=useState(false);
  const [showGN,setShowGN]=useState(false);
  const [form,setForm]=useState({title:'',type:'trace',matiere:'Mathématiques',niveau:'3ème',desc:'',devoirs:'',commentaires:''});
  const [gnStep,setGnStep]=useState('upload');
  const [gnFile,setGnFile]=useState(null);
  const [gnPreview,setGnPreview]=useState(null);
  const [gnError,setGnError]=useState('');
  const canM=user.role==='admin'||user.role==='prof';
  // Élève : ses matières + son niveau uniquement
  const myMatieres=useMemo(()=>{
    if(user.role!=='eleve')return null; // null = no filter
    const myCours=cours.filter(c=>c.eleveIds.includes(user.id));
    return new Set(myCours.map(c=>c.matiere));
  },[user,cours]);
  // Compétences en cours/à revoir pour l'élève — pour suggestions
  const myCompSuggestions=useMemo(()=>{
    if(user.role!=='eleve')return new Set();
    const etats=compEtats[user.id]||{};
    return new Set(
      COMP_TEMPLATES
        .filter(t=>{const s=etats[t.id]?.statut;return s==='en_cours'||s==='a_revoir';})
        .map(t=>t.matiere)
    );
  },[user,compEtats]);

  const TYPES=['Tous','fiche','exercice','trace','cours'];
  const filtered=useMemo(()=>resources.filter(r=>{
    // Élève : voir seulement ses matières
    if(myMatieres&&!myMatieres.has(r.matiere)&&r.matiere!=='Multi'&&r.matiere!=='Général')return false;
    if(ft!=='Tous'&&r.type!==ft)return false;
    if(fm!=='Toutes'&&r.matiere!==fm)return false;
    if(q&&!r.title.toLowerCase().includes(q.toLowerCase()))return false;
    return true;
  }),[resources,ft,fm,q,myMatieres]);
  const add=()=>{if(!form.title.trim())return;setResources(p=>[...p,{id:'r'+Date.now(),...form,auteurId:user.id,date:new Date().toISOString().split('T')[0],dl:0}]);setShow(false);setForm({title:'',type:'trace',matiere:'Mathématiques',niveau:'3ème',desc:'',devoirs:'',commentaires:''});};
  const del=(id)=>setResources(p=>p.filter(r=>r.id!==id));
  const dl=(res)=>{setResources(p=>p.map(r=>r.id===res.id?{...r,dl:r.dl+1}:r));alert(`📥 "${res.title}"\n\nTéléchargement simulé.`);};
  const openGN=()=>{setGnStep('upload');setGnFile(null);setGnPreview(null);setGnError('');setShowGN(true);};
  const handleGNFile=(file)=>{
    if(!file)return;
    setGnFile(file);setGnError('');
    if(file.type.startsWith('image/')){const reader=new FileReader();reader.onload=e=>setGnPreview({type:'image',src:e.target.result});reader.readAsDataURL(file);}
    else{setGnPreview({type:'pdf',name:file.name});}
  };
  const analyzeWithClaude=async()=>{
    if(!gnFile){setGnError("Veuillez d'abord sélectionner un fichier.");return;}
    setGnStep('analyzing');
    try{
      const toBase64=f=>new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(f);});
      const b64=await toBase64(gnFile);
      const isImage=gnFile.type.startsWith('image/');
      const mediaType=isImage?gnFile.type:'application/pdf';
      const msgContent=[
        {type:isImage?'image':'document',source:{type:'base64',media_type:mediaType,data:b64}},
        {type:'text',text:'Tu es un assistant pédagogique. Analyse ce document (trace écrite, export GoodNotes) et extrais en JSON strict sans markdown :\n{"titre":"titre du cours","matiere":"Mathématiques|Physique|Français|Histoire|Multi","niveau":"5ème|4ème|3ème|Lycée|Terminale|Collège","description":"résumé 2-3 phrases","devoirs":"devoirs à faire ou chaine vide","commentaires":"commentaires du prof ou chaine vide"}\nRéponds UNIQUEMENT avec le JSON.'}
      ];
      const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:msgContent}]})});
      const data=await resp.json();
      const text=data.content?.find(c=>c.type==='text')?.text||'';
      let parsed;
      try{parsed=JSON.parse(text.replace(/```json|```/g,'').trim());}catch(e){throw new Error("Réponse inattendue. Réessayez.");}
      setForm({title:parsed.titre||'',type:'trace',matiere:parsed.matiere||'Mathématiques',niveau:parsed.niveau||'3ème',desc:parsed.description||'',devoirs:parsed.devoirs||'',commentaires:parsed.commentaires||''});
      setGnStep('result');
    }catch(e){setGnError(e.message||"Erreur lors de l'analyse.");setGnStep('upload');}
  };
  const publishFromGN=()=>{
    if(!form.title.trim())return;
    setResources(p=>[...p,{id:'r'+Date.now(),...form,auteurId:user.id,date:new Date().toISOString().split('T')[0],dl:0,gnImport:true}]);
    setShowGN(false);setGnStep('upload');
  };
  return <>
    <TB title="Bibliothèque">
      <div className="sw"><input className="si" style={{width:190}} placeholder="Rechercher..." value={q} onChange={e=>setQ(e.target.value)}/></div>
      {user.role==='prof'&&<button className="btn btn-o" onClick={openGN}>📲 GoodNotes</button>}
      {canM&&<button className="btn btn-p" onClick={()=>setShow(true)}>＋ Ajouter</button>}
    </TB>
    <div className="pg">
      <div className="fb">
        <span style={{fontSize:11,fontWeight:600,color:'var(--muted)',alignSelf:'center',marginRight:3}}>Type :</span>
        {TYPES.map(t=><button key={t} className={`chip ${ft===t?'on':''}`} onClick={()=>setFt(t)}>{t==='Tous'?'Tous':`${TI[t]||''} ${TL[t]||t}`}</button>)}
      </div>
      <div className="fb">
        <span style={{fontSize:11,fontWeight:600,color:'var(--muted)',alignSelf:'center',marginRight:3}}>Matière :</span>
        {(myMatieres
          ?['Toutes',...Array.from(myMatieres)]
          :MATIERES
        ).map(m=><button key={m} className={`chip ${fm===m?'on':''}`} onClick={()=>setFm(m)}>{m}</button>)}
      </div>
      {user.role==='eleve'&&myCompSuggestions.size>0&&(()=>{
        const suggested=filtered.filter(r=>myCompSuggestions.has(r.matiere));
        return suggested.length>0?<div style={{background:'#EEF5FF',border:'1.5px solid rgba(26,111,212,.2)',borderRadius:0,padding:'12px 16px',marginBottom:16,fontSize:13}}>
          <div style={{fontWeight:600,color:'var(--navy)',marginBottom:4}}>💡 Suggérées pour toi</div>
          <div style={{color:'var(--muted)',fontSize:12}}>Ces ressources correspondent aux compétences que tu travailles actuellement : {[...myCompSuggestions].join(', ')}</div>
        </div>:null;
      })()}
      {filtered.length===0?<div className="emp"><div className="emp-icon">📚</div><h3>Aucune ressource disponible</h3><p>{user.role==='eleve'?'Aucune ressource pour tes matières pour le moment.':'Aucune ressource.'}</p></div>:(
        <div className="rg">{filtered.map(r=>{const a=users.find(u=>u.id===r.auteurId);return <div key={r.id} className="res-card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
              <span className={`rtag ${TC[r.type]}`}>{TI[r.type]} {TL[r.type]}</span>
              {r.gnImport&&<span className="rtag" style={{background:'#EEF5FF',color:'var(--gold)'}}>📲 GoodNotes</span>}
              {user.role==='eleve'&&myCompSuggestions.has(r.matiere)&&<span style={{background:'#ECFDF5',color:'#059669',padding:'1px 7px',borderRadius:0,fontSize:10,fontWeight:700}}>✨ Suggéré</span>}
            </div>
            <span style={{fontSize:11,color:'var(--muted)'}}>{r.date}</span>
          </div>
          <div className="rc-ttl">{r.title}</div>
          <div className="rc-meta"><span>📖 {r.matiere}</span><span>🎯 {r.niveau}</span>{a&&<span>👤 {a.name.split(' ').slice(-1)[0]}</span>}</div>
          <p style={{fontSize:12,color:'var(--muted)',margin:'8px 0 0',lineHeight:1.5}}>{r.desc}</p>
          {r.devoirs&&<div className="gn-devoir">📌 <strong>Devoirs :</strong> {r.devoirs}</div>}
          {r.commentaires&&<div style={{background:'#EEF5FF',borderRadius:2,padding:'7px 10px',fontSize:12,borderLeft:'3px solid var(--gold)',marginTop:6}}>💬 <strong>Commentaires :</strong> {r.commentaires}</div>}
          <div className="rc-foot">
            <span style={{fontSize:11,color:'var(--muted)'}}>⬇️ {r.dl}</span>
            <div style={{display:'flex',gap:6}}>
              {canM&&(user.role==='admin'||r.auteurId===user.id)&&<button className="btn btn-d btn-sm" onClick={()=>del(r.id)}>🗑️</button>}
              <button className="btn btn-p btn-sm" onClick={()=>dl(r)}>⬇️ Accéder</button>
            </div>
          </div>
        </div>;})}
        </div>
      )}
    </div>
    {show&&<Modal title="Ajouter une ressource" onClose={()=>setShow(false)}>
      <div className="fg"><label className="fl">Titre *</label><input className="fi" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Ex: Fiche — Les dérivées"/></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div className="fg"><label className="fl">Type</label><select className="fi" value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>{['fiche','exercice','trace','cours'].map(t=><option key={t} value={t}>{TL[t]}</option>)}</select></div>
        <div className="fg"><label className="fl">Matière</label><select className="fi" value={form.matiere} onChange={e=>setForm({...form,matiere:e.target.value})}>{MATIERES.filter(m=>m!=='Toutes').map(m=><option key={m}>{m}</option>)}</select></div>
        <div className="fg"><label className="fl">Niveau</label><select className="fi" value={form.niveau} onChange={e=>setForm({...form,niveau:e.target.value})}>{NIVEAUX.filter(n=>n!=='Tous').map(n=><option key={n}>{n}</option>)}</select></div>
      </div>
      <div className="fg"><label className="fl">Description</label><textarea className="fi" value={form.desc} onChange={e=>setForm({...form,desc:e.target.value})}/></div>
      <div className="fg"><label className="fl">Fichier</label><input type="file" className="fi" accept=".pdf,.docx,.pptx"/></div>
      <div className="fa"><button className="btn btn-o" onClick={()=>setShow(false)}>Annuler</button><button className="btn btn-p" onClick={add}>Publier</button></div>
    </Modal>}
    {showGN&&<Modal title="📲 Import depuis GoodNotes" onClose={()=>setShowGN(false)}>
      {gnStep==='upload'&&<>
        <p style={{fontSize:13,color:'var(--muted)',marginBottom:14}}>Exportez votre trace depuis GoodNotes en <strong>PDF ou image</strong>. Claude analyse automatiquement le contenu, les devoirs et les commentaires.</p>
        <div className="gn-dropzone"
          onDragOver={e=>{e.preventDefault();e.currentTarget.classList.add('drag');}}
          onDragLeave={e=>e.currentTarget.classList.remove('drag')}
          onDrop={e=>{e.preventDefault();e.currentTarget.classList.remove('drag');const f=e.dataTransfer.files[0];if(f)handleGNFile(f);}}
          onClick={()=>document.getElementById('gn-input').click()}>
          <input id="gn-input" type="file" accept=".pdf,image/*" onChange={e=>handleGNFile(e.target.files[0])}/>
          {gnPreview&&gnPreview.type==='image'?<img src={gnPreview.src} className="preview-thumb" alt="preview"/>:<div className="gn-icon">{gnFile?'📄':'📂'}</div>}
          {gnFile
            ?<div><div style={{fontWeight:600,fontSize:13}}>{gnFile.name}</div><div style={{fontSize:11,color:'var(--muted)',marginTop:3}}>{(gnFile.size/1024).toFixed(0)} Ko</div></div>
            :<div><div style={{fontWeight:600,fontSize:13}}>Glisser-déposer ou cliquer</div><div style={{fontSize:11,color:'var(--muted)',marginTop:3}}>PDF ou image — export GoodNotes</div></div>
          }
        </div>
        {gnError&&<div style={{color:'var(--err)',fontSize:12,marginTop:8,padding:'8px 12px',background:'#FFF0F0',borderRadius:2}}>{gnError}</div>}
        <div style={{background:'#EEF5FF',borderRadius:2,padding:'9px 12px',fontSize:12,color:'#0d4a8f',marginTop:12}}>
          💡 <strong>Export GoodNotes :</strong> Ouvrez votre note → ••• → Exporter → PDF ou Image
        </div>
        <div className="fa"><button className="btn btn-o" onClick={()=>setShowGN(false)}>Annuler</button><button className="btn btn-p" disabled={!gnFile} onClick={analyzeWithClaude}>🔍 Analyser avec Claude</button></div>
      </>}
      {gnStep==='analyzing'&&<div className="gn-analyzing">
        <div className="gn-spinner"/>
        <div style={{fontFamily:'Playfair Display,serif',fontSize:16,fontWeight:600}}>Analyse en cours…</div>
        <div style={{fontSize:13,color:'var(--muted)',textAlign:'center',maxWidth:280}}>Claude lit votre trace écrite et extrait les informations pédagogiques.</div>
      </div>}
      {gnStep==='result'&&<>
        <div style={{background:'#EEFFF6',border:'1.5px solid #2D9B6F',borderRadius:0,padding:'8px 14px',marginBottom:14,fontSize:12,color:'#1a6b46'}}>✅ Analyse terminée — vérifiez avant de publier.</div>
        <div className="fg"><label className="fl">Titre</label><input className="fi" value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div className="fg"><label className="fl">Matière</label><select className="fi" value={form.matiere} onChange={e=>setForm({...form,matiere:e.target.value})}>{MATIERES.filter(m=>m!=='Toutes').map(m=><option key={m}>{m}</option>)}</select></div>
          <div className="fg"><label className="fl">Niveau</label><select className="fi" value={form.niveau} onChange={e=>setForm({...form,niveau:e.target.value})}>{NIVEAUX.filter(n=>n!=='Tous').map(n=><option key={n}>{n}</option>)}</select></div>
        </div>
        <div className="fg"><label className="fl">Description</label><textarea className="fi" value={form.desc} onChange={e=>setForm({...form,desc:e.target.value})}/></div>
        <div className="fg"><label className="fl">📌 Devoirs à faire</label><textarea className="fi" style={{minHeight:52}} value={form.devoirs} onChange={e=>setForm({...form,devoirs:e.target.value})} placeholder="Aucun devoir détecté"/></div>
        <div className="fg"><label className="fl">💬 Commentaires professeur</label><textarea className="fi" style={{minHeight:52}} value={form.commentaires} onChange={e=>setForm({...form,commentaires:e.target.value})} placeholder="Aucun commentaire détecté"/></div>
        <div className="fa"><button className="btn btn-o" onClick={()=>setGnStep('upload')}>← Réimporter</button><button className="btn btn-p" onClick={publishFromGN}>✅ Publier</button></div>
      </>}
    </Modal>}
  </>;
}
