                  <div style={{fontSize:12.5,fontWeight:700,color:ina?'#b3243b':'#1a7a4a'}}>{ina?'⏸ Élève inactif':'✓ Élève actif'}</div>
                  <button className={ina?'btn btn-p btn-sm':'btn btn-o btn-sm'} onClick={()=>{const ns=ina?'actif':'inactif'; setInscriptions(p=>p.map(i=>i.id===selIns.id?{...i,statut:ns}:i)); setSelIns(prev=>prev?{...prev,statut:ns}:prev);}}>{ina?'Réactiver':'Passer en inactif'}</button>
                </div>; })()}
                {(()=>{ const eu=users.find(u=>u.id===selIns.userId); return <div style={{background:'#F3EEFF',border:'1.5px solid #d8d0ff',padding:'12px 16px',borderRadius:6,marginBottom:12}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                    <div style={{fontWeight:700,fontSize:13,color:'#7c3aed'}}>🔑 Accès élève</div>
                    {eu&&eu.auth_id?<span style={{fontSize:12,color:'#1a7a4a',fontWeight:600}}>✓ Accès créé</span>:<button className="btn btn-p btn-sm" onClick={()=>{ if(eu)ouvrirAcces(eu); }}>Créer identifiant + mot de passe</button>}
                  </div>
                  <div style={{fontSize:11.5,color:'#6b5b95',marginTop:6}}>{eu&&eu.auth_id?'L\'élève peut se connecter à son profil avec cet identifiant.':'Crée un compte de connexion pour que l\'élève accède à son profil.'}</div>
                </div>; })()}
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                  <div style={{fontSize:11,fontWeight:700,color:'#1a2340',textTransform:'uppercase',letterSpacing:.5}}>📚 Groupes assignés ({groupes.length})</div>
                  <button className="btn btn-p btn-sm" onClick={()=>setShowAssign(true)}>＋ Assigner / Modifier groupes</button>
                </div>
                {groupes.length===0?<div style={{padding:'14px',background:'#fff8e0',border:'1.5px solid #f5d882',borderRadius:4,fontSize:13,color:'#7a5800',textAlign:'center'}}>
                  ⚠ Élève actif mais sans groupe assigné — aucune facture ne sera générée tant qu'aucun cours n'est attribué.
                </div>:<div style={{background:'var(--cream)',borderRadius:4,padding:'10px 14px'}}>
                  <div style={{display:'flex',flexDirection:'column',gap:5}}>
                    {groupes.map(c=>{
                      const prof=users.find(u=>u.id===c.profId);
                      return<div key={c.id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderBottom:'1px solid var(--cream2)',fontSize:12}}>
                        <span style={{...getCoursBadge(c.matiere),fontSize:10}}>{c.matiere}</span>
                        <span style={{fontWeight:600}}>{c.niveau}</span>
                        <span style={{color:'var(--muted)'}}>· {c.jour} {hs(c.debut)}–{hs(c.fin)}</span>
                        <span style={{color:'var(--muted)'}}>· {prof?.name||'—'}</span>
                        <span style={{marginLeft:'auto',color:'#1a7a4a',fontWeight:700}}>55€/mois</span>
                      </div>;
                    })}
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:8,marginTop:6,borderTop:'2px solid var(--cream2)'}}>
                    <span style={{fontSize:12,color:'var(--muted)'}}>Total {mats.length} matière{mats.length>1?'s':''}</span>
                    <span style={{fontSize:16,fontWeight:700,color:'#1a4fc4',fontFamily:'var(--ff-serif)'}}>{mrr}€/mois facturés</span>
                  </div>
                </div>}

                {/* Cours suggérés */}
                {sugg.length>0&&groupes.length===0&&<div style={{marginTop:14}}>
                  <div style={{fontSize:11,fontWeight:700,color:'#7c3aed',marginBottom:8,textTransform:'uppercase',letterSpacing:.5}}>💡 Suggestions ({sugg.length})</div>
                  <div style={{display:'flex',flexDirection:'column',gap:5}}>
                    {sugg.slice(0,5).map(c=>{
                      const prof=users.find(u=>u.id===c.profId);
                      return<div key={c.id} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 12px',background:'#f5f3ff',border:'1.5px solid #d8d0ff',borderRadius:4}}>
                        <span style={{...getCoursBadge(c.matiere),fontSize:10}}>{c.matiere}</span>
                        <span style={{fontWeight:600,fontSize:12}}>{c.niveau}</span>
                        <span style={{fontSize:11,color:'var(--muted)'}}>· {c.jour} {hs(c.debut)}–{hs(c.fin)} · {prof?.name.split(' ').slice(-1)[0]||'—'}</span>
                        <button onClick={()=>toggleAssign(c.id,selIns.userId)} style={{marginLeft:'auto',background:'#7c3aed',color:'white',border:'none',padding:'4px 10px',borderRadius:3,fontSize:10,cursor:'pointer',fontWeight:600}}>＋ Inscrire</button>
                      </div>;
                    })}
                  </div>
                </div>}
              </>}
            </div>
          </div>;
        })()}
      </div>
    </>}
    </div>

    {/* Modal Fiche d'inscription */}
    {showIns&&<Modal title={selIns?"Modifier l'inscription":"Nouvelle inscription"} onClose={()=>setShowIns(false)}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div className="fg"><label className="fl">Prénom *</label><input className="fi" value={insForm.prenom} onChange={e=>setInsForm(p=>({...p,prenom:e.target.value}))} autoFocus/></div>
        <div className="fg"><label className="fl">Nom *</label><input className="fi" value={insForm.nom} onChange={e=>setInsForm(p=>({...p,nom:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Date de naissance</label><input className="fi" type="date" value={insForm.dateNaissance} onChange={e=>setInsForm(p=>({...p,dateNaissance:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Niveau *</label>
          <select className="fi" value={insForm.niveau} onChange={e=>setInsForm(p=>({...p,niveau:e.target.value}))}>
            {NIVEAUX_INS.map(n=><option key={n} value={n}>{n}</option>)}
          </select>
        </div>
      </div>
      <div className="fg" style={{marginTop:4}}>
        <label className="fl">Matières souhaitées</label>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:4}}>
          {MATIERES_INS.map(m=>{
            const on=insForm.matieres.includes(m);
            return<span key={m} onClick={()=>setInsForm(p=>({...p,matieres:on?p.matieres.filter(x=>x!==m):[...p.matieres,m]}))}
              style={{...getCoursBadge(m),fontSize:11,cursor:'pointer',opacity:on?1:.4,border:on?'2px solid var(--gold)':'2px solid transparent',padding:'3px 9px'}}>{m}</span>;
          })}
        </div>
      </div>
      <div style={{borderTop:'1.5px solid var(--cream2)',marginTop:12,paddingTop:10,fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5,marginBottom:8}}>Contact parent / responsable</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div className="fg"><label className="fl">Nom du parent</label><input className="fi" value={insForm.parentNom} onChange={e=>setInsForm(p=>({...p,parentNom:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Téléphone</label><input className="fi" type="tel" value={insForm.parentTel} onChange={e=>setInsForm(p=>({...p,parentTel:e.target.value}))}/></div>
        <div className="fg" style={{gridColumn:'1/-1'}}><label className="fl">Email</label><input className="fi" type="email" value={insForm.parentEmail} onChange={e=>setInsForm(p=>({...p,parentEmail:e.target.value}))}/></div>
        <div className="fg" style={{gridColumn:'1/-1'}}><label className="fl">Adresse</label><input className="fi" value={insForm.adresse} onChange={e=>setInsForm(p=>({...p,adresse:e.target.value}))}/></div>
      </div>
      <div className="fg" style={{marginTop:4}}><label className="fl">Notes internes</label>
        <textarea className="fi" rows={2} value={insForm.notes} onChange={e=>setInsForm(p=>({...p,notes:e.target.value}))} placeholder="Besoins particuliers, observations..." style={{resize:'vertical',fontFamily:'var(--ff-mono)',fontSize:12}}/>
      </div>
      <div className="fa"><button className="btn btn-o" onClick={()=>setShowIns(false)}>Annuler</button><button className="btn btn-p" onClick={saveIns} disabled={!insForm.prenom.trim()||!insForm.nom.trim()}>Enregistrer</button></div>
    </Modal>}

    {/* Modal Assignation aux groupes */}
    {showAcces&&selIns?.userId&&(()=>{ const eu=users.find(u=>u.id===selIns.userId); return <Modal title={'Accès élève — '+(eu?eu.name:'')} onClose={()=>setShowAcces(false)}>
      <div className="fg"><label className="fl">Identifiant (email de connexion)</label>
        <input className="fi" value={accesEmail} onChange={e=>setAccesEmail(e.target.value)} placeholder="prenom.nom@eleve.plusdebonnesnotes.com"/></div>
      <div className="fg"><label className="fl">Mot de passe</label>
        <div style={{display:'flex',gap:8}}>
          <input className="fi" style={{flex:1}} value={accesPwd} onChange={e=>setAccesPwd(e.target.value)}/>
          <button className="btn btn-o btn-sm" onClick={()=>setAccesPwd(genPwd())}>↻ Générer</button>
        </div></div>
      {accesErr?<div style={{background:'#fdecef',border:'1.5px solid #f3b8c2',color:'#b3243b',padding:'9px 13px',borderRadius:5,fontSize:12.5,marginBottom:8}}>{accesErr}</div>:null}
      {accesMsg?<div style={{background:'#EEFFF6',border:'1.5px solid #b8dbb8',color:'#1a7a4a',padding:'9px 13px',borderRadius:5,fontSize:12.5,marginBottom:8}}>✓ {accesMsg}<div style={{marginTop:6,fontFamily:'monospace',color:'#1a2340',wordBreak:'break-all'}}>Identifiant : {accesEmail}<br/>Mot de passe : {accesPwd}</div></div>:null}
      <div className="fa">{accesMsg?<button className="btn btn-p" onClick={()=>setShowAcces(false)}>Terminé</button>:<button className="btn btn-p" disabled={accesBusy} onClick={()=>{ const eu2=users.find(u=>u.id===selIns.userId); if(eu2)creerAcces(eu2); }}>{accesBusy?'Création…':'Créer l\'accès'}</button>}</div>
    </Modal>; })()}
    {showAssign&&selIns?.userId&&<Modal title={`Attribuer des créneaux à ${selIns.prenom} ${selIns.nom}`} onClose={()=>setShowAssign(false)} width="min(1100px, 94vw)">
      <div style={{background:'#EEF3FF',border:'1.5px solid #c8d8f5',padding:'10px 14px',borderRadius:4,marginBottom:14,fontSize:12,color:'#1a4fc4'}}>
        💡 La facture mensuelle se recalcule automatiquement selon la grille dégressive de la page d'accueil, <strong>au nombre de créneaux</strong> (65 € pour 1 créneau, puis dégressif).
      </div>
      <PlanningPicker cours={cours} users={users} niveauHint={selIns.niveau} isSelected={c=>c.eleveIds.includes(selIns.userId)} onPick={c=>toggleAssign(c.id,selIns.userId)}/>
      {(()=>{ const selectedCours=cours.filter(c=>c.eleveIds.includes(selIns.userId)); return <div style={{marginTop:12,padding:'10px 12px',background:'#F3EEFF',border:'1.5px solid #d8d0ff',borderRadius:4,fontSize:12}}>
        <strong>{selectedCours.length}</strong> créneau{selectedCours.length>1?'x':''} attribué{selectedCours.length>1?'s':''}{selectedCours.length>0?' : ':''}{selectedCours.map(c=>c.matiere+' '+c.jour+' '+hs(c.debut)).join(' · ')}
        {selectedCours.length>0?<div style={{marginTop:4,color:'#7c3aed',fontWeight:600}}>Forfait : {tarifMensuel(selectedCours.length)} €/mois</div>:null}
      </div>; })()}
      <div className="fa"><button className="btn btn-p" onClick={()=>setShowAssign(false)}>✓ Terminé</button></div>
    </Modal>}
  </>;
}

function Admin({user,users,setUsers,resources,setResources,modules,setModules,cours,setCours,grades,factures=[],setFactures,customTrophies=[],setCustomTrophies,awardedTrophies={},setAwardedTrophies,inscriptions=[],setInscriptions}){
  const [tab,setTab]=useState('users');
  const [show,setShow]=useState(false);
  const [form,setForm]=useState({name:'',role:'eleve',niveau:'3ème',matiere:''});
  const [showAcces,setShowAcces]=useState(false);
  const [accesUser,setAccesUser]=useState(null);
  const [accesEmail,setAccesEmail]=useState('');
  const [accesPwd,setAccesPwd]=useState('');
  const [accesBusy,setAccesBusy]=useState(false);
  const [accesErr,setAccesErr]=useState('');
  const [accesMsg,setAccesMsg]=useState('');
  // Gestion groupes
  const [selCours,setSelCours]=useState(null);
  const [searchGroupe,setSearchGroupe]=useState('');
  const [ficheEleve,setFicheEleve]=useState(null); // élève dont on affiche/édite la fiche
  const [ficheForm,setFicheForm]=useState({});
  // Users tab — filtres / pagination
  const [usrSearch,setUsrSearch]=useState('');
  const [usrRole,setUsrRole]=useState('tous');
  const [usrNiveau,setUsrNiveau]=useState('tous');
  const [usrSort,setUsrSort]=useState('name');
  const [usrPage,setUsrPage]=useState(1);
  const [usrSansGroupe,setUsrSansGroupe]=useState(false);
  const PAGE_SIZE=50;
  // Inscriptions
  const [showIns,setShowIns]=useState(false);
  const [selIns,setSelIns]=useState(null);
  const [searchIns,setSearchIns]=useState('');
  const [showAssign,setShowAssign]=useState(false);
  const [insForm,setInsForm]=useState({prenom:'',nom:'',dateNaissance:'',niveau:'3eme',matieres:[],parentNom:'',parentTel:'',parentEmail:'',adresse:'',notes:'',statut:'nouveau'});
  const NIVEAUX_INS=['6ème','5ème','4ème','3ème','Seconde','Première','Terminale','Supérieures'];
  const MATIERES_INS=['Mathematiques','Francais','Physique','Histoire','Anglais','SVT','Philosophie','Informatique'];
  const insStatutStyle=s=>({nouveau:{bg:'#EEF3FF',color:'var(--info)',label:'Nouveau'},actif:{bg:'#EEFFF6',color:'#2D9B6F',label:'Actif'},archive:{bg:'#f5f5f5',color:'#aaa',label:'Archive'}}[s]||{bg:'#f5f5f5',color:'#888',label:s});
  const filteredIns=useMemo(()=>{const q=searchIns.toLowerCase();return inscriptions.filter(i=>q===''||(i.prenom+' '+i.nom).toLowerCase().includes(q)||(i.parentNom||'').toLowerCase().includes(q)||(i.niveau||'').toLowerCase().includes(q));},[inscriptions,searchIns]);
  const saveIns=()=>{
    if(!insForm.prenom.trim()||!insForm.nom.trim())return;
    if(selIns){
      setInscriptions(p=>p.map(i=>i.id===selIns.id?{...i,...insForm}:i));
      setSelIns(prev=>({...prev,...insForm}));
    } else {
      const n={id:'ins'+Date.now(),...insForm,dateInscription:new Date().toISOString().split('T')[0],userId:null};
      setInscriptions(p=>[...p,n]);
    }
    setShowIns(false);
  };
  const activerIns=ins=>{
    if(ins.userId){alert("Cet eleve est deja dans l'effectif.");return;}
    const fullName=ins.prenom+' '+ins.nom;
    const initials=(ins.prenom[0]||'')+(ins.nom[0]||'');
    const newU={id:'u'+Date.now(),name:fullName,role:'eleve',initials:initials.toUpperCase(),matiere:ins.matieres.join(' - ')||null,niveau:ins.niveau,parentNom:ins.parentNom,parentTel:ins.parentTel,parentEmail:ins.parentEmail};
    setUsers(p=>[...p,newU]);
    setInscriptions(p=>p.map(i=>i.id===ins.id?{...i,statut:'actif',userId:newU.id}:i));
    setSelIns(prev=>prev?{...prev,statut:'actif',userId:newU.id}:prev);
    alert(fullName+' ajoute(e) a l effectif !');
  };
  const archiverIns=id=>{setInscriptions(p=>p.map(i=>i.id===id?{...i,statut:'archive'}:i));setSelIns(prev=>prev?.id===id?{...prev,statut:'archive'}:prev);};
  // Trophée form state (hoisted — hooks cannot be called inside IIFE/nested functions)
  const [tf,setTf]=useState({icon:'⭐',name:'',desc:'',cat:'bonus'});
  const TROPHY_CATS=[{k:'debut',l:'Démarrage'},{k:'assiduite',l:'Assiduité'},{k:'module',l:'Modules'},{k:'notes',l:'Notes'},{k:'matiere',l:'Matières'},{k:'progression',l:'Progression'},{k:'comportement',l:'Comportement'},{k:'anciennete',l:'Ancienneté'},{k:'bonus',l:'Bonus'}];
  const addTrophy=()=>{if(!tf.name.trim())return;setCustomTrophies(p=>[...p,{...tf,id:'ct'+Date.now(),type:'manual'}]);setTf({icon:'⭐',name:'',desc:'',cat:'bonus'});};
  const eleves=users.filter(u=>u.role==='eleve');
  const profs=users.filter(u=>u.role==='prof');

  const addUser=()=>{
    if(!form.name.trim())return;
    const initials=form.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    setUsers(p=>[...p,{id:'u'+Date.now(),...form,initials}]);
    setShow(false);setForm({name:'',role:'eleve',niveau:'3ème',matiere:''});
  };
  const genPwd=()=>{ const c='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789'; let s=''; for(let i=0;i<10;i++)s+=c[Math.floor(Math.random()*c.length)]; return s; };
  const slugMail=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'.').replace(/^\.+|\.+$/g,'');
  const domByRole=r=>r==='prof'?'prof.plusdebonnesnotes.com':r==='admin'?'plusdebonnesnotes.com':'eleve.plusdebonnesnotes.com';
  const ouvrirAccesU=(u)=>{ const base=u.email||(slugMail(u.name).slice(0,24)+'@'+domByRole(u.role)); setAccesUser(u); setAccesEmail(base); setAccesPwd(genPwd()); setAccesErr(''); setAccesMsg(''); setShowAcces(true); };
  const creerAccesU=async()=>{ const u=accesUser; if(!u)return; setAccesErr(''); setAccesMsg(''); const mail=accesEmail.toLowerCase().trim(); if(!mail||accesPwd.length<6){ setAccesErr('Indique un identifiant (email) et un mot de passe d\'au moins 6 caractères.'); return; } setAccesBusy(true); try{ const tmp=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:false,autoRefreshToken:false}}); const {data,error}=await tmp.auth.signUp({email:mail,password:accesPwd}); if(error){ setAccesErr('Échec : '+error.message); setAccesBusy(false); return; } if(!data||!data.session){ setAccesErr('Compte non actif immédiatement : désactive « Confirm email » dans Supabase (Auth → Providers → Email) puis recommence (ou cet email est déjà utilisé).'); setAccesBusy(false); return; } const authId=data.user.id; setUsers(p=>p.map(x=>x.id===u.id?{...x,auth_id:authId}:x)); try{await tmp.auth.signOut();}catch(_){ } setAccesMsg('Accès créé. Transmets ces identifiants à la personne.'); }catch(e){ setAccesErr('Erreur : '+((e&&e.message)||'')); } setAccesBusy(false); };
  const delUser=(id)=>{if(id===user.id){alert('Impossible de supprimer votre propre compte.');return;}setUsers(p=>p.filter(u=>u.id!==id));sbDelete('users',id);};

  // Toggle élève dans un cours → propagé instantanément aux listes d'appel + facture auto recalculée
  const toggleEleve=(coursId,eleveId)=>{
    setCours(p=>{
      const updated=p.map(c=>{
        if(c.id!==coursId)return c;
        const already=c.eleveIds.includes(eleveId);
        return {...c,eleveIds:already?c.eleveIds.filter(x=>x!==eleveId):[...c.eleveIds,eleveId]};
      });
      // Auto-facturation : recalculer la facture mensuelle de l'élève
      recalcAutoInvoice({eleveId,coursArr:updated,users,setFactures});
      return updated;
    });
  };

  const stats={eleves:eleves.length,profs:profs.length,dl:resources.reduce((a,r)=>a+r.dl,0),cours:cours.length};
  const curC=cours.find(c=>c.id===selCours);
  const curProf=curC?users.find(u=>u.id===curC.profId):null;


  return <>
    <TB title="Administration"/>
    <div className="pg">
      <div className="sg" style={{marginBottom:20}}>
        <div className="sc c-info"><div className="sc-ic">🎓</div><div className="sc-v">{stats.eleves}</div><div className="sc-l">Élèves</div></div>
        <div className="sc c-navy"><div className="sc-ic">👨‍🏫</div><div className="sc-v">{stats.profs}</div><div className="sc-l">Professeurs</div></div>
        <div className="sc c-gold"><div className="sc-ic">📅</div><div className="sc-v">{stats.cours}</div><div className="sc-l">Cours hebdo</div></div>
        <div className="sc c-ok"><div className="sc-ic">📥</div><div className="sc-v">{stats.dl}</div><div className="sc-l">Téléchargements</div></div>
      </div>
      <div className="tabs">
        <button className={`tab ${tab==='users'?'on':''}`} onClick={()=>setTab('users')}>👥 Utilisateurs</button>
        <button className={`tab ${tab==='groupes'?'on':''}`} onClick={()=>setTab('groupes')}>📋 Groupes</button>
        <button className={`tab ${tab==='resources'?'on':''}`} onClick={()=>setTab('resources')}>📚 Ressources</button>
        <button className={`tab ${tab==='modules'?'on':''}`} onClick={()=>setTab('modules')}>📦 Modules</button>
        <button className={`tab ${tab==='trophees'?'on':''}`} onClick={()=>setTab('trophees')}>🏆 Trophées</button>
      </div>

      {tab==='users'&&(()=>{
        // Filtrage + tri + pagination
        const q=usrSearch.toLowerCase();
        let list=users.filter(u=>{
          if(usrRole!=='tous'&&u.role!==usrRole)return false;
          if(usrSansGroupe&&(u.role!=='eleve'||cours.some(c=>c.eleveIds.includes(u.id))))return false;
          if(usrNiveau!=='tous'&&u.role==='eleve'&&u.niveau!==usrNiveau)return false;
          if(!q)return true;
          return (u.name||'').toLowerCase().includes(q)||
                 (u.niveau||'').toLowerCase().includes(q)||
                 (u.matiere||'').toLowerCase().includes(q)||
                 (u.parentNom||'').toLowerCase().includes(q)||
                 (u.parentEmail||'').toLowerCase().includes(q)||
                 (u.parentTel||'').toLowerCase().includes(q);
        });
        // Tri
        list.sort((a,b)=>{
          if(usrSort==='name')return (a.name||'').localeCompare(b.name||'');
          if(usrSort==='nameDesc')return (b.name||'').localeCompare(a.name||'');
          if(usrSort==='role')return (a.role||'').localeCompare(b.role||'')||(a.name||'').localeCompare(b.name||'');
          if(usrSort==='niveau')return (a.niveau||'').localeCompare(b.niveau||'')||(a.name||'').localeCompare(b.name||'');
          if(usrSort==='groupes'){
            const ga=cours.filter(c=>c.eleveIds.includes(a.id)).length;
            const gb=cours.filter(c=>c.eleveIds.includes(b.id)).length;
            return gb-ga||(a.name||'').localeCompare(b.name||'');
          }
          return 0;
        });
        const total=list.length;
        const nbPages=Math.max(1,Math.ceil(total/PAGE_SIZE));
        const curPage=Math.min(usrPage,nbPages);
        const start=(curPage-1)*PAGE_SIZE;
        const visible=list.slice(start,start+PAGE_SIZE);
        const NIVEAUX_LIST=[...new Set(users.filter(u=>u.role==='eleve'&&u.niveau).map(u=>u.niveau))].sort();
        // Stats compactes
        const cntEleves=users.filter(u=>u.role==='eleve').length;
        const cntProfs=users.filter(u=>u.role==='prof').length;
        const cntAdmins=users.filter(u=>u.role==='admin').length;
        const sansGroupe=users.filter(u=>u.role==='eleve'&&!cours.some(c=>c.eleveIds.includes(u.id))).length;
        return<>
          <div className="sh"><h2 className="st">Utilisateurs ({users.length})</h2><button className="btn btn-p" onClick={()=>setShow(true)}>＋ Ajouter</button></div>
          {/* Mini-stats */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:8,marginBottom:14}}>
            {[
              {icon:'🎓',val:cntEleves,label:'Élèves',col:'#1a4fc4',bg:'#f4f7ff',active:usrRole==='eleve'&&!usrSansGroupe,action:()=>{setUsrSansGroupe(false);setUsrRole('eleve');setUsrPage(1);}},
              {icon:'👨‍🏫',val:cntProfs,label:'Professeurs',col:'#1a2340',bg:'#f5f3ff',active:usrRole==='prof',action:()=>{setUsrSansGroupe(false);setUsrRole('prof');setUsrPage(1);}},
              {icon:'⚙️',val:cntAdmins,label:'Admins',col:'#c47a00',bg:'#fff8e0',active:usrRole==='admin',action:()=>{setUsrSansGroupe(false);setUsrRole('admin');setUsrPage(1);}},
              {icon:'⚠️',val:sansGroupe,label:'Élèves sans groupe',col:'#b02020',bg:'#fff0f0',active:usrSansGroupe,action:()=>{setUsrRole('eleve');setUsrSansGroupe(true);setUsrNiveau('tous');setUsrPage(1);}},
            ].map((k,i)=>(
              <div key={i} onClick={k.action||(()=>{})} style={{background:k.bg,border:`1.5px solid ${k.active?k.col:k.col+'40'}`,borderRadius:6,padding:'10px 12px',cursor:k.action?'pointer':'default',transition:'all .15s',boxShadow:k.active?`0 0 0 2px ${k.col}33`:'none'}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:18}}>{k.icon}</span>
                  <div>
                    <div style={{fontWeight:700,fontSize:18,color:k.col,fontFamily:'var(--ff-serif)'}}>{k.val}</div>
                    <div style={{fontSize:10,color:'#6b7ab5'}}>{k.label}</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
          {/* Barre recherche + filtres */}
          <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap',alignItems:'center',background:'white',padding:'10px 12px',border:'1.5px solid #e0e8f5',borderRadius:6}}>
            <div style={{flex:1,minWidth:200,position:'relative'}}>
              <input value={usrSearch} onChange={e=>{setUsrSearch(e.target.value);setUsrPage(1);}}
                placeholder="🔍 Rechercher nom, niveau, matière, parent, email…"
                style={{width:'100%',padding:'7px 30px 7px 12px',border:'1.5px solid #dde3f0',borderRadius:4,fontSize:12,fontFamily:'var(--ff-mono)'}}/>
              {usrSearch&&<button onClick={()=>setUsrSearch('')} style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'#aaa',fontSize:12}}>✕</button>}
            </div>
            <select value={usrRole} onChange={e=>{setUsrRole(e.target.value);setUsrSansGroupe(false);setUsrPage(1);}} style={{padding:'6px 10px',border:'1.5px solid #dde3f0',borderRadius:4,fontSize:11,background:'white',fontFamily:'var(--ff-mono)'}}>
              <option value="tous">Tous rôles</option>
              <option value="eleve">🎓 Élèves</option>
              <option value="prof">👨‍🏫 Professeurs</option>
              <option value="admin">⚙️ Admins</option>
            </select>
            {(usrRole==='eleve'||usrRole==='tous')&&NIVEAUX_LIST.length>0&&<select value={usrNiveau} onChange={e=>{setUsrNiveau(e.target.value);setUsrPage(1);}} style={{padding:'6px 10px',border:'1.5px solid #dde3f0',borderRadius:4,fontSize:11,background:'white',fontFamily:'var(--ff-mono)'}}>
              <option value="tous">Tous niveaux</option>
              {NIVEAUX_LIST.map(n=><option key={n} value={n}>{n}</option>)}
            </select>}
            <select value={usrSort} onChange={e=>setUsrSort(e.target.value)} style={{padding:'6px 10px',border:'1.5px solid #dde3f0',borderRadius:4,fontSize:11,background:'white',fontFamily:'var(--ff-mono)'}}>
              <option value="name">Tri : A → Z</option>
              <option value="nameDesc">Tri : Z → A</option>
              <option value="role">Tri : Rôle</option>
              <option value="niveau">Tri : Niveau</option>
              <option value="groupes">Tri : Nb groupes ↓</option>
            </select>
            {(usrSearch||usrRole!=='tous'||usrNiveau!=='tous'||usrSansGroupe)&&<button onClick={()=>{setUsrSearch('');setUsrRole('tous');setUsrNiveau('tous');setUsrSansGroupe(false);setUsrPage(1);}} style={{padding:'5px 10px',background:'#fff0f0',color:'#b02020',border:'1.5px solid #f5b8b8',borderRadius:4,fontSize:11,cursor:'pointer',fontWeight:600}}>✕ Réinitialiser</button>}
          </div>
          {/* Bandeau résultats */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:11,color:'var(--muted)',marginBottom:8,padding:'0 4px'}}>
            <span><strong style={{color:'#1a2340'}}>{total}</strong> résultat{total>1?'s':''} {(usrSearch||usrRole!=='tous'||usrNiveau!=='tous')&&<span>· filtré{total>1?'s':''} sur {users.length}</span>}</span>
            {nbPages>1&&<span>Page {curPage}/{nbPages}</span>}
          </div>
          {/* Tableau compact */}
          {total===0?<div className="emp" style={{padding:'40px 20px'}}><div className="emp-icon">🔍</div><h3>Aucun résultat</h3><p>Essayez d'élargir vos filtres.</p></div>:
          <div style={{background:'white',border:'1.5px solid #e0e8f5',borderRadius:6,overflow:'hidden'}}>
            <div style={{display:'grid',gridTemplateColumns:'2fr 90px 1fr 120px 150px',gap:0,padding:'8px 14px',background:'#f8faff',borderBottom:'2px solid #e8ecf5',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:.6,color:'#8892b0'}}>
              <span>Nom</span><span>Rôle</span><span>Détails</span><span>Groupes / Contact</span><span style={{textAlign:'right'}}>Actions</span>
            </div>
            {visible.map(u=>{
              const groupes=cours.filter(c=>c.eleveIds.includes(u.id));
              return<div key={u.id} style={{display:'grid',gridTemplateColumns:'2fr 90px 1fr 120px 150px',gap:0,padding:'8px 14px',borderBottom:'1px solid #f0f4fc',alignItems:'center',background:'white',transition:'background .15s'}}
                onMouseEnter={e=>e.currentTarget.style.background='#fafbff'}
                onMouseLeave={e=>e.currentTarget.style.background='white'}>
                <div style={{display:'flex',alignItems:'center',gap:9,minWidth:0}}>
                  <div style={{width:28,height:28,borderRadius:'50%',background:u.role==='admin'?'#fff8e0':u.role==='prof'?'#f5f3ff':'var(--navy)',color:u.role==='admin'?'#c47a00':u.role==='prof'?'#7c3aed':'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>{RI[u.role]}</div>
                  <div style={{minWidth:0,flex:1}}>
                    <div style={{fontWeight:600,fontSize:13,color:'#1a2340',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.name}</div>
                    {u.parentNom&&<div style={{fontSize:10,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>👨‍👩‍👧 {u.parentNom}</div>}
                  </div>
                </div>
                <span style={{padding:'2px 8px',borderRadius:2,fontSize:10,fontWeight:700,background:u.role==='admin'?'#fff8e0':u.role==='prof'?'#f5f3ff':'#EEFFF6',color:u.role==='admin'?'#c47a00':u.role==='prof'?'#7c3aed':'#2D9B6F',width:'fit-content'}}>{RL[u.role]}</span>
                <span style={{fontSize:12,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.niveau||u.matiere||'—'}</span>
                <div style={{display:'flex',flexDirection:'column',gap:1,fontSize:11,color:'var(--muted)'}}>
                  {u.role==='eleve'&&<span style={{color:groupes.length>0?'#1a4fc4':'#b02020',fontWeight:600}}>📚 {groupes.length} groupe{groupes.length>1?'s':''}{groupes.length===0&&' ⚠'}</span>}
                  {u.parentTel&&<span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>📞 {u.parentTel}</span>}
                  {u.parentEmail&&<span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>✉ {u.parentEmail.slice(0,18)}{u.parentEmail.length>18?'…':''}</span>}
                </div>
                <div style={{display:'flex',gap:4,justifyContent:'flex-end'}}>
                  {u.role==='eleve'&&<button className="btn btn-sm" style={{background:'#EEF3FF',border:'1.5px solid #C8D8F5',color:'var(--info)',fontSize:10,padding:'3px 7px'}} onClick={()=>{setFicheForm({name:u.name,niveau:u.niveau||'3ème',etablissement:u.etablissement||'',dateNaissance:u.dateNaissance||'',parentNom:u.parentNom||'',parentTel:u.parentTel||'',parentEmail:u.parentEmail||'',adresse:u.adresse||'',notes:u.notes||''});setFicheEleve(u);}}>📋</button>}
                  {u.auth_id?<span title="Accès de connexion créé" style={{fontSize:11,color:'#1a7a4a',fontWeight:700,alignSelf:'center'}}>🔑✓</span>:<button className="btn btn-sm" style={{background:'#F3EEFF',border:'1.5px solid #d8d0ff',color:'#7c3aed',fontSize:10,padding:'3px 7px'}} onClick={()=>ouvrirAccesU(u)} title="Créer un accès de connexion">🔑</button>}
                  <button className="btn btn-d btn-sm" style={{fontSize:10,padding:'3px 7px'}} onClick={()=>delUser(u.id)}>🗑️</button>
                </div>
              </div>;
            })}
          </div>}
          {/* Pagination */}
          {nbPages>1&&<div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:6,marginTop:14}}>
            <button onClick={()=>setUsrPage(1)} disabled={curPage===1} style={{padding:'5px 10px',background:'white',border:'1.5px solid #dde3f0',borderRadius:4,fontSize:12,cursor:curPage===1?'not-allowed':'pointer',opacity:curPage===1?.4:1,color:'#1a4fc4',fontWeight:600}}>«</button>
            <button onClick={()=>setUsrPage(p=>Math.max(1,p-1))} disabled={curPage===1} style={{padding:'5px 10px',background:'white',border:'1.5px solid #dde3f0',borderRadius:4,fontSize:12,cursor:curPage===1?'not-allowed':'pointer',opacity:curPage===1?.4:1,color:'#1a4fc4',fontWeight:600}}>‹</button>
            {(()=>{
              const pages=[];
              const range=2;
              for(let i=Math.max(1,curPage-range);i<=Math.min(nbPages,curPage+range);i++)pages.push(i);
              return pages.map(i=><button key={i} onClick={()=>setUsrPage(i)} style={{padding:'5px 11px',background:i===curPage?'#1a4fc4':'white',color:i===curPage?'white':'#1a4fc4',border:`1.5px solid ${i===curPage?'#1a4fc4':'#dde3f0'}`,borderRadius:4,fontSize:12,cursor:'pointer',fontWeight:i===curPage?700:500,minWidth:32}}>{i}</button>);
            })()}
            <button onClick={()=>setUsrPage(p=>Math.min(nbPages,p+1))} disabled={curPage===nbPages} style={{padding:'5px 10px',background:'white',border:'1.5px solid #dde3f0',borderRadius:4,fontSize:12,cursor:curPage===nbPages?'not-allowed':'pointer',opacity:curPage===nbPages?.4:1,color:'#1a4fc4',fontWeight:600}}>›</button>
            <button onClick={()=>setUsrPage(nbPages)} disabled={curPage===nbPages} style={{padding:'5px 10px',background:'white',border:'1.5px solid #dde3f0',borderRadius:4,fontSize:12,cursor:curPage===nbPages?'not-allowed':'pointer',opacity:curPage===nbPages?.4:1,color:'#1a4fc4',fontWeight:600}}>»</button>
            <span style={{fontSize:11,color:'var(--muted)',marginLeft:8}}>{start+1}–{Math.min(start+PAGE_SIZE,total)} sur {total}</span>
          </div>}
        </>;
      })()}

      {tab==='groupes'&&<div style={{display:'grid',gridTemplateColumns:'280px 1fr',gap:20}}>
        {/* Liste des cours */}
        <div>
          <div style={{fontFamily:'Playfair Display,serif',fontSize:14,fontWeight:600,marginBottom:10}}>Cours ({cours.length})</div>
          <div className="epanel">
            {cours.map(c=>{
              const p=users.find(u=>u.id===c.profId);
              const clr=nc(c.niveau);
              return <div key={c.id} className={`eitem ${selCours===c.id?'on':''}`} onClick={()=>setSelCours(c.id)}>
                <div>
                  <div className="ei-n" style={{display:'flex',alignItems:'center',gap:6}}>
                    <span style={{width:8,height:8,borderRadius:2,background:selCours===c.id?'var(--gold)':clr.bd,flexShrink:0,display:'inline-block'}}/>
                    {c.matiere}
                  </div>
                  <div className="ei-l">{c.niveau} · {c.jour} {hs(c.debut)}–{hs(c.fin)}</div>
                  <div className="ei-l" style={{marginTop:1}}>{p?.name.split(' ').slice(-1)[0]} · {c.eleveIds.length} élève{c.eleveIds.length>1?'s':''}</div>
                </div>
              </div>;
            })}
          </div>
        </div>

        {/* Gestion élèves du cours sélectionné */}
        <div>
          {!selCours?<div className="emp"><div className="emp-icon">📋</div><h3>Sélectionnez un cours</h3><p>Gérez les élèves inscrits dans chaque groupe.</p></div>:(
            <>
              {/* Header cours */}
              <div style={{background:'white',borderRadius:0,padding:'14px 18px',border:'1.5px solid var(--cream2)',marginBottom:16}}>
                <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
                  <div style={{...getCoursBadge(curC.matiere),fontSize:13}}>{curC.matiere}</div>
                  <div style={{fontWeight:600,fontSize:14}}>{curC.niveau}</div>
                  <div style={{marginLeft:'auto',fontSize:12,color:'var(--muted)'}}>{curC.jour} · {hs(curC.debut)}–{hs(curC.fin)} · {curC.salle}</div>
                </div>
                <div style={{fontSize:12,color:'var(--muted)'}}>
                  👨‍🏫 {curProf?.name} · {curC.eleveIds.length} élève{curC.eleveIds.length>1?'s':''} inscrit{curC.eleveIds.length>1?'s':''}
                  <span style={{marginLeft:10,fontSize:11,color:'var(--ok)'}}>↓ Toute modification est répercutée instantanément sur la liste d'appel du professeur</span>
                </div>
              </div>

              {/* Recherche + Grille élèves avec toggle */}
              {(()=>{
              const elevesFiltres=searchGroupe?eleves.filter(e=>e.name.toLowerCase().includes(searchGroupe.toLowerCase())||(e.niveau||'').toLowerCase().includes(searchGroupe.toLowerCase())):eleves;
              const inscrits=elevesFiltres.filter(e=>curC.eleveIds.includes(e.id));
              const nonInscrits=elevesFiltres.filter(e=>!curC.eleveIds.includes(e.id));
              return <>
                <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center'}}>
                  <div style={{position:'relative',flex:1}}>
                    <input className="fi" placeholder="🔍 Chercher un élève à ajouter…" value={searchGroupe} onChange={e=>setSearchGroupe(e.target.value)} style={{fontSize:12,padding:'6px 10px',width:'100%'}}/>
                    {searchGroupe&&<button onClick={()=>setSearchGroupe('')} style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'#aaa',fontSize:12}}>✕</button>}
                  </div>
                  <span style={{fontSize:11,color:'var(--muted)',whiteSpace:'nowrap'}}>{curC.eleveIds.length}/{eleves.length} inscrits</span>
                </div>
                {inscrits.length>0&&<>
                  <div style={{fontSize:10,fontWeight:700,color:'var(--ok)',textTransform:'uppercase',letterSpacing:.5,marginBottom:6}}>✓ Inscrits ({inscrits.length})</div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(190px,1fr))',gap:8,marginBottom:14}}>
                    {inscrits.map(e=><div key={e.id} onClick={()=>toggleEleve(curC.id,e.id)}
                      style={{background:'linear-gradient(135deg,#EEF5FF,white)',borderRadius:0,padding:'10px 13px',border:'2px solid var(--gold)',cursor:'pointer',display:'flex',alignItems:'center',gap:9}}>
                      <div style={{width:28,height:28,borderRadius:2,background:'var(--navy)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,flexShrink:0}}>✓</div>
                      <div><div style={{fontSize:12,fontWeight:700,color:'var(--navy)'}}>{e.name}</div><div style={{fontSize:11,color:'var(--muted)'}}>{e.niveau}</div></div>
                    </div>)}
                  </div>
                </>}
                {nonInscrits.length>0&&<>
                  <div style={{fontSize:10,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5,marginBottom:6}}>+ Ajouter au groupe ({nonInscrits.length})</div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(190px,1fr))',gap:8}}>
                    {nonInscrits.map(e=><div key={e.id} onClick={()=>toggleEleve(curC.id,e.id)}
                      style={{background:'white',borderRadius:0,padding:'10px 13px',border:'2px solid var(--cream2)',cursor:'pointer',display:'flex',alignItems:'center',gap:9,transition:'all .1s'}}>
                      <div style={{width:28,height:28,borderRadius:2,background:'var(--cream2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,flexShrink:0}}>🎓</div>
                      <div><div style={{fontSize:12,fontWeight:500}}>{e.name}</div><div style={{fontSize:11,color:'var(--muted)'}}>{e.niveau}</div></div>
                    </div>)}
                  </div>
                </>}
                {elevesFiltres.length===0&&<div style={{textAlign:'center',padding:'20px',color:'var(--muted)',fontSize:12}}>Aucun élève trouvé</div>}
              </>;})()} 
            </>
          )}
        </div>
      </div>}

      {tab==='resources'&&<>
        <div className="sh"><h2 className="st">Ressources ({resources.length})</h2></div>
        <table className="tbl">
          <thead><tr><th>Titre</th><th>Type</th><th>Matière</th><th>DL</th><th></th></tr></thead>
          <tbody>{resources.map(r=><tr key={r.id}><td style={{fontSize:12,maxWidth:180}}>{r.title}</td><td><span className={`rtag ${TC[r.type]}`} style={{fontSize:9}}>{TL[r.type]}</span></td><td style={{fontSize:12}}>{r.matiere}</td><td style={{fontSize:12,color:'var(--muted)'}}>{r.dl}</td><td><button className="btn btn-d btn-sm" onClick={()=>{setResources(p=>p.filter(x=>x.id!==r.id));sbDelete('ressources',r.id);}}>🗑️</button></td></tr>)}</tbody>
        </table>
      </>}
      {tab==='modules'&&<>
        <div className="sh"><h2 className="st">Modules ({modules.length})</h2></div>
        <table className="tbl">
          <thead><tr><th>Module</th><th>Matière</th><th>Date</th><th>Inscriptions</th><th></th></tr></thead>
          <tbody>{modules.map(m=>{const pct=(m.inscrits/m.places)*100;return<tr key={m.id}>
            <td><div style={{display:'flex',alignItems:'center',gap:7}}><span>{m.emoji}</span><span style={{fontWeight:500,fontSize:13}}>{m.title}</span></div></td>
            <td style={{fontSize:12}}>{m.matiere}</td><td style={{fontSize:12,color:'var(--muted)'}}>{m.date}</td>
            <td><div style={{display:'flex',alignItems:'center',gap:7}}><div className="pb" style={{width:48}}><div className="pbf" style={{width:`${pct}%`,background:pct>=100?'var(--err)':'var(--ok)'}}/></div><span style={{fontSize:12}}>{m.inscrits}/{m.places}</span></div></td>
            <td><button className="btn btn-d btn-sm" onClick={()=>{setModules(p=>p.filter(x=>x.id!==m.id));sbDelete('modules',m.id);}}>🗑️</button></td>
          </tr>;})}
          </tbody>
        </table>
      </>}
    </div>
      {tab==='trophees'&&<>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
          {/* Add trophy form */}
          <div style={{background:'white',border:'1.5px solid var(--cream2)',borderRadius:0,padding:'20px'}}>
            <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:16,fontWeight:600,marginBottom:16,color:'var(--navy)'}}>Créer un trophée</div>
            <>
              <div style={{display:'grid',gridTemplateColumns:'64px 1fr',gap:10,marginBottom:10}}>
                <div className="fg"><label className="fl">Icône</label><input className="fi" style={{textAlign:'center',fontSize:20}} value={tf.icon} onChange={e=>setTf(t=>({...t,icon:e.target.value}))}/></div>
                <div className="fg"><label className="fl">Nom *</label><input className="fi" value={tf.name} onChange={e=>setTf(t=>({...t,name:e.target.value}))} placeholder="Ex: Meilleure progression"/></div>
              </div>
              <div className="fg"><label className="fl">Description</label><input className="fi" value={tf.desc} onChange={e=>setTf(t=>({...t,desc:e.target.value}))} placeholder="Ex: A fait le plus gros effort ce trimestre"/></div>
              <div className="fg"><label className="fl">Catégorie</label>
                <select className="fi" value={tf.cat} onChange={e=>setTf(t=>({...t,cat:e.target.value}))}>
                  {TROPHY_CATS.map(c=><option key={c.k} value={c.k}>{c.l}</option>)}
                </select>
              </div>
              <div className="fa" style={{marginTop:8}}><button className="btn btn-p" onClick={addTrophy}>Créer le trophée</button></div>
            </>
          </div>

          {/* Custom trophies list */}
          <div>
            <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:16,fontWeight:600,marginBottom:12,color:'var(--navy)'}}>Trophées personnalisés ({(customTrophies||[]).length})</div>
            {(customTrophies||[]).length===0
              ?<div style={{color:'var(--muted)',fontSize:13,textAlign:'center',padding:'30px 0'}}>Aucun trophée créé.<br/>Créez-en un à gauche.</div>
              :(customTrophies||[]).map(t=><div key={t.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'white',border:'1.5px solid var(--cream2)',borderRadius:0,marginBottom:8}}>
                <span style={{fontSize:24,flexShrink:0}}>{t.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13}}>{t.name}</div>
                  <div style={{fontSize:11,color:'var(--muted)'}}>{t.desc}</div>
                  <span style={{fontSize:10,padding:'1px 6px',background:'#EEF5FF',color:'var(--gold)',borderRadius:2,fontWeight:600,marginTop:3,display:'inline-block'}}>{t.cat}</span>
                </div>
                <button className="btn btn-d btn-sm" onClick={()=>setCustomTrophies(p=>p.filter(x=>x.id!==t.id))}>🗑️</button>
              </div>)
            }
          </div>
        </div>

        {/* Award trophies to students */}
        <div style={{marginTop:24}}>
          <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:16,fontWeight:600,marginBottom:12,color:'var(--navy)'}}>Attribuer un trophée manuellement</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:12}}>
            {users.filter(u=>u.role==='eleve').map(e=>{
              const myAwarded=Object.keys(awardedTrophies||{}).filter(k=>k.startsWith(e.id+'_'));
              const allCustom=[...(customTrophies||[]),...TROPHIES.filter(t=>t.cat==='bonus')];
              return <div key={e.id} style={{background:'white',border:'1.5px solid var(--cream2)',borderRadius:0,padding:'14px'}}>
                <div style={{fontWeight:600,marginBottom:8}}>{e.name} <span style={{fontWeight:400,color:'var(--muted)',fontSize:12}}>· {e.niveau}</span></div>
                <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:8}}>
                  {myAwarded.map(k=>{const tid=k.split('_')[1];const t=[...TROPHIES,...(customTrophies||[])].find(x=>x.id===tid);return t?<span key={k} title={t.desc} style={{fontSize:16}}>{t.icon}</span>:null;})}
                  {myAwarded.length===0&&<span style={{fontSize:11,color:'var(--muted)',fontStyle:'italic'}}>Aucun trophée attribué</span>}
                </div>
                <select className="fi" style={{fontSize:12}} onChange={ev=>{const tid=ev.target.value;if(!tid)return;const key=e.id+'_'+tid;setAwardedTrophies(p=>({...p,[key]:true}));ev.target.value='';}}>
                  <option value="">＋ Attribuer un trophée…</option>
                  {allCustom.map(t=><option key={t.id} value={t.id}>{t.icon} {t.name}</option>)}
                </select>
              </div>;
            })}
          </div>
        </div>
      </>}

    
      {/* ── Inscriptions tab moved to dedicated Inscriptions page ── */}


    {/* ── Modale Fiche Élève ── */}
    {ficheEleve&&<Modal title={`📋 Fiche — ${ficheEleve.name}`} onClose={()=>setFicheEleve(null)}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div className="fg"><label className="fl">Nom complet</label><input className="fi" value={ficheForm.name} onChange={e=>setFicheForm(p=>({...p,name:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Niveau</label>
          <select className="fi" value={ficheForm.niveau} onChange={e=>setFicheForm(p=>({...p,niveau:e.target.value}))}>
            {NIVEAUX.filter(n=>n!=='Tous').map(n=><option key={n}>{n}</option>)}
          </select>
        </div>
        <div className="fg"><label className="fl">Date de naissance</label><input className="fi" type="date" value={ficheForm.dateNaissance} onChange={e=>setFicheForm(p=>({...p,dateNaissance:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Établissement fréquenté</label><input className="fi" value={ficheForm.etablissement} placeholder="Ex: Collège Paul Éluard" onChange={e=>setFicheForm(p=>({...p,etablissement:e.target.value}))}/></div>
      </div>
      <div style={{borderTop:'1.5px solid var(--cream2)',margin:'12px 0 10px',fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5}}>Contact parent / tuteur</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div className="fg"><label className="fl">Nom du parent</label><input className="fi" value={ficheForm.parentNom} onChange={e=>setFicheForm(p=>({...p,parentNom:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Téléphone</label><input className="fi" type="tel" value={ficheForm.parentTel} onChange={e=>setFicheForm(p=>({...p,parentTel:e.target.value}))}/></div>
        <div className="fg" style={{gridColumn:'1/-1'}}><label className="fl">Email</label><input className="fi" type="email" value={ficheForm.parentEmail} onChange={e=>setFicheForm(p=>({...p,parentEmail:e.target.value}))}/></div>
        <div className="fg" style={{gridColumn:'1/-1'}}><label className="fl">Adresse domicile</label><input className="fi" value={ficheForm.adresse} placeholder="Rue, code postal, ville" onChange={e=>setFicheForm(p=>({...p,adresse:e.target.value}))}/></div>
      </div>
      <div style={{borderTop:'1.5px solid var(--cream2)',margin:'12px 0 10px',fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5}}>Groupes & créneaux</div>
      <div style={{display:'flex',flexDirection:'column',gap:5,maxHeight:180,overflowY:'auto',marginBottom:10}}>
        {cours.map(c=>{
          const inscrit=c.eleveIds.includes(ficheEleve.id);
          const p=users.find(u=>u.id===c.profId);
          return <div key={c.id} onClick={()=>toggleEleve(c.id,ficheEleve.id)}
            style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',border:`2px solid ${inscrit?'var(--gold)':'var(--cream2)'}`,background:inscrit?'#EEF5FF':'white',cursor:'pointer',borderRadius:2}}>
            <div style={{width:22,height:22,background:inscrit?'var(--navy)':'var(--cream2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,flexShrink:0,borderRadius:2}}>{inscrit?'✓':'+'}</div>
            <div style={{flex:1}}>
              <span style={{...getCoursBadge(c.matiere),fontSize:10,marginRight:6}}>{c.matiere}</span>
              <span style={{fontSize:12,fontWeight:500}}>{c.niveau}</span>
              <span style={{fontSize:11,color:'var(--muted)',marginLeft:6}}>{c.jour} {hs(c.debut)}–{hs(c.fin)} · {p?.name.split(' ').slice(-1)[0]}</span>
            </div>
          </div>;
        })}
      </div>
      <div className="fg"><label className="fl">Notes internes</label>
        <textarea className="fi" rows={2} value={ficheForm.notes} onChange={e=>setFicheForm(p=>({...p,notes:e.target.value}))} placeholder="Besoins particuliers, remarques…" style={{resize:'vertical',fontSize:12}}/>
      </div>
      <div className="fa">
        <button className="btn btn-o" onClick={()=>setFicheEleve(null)}>Annuler</button>
        <button className="btn btn-p" onClick={()=>{
          setUsers(p=>p.map(u=>u.id===ficheEleve.id?{...u,...ficheForm,initials:(ficheForm.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase())}:u));
          setFicheEleve(null);
        }}>💾 Enregistrer</button>
      </div>
    </Modal>}

    {showAcces&&accesUser&&<Modal title={'Accès de connexion — '+accesUser.name} onClose={()=>setShowAcces(false)} width="460px">
      <div style={{fontSize:12,color:'var(--muted)',marginBottom:12}}>Rôle : <strong>{RL[accesUser.role]||accesUser.role}</strong></div>
      <div className="fg"><label className="fl">Identifiant (email de connexion)</label><input className="fi" value={accesEmail} onChange={e=>setAccesEmail(e.target.value)}/></div>
      <div className="fg"><label className="fl">Mot de passe</label><div style={{display:'flex',gap:8}}><input className="fi" style={{flex:1}} value={accesPwd} onChange={e=>setAccesPwd(e.target.value)}/><button className="btn btn-o btn-sm" onClick={()=>setAccesPwd(genPwd())}>↻ Générer</button></div></div>
      {accesErr?<div style={{background:'#fdecef',border:'1.5px solid #f3b8c2',color:'#b3243b',padding:'9px 13px',borderRadius:5,fontSize:12.5,marginBottom:8}}>{accesErr}</div>:null}
      {accesMsg?<div style={{background:'#EEFFF6',border:'1.5px solid #b8dbb8',color:'#1a7a4a',padding:'9px 13px',borderRadius:5,fontSize:12.5,marginBottom:8}}>✓ {accesMsg}<div style={{marginTop:6,fontFamily:'monospace',color:'#1a2340',wordBreak:'break-all'}}>Identifiant : {accesEmail}<br/>Mot de passe : {accesPwd}</div></div>:null}
      <div className="fa">{accesMsg?<button className="btn btn-p" onClick={()=>setShowAcces(false)}>Terminé</button>:<button className="btn btn-p" disabled={accesBusy} onClick={creerAccesU}>{accesBusy?'Création…':'Créer l\'accès'}</button>}</div>
    </Modal>}
    {show&&<Modal title="Ajouter un utilisateur" onClose={()=>setShow(false)}>
      <div className="fg"><label className="fl">Nom complet *</label><input className="fi" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Ex: Lucas Moreau"/></div>
      <div className="fg"><label className="fl">Rôle</label><select className="fi" value={form.role} onChange={e=>setForm({...form,role:e.target.value})}><option value="eleve">Élève</option><option value="prof">Professeur</option><option value="admin">Administrateur</option></select></div>
      {form.role==='eleve'&&<div className="fg"><label className="fl">Niveau</label><select className="fi" value={form.niveau} onChange={e=>setForm({...form,niveau:e.target.value})}>{NIVEAUX.filter(n=>n!=='Tous').map(n=><option key={n}>{n}</option>)}</select></div>}
      {form.role==='prof'&&<div className="fg"><label className="fl">Matières</label><input className="fi" value={form.matiere} onChange={e=>setForm({...form,matiere:e.target.value})} placeholder="Mathématiques, Physique"/></div>}
      <div className="fa"><button className="btn btn-o" onClick={()=>setShow(false)}>Annuler</button><button className="btn btn-p" onClick={addUser}>Ajouter</button></div>
    </Modal>}

  </>;
}



// ─── STATISTIQUES ───
function Statistiques({users,cours,setCours,factures,salaires,setSalaires,charges=[],setCharges}){
  const [tab,setTab]=useState('actuel');
  const [showSal,setShowSal]=useState(false);
  const [showCharge,setShowCharge]=useState(false);
  const [editCharge,setEditCharge]=useState(null);
  const [chargeForm,setChargeForm]=useState({nom:'',montant:'',frequence:'mensuelle',categorie:'Frais généraux',type:'fixe'});
  const [simulCroissance,setSimulCroissance]=useState(0); // % d'élèves en plus
  const [horizonMois,setHorizonMois]=useState(6); // projection sur N mois
  const [tauxRetention,setTauxRetention]=useState(90); // % maintien
  const [editPlacesId,setEditPlacesId]=useState(null);

  const profs=users.filter(u=>u.role==='prof');
  const eleves=users.filter(u=>u.role==='eleve');
  const TARIF=55;
  const DEFAULT_PLACES=12; // capacité salle par défaut

  // ── Helpers ──
  const netOf=f=>f.montant-(f.reduction||0);
  const totalBille=factures.reduce((a,f)=>a+netOf(f),0);
  const totalPaye=factures.filter(f=>f.statut==='paye').reduce((a,f)=>a+netOf(f),0);
  const totalAttente=factures.filter(f=>f.statut==='attente').reduce((a,f)=>a+netOf(f),0);
  const totalRetard=factures.filter(f=>f.statut==='retard').reduce((a,f)=>a+netOf(f),0);
  const tauxEncaissement=totalBille>0?Math.round((totalPaye/totalBille)*100):0;
  const tauxRetard=totalBille>0?Math.round((totalRetard/totalBille)*100):0;

  // MRR
  const mrrParEleve=eleves.map(e=>{const mats=new Set(cours.filter(c=>c.eleveIds.includes(e.id)).map(c=>c.matiere));const nbc=cours.filter(c=>c.eleveIds.includes(e.id)).length;return{id:e.id,name:e.name,niveau:e.niveau,matieres:[...mats],mrr:tarifMensuel(nbc)};}).filter(e=>e.mrr>0);
  const mrrTotal=mrrParEleve.reduce((a,e)=>a+e.mrr,0);

  // Salaires profs
  const salProfs=profs.map(p=>{const sal=salaires.find(s=>s.profId===p.id)||{tauxHoraire:35};const heures=cours.filter(c=>c.profId===p.id).reduce((a,c)=>a+(c.fin-c.debut),0);const salMensuel=Math.round(sal.tauxHoraire*heures*4.33);return{...p,tauxHoraire:sal.tauxHoraire,heuresHebdo:heures.toFixed(1),salMensuel};});
  const totalSalMensuel=salProfs.reduce((a,p)=>a+p.salMensuel,0);

  // Charges normalisées en mensuel
  const monthlyCharges=charges.reduce((a,c)=>{
    if(c.frequence==='mensuelle')return a+(c.montant||0);
    if(c.frequence==='annuelle')return a+(c.montant||0)/12;
    return a; // ponctuelle ignorée du mensuel
  },0);
  const monthlyChargesRounded=Math.round(monthlyCharges);
  const annualCharges=charges.reduce((a,c)=>{
    if(c.frequence==='mensuelle')return a+(c.montant||0)*12;
    if(c.frequence==='annuelle')return a+(c.montant||0);
    if(c.frequence==='ponctuelle')return a+(c.montant||0);
    return a;
  },0);

  // Marge nette = MRR - Salaires - Charges
  const margeMensuelle=mrrTotal-totalSalMensuel-monthlyChargesRounded;
  const margeRate=mrrTotal>0?Math.round((margeMensuelle/mrrTotal)*100):0;
  const breakevenEleves=(()=>{
    // Combien d'élèves "moyens" il faut pour couvrir les charges fixes + salaires
    if(mrrParEleve.length===0)return null;
    const mrrMoyenParEleve=mrrTotal/mrrParEleve.length;
    if(mrrMoyenParEleve===0)return null;
    return Math.ceil((totalSalMensuel+monthlyChargesRounded)/mrrMoyenParEleve);
  })();

  // Familles
  const familles=useMemo(()=>{
    const map={};
    eleves.forEach(e=>{const ln=e.name.trim().split(/\s+/).slice(-1)[0];const id='fam_'+ln.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');if(!map[id])map[id]={id,nom:'Famille '+ln,eleveIds:[e.id]};else map[id].eleveIds.push(e.id);});
    return Object.values(map);
  },[eleves]);
  const famStats=familles.map(fam=>{const ff=factures.filter(f=>f.familleId===fam.id);const total=ff.reduce((a,f)=>a+netOf(f),0);const paye=ff.filter(f=>f.statut==='paye').reduce((a,f)=>a+netOf(f),0);const retard=ff.filter(f=>f.statut==='retard').reduce((a,f)=>a+netOf(f),0);const mats=new Set(cours.filter(c=>c.eleveIds.some(eid=>fam.eleveIds.includes(eid))).map(c=>c.matiere));return{...fam,total,paye,retard,taux:total>0?Math.round((paye/total)*100):0,mrr:(fam.eleveIds||[]).reduce((s,id)=>s+tarifMensuel(cours.filter(c=>c.eleveIds.includes(id)).length),0)};}).filter(f=>f.total>0||f.mrr>0).sort((a,b)=>b.retard-a.retard);

  // Évolution CA 12 mois
  const evolution=useMemo(()=>{
    const out=[];const today=new Date();
    for(let i=11;i>=0;i--){
      const d=new Date(today.getFullYear(),today.getMonth()-i,1);
      const ms=d.toISOString().slice(0,7);
      const enc=factures.filter(f=>f.statut==='paye'&&f.datePaiement&&f.datePaiement.startsWith(ms)).reduce((a,f)=>a+netOf(f),0);
      out.push({label:d.toLocaleDateString('fr-FR',{month:'short'}).replace('.',''),ms,enc});
    }
    return out;
  },[factures]);

  // Évolution par niveau (revenus)
  const evolutionParNiveau=useMemo(()=>{
    const niveaux=[...new Set(eleves.map(e=>e.niveau).filter(Boolean))].sort();
    const today=new Date();
    return niveaux.map(niv=>{
      const eleveIdsNiv=new Set(eleves.filter(e=>e.niveau===niv).map(e=>e.id));
      const months=[];
      for(let i=5;i>=0;i--){
        const d=new Date(today.getFullYear(),today.getMonth()-i,1);
        const ms=d.toISOString().slice(0,7);
        const enc=factures.filter(f=>f.statut==='paye'&&f.datePaiement&&f.datePaiement.startsWith(ms)&&eleveIdsNiv.has(f.eleveId)).reduce((a,f)=>a+netOf(f),0);
        months.push({label:d.toLocaleDateString('fr-FR',{month:'short'}).replace('.',''),val:enc});
      }
      const total=months.reduce((a,m)=>a+m.val,0);
      const max=Math.max(...months.map(m=>m.val),1);
      return{niveau:niv,months,total,max,nbEleves:eleveIdsNiv.size};
    });
  },[eleves,factures]);

  // Capacité des cours (heatmap)
  const coursCapacite=useMemo(()=>{
    return cours.map(c=>{
      const placesMax=c.maxPlaces||DEFAULT_PLACES;
      const inscrits=c.eleveIds.length;
      const pct=Math.round((inscrits/placesMax)*100);
      let statut='libre';
      if(pct>=100)statut='sature';
      else if(pct>=85)statut='complet';
      else if(pct>=60)statut='bien';
      else statut='libre';
      return{...c,placesMax,inscrits,pct,statut};
    });
  },[cours]);

  const groupesSatures=coursCapacite.filter(c=>c.statut==='sature');
  const groupesComplets=coursCapacite.filter(c=>c.statut==='complet');
  const groupesLibres=coursCapacite.filter(c=>c.statut==='libre');
  const moyenneRemplissage=coursCapacite.length>0?Math.round(coursCapacite.reduce((a,c)=>a+c.pct,0)/coursCapacite.length):0;

  // Couleur heatmap selon le taux
  const heatColor=pct=>{
    if(pct>=110)return{bg:'#7f1d1d',color:'white',label:'CRITIQUE'};
    if(pct>=100)return{bg:'#dc2626',color:'white',label:'Saturé'};
    if(pct>=85)return{bg:'#ea580c',color:'white',label:'Complet'};
    if(pct>=70)return{bg:'#f59e0b',color:'white',label:'Quasi-plein'};
    if(pct>=50)return{bg:'#84cc16',color:'white',label:'Bien rempli'};
    if(pct>=30)return{bg:'#bef264',color:'#1a2340',label:'Modéré'};
    if(pct>0)return{bg:'#e0e7ff',color:'#1a4fc4',label:'Sous-rempli'};
    return{bg:'#f3f4f6',color:'#6b7280',label:'Vide'};
  };

  // Prévisionnel : projection MRR sur N mois
  const projection=useMemo(()=>{
    const months=[];const today=new Date();
    const growthMonthly=Math.pow(1+simulCroissance/100,1/12)-1; // taux mensuel équivalent
    const retentionMonthly=Math.pow(tauxRetention/100,1/12); // attrition mensuelle (90% sur 12 mois = 0.991/mois)
    let mrrSimule=mrrTotal;
    for(let i=0;i<horizonMois;i++){
      const d=new Date(today.getFullYear(),today.getMonth()+i+1,1);
      mrrSimule=mrrSimule*retentionMonthly*(1+growthMonthly);
      const projeMrr=Math.round(mrrSimule);
      const projeMarge=projeMrr-totalSalMensuel-monthlyChargesRounded;
      months.push({label:d.toLocaleDateString('fr-FR',{month:'short',year:'2-digit'}).replace('.',''),mrr:projeMrr,marge:projeMarge,charges:totalSalMensuel+monthlyChargesRounded});
    }
    return months;
  },[mrrTotal,totalSalMensuel,monthlyChargesRounded,simulCroissance,horizonMois,tauxRetention]);
  const totalProjeMrr=projection.reduce((a,m)=>a+m.mrr,0);
  const totalProjeMarge=projection.reduce((a,m)=>a+m.marge,0);

  // Charges CRUD
  const saveCharge=()=>{
    if(!chargeForm.nom.trim()||!chargeForm.montant)return;
    const data={...chargeForm,montant:parseFloat(chargeForm.montant)||0};
    if(editCharge){
      setCharges(p=>p.map(c=>c.id===editCharge.id?{...c,...data}:c));
    }else{
      setCharges(p=>[...p,{id:'ch'+Date.now(),...data}]);
    }
    setShowCharge(false);setEditCharge(null);setChargeForm({nom:'',montant:'',frequence:'mensuelle',categorie:'Frais généraux',type:'fixe'});
  };
  const delCharge=id=>{if(window.confirm('Supprimer cette charge ?'))setCharges(p=>p.filter(c=>c.id!==id));};
  const openEditCharge=c=>{setEditCharge(c);setChargeForm({nom:c.nom,montant:String(c.montant),frequence:c.frequence,categorie:c.categorie,type:c.type});setShowCharge(true);};
  const openNewCharge=()=>{setEditCharge(null);setChargeForm({nom:'',montant:'',frequence:'mensuelle',categorie:'Frais généraux',type:'fixe'});setShowCharge(true);};

  // Modifier maxPlaces d'un cours
  const updateMaxPlaces=(coursId,places)=>{
    setCours(p=>p.map(c=>c.id===coursId?{...c,maxPlaces:Math.max(1,parseInt(places)||DEFAULT_PLACES)}:c));
  };

  // Évolution par matière (pour onglet évolution)
  const evolutionParMatiere=useMemo(()=>{
    const allMats=[...new Set(cours.map(c=>c.matiere))].sort();
    return allMats.map(mat=>{
      const eleveCount=new Set(cours.filter(c=>c.matiere===mat).flatMap(c=>c.eleveIds)).size;
      const mrr=eleveCount*TARIF;
      return{matiere:mat,nbEleves:eleveCount,mrr,nbCours:cours.filter(c=>c.matiere===mat).length};
    }).sort((a,b)=>b.mrr-a.mrr);
  },[cours]);

  return <>
    <TB title="Statistiques & Pilotage">
      <button className="btn btn-sm" style={{background:'#f5f3ff',border:'1.5px solid #d8d0ff',color:'#7c3aed'}} onClick={()=>setShowSal(true)}>⚙️ Taux horaires</button>
      {tab==='charges'&&<button className="btn btn-p btn-sm" onClick={openNewCharge}>＋ Charge</button>}
    </TB>
    <div className="pg">
      {/* Onglets */}
      <div className="tabs" style={{marginBottom:18,flexWrap:'wrap',maxWidth:800}}>
        <button className={`tab ${tab==='actuel'?'on':''}`} onClick={()=>setTab('actuel')}>📊 Vue actuelle</button>
        <button className={`tab ${tab==='previsionnel'?'on':''}`} onClick={()=>setTab('previsionnel')}>🔮 Prévisionnel</button>
        <button className={`tab ${tab==='evolution'?'on':''}`} onClick={()=>setTab('evolution')}>📈 Évolution</button>
        <button className={`tab ${tab==='capacite'?'on':''}`} onClick={()=>setTab('capacite')}>🌡️ Capacité {groupesSatures.length>0&&<span style={{background:'var(--err)',color:'white',padding:'1px 6px',borderRadius:10,fontSize:9,marginLeft:4}}>{groupesSatures.length}</span>}</button>
        <button className={`tab ${tab==='charges'?'on':''}`} onClick={()=>setTab('charges')}>💰 Charges</button>
      </div>

      {/* ━━━ ONGLET ACTUEL ━━━ */}
      {tab==='actuel'&&<>
        <div className="kpi-grid">
          <div className="kpi k-mrr"><div className="kpi-icon">📈</div><div className="kpi-val">{mrrTotal}€</div><div className="kpi-lbl">MRR prévisionnel</div><div className="kpi-sub" style={{color:'var(--gold)'}}>{mrrTotal*12}€ / an</div></div>
          <div className="kpi k-rev"><div className="kpi-icon">✅</div><div className="kpi-val">{totalPaye}€</div><div className="kpi-lbl">Encaissé</div><div className="kpi-sub" style={{color:'var(--ok)'}}>{tauxEncaissement}% du total facturé</div></div>
          <div className="kpi k-pend"><div className="kpi-icon">⏳</div><div className="kpi-val">{totalAttente}€</div><div className="kpi-lbl">En attente</div><div className="kpi-sub" style={{color:'#D97706'}}>{factures.filter(f=>f.statut==='attente').length} facture{factures.filter(f=>f.statut==='attente').length>1?'s':''}</div></div>
          <div className="kpi k-retard"><div className="kpi-icon">⚠️</div><div className="kpi-val">{totalRetard}€</div><div className="kpi-lbl">En retard</div><div className="kpi-sub" style={{color:'var(--err)'}}>{tauxRetard}% du total</div></div>
          <div className="kpi k-salary"><div className="kpi-icon">👨‍🏫</div><div className="kpi-val">{totalSalMensuel}€</div><div className="kpi-lbl">Salaires / mois</div><div className="kpi-sub" style={{color:'var(--navy)'}}>{totalSalMensuel*12}€ / an</div></div>
          <div className="kpi" style={{borderBottom:'3px solid #c47a00'}}><div className="kpi-icon">🏢</div><div className="kpi-val" style={{color:'#c47a00'}}>{monthlyChargesRounded}€</div><div className="kpi-lbl">Charges fixes / mois</div><div className="kpi-sub" style={{color:'#c47a00'}}>{annualCharges}€ / an</div></div>
          <div className="kpi k-margin"><div className="kpi-icon">{margeMensuelle>=0?'💚':'🔴'}</div><div className="kpi-val" style={{color:margeMensuelle>=0?'#7C3AED':'var(--err)'}}>{margeMensuelle>=0?'+':''}{margeMensuelle}€</div><div className="kpi-lbl">Marge nette / mois</div><div className="kpi-sub" style={{color:margeRate>=0?'#7C3AED':'var(--err)'}}>{margeRate}% marge</div></div>
          {breakevenEleves!==null&&<div className="kpi" style={{borderBottom:'3px solid #1a4fc4'}}><div className="kpi-icon">🎯</div><div className="kpi-val" style={{color:'#1a4fc4'}}>{breakevenEleves}</div><div className="kpi-lbl">Point mort (élèves)</div><div className="kpi-sub" style={{color:'#1a4fc4'}}>{breakevenEleves<=mrrParEleve.length?'✓ Atteint':'À conquérir'}</div></div>}
        </div>

        {/* Synthèse budget mensuel + Répartition paiements */}
        <div style={{display:'grid',gridTemplateColumns:'1.2fr 1fr',gap:20,marginTop:24,marginBottom:20}}>
          <div className="stat-section">
            <div className="stat-section-ttl">💼 Compte de résultat mensuel</div>
            {[
              {label:'+ Revenus prévisionnels (MRR)',val:mrrTotal,col:'var(--ok)',weight:600},
              {label:'− Masse salariale profs',val:-totalSalMensuel,col:'var(--err)',weight:500},
              {label:'− Charges fixes & variables',val:-monthlyChargesRounded,col:'#c47a00',weight:500},
              {label:'= Marge nette mensuelle',val:margeMensuelle,col:margeMensuelle>=0?'#7C3AED':'var(--err)',weight:700,border:true},
              {label:'Annualisé',val:margeMensuelle*12,col:margeMensuelle>=0?'#7C3AED':'var(--err)',weight:600,sub:true},
            ].map((r,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderTop:r.border?'2px solid var(--cream2)':(i>0?'1px solid var(--cream2)':'none'),marginTop:r.border?6:0}}>
                <span style={{fontSize:r.sub?12:13,color:r.col,fontWeight:r.weight,fontStyle:r.sub?'italic':'normal'}}>{r.label}</span>
                <span style={{fontFamily:'Playfair Display,serif',fontSize:r.weight===700?22:(r.sub?13:15),fontWeight:r.weight,color:r.col}}>{r.val>=0?'+':''}{r.val}€</span>
              </div>
            ))}
            <div style={{background:margeMensuelle>=0?'#F5EEFF':'#FFF0F0',borderRadius:4,padding:'10px 14px',marginTop:12,textAlign:'center'}}>
              <div style={{fontSize:11,color:'var(--muted)'}}>Taux de marge nette</div>
              <div style={{fontFamily:'Playfair Display,serif',fontSize:28,fontWeight:700,color:margeMensuelle>=0?'#7C3AED':'var(--err)'}}>{margeRate}%</div>
            </div>
          </div>

          <div className="stat-section">
            <div className="stat-section-ttl">🥧 Répartition des paiements</div>
            {totalBille===0?<div style={{fontSize:13,color:'var(--muted)',textAlign:'center',padding:'30px 0'}}>Aucune facture</div>:<div className="donut-wrap">
              <svg width="110" height="110" viewBox="0 0 36 36">
                {(()=>{const segs=[{val:totalPaye,col:'#2D9B6F'},{val:totalAttente,col:'#D97706'},{val:totalRetard,col:'#C94A4A'}].filter(s=>s.val>0);const r=15.9155,c=18,circ=2*Math.PI*r;let off=25;return segs.map((s,i)=>{const pct=s.val/totalBille;const dash=pct*circ;const el=<circle key={i} cx={c} cy={c} r={r} fill="none" stroke={s.col} strokeWidth="3.5" strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={-off*circ/100}/>;off-=pct*100;return el;});})()}
                <text x="18" y="18" textAnchor="middle" dominantBaseline="middle" style={{fontSize:5,fontWeight:700,fill:'var(--navy)'}}>{tauxEncaissement}%</text>
              </svg>
              <div className="donut-legend">
                {[{label:'Payé',val:totalPaye,col:'#2D9B6F'},{label:'En attente',val:totalAttente,col:'#D97706'},{label:'En retard',val:totalRetard,col:'#C94A4A'}].map(s=><div key={s.label} className="donut-item"><span style={{width:10,height:10,borderRadius:2,background:s.col,display:'inline-block',flexShrink:0}}/><span style={{color:'var(--muted)'}}>{s.label}</span><span style={{marginLeft:'auto',fontWeight:700}}>{s.val}€</span></div>)}
                <div className="donut-item" style={{borderTop:'1px solid var(--cream2)',paddingTop:5,marginTop:2}}><span style={{fontWeight:700}}>Total</span><span style={{marginLeft:'auto',fontWeight:700}}>{totalBille}€</span></div>
              </div>
            </div>}
          </div>
        </div>

        {/* MRR par élève + Taux paiement par famille */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,marginBottom:20}}>
          <div className="stat-section">
            <div className="stat-section-ttl">💶 MRR par élève — {TARIF}€/matière</div>
            <div style={{maxHeight:340,overflowY:'auto'}}>
              {mrrParEleve.length===0?<div style={{fontSize:13,color:'var(--muted)'}}>Aucun élève inscrit</div>:
              mrrParEleve.map(e=><div key={e.id} className="prog-row">
                <div className="prog-label">
                  <div style={{fontWeight:600,fontSize:12}}>{e.name}</div>
                  <div style={{fontSize:10,color:'var(--muted)'}}>{e.niveau} · {e.matieres.join(', ')}</div>
                </div>
                <div className="prog-bar"><div className="prog-fill" style={{width:`${e.mrr/Math.max(...mrrParEleve.map(x=>x.mrr))*100}%`,background:'var(--gold2)'}}/></div>
                <div className="prog-pct" style={{color:'var(--navy)',fontFamily:'Playfair Display,serif'}}>{e.mrr}€</div>
              </div>)}
            </div>
            <div style={{borderTop:'1px solid var(--cream2)',marginTop:12,paddingTop:10,display:'flex',justifyContent:'space-between',fontWeight:700,fontSize:13}}>
              <span>Total MRR ({mrrParEleve.length} élèves)</span>
              <span style={{color:'var(--gold)',fontFamily:'Playfair Display,serif',fontSize:16}}>{mrrTotal}€/mois</span>
            </div>
          </div>
          <div className="stat-section">
            <div className="stat-section-ttl">👨‍👩‍👧 Taux de paiement par famille</div>
            <div style={{maxHeight:340,overflowY:'auto'}}>
              {famStats.length===0?<div style={{fontSize:13,color:'var(--muted)'}}>Aucune donnée</div>:
              <table className="tbl">
                <thead><tr><th>Famille</th><th>MRR</th><th>Payé</th><th>Retard</th><th>Taux</th></tr></thead>
                <tbody>{famStats.map(f=><tr key={f.id}>
                  <td style={{fontWeight:600,fontSize:12}}>{f.nom}</td>
                  <td style={{fontSize:12,color:'var(--gold)',fontWeight:700}}>{f.mrr}€</td>
                  <td style={{color:'var(--ok)',fontWeight:600,fontSize:12}}>{f.paye}€</td>
                  <td style={{color:f.retard>0?'var(--err)':'var(--muted)',fontWeight:f.retard>0?700:400,fontSize:12}}>{f.retard>0?f.retard+'€':'—'}</td>
                  <td><div style={{display:'flex',alignItems:'center',gap:6}}><div style={{flex:1,height:5,background:'var(--cream2)',borderRadius:3,overflow:'hidden',minWidth:40}}><div style={{height:'100%',width:`${f.taux}%`,background:f.taux>=80?'var(--ok)':f.taux>=50?'#D97706':'var(--err)'}}/></div><span style={{fontSize:11,fontWeight:700,color:f.taux>=80?'var(--ok)':f.taux>=50?'#D97706':'var(--err)',minWidth:26}}>{f.taux}%</span></div></td>
                </tr>)}</tbody>
              </table>}
            </div>
          </div>
        </div>

        {/* Salaires profs */}
        <div className="stat-section">
          <div className="stat-section-ttl">👨‍🏫 Détail masse salariale prévisionnelle</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:10}}>
            {salProfs.map(p=><div key={p.id} style={{background:'var(--cream)',borderRadius:4,padding:'10px 14px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                <div>
                  <div style={{fontWeight:600,fontSize:13}}>{p.name.split(' ').slice(-1)[0]}</div>
                  <div style={{fontSize:10,color:'var(--muted)'}}>{p.heuresHebdo}h/sem · {p.tauxHoraire}€/h</div>
                </div>
                <span style={{fontFamily:'Playfair Display,serif',fontWeight:700,color:'var(--navy)',fontSize:15}}>{p.salMensuel}€</span>
              </div>
              <div style={{height:3,background:'var(--cream2)',borderRadius:2,overflow:'hidden'}}><div style={{height:'100%',width:`${totalSalMensuel>0?p.salMensuel/Math.max(...salProfs.map(x=>x.salMensuel))*100:0}%`,background:'var(--navy)'}}/></div>
            </div>)}
          </div>
          <div style={{borderTop:'1px solid var(--cream2)',marginTop:10,paddingTop:10,display:'flex',justifyContent:'space-between',fontWeight:700,fontSize:13}}>
            <span>Total mensuel</span>
            <span style={{fontFamily:'Playfair Display,serif',fontSize:16,color:'var(--navy)'}}>{totalSalMensuel}€</span>
          </div>
        </div>
      </>}

      {/* ━━━ ONGLET PRÉVISIONNEL ━━━ */}
      {tab==='previsionnel'&&<>
        <div style={{background:'#f5f3ff',border:'1.5px solid #d8d0ff',borderRadius:6,padding:'14px 18px',marginBottom:18}}>
          <div style={{fontFamily:'var(--ff-serif)',fontSize:15,fontWeight:700,color:'#7c3aed',marginBottom:10}}>🔮 Simulateur de projection financière</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:14,alignItems:'end'}}>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5,display:'block',marginBottom:4}}>Croissance annuelle visée</label>
              <input type="range" min="-30" max="100" step="5" value={simulCroissance} onChange={e=>setSimulCroissance(parseFloat(e.target.value))} style={{width:'100%',accentColor:'#7c3aed'}}/>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--muted)',marginTop:2}}><span>-30%</span><strong style={{color:'#7c3aed',fontSize:15}}>{simulCroissance>=0?'+':''}{simulCroissance}%</strong><span>+100%</span></div>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5,display:'block',marginBottom:4}}>Rétention annuelle</label>
              <input type="range" min="50" max="100" step="1" value={tauxRetention} onChange={e=>setTauxRetention(parseFloat(e.target.value))} style={{width:'100%',accentColor:'#7c3aed'}}/>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--muted)',marginTop:2}}><span>50%</span><strong style={{color:'#7c3aed',fontSize:15}}>{tauxRetention}%</strong><span>100%</span></div>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5,display:'block',marginBottom:4}}>Horizon de projection</label>
              <select value={horizonMois} onChange={e=>setHorizonMois(parseInt(e.target.value))} style={{width:'100%',padding:'7px 10px',border:'1.5px solid #c8d8f5',borderRadius:4,fontSize:13,fontWeight:600,color:'#1a2340'}}>
                <option value="3">3 mois</option>
                <option value="6">6 mois</option>
                <option value="12">12 mois</option>
                <option value="24">24 mois</option>
              </select>
            </div>
            <div style={{background:'white',padding:'10px 14px',borderRadius:4,border:'1.5px solid #d8d0ff'}}>
              <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5}}>Hypothèse retenue</div>
              <div style={{fontSize:12,color:'#1a2340',marginTop:4,lineHeight:1.4}}>Croissance <strong style={{color:'#7c3aed'}}>{simulCroissance>=0?'+':''}{simulCroissance}%</strong> /an, rétention <strong style={{color:'#7c3aed'}}>{tauxRetention}%</strong>, charges actuelles maintenues</div>
            </div>
          </div>
        </div>
