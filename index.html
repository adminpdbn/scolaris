// ─── TIMETABLE COMPONENT ───

function generatePlanningPDF(cours, users, filtres){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4',orientation:'landscape'});
  const W=297,H=210,ML=10,MR=10;

  // ── Couleurs par niveau (PDF) ──
  const NCLR={
    '6ème':       {bg:[243,232,255],bd:[124,58,237], tx:[91,33,182],  gold:false},
    '5ème':       {bg:[255,252,210],bd:[202,138,4],  tx:[146,64,14],  gold:false},
    '4ème':       {bg:[219,234,255],bd:[29,79,196],  tx:[30,64,175],  gold:false},
    '3ème':       {bg:[209,250,229],bd:[5,150,105],  tx:[6,95,70],    gold:false},
    'Seconde':    {bg:[254,220,220],bd:[220,38,38],  tx:[153,27,27],  gold:false},
    'Première':   {bg:[235,238,243],bd:[71,85,105],  tx:[30,41,59],   gold:false},
    'Terminale':  {bg:[255,248,195],bd:[180,130,0],  tx:[120,80,0],   gold:true},
    'Supérieures':{bg:[253,244,255],bd:[162,28,175], tx:[134,25,143], gold:false},
    'Module':     {bg:[224,252,249],bd:[13,148,136],  tx:[15,118,110], gold:false, isModule:true},
  };
  const defC={bg:[235,240,248],bd:[90,110,150],tx:[60,80,120],gold:false};
  const getC=niv=>{for(const[k,v]of Object.entries(NCLR))if(niv===k)return v;return defC;};

  // Filtres
  let filtered=[...cours];
  if(filtres.prof&&filtres.prof!=='tous')    filtered=filtered.filter(c=>c.profId===filtres.prof);
  if(filtres.matiere&&filtres.matiere!=='toutes') filtered=filtered.filter(c=>c.matiere===filtres.matiere);
  if(filtres.niveau&&filtres.niveau!=='tous') filtered=filtered.filter(c=>c.niveau===filtres.niveau);
  // Modules exclus par défaut sauf si coché explicitement
  if(!filtres.includeModules) filtered=filtered.filter(c=>c.niveau!=='Module');

  // Plage horaire FIXE — toute la journée pour avoir un template cohérent
  const H_START=8;
  const H_END=21;
  const nHours=H_END-H_START;
  const today=new Date().toLocaleDateString('fr-FR');

  // ── Layout ──
  const HDR=20;          // header height
  const DAY_HDR=8;       // day label row
  const TIME_W=13;       // time column
  const GRID_TOP=HDR+DAY_HDR;
  const GRID_BOT=H-24;   // leave room for legend + footer
  const GRID_H=GRID_BOT-GRID_TOP;
  const MM_H=GRID_H/nHours;  // mm per hour
  const DAYS=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
  const GRID_W=W-ML-MR-TIME_W;
  const DAY_W=GRID_W/DAYS.length;

  // ── HEADER ──
  doc.setFillColor(20,30,70);doc.rect(0,0,W,HDR,'F');
  // accent strip
  doc.setFillColor(42,91,212);doc.rect(0,HDR-2,W,2,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(255,255,255);
  doc.text('Plus de bonnes notes',ML+2,10);
  doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(180,200,240);
  const filterDesc=[];
  if(filtres.prof&&filtres.prof!=='tous'){const p=users.find(u=>u.id===filtres.prof);if(p)filterDesc.push(p.name);}
  if(filtres.matiere&&filtres.matiere!=='toutes')filterDesc.push(filtres.matiere);
  if(filtres.niveau&&filtres.niveau!=='tous')filterDesc.push(filtres.niveau);
  const subtitle=filterDesc.length?filterDesc.join(' · '):'Planning hebdomadaire — Semaine type';
  doc.text(subtitle,ML+2,16.5);
  doc.text(filtered.length+' cours · Généré le '+today,W-MR,16.5,{align:'right'});

  // ── DAY HEADERS ──
  DAYS.forEach((day,i)=>{
    const x=ML+TIME_W+i*DAY_W;
    const isWE=i>=5;
    doc.setFillColor(isWE?245:230,isWE?240:240,isWE?245:255);
    doc.rect(x,HDR,DAY_W,DAY_HDR,'F');
    doc.setDrawColor(190,205,230);doc.setLineWidth(0.2);
    doc.line(x,HDR,x,HDR+DAY_HDR);
    doc.setFont('helvetica','bold');doc.setFontSize(8);
    doc.setTextColor(isWE?110:26,isWE?110:50,isWE?130:140);
    doc.text(day.slice(0,3).toUpperCase(),x+DAY_W/2,HDR+5.5,{align:'center'});
  });
  // Right border of last day
  doc.setDrawColor(190,205,230);doc.setLineWidth(0.2);
  doc.line(ML+TIME_W+GRID_W,HDR,ML+TIME_W+GRID_W,HDR+DAY_HDR);
  // Bottom border of day headers
  doc.setDrawColor(42,91,212);doc.setLineWidth(0.4);
  doc.line(ML,HDR+DAY_HDR,W-MR,HDR+DAY_HDR);

  // ── GRID BACKGROUND ──
  // Weekend shading
  [4,5].forEach(i=>{
    const x=ML+TIME_W+i*DAY_W;
    doc.setFillColor(248,246,242);
    doc.rect(x,GRID_TOP,DAY_W,GRID_H,'F');
  });
  // Hour lines + time labels
  for(let h=H_START;h<=H_END;h++){
    const y=GRID_TOP+(h-H_START)*MM_H;
    const isMaj=h%2===0;
    doc.setDrawColor(isMaj?195:220,isMaj?208:230,isMaj?228:242);
    doc.setLineWidth(isMaj?0.25:0.1);
    doc.line(ML+TIME_W,y,W-MR,y);
    if(h<H_END){
      doc.setFont('helvetica',isMaj?'bold':'normal');
      doc.setFontSize(isMaj?6.5:5.5);
      doc.setTextColor(isMaj?50:110,isMaj?65:120,isMaj?90:145);
      doc.text(h+'h',ML+TIME_W-2,y+2,{align:'right'});
    }
  }
  // Day vertical separators
  DAYS.forEach((_,i)=>{
    const x=ML+TIME_W+i*DAY_W;
    doc.setDrawColor(205,215,235);doc.setLineWidth(0.15);
    doc.line(x,GRID_TOP,x,GRID_BOT);
  });
  doc.setDrawColor(205,215,235);doc.setLineWidth(0.15);
  doc.line(ML+TIME_W+GRID_W,GRID_TOP,ML+TIME_W+GRID_W,GRID_BOT);

  // ── DRAW SLOTS ──
  DAYS.forEach((day,di)=>{
    const dayX=ML+TIME_W+di*DAY_W;
    const slots=filtered.filter(c=>c.jour===day).sort((a,b)=>a.debut-b.debut);
    // Overlap layout
    const colEnds=[];const colMap={};
    slots.forEach(s=>{
      let col=colEnds.findIndex(end=>end<=s.debut);
      if(col===-1)col=colEnds.length;
      colEnds[col]=s.fin;colMap[s.id]={col,total:1};
    });
    slots.forEach(s=>{
      const ov=slots.filter(o=>o.debut<s.fin&&o.fin>s.debut);
      const maxT=Math.max(...ov.map(o=>colMap[o.id]?.col??0))+1;
      ov.forEach(o=>{colMap[o.id].total=Math.max(colMap[o.id].total,maxT);});
    });

    slots.forEach(c=>{
      const clr=getC(c.niveau);
      const ol=colMap[c.id]||{col:0,total:1};
      const w=(DAY_W/ol.total)-0.8;
      const x=dayX+ol.col*(DAY_W/ol.total)+0.4;
      const y=GRID_TOP+(c.debut-H_START)*MM_H+0.4;
      const h=(c.fin-c.debut)*MM_H-0.8;

      // Shadow effect (very subtle)
      doc.setFillColor(160,170,190);
      doc.roundedRect(x+0.5,y+0.5,w,h,1,1,'F');
      // Slot fill
      doc.setFillColor(...clr.bg);
      doc.roundedRect(x,y,w,h,1,1,'F');
      // Left accent bar
      doc.setFillColor(...clr.bd);
      doc.rect(x,y,2.2,h,'F');
      // Gold shimmer for Terminale (top stripe)
      if(clr.gold){
        doc.setFillColor(255,200,0);
        doc.rect(x+2.2,y,w-2.2,1.8,'F');
      }
      // Border
      doc.setDrawColor(...clr.bd);doc.setLineWidth(0.25);
      doc.roundedRect(x,y,w,h,1,1,'S');

      // ── TEXT (discret — sans noms) ──
      const tx=x+3.5; let ty=y+4;

      // Matière
      doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(...clr.tx);
      const mat=c.matiere.length>13?c.matiere.slice(0,12)+'.':c.matiere;
      doc.text(mat,tx,ty,{maxWidth:w-4.5});ty+=3.5;

      // Niveau
      if(h>9){
        doc.setFont('helvetica','bold');doc.setFontSize(6);doc.setTextColor(...clr.bd);
        doc.text(c.niveau,tx,ty);ty+=3;
      }
      // Heure
      if(h>13){
        doc.setFont('helvetica','normal');doc.setFontSize(5.5);doc.setTextColor(100,115,140);
        doc.text(hs(c.debut)+'–'+hs(c.fin),tx,ty);ty+=2.8;
      }
      // Effectif (discret — pas de noms)
      if(h>17&&c.eleveIds.length>0){
        doc.setFont('helvetica','normal');doc.setFontSize(5.5);doc.setTextColor(140,155,175);
        doc.text(c.eleveIds.length+' élève'+(c.eleveIds.length>1?'s':''),tx,ty);
      }
    });
  });

  // ── LÉGENDE COMPLÈTE PAR NIVEAU ──
  // Titre légende
  const ly=GRID_BOT+2;
  doc.setFont('helvetica','bold');doc.setFontSize(5.5);doc.setTextColor(80,90,110);
  doc.text('NIVEAUX :',ML,ly+3.5);

  const nivPresents=new Set(filtered.map(c=>c.niveau));
  const allLegItems=Object.entries(NCLR);
  let lx=ML+18;const legY=ly;
  allLegItems.forEach(([niv,clr])=>{
    const isPresent=nivPresents.has(niv);
    const alpha=isPresent?1:0.45;
    // Box
    const boxW=doc.getTextWidth(niv)*(5.5/10)+8;
    // Background (lighter if not present)
    const bg=isPresent?clr.bg:clr.bg.map(v=>Math.round(v+(255-v)*0.5));
    doc.setFillColor(...bg);
    doc.roundedRect(lx,legY,boxW,5,0.7,0.7,'F');
    doc.setFillColor(...(isPresent?clr.bd:clr.bd.map(v=>Math.round(v+(255-v)*0.5))));
    doc.rect(lx,legY,1.8,5,'F');
    doc.setDrawColor(...(isPresent?clr.bd:clr.bd.map(v=>Math.round(v+(255-v)*0.5))));
    doc.setLineWidth(isPresent?0.3:0.12);
    doc.roundedRect(lx,legY,boxW,5,0.7,0.7,'S');
    if(niv==='Terminale'&&isPresent){doc.setFillColor(255,215,0);doc.rect(lx+1.8,legY,boxW-1.8,1,'F');}
    doc.setFont('helvetica',isPresent?'bold':'normal');
    doc.setFontSize(5.5);
    doc.setTextColor(...(isPresent?clr.tx:clr.tx.map(v=>Math.round(v+(180-v)*0.5))));
    doc.text(niv,lx+2.5,legY+3.5);
    lx+=boxW+2.5;
  });

  // ── FOOTER ──
  doc.setFillColor(20,30,70);doc.rect(0,H-8,W,8,'F');
  doc.setFont('helvetica','normal');doc.setFontSize(6);doc.setTextColor(160,185,230);
  doc.text('Plus de bonnes notes — Soutien scolaire — La Courneuve',ML,H-3);
  doc.text('Généré le '+today,W-MR,H-3,{align:'right'});

  doc.save('planning-educenter.pdf');
}


function EmploiDuTemps({user,users,cours,setCours,modules,enrollments,dispos=[]}){
  const myCours=user.role==='eleve'?cours.filter(c=>c.eleveIds.includes(user.id)):user.role==='admin'?cours:cours.filter(c=>c.profId===user.id);
  const enr=enrollments[user.id]||[];
  const myMods=user.role==='eleve'?modules.filter(m=>enr.includes(m.id)):user.role==='admin'?modules:modules.filter(m=>m.profId===user.id);

  // ── Filters (admin only) ──
  const [filterProf,setFilterProf]=useState('tous');
  const [filterMat,setFilterMat]=useState('toutes');
  const [filterNiv,setFilterNiv]=useState('tous');

  const allProfs=useMemo(()=>users.filter(u=>u.role==='prof'),[users]);
  const allMats=useMemo(()=>[...new Set(cours.map(c=>c.matiere))].sort(),[cours]);
  const allNiveaux=useMemo(()=>[...new Set(cours.map(c=>c.niveau))].sort(),[cours]);

  const filteredCours=useMemo(()=>{
    let c=myCours;
    if(user.role==='admin'){
      if(filterProf!=='tous')c=c.filter(x=>x.profId===filterProf);
      if(filterMat!=='toutes')c=c.filter(x=>x.matiere===filterMat);
      if(filterNiv!=='tous')c=c.filter(x=>x.niveau===filterNiv);
    }
    return c;
  },[myCours,filterProf,filterMat,filterNiv,user.role]);

  const byDay=DAYS.reduce((acc,d)=>{acc[d]=filteredCours.filter(c=>c.jour===d);return acc;},{});
  const hasData=filteredCours.length>0||myMods.length>0;

  // ── Overlap layout pour le Visualiser (même logique que PlanningEditor) ──
  const ttOverlapLayout=useMemo(()=>{
    const map={};
    DAYS.forEach(jour=>{
      const slots=filteredCours.filter(c=>c.jour===jour).sort((a,b)=>a.debut-b.debut);
      const colEnd=[];
      slots.forEach(s=>{
        let col=colEnd.findIndex(end=>end<=s.debut);
        if(col===-1)col=colEnd.length;
        colEnd[col]=s.fin;map[s.id]={col};
      });
      slots.forEach(s=>{
        const ov=slots.filter(o=>o.debut<s.fin&&o.fin>s.debut);
        map[s.id].total=Math.max(...ov.map(o=>map[o.id]?.col??0))+1;
      });
      slots.forEach(s=>{
        const ov=slots.filter(o=>o.debut<s.fin&&o.fin>s.debut);
        const maxT=Math.max(...ov.map(o=>map[o.id].total));
        ov.forEach(o=>{map[o.id].total=maxT;});
      });
    });
    return map;
  },[filteredCours]);

  const [weekOffset,setWeekOffset]=useState(0);
  const getWeekStart=(off=0)=>{const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-d.getDay()+1+off*7);return d;};
  const weekStart=getWeekStart(weekOffset);
  const weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+6);
  const weekLabel=`${weekStart.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})} – ${weekEnd.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})}`;
  const dayToDate=day=>{const idx=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'].indexOf(day);const d=new Date(weekStart);d.setDate(weekStart.getDate()+(idx===6?6:idx));return d.toISOString().split('T')[0];};

  const visibleDispos=dispos.filter(d=>{
    if(d.date<weekStart.toISOString().split('T')[0]||d.date>weekEnd.toISOString().split('T')[0])return false;
    if(user.role==='prof')return d.profId===user.id;
    if(user.role==='eleve')return d.statut==='libre'||d.eleveId===user.id;
    return true;
  });
  const disposByDay=DAYS.reduce((acc,d)=>{const date=dayToDate(d);acc[d]=visibleDispos.filter(x=>x.date===date);return acc;},{});

  const [edtTab,setEdtTab]=useState('vue');
  const [includeModules,setIncludeModules]=useState(false);

  const doExportPDF=()=>{
    try{
      generatePlanningPDF(filteredCours,users,{prof:filterProf,matiere:filterMat,niveau:filterNiv,includeModules});
    }catch(e){alert('Erreur PDF: '+e.message);console.error(e);}
  };

  const Legend=()=><div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:14,alignItems:'center'}}>
    {Object.entries(MC).map(([m,c])=>(<div key={m} style={{display:'flex',alignItems:'center',gap:5,fontSize:11}}><div style={{width:10,height:10,borderRadius:2,background:c.bg,border:`2px solid ${c.bd}`}}/><span style={{color:'var(--muted)'}}>{m}</span></div>))}
  </div>;

  return <>
    <TB title="Emploi du Temps">
      {user.role==='admin'&&<div style={{display:'flex',alignItems:'center',gap:8}}>
        <label style={{display:'flex',alignItems:'center',gap:5,fontSize:11,cursor:'pointer',color:'var(--muted)',userSelect:'none'}}>
          <input type="checkbox" checked={includeModules} onChange={e=>setIncludeModules(e.target.checked)} style={{accentColor:'#0D9488',width:13,height:13}}/>
          <span style={{color:'#0D9488',fontWeight:600}}>🟦 Modules</span>
        </label>
        <button className="btn btn-sm" style={{background:'#1a3a8c',border:'none',color:'white',display:'flex',alignItems:'center',gap:5,fontSize:11}} onClick={doExportPDF}>⬇ Export PDF</button>
      </div>}
    </TB>
    <div className="pg">
      {/* ── Filters bar (admin only) ── */}
      {user.role==='admin'&&<div style={{display:'flex',gap:10,marginBottom:18,flexWrap:'wrap',alignItems:'flex-end',background:'#f8faff',border:'1.5px solid #e0e8f5',borderRadius:6,padding:'12px 16px'}}>
        <div className="fg" style={{marginBottom:0,flex:'1 1 160px'}}>
          <label className="fl" style={{fontSize:10}}>Professeur</label>
          <select className="fi" style={{fontSize:12,padding:'6px 10px'}} value={filterProf} onChange={e=>setFilterProf(e.target.value)}>
            <option value="tous">Tous les profs</option>
            {allProfs.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
        </div>
        <div className="fg" style={{marginBottom:0,flex:'1 1 140px'}}>
          <label className="fl" style={{fontSize:10}}>Matière</label>
          <select className="fi" style={{fontSize:12,padding:'6px 10px'}} value={filterMat} onChange={e=>setFilterMat(e.target.value)}>
            <option value="toutes">Toutes</option>
            {allMats.map(m=><option key={m} value={m}>{m}</option>)}
          </select>
        </div>
        <div className="fg" style={{marginBottom:0,flex:'1 1 130px'}}>
          <label className="fl" style={{fontSize:10}}>Niveau / Groupe</label>
          <select className="fi" style={{fontSize:12,padding:'6px 10px'}} value={filterNiv} onChange={e=>setFilterNiv(e.target.value)}>
            <option value="tous">Tous</option>
            {allNiveaux.map(n=><option key={n} value={n}>{n}</option>)}
          </select>
        </div>
        <div style={{display:'flex',alignItems:'flex-end',gap:6,flexShrink:0}}>
          {(filterProf!=='tous'||filterMat!=='toutes'||filterNiv!=='tous')&&<button className="btn btn-sm" style={{background:'#f0f4ff',border:'1.5px solid #c8d8f5',color:'#6b7ab5',fontSize:11,marginBottom:0}} onClick={()=>{setFilterProf('tous');setFilterMat('toutes');setFilterNiv('tous');}}>✕ Reset</button>}
          <div style={{fontSize:11,color:'#6b7ab5',padding:'6px 0',marginBottom:0}}>{filteredCours.length} cours affiché{filteredCours.length!==1?'s':''}</div>
        </div>
      </div>}

      {user.role==='admin'&&<div className="tabs" style={{marginBottom:18,maxWidth:300}}>
        <button className={`tab ${edtTab==='vue'?'on':''}`} onClick={()=>setEdtTab('vue')}>📅 Visualiser</button>
        <button className={`tab ${edtTab==='edit'?'on':''}`} onClick={()=>setEdtTab('edit')}>⚙️ Modifier</button>
      </div>}

      {(edtTab==='vue'||user.role!=='admin')&&<div>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
          <button className="btn btn-sm" style={{background:'#f0f4ff',border:'1.5px solid #c8d8f5',color:'var(--info)',padding:'5px 10px'}} onClick={()=>setWeekOffset(w=>w-1)}>◀</button>
          <div style={{fontWeight:600,fontSize:13,flex:1,textAlign:'center',color:'var(--navy)'}}>{weekLabel}</div>
          <button className="btn btn-sm" style={{background:'#f0f4ff',border:'1.5px solid #c8d8f5',color:'var(--info)',padding:'5px 10px'}} onClick={()=>setWeekOffset(w=>w+1)}>▶</button>
          {weekOffset!==0&&<button className="btn btn-sm" style={{background:'var(--cream2)',border:'none',fontSize:11,color:'var(--muted)'}} onClick={()=>setWeekOffset(0)}>Aujourd'hui</button>}
        </div>
        {!hasData?<div className="emp"><div className="emp-icon">📅</div><h3>Aucun cours</h3></div>:<>
          <Legend/>
          <div className="tt-wrap">
            <div className="tt-head">
              <div className="tt-time-col" style={{height:44}}/>
              {DAYS.map(d=>{
                const count=byDay[d].length;const dateStr=dayToDate(d);const isToday=dateStr===new Date().toISOString().split('T')[0];const dispoCount=disposByDay[d]?.length||0;
                return <div key={d} className="tt-day-hd" style={{position:'relative',height:44,flexDirection:'column',gap:1,justifyContent:'center'}}>
                  <div style={{fontWeight:700,fontSize:11,letterSpacing:.5,color:isToday?'var(--gold)':'var(--navy)'}}>{d.slice(0,3).toUpperCase()}</div>
                  <div style={{fontSize:10,color:isToday?'var(--gold)':'var(--muted)'}}>{new Date(dateStr+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</div>
                  {(count>0||dispoCount>0)&&<div style={{position:'absolute',top:6,right:6,display:'flex',gap:2}}>
                    {count>0&&<span style={{width:15,height:15,borderRadius:2,background:'var(--navy)',color:'white',fontSize:8,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{count}</span>}
                    {dispoCount>0&&<span style={{width:15,height:15,borderRadius:2,background:'#10B981',color:'white',fontSize:8,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{dispoCount}</span>}
                  </div>}
                  {isToday&&<div style={{position:'absolute',bottom:0,left:0,right:0,height:2,background:'var(--gold)',borderRadius:2}}/>}
                </div>;
              })}
            </div>
            <div className="tt-body">
              <div className="tt-times">{HOURS.map(h=><div key={h} className="tt-hour-lbl" style={{height:CH}}>{h}h</div>)}</div>
              <div className="tt-days">
                {DAYS.map(d=>(<div key={d} className="tt-day-col">
                  {HOURS.map(h=><div key={h} className="tt-cell" style={{height:CH}}/>)}
                  {byDay[d].map(c=>{
                    const clr=nc(c.niveau);const top=(c.debut-H_START)*CH+1;const height=(c.fin-c.debut)*CH-2;
                    const eleveNames=users.filter(u=>c.eleveIds.includes(u.id)).map(u=>u.name.split(' ').slice(-1)[0]);
                    const profName=users.find(u=>u.id===c.profId)?.name.split(' ').slice(-1)[0];
                    const ol=ttOverlapLayout[c.id]||{col:0,total:1};
                    const pct=100/ol.total;
                    return <div key={c.id} className="tt-event" style={{
                      top,height,background:clr.bg,
                      border:`1.5px solid ${clr.bd}`,borderLeft:`3px solid ${clr.bd}`,
                      left:`calc(${ol.col*pct}% + 2px)`,
                      width:`calc(${pct}% - 4px)`,
                      right:'auto'
                    }}>
                      <div className="tt-ev-ttl" style={{color:clr.tx}}>{c.matiere}</div>
                      <div className="tt-ev-sub" style={{color:clr.tx,opacity:.85,fontWeight:700}}>{c.niveau}</div>
                      <div className="tt-ev-time" style={{color:'var(--muted)'}}>{hs(c.debut)}–{hs(c.fin)}</div>
                      {height>55&&<div className="tt-ev-time" style={{color:'var(--muted)'}}>{c.salle}{(user.role==='prof'||user.role==='admin')?` · ${c.eleveIds.length}él`:''}</div>}
                      {user.role==='admin'&&height>75&&<div className="tt-ev-time" style={{color:clr.tx,fontWeight:700}}>{profName}</div>}
                      {user.role==='prof'&&height>90&&<div className="tt-ev-time" style={{color:'var(--muted)'}}>{eleveNames.join(', ')}</div>}
                    </div>;
                  })}
                  {(disposByDay[d]||[]).map(dispo=>{
                    const top=(dispo.debut-H_START)*CH+1;const height=(dispo.fin-dispo.debut)*CH-2;
                    const statColor=dispo.statut==='confirme'?'var(--gold)':dispo.statut==='reserve'?'#D97706':'#10B981';
                    const statBg=dispo.statut==='confirme'?'#EEF5FF':dispo.statut==='reserve'?'#EEF5FF':'#EEFFF6';
                    const prof=users.find(u=>u.id===dispo.profId);
                    return <div key={dispo.id} style={{position:'absolute',top,height,left:2,right:2,background:statBg,border:`1.5px dashed ${statColor}`,borderRadius:2,padding:'4px 7px',overflow:'hidden',zIndex:2}}>
                      <div style={{fontSize:10,fontWeight:700,color:statColor,lineHeight:1.2}}>{dispo.mode==='visio'?'💻':'🏫'} Cours part.</div>
                      {height>28&&<div style={{fontSize:9,color:'var(--muted)'}}>{dispo.matiere}</div>}
                      {height>42&&<div style={{fontSize:9,color:'var(--muted)'}}>{hs(dispo.debut)}–{hs(dispo.fin)}</div>}
                    </div>;
                  })}
                </div>))}
              </div>
            </div>
          </div>
          {/* Table récap */}
          {(user.role==='prof'||user.role==='admin')&&filteredCours.length>0&&<>
            <div className="sh" style={{marginTop:20,marginBottom:10}}><h2 className="st">Récapitulatif — {filteredCours.length} cours</h2></div>
            <table className="tbl" style={{marginBottom:24}}>
              <thead><tr><th>Cours</th><th>Classe</th>{user.role==='admin'&&<th>Professeur</th>}<th>Créneau</th><th>Salle</th><th>Effectif</th></tr></thead>
              <tbody>{[...filteredCours].sort((a,b)=>DAYS.indexOf(a.jour)-DAYS.indexOf(b.jour)||a.debut-b.debut).map(c=>{
                const p=users.find(u=>u.id===c.profId);
                return <tr key={c.id}>
                  <td><span style={getCoursBadge(c.matiere)}>{c.matiere}</span></td>
                  <td style={{fontWeight:600}}>{c.niveau}</td>
                  {user.role==='admin'&&<td style={{fontSize:12}}>{p?.name}</td>}
                  <td>{c.jour} · {hs(c.debut)}–{hs(c.fin)}</td>
                  <td style={{color:'var(--muted)'}}>{c.salle}</td>
                  <td>{c.eleveIds.length} élève{c.eleveIds.length>1?'s':''}</td>
                </tr>;
              })}</tbody>
            </table>
          </>}
          {myMods.length>0&&<>
            <div className="sh"><h2 className="st">{user.role==='eleve'?'Modules inscrits':'Modules'}</h2></div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:12}}>
              {myMods.map(m=>(<div key={m.id} className="res-card" style={{borderLeft:`3px solid ${mc(m.matiere).bd}`}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:7}}><span style={{fontSize:26}}>{m.emoji}</span><div><div style={{fontWeight:600,fontSize:14}}>{m.title}</div><div style={{fontSize:11,color:'var(--muted)'}}>{m.matiere} · {m.niveau}</div></div></div>
                <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.6}}><div>📅 {m.date} · {m.heure}</div><div>📍 {m.lieu}</div></div>
                <div style={{marginTop:8}}><span className="mbadge mb-enr">{user.role==='eleve'?'✓ Inscrit':'📋 Mon module'}</span></div>
              </div>))}
            </div>
          </>}
        </>}
      </div>}
      {user.role==='admin'&&edtTab==='edit'&&<PlanningEditor users={users} cours={cours} setCours={setCours}/>}
    </div>
  </>;
}


function getCoursBadge(matiere){const c=mc(matiere);return{background:c.bg,color:c.tx,padding:'2px 8px',borderRadius:2,fontSize:11,fontWeight:700};}

// ─── DASHBOARD ───
function Dashboard({user,users,resources,modules,grades,enrollments,cours,factures=[],salaires=[],appel={},compEtats={},customComps=[]}){
  const eg=grades[user.id]||[];
  const ee=enrollments[user.id]||[];
  const m=moy(eg);
  const eleves=users.filter(u=>u.role==='eleve');
  const profs=users.filter(u=>u.role==='prof');
  const myRes=resources.filter(r=>r.auteurId===user.id);
  const myMod=modules.filter(m=>m.profId===user.id);
  const myCours=cours.filter(c=>c.profId===user.id);

  if(user.role==='eleve'){
    const enrMods=modules.filter(mod=>ee.includes(mod.id));
    const myCoursList=cours.filter(c=>c.eleveIds.includes(user.id));
    const tData={enr:ee,m:m||0,gs:eg,cours:myCoursList.length,totalCours:cours.length,jours:30,absences:0,retards:0,remarques:0,questions:1,devoirs:0,participations:0,mentions:0};
    const earnedIds=new Set(TROPHIES.filter(t=>t.cond(tData)).map(t=>t.id));
    const nbTrophies=earnedIds.size;

    // ── Radar chart data ──
    const radarAxes=[
      {label:'Notes',value:m?Math.round((parseFloat(m)/20)*100):0},
      {label:'Assiduité',value:Math.min(100,Math.round((myCoursList.length/Math.max(cours.length,1))*100))},
      {label:'Modules',value:Math.min(100,enrMods.length*25)},
      {label:'Trophées',value:Math.round((nbTrophies/TROPHIES.length)*100)},
      {label:'Comportement',value:100},
      {label:'Ancienneté',value:40},
    ];
    const cx=160,cy=160,R=120;
    const n=radarAxes.length;
    const pts=radarAxes.map((ax,i)=>{
      const angle=(i/n)*2*Math.PI-Math.PI/2;
      const r=(ax.value/100)*R;
      return {x:cx+r*Math.cos(angle),y:cy+r*Math.sin(angle),lx:cx+(R+28)*Math.cos(angle),ly:cy+(R+28)*Math.sin(angle)};
    });
    const gridPts=(pct)=>radarAxes.map((_,i)=>{
      const angle=(i/n)*2*Math.PI-Math.PI/2;
      return `${cx+pct*R*Math.cos(angle)},${cy+pct*R*Math.sin(angle)}`;
    }).join(' ');
    const dataPath=pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ')+'Z';

    // Trophy categories for the board
    const trophysCats=[
      {key:'debut',icon:'🎒',label:'Démarrage'},
      {key:'assiduite',icon:'📅',label:'Assiduité'},
      {key:'module',icon:'🎯',label:'Modules'},
      {key:'notes',icon:'📊',label:'Notes'},
      {key:'matiere',icon:'📚',label:'Matières'},
      {key:'progression',icon:'📈',label:'Progression'},
      {key:'comportement',icon:'😇',label:'Comportement'},
      {key:'anciennete',icon:'🌱',label:'Ancienneté'},
      {key:'bonus',icon:'💡',label:'Bonus'},
    ];

    return <div className="fa-in">
      <div style={{padding:'22px 26px 0'}}>
        <div className="wb">
          <h2>Bonjour, <span className="gold">{user.name.split(' ')[0]}</span> 👋</h2>
          <p>{user.niveau} · {myCoursList.length} cours hebdo · {enrMods.length} module{enrMods.length!==1?'s':''}</p>
        </div>

        {/* Agenda + compétences (élève) */}
        <div style={{display:'grid',gridTemplateColumns:'1fr',gap:14,marginBottom:18}}>
          {(()=>{
            const JOURN={'Dimanche':0,'Lundi':1,'Mardi':2,'Mercredi':3,'Jeudi':4,'Vendredi':5,'Samedi':6};
            const now=new Date();
            const occ=myCoursList.map(c=>{ const wd=JOURN[c.jour]; if(wd===undefined)return null; const d=new Date(now); let add=(wd-now.getDay()+7)%7; const h=Math.floor(c.debut),mn=Math.round((c.debut-h)*60); d.setDate(now.getDate()+add); d.setHours(h,mn,0,0); if(d<now)d.setDate(d.getDate()+7); return {c,d}; }).filter(Boolean).sort((a,b)=>a.d-b.d).slice(0,6);
            const J=['dim.','lun.','mar.','mer.','jeu.','ven.','sam.'];
            const fmtDate=d=>J[d.getDay()]+' '+d.getDate()+'/'+(d.getMonth()+1);
            return <div style={{background:'white',border:'2px solid var(--navy)',borderRadius:8,padding:'16px 18px'}}>
              <div style={{fontSize:13,fontWeight:700,color:'var(--navy)',textTransform:'uppercase',letterSpacing:.5,marginBottom:12}}>📅 Mes prochains cours</div>
              {occ.length===0?<div style={{fontSize:12.5,color:'var(--muted)'}}>Aucun cours programmé pour l'instant. Demande à être inscrit dans un groupe.</div>:
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {occ.map(({c,d},i)=>{
                  const prof=users.find(u=>u.id===c.profId);
                  const grp=resources.filter(r=>r.coursId?r.coursId===c.id:r.matiere===c.matiere).slice().sort((a,b)=>(''+(b.date||b.id||'')).localeCompare(''+(a.date||a.id||'')));
                  const theme=grp[0]?grp[0].title:null;
                  const dev=grp.find(r=>r.devoirs);
                  const note=grp.find(r=>r.commentaires);
                  return <div key={i} style={{borderLeft:'3px solid var(--gold)',background:'var(--cream)',borderRadius:'0 6px 6px 0',padding:'9px 12px'}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                      <span style={{fontSize:11,fontWeight:700,color:'var(--navy)',background:'#EEF5FF',padding:'2px 8px',borderRadius:3}}>{fmtDate(d)} · {hs(c.debut)}</span>
                      <span style={{...getCoursBadge(c.matiere),fontSize:11,padding:'2px 8px',borderRadius:3,fontWeight:700}}>{c.matiere}</span>
                      <span style={{fontSize:11,color:'var(--muted)'}}>{c.salle?('📍 '+c.salle+' '):''}{prof?('· 👨‍🏫 '+prof.name.split(' ').slice(-1)[0]):''}</span>
                    </div>
                    {theme&&<div style={{fontSize:11.5,color:'#555',marginTop:5}}>📖 Thème : {theme}</div>}
                    {dev&&<div style={{fontSize:11.5,color:'#b45309',background:'#FFF7E6',border:'1px solid #ffe0a3',borderRadius:3,padding:'5px 8px',marginTop:5}}>📌 Devoirs : {dev.devoirs}</div>}
                    {note&&<div style={{fontSize:11.5,color:'#1a4fc4',background:'#EEF5FF',borderRadius:3,padding:'5px 8px',marginTop:5}}>📝 Note du prof : {note.commentaires}</div>}
                  </div>;
                })}
              </div>}
            </div>;
          })()}
          {(()=>{
            const myMats=new Set(myCoursList.map(c=>c.matiere));
            const rel=[...COMP_TEMPLATES,...(customComps||[])].filter(tp=>tp.niveau===user.niveau&&(myMats.size===0||myMats.has(tp.matiere)));
            if(rel.length===0)return null;
            const et=compEtats[user.id]||{};
            const cnt={valide:0,en_cours:0,a_revoir:0,non_commence:0};
            rel.forEach(tp=>{const s=(et[tp.id]&&et[tp.id].statut)||'non_commence'; cnt[s]=(cnt[s]||0)+1;});
            const pct=Math.round((cnt.valide/rel.length)*100);
            const order=['valide','en_cours','a_revoir','non_commence'];
            return <div style={{background:'white',border:'2px solid var(--navy)',borderRadius:8,padding:'16px 18px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,gap:8,flexWrap:'wrap'}}>
                <div style={{fontSize:13,fontWeight:700,color:'var(--navy)',textTransform:'uppercase',letterSpacing:.5}}>🎯 Mes compétences</div>
                <div style={{fontSize:11,color:'var(--muted)'}}>Détail dans « Mon Programme »</div>
              </div>
              <div style={{height:10,background:'#eee',borderRadius:6,overflow:'hidden',marginBottom:6}}><div style={{height:'100%',width:pct+'%',background:'#059669'}}/></div>
              <div style={{fontSize:12,color:'var(--navy)',fontWeight:600,marginBottom:10}}>{cnt.valide}/{rel.length} compétences validées ({pct}%)</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {order.map(k=>{const st=COMP_STATUTS[k];return <span key={k} style={{fontSize:11,fontWeight:600,color:st.color,background:st.bg,border:'1px solid '+st.color+'40',padding:'3px 9px',borderRadius:4}}>{st.icon} {st.label} : {cnt[k]||0}</span>;})}
              </div>
            </div>;
          })()}
        </div>
        <div className="sg">
          <div className="sc c-gold"><div className="sc-ic">📊</div><div className="sc-v">{m||'—'}</div><div className="sc-l">Moyenne /20</div></div>
          <div className="sc c-info"><div className="sc-ic">📅</div><div className="sc-v">{myCoursList.length}</div><div className="sc-l">Cours/semaine</div></div>
          <div className="sc c-ok"><div className="sc-ic">🗓️</div><div className="sc-v">{enrMods.length}</div><div className="sc-l">Modules inscrits</div></div>
          <div className="sc c-navy"><div className="sc-ic">🏆</div><div className="sc-v">{nbTrophies}</div><div className="sc-l">Trophées</div></div>
        </div>
      </div>
      <div className="pg" style={{paddingTop:0}}>
        {/* ── RADAR + NOTES ── */}
        <div style={{display:'grid',gridTemplateColumns:'320px 1fr',gap:24,marginBottom:28,alignItems:'start'}}>
          {/* Radar chart */}
          <div style={{background:'white',border:'1.5px solid var(--cream2)',borderRadius:0,padding:'20px',textAlign:'center'}}>
            <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:16,fontWeight:600,marginBottom:14,color:'var(--navy)'}}>Profil de compétences</div>
            <svg viewBox="-82 0 484 322" style={{width:'100%',maxWidth:360,margin:'0 auto',display:'block'}}>
              {/* Grid rings */}
              {[0.25,0.5,0.75,1].map(pct=>(
                <polygon key={pct} points={gridPts(pct)} fill="none" stroke={pct===1?'var(--cream2)':'var(--cream2)'} strokeWidth={pct===1?1.5:1} strokeDasharray={pct===1?'none':'4 3'}/>
              ))}
              {/* Axes */}
              {radarAxes.map((_,i)=>{
                const angle=(i/n)*2*Math.PI-Math.PI/2;
                return <line key={i} x1={cx} y1={cy} x2={cx+R*Math.cos(angle)} y2={cy+R*Math.sin(angle)} stroke="var(--cream2)" strokeWidth="1"/>;
              })}
              {/* Data area */}
              <path d={dataPath} fill="rgba(26,111,212,0.12)" stroke="var(--gold)" strokeWidth="2" strokeLinejoin="round"/>
              {/* Data points */}
              {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="4" fill="var(--gold)" stroke="white" strokeWidth="1.5"/>)}
              {/* Labels */}
              {radarAxes.map((ax,i)=>{
                const p=pts[i];
                const anchor=p.lx<cx-5?'end':p.lx>cx+5?'start':'middle';
                return <text key={i} x={p.lx} y={p.ly} textAnchor={anchor} dominantBaseline="middle" fontSize="11" fontFamily="Space Grotesk,sans-serif" fill="var(--muted)" fontWeight="500">{ax.label}</text>;
              })}
              {/* Center value */}
              {m&&<text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle" fontSize="20" fontFamily="Cormorant Garamond,serif" fontWeight="600" fill="var(--navy)">{m}</text>}
            </svg>
            <div style={{display:'flex',flexWrap:'wrap',gap:6,justifyContent:'center',marginTop:10}}>
              {radarAxes.map((ax,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'var(--muted)'}}>
                  <div style={{width:8,height:8,borderRadius:2,background:'var(--gold)',opacity:0.3+ax.value/150}}/>
                  <span>{ax.label} {ax.value}%</span>
                </div>
              ))}
            </div>
          </div>
          {/* Notes récentes */}
          <div>
            <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:16,fontWeight:600,marginBottom:12,color:'var(--navy)'}}>Dernières notes</div>
            {eg.length===0?<div style={{color:'var(--muted)',fontSize:13}}>Aucune note enregistrée.</div>:
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:10}}>
              {eg.map((g,i)=><div key={i} className="nc">
                <div className="nc-sub">{g.matiere}</div>
                <div className="nc-v" style={{color:gcol(g.note,g.max)}}>{g.note}</div>
                <div className="nc-max">/ {g.max}</div>
                <div className="nc-note">{g.commentaire}</div>
              </div>)}
            </div>}
            {myCoursList.length>0&&<>
              <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:16,fontWeight:600,margin:'18px 0 10px',color:'var(--navy)'}}>Mes cours</div>
              <div style={{display:'flex',flexDirection:'column',gap:7}}>
                {myCoursList.map(c=><div key={c.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background:'white',border:'1.5px solid var(--cream2)',borderRadius:0}}>
                  <span style={{...getCoursBadge(c.matiere),flexShrink:0}}>{c.matiere}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:13}}>{c.niveau}</div>
                    <div style={{fontSize:11,color:'var(--muted)'}}>{c.jour} · {hs(c.debut)}–{hs(c.fin)} · {c.salle}</div>
                  </div>
                </div>)}
              </div>
            </>}
          </div>
        </div>

        {/* ── TROPHY BOARD ── */}
        <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:18,fontWeight:600,marginBottom:4,color:'var(--navy)'}}>Tableau des réussites</div>
        <div style={{fontSize:12,color:'var(--muted)',marginBottom:18}}>{nbTrophies} trophée{nbTrophies>1?'s':''} obtenu{nbTrophies>1?'s':''} sur {TROPHIES.length}</div>
        {/* Progress bar */}
        <div style={{height:6,background:'var(--cream2)',borderRadius:3,marginBottom:24,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${Math.round((nbTrophies/TROPHIES.length)*100)}%`,background:'var(--ok)',borderRadius:3,transition:'width .8s ease'}}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:16}}>
          {trophysCats.map(cat=>{
            const catTrophies=TROPHIES.filter(t=>t.cat===cat.key);
            const earned=catTrophies.filter(t=>earnedIds.has(t.id));
            return <div key={cat.key} style={{background:'white',border:'1.5px solid var(--cream2)',borderRadius:0,padding:'16px 18px'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
                <div style={{display:'flex',alignItems:'center',gap:7}}>
                  <span style={{fontSize:20}}>{cat.icon}</span>
                  <span style={{fontWeight:700,fontSize:13,color:'var(--navy)'}}>{cat.label}</span>
                </div>
                <span style={{fontSize:11,fontWeight:600,color:earned.length===catTrophies.length?'var(--ok)':'var(--muted)'}}>
                  {earned.length}/{catTrophies.length}
                </span>
              </div>
              <div style={{height:3,background:'var(--cream2)',borderRadius:2,marginBottom:12,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${catTrophies.length>0?Math.round((earned.length/catTrophies.length)*100):0}%`,background:earned.length===catTrophies.length?'var(--ok)':'var(--gold)',borderRadius:2}}/>
              </div>
              <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
                {catTrophies.map(t=>{
                  const has=earnedIds.has(t.id);
                  return <div key={t.id} title={t.desc} style={{
                    display:'flex',alignItems:'center',gap:5,
                    padding:'5px 10px',borderRadius:20,fontSize:11,
                    background:has?'#EEF5FF':'var(--cream)',
                    border:has?'1.5px solid rgba(26,111,212,.3)':'1.5px solid var(--cream2)',
                    color:has?'var(--navy)':'var(--muted)',
                    fontWeight:has?600:400,
                    opacity:has?1:.6,
                    cursor:'help',
                    transition:'all .15s'
                  }}>
                    <span style={{fontSize:14,filter:has?'none':'grayscale(1)'}}>{t.icon}</span>
                    <span>{t.name}</span>
                    {has&&<span style={{color:'var(--ok)',fontSize:10}}>✓</span>}
                  </div>;
                })}
              </div>
            </div>;
          })}
        </div>
      </div>
    </div>;
  }

  if(user.role==='prof'){
    const dayNames=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const todayName=dayNames[new Date().getDay()];
    const nowH=new Date().getHours()+new Date().getMinutes()/60;
    const myEleveIds=[...new Set(myCours.flatMap(c=>c.eleveIds))];
    const myEleves=users.filter(u=>u.role==='eleve'&&myEleveIds.includes(u.id));

    // Cours du jour
    const todayCours=myCours.filter(c=>c.jour===todayName).sort((a,b)=>a.debut-b.debut).map(c=>{
      const isLive=c.debut<=nowH&&nowH<=c.fin;
      const isSoon=c.debut>nowH&&c.debut-nowH<=2;
      const isPast=c.fin<nowH;
      return{...c,_state:isLive?'live':isSoon?'soon':isPast?'past':'later'};
    });

    // Stats agrégées
    let totAss=0,totP=0,totR=0;
    Object.entries(appel||{}).forEach(([k,d])=>{
      const cid=k.split('|')[0];
      if(!myCours.some(c=>c.id===cid))return;
      Object.values(d).forEach(s=>{totAss++;if(s==='present')totP++;else if(s==='retard')totR++;});
    });
    const tauxAss=totAss>0?Math.round((totP+totR*0.5)/totAss*100):null;

    // Alertes élèves
    const profAlertes=myEleves.map(e=>{
      let p=0,r=0,a=0,t=0;
      Object.entries(appel||{}).forEach(([k,d])=>{
        const cid=k.split('|')[0];
        const c=myCours.find(x=>x.id===cid);
        if(!c||!c.eleveIds.includes(e.id))return;
        const st=d[e.id];if(st){t++;if(st==='present')p++;else if(st==='retard')r++;else if(st==='absent')a++;}
      });
      const tp=t>0?Math.round((p+r*0.5)/t*100):null;
      const g=grades[e.id]||[];const m=moy(g);
      const flags=[];
      if(m&&parseFloat(m)<10)flags.push({label:`Moy. ${m}`,color:'#b02020'});
      if(tp!==null&&tp<70&&t>=3)flags.push({label:`Ass. ${tp}%`,color:'#c47a00'});
      if(a>=3)flags.push({label:`${a} absences`,color:'#b02020'});
      return{e,m,tp,a,flags};
    }).filter(x=>x.flags.length>0).slice(0,5);

    return <div className="fa-in">
      <div style={{padding:'22px 26px 0'}}>
        <div className="wb">
          <h2>Bonjour, <span className="gold">{user.name.split(' ').slice(-1)[0]}</span> 👋</h2>
          <p>{user.matiere||''} · {new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}</p>
        </div>
        <div className="sg">
          <div className="sc c-info"><div className="sc-ic">📅</div><div className="sc-v">{myCours.length}</div><div className="sc-l">Cours/semaine</div></div>
          <div className="sc c-navy"><div className="sc-ic">👥</div><div className="sc-v">{myEleves.length}</div><div className="sc-l">Élèves suivis</div></div>
          <div className="sc c-ok"><div className="sc-ic">📋</div><div className="sc-v">{tauxAss!==null?tauxAss+'%':'—'}</div><div className="sc-l">Taux assiduité</div></div>
          <div className="sc c-gold"><div className="sc-ic">📚</div><div className="sc-v">{myRes.length}</div><div className="sc-l">Mes ressources</div></div>
          {profAlertes.length>0&&<div className="sc" style={{borderBottom:'3px solid var(--err)'}}><div className="sc-ic">⚠️</div><div className="sc-v" style={{color:'var(--err)'}}>{profAlertes.length}</div><div className="sc-l">Élèves en alerte</div></div>}
        </div>
      </div>
      <div className="pg" style={{paddingTop:0}}>
        {/* Cours du jour */}
        <div className="sh"><h2 className="st">📌 Aujourd'hui — {todayName}</h2></div>
        {todayCours.length===0?<div style={{background:'var(--cream)',padding:'14px',borderRadius:4,fontSize:13,color:'var(--muted)',textAlign:'center',marginBottom:24}}>Aucun cours prévu aujourd'hui.</div>:
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:10,marginBottom:24}}>
          {todayCours.map(c=>{
            const colors={live:{bg:'#EEFFF6',border:'#b8dbb8',label:'🟢 En cours',col:'var(--ok)'},
                          soon:{bg:'#EEF5FF',border:'#c0d0f0',label:'🔵 Bientôt',col:'#1a4fc4'},
                          later:{bg:'white',border:'var(--cream2)',label:'⏳ Plus tard',col:'var(--muted)'},
                          past:{bg:'#f5f5f5',border:'#e0e0e0',label:'✓ Terminé',col:'#888'}};
            const cl=colors[c._state];
            return<div key={c.id} style={{background:cl.bg,border:`1.5px solid ${cl.border}`,borderLeft:`4px solid ${cl.col}`,borderRadius:4,padding:'10px 14px',opacity:c._state==='past'?.65:1}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                <span style={{...getCoursBadge(c.matiere),fontSize:11}}>{c.matiere}</span>
                <span style={{fontSize:10,fontWeight:700,color:cl.col}}>{cl.label}</span>
              </div>
              <div style={{fontWeight:700,fontSize:13,marginBottom:2}}>{c.niveau} · {hs(c.debut)}–{hs(c.fin)}</div>
              <div style={{fontSize:11,color:'var(--muted)'}}>📍 {c.salle} · {c.eleveIds.length} élève{c.eleveIds.length>1?'s':''}</div>
            </div>;
          })}
        </div>}

        {/* Alertes */}
        {profAlertes.length>0&&<>
          <div className="sh"><h2 className="st">⚠️ Élèves à surveiller</h2></div>
          <div style={{display:'flex',flexDirection:'column',gap:7,marginBottom:24}}>
            {profAlertes.map(({e,m,tp,flags})=><div key={e.id} style={{background:'white',border:'1.5px solid var(--cream2)',borderLeft:'4px solid #b02020',padding:'9px 14px',borderRadius:4,display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:30,height:30,borderRadius:'50%',background:'var(--cream2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>🎓</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:13}}>{e.name}</div>
                <div style={{fontSize:11,color:'var(--muted)'}}>{e.niveau}{m&&` · Moy ${m}/20`}{tp!==null&&` · Ass ${tp}%`}</div>
              </div>
              <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>{flags.map((f,i)=><span key={i} style={{padding:'2px 8px',borderRadius:3,fontSize:10,fontWeight:700,background:'#fff0f0',color:f.color,border:`1px solid ${f.color}40`}}>{f.label}</span>)}</div>
            </div>)}
          </div>
        </>}

        <div className="sh"><h2 className="st">📅 Mes cours</h2></div>
        <table className="tbl" style={{marginBottom:24}}>
          <thead><tr><th>Matière</th><th>Niveau</th><th>Créneau</th><th>Salle</th><th>Effectif</th></tr></thead>
          <tbody>{myCours.map(c=><tr key={c.id}>
            <td><span style={getCoursBadge(c.matiere)}>{c.matiere}</span></td>
            <td style={{fontWeight:600}}>{c.niveau}</td>
            <td>{c.jour} · {hs(c.debut)}–{hs(c.fin)}</td>
            <td style={{color:'var(--muted)'}}>{c.salle}</td>
            <td>{c.eleveIds.length} élève{c.eleveIds.length>1?'s':''}</td>
          </tr>)}</tbody>
        </table>
      </div>
    </div>;
  }

  // admin
  const TARIF=55;
  const now=new Date();
  const moisCourant=now.getMonth();
  const moisPrecedent=moisCourant===0?11:moisCourant-1;
  // Finances ce mois
  const factMois=factures.filter(f=>f.statut==='paye'&&f.datePaiement&&new Date(f.datePaiement).getMonth()===moisCourant);
  const factPrevMois=factures.filter(f=>f.statut==='paye'&&f.datePaiement&&new Date(f.datePaiement).getMonth()===moisPrecedent);
  const revMois=factMois.reduce((a,f)=>a+f.montant,0);
  const revPrevMois=factPrevMois.reduce((a,f)=>a+f.montant,0);
  const impayes=factures.filter(f=>f.statut==='retard'||f.statut==='attente');
  const montantImpayes=impayes.reduce((a,f)=>a+(f.montant-(f.reduction||0)),0);
  // MRR prévisionnel
  const mrrTotal=eleves.reduce((a,e)=>{const nbc=cours.filter(c=>c.eleveIds.includes(e.id)).length;return a+tarifMensuel(nbc);},0);
  // Salaires
  const totalSal=salaires.reduce((a,s)=>{const h=cours.filter(c=>c.profId===s.profId).reduce((x,c)=>x+(c.fin-c.debut),0);return a+Math.round(s.tauxHoraire*h*4.33);},0);
  const marge=mrrTotal-totalSal;
  // Cours prochains (7 jours)
  const dayNames=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const todayName=dayNames[now.getDay()];
  const todayIdx=DAYS.indexOf(todayName);
  const prochainsCours=cours.filter(c=>{const idx=DAYS.indexOf(c.jour);return idx>=todayIdx||idx<todayIdx;}).sort((a,b)=>DAYS.indexOf(a.jour)-DAYS.indexOf(b.jour)||a.debut-b.debut).slice(0,5);
  // Évolution revenus
  const deltaRev=revPrevMois>0?Math.round(((revMois-revPrevMois)/revPrevMois)*100):null;

  return <div className="fa-in">
    <div style={{padding:'22px 26px 0'}}>
      <div className="wb">
        <h2>Bonjour, <span className="gold">{user.name.split(' ').slice(-1)[0]}</span> 👋</h2>
        <p>Vue d'ensemble — {new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}</p>
      </div>
      {/* KPIs financiers */}
      <div className="sg" style={{gridTemplateColumns:'repeat(auto-fill,minmax(155px,1fr))'}}>
        <div className="sc c-ok">
          <div className="sc-ic">💶</div>
          <div className="sc-v">{revMois}€</div>
          <div className="sc-l">Encaissé ce mois</div>
          {deltaRev!==null&&<div style={{fontSize:10,fontWeight:700,color:deltaRev>=0?'var(--ok)':'var(--err)',marginTop:2}}>{deltaRev>=0?'↑':'↓'} {Math.abs(deltaRev)}% vs mois préc.</div>}
        </div>
        <div className="sc c-mrr" style={{borderBottomColor:'#8B5CF6'}}>
          <div className="sc-ic">📈</div>
          <div className="sc-v">{mrrTotal}€</div>
          <div className="sc-l">MRR prévisionnel</div>
          <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>Marge {mrrTotal>0?Math.round((marge/mrrTotal)*100):0}%</div>
        </div>
        {montantImpayes>0&&<div className="sc" style={{borderBottom:'3px solid var(--err)'}}>
          <div className="sc-ic">⚠️</div>
          <div className="sc-v" style={{color:'var(--err)'}}>{montantImpayes}€</div>
          <div className="sc-l">Impayés</div>
          <div style={{fontSize:10,color:'var(--err)',marginTop:2}}>{impayes.length} facture{impayes.length>1?'s':''}</div>
        </div>}
        <div className="sc c-info"><div className="sc-ic">🎓</div><div className="sc-v">{eleves.length}</div><div className="sc-l">Élèves</div></div>
        <div className="sc c-navy"><div className="sc-ic">📅</div><div className="sc-v">{cours.length}</div><div className="sc-l">Cours/semaine</div></div>
        <div className="sc c-gold"><div className="sc-ic">👨‍🏫</div><div className="sc-v">{profs.length}</div><div className="sc-l">Professeurs</div></div>
      </div>
    </div>
    <div className="pg" style={{paddingTop:0}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,marginBottom:20}}>
        {/* Prochains cours */}
        <div className="stat-section">
          <div className="stat-section-ttl">📅 Prochains cours</div>
          {prochainsCours.length===0?<div style={{fontSize:13,color:'var(--muted)'}}>Aucun cours planifié</div>:
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {prochainsCours.map(c=>{
              const p=users.find(u=>u.id===c.profId);
              const clr=nc(c.niveau);
              return <div key={c.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 11px',background:clr.bg,border:`1.5px solid ${clr.bd}`,borderRadius:4}}>
                <div style={{background:clr.bd,borderRadius:2,width:4,height:36,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13,color:clr.tx}}>{c.matiere} — {c.niveau}</div>
                  <div style={{fontSize:11,color:'var(--muted)'}}>{c.jour} {hs(c.debut)}–{hs(c.fin)} · {p?.name.split(' ').slice(-1)[0]} · {c.eleveIds.length}él</div>
                </div>
                {c.recurrent&&<span style={{fontSize:9,background:'var(--cream2)',borderRadius:2,padding:'1px 5px',color:'var(--muted)'}}>↺</span>}
              </div>;
            })}
          </div>}
        </div>
        {/* Alertes impayés */}
        <div className="stat-section">
          <div className="stat-section-ttl">🔔 Alertes & Notifications</div>
          <div style={{display:'flex',flexDirection:'column',gap:7}}>
            {impayes.filter(f=>f.statut==='retard').slice(0,3).map(f=>{
              const fam=f.familleId?.replace('fam_','').replace(/^\w/,c=>c.toUpperCase())||'';
              return <div key={f.id} style={{display:'flex',gap:8,padding:'8px 11px',background:'#FFF0F0',border:'1px solid #FECACA',borderRadius:4,fontSize:12}}>
                <span>🔴</span><div><div style={{fontWeight:600,color:'var(--err)'}}>Retard — Famille {fam}</div><div style={{color:'var(--muted)'}}>{f.libelle} · {f.montant-(f.reduction||0)}€</div></div>
              </div>;
            })}
            {impayes.filter(f=>f.statut==='attente').slice(0,2).map(f=>{
              const fam=f.familleId?.replace('fam_','').replace(/^\w/,c=>c.toUpperCase())||'';
              return <div key={f.id} style={{display:'flex',gap:8,padding:'8px 11px',background:'#FFFCE8',border:'1px solid #FDE68A',borderRadius:4,fontSize:12}}>
                <span>🟡</span><div><div style={{fontWeight:600,color:'#C47A00'}}>En attente — Famille {fam}</div><div style={{color:'var(--muted)'}}>{f.libelle} · {f.montant-(f.reduction||0)}€</div></div>
              </div>;
            })}
            {impayes.length===0&&<div style={{background:'#ECFDF5',border:'1.5px solid #86EFAC',borderRadius:4,padding:'10px 12px',fontSize:13,color:'#059669',fontWeight:600,textAlign:'center'}}>✅ Aucun impayé</div>}
            {/* Stats mensuelles */}
            <div style={{borderTop:'1px solid var(--cream2)',paddingTop:10,marginTop:4}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',marginBottom:6,textTransform:'uppercase',letterSpacing:.5}}>Revenus des 3 derniers mois</div>
              <div style={{display:'flex',gap:6,alignItems:'flex-end',height:40}}>
                {[-2,-1,0].map(offset=>{
                  const m=(moisCourant+12+offset)%12;
                  const labels=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
                  const val=factures.filter(f=>f.statut==='paye'&&f.datePaiement&&new Date(f.datePaiement).getMonth()===m).reduce((a,f)=>a+f.montant,0);
                  const maxV=Math.max(...[-2,-1,0].map(o=>{const mm=(moisCourant+12+o)%12;return factures.filter(f=>f.statut==='paye'&&f.datePaiement&&new Date(f.datePaiement).getMonth()===mm).reduce((a,f)=>a+f.montant,0);}),1);
                  return <div key={m} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                    <div style={{fontSize:9,color:'var(--muted)',fontWeight:600}}>{val>0?val+'€':''}</div>
                    <div style={{width:'100%',height:`${Math.max(Math.round((val/maxV)*28),3)}px`,background:offset===0?'var(--gold2)':'var(--cream2)',borderRadius:2,transition:'height .5s'}}/>
                    <div style={{fontSize:9,color:'var(--muted)'}}>{labels[m]}</div>
                  </div>;
                })}
              </div>
            </div>
          </div>
        </div>
      </div>
      {/* Synthèse budget */}
      <div className="stat-section" style={{marginBottom:0}}>
        <div className="stat-section-ttl">📊 Synthèse financière mensuelle</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:12}}>
          {[
            {label:'Revenus prévisionnels',val:mrrTotal,col:'#059669',sign:'+'},
            {label:'Masse salariale',val:totalSal,col:'var(--err)',sign:'−'},
            {label:'Marge nette',val:Math.abs(marge),col:marge>=0?'#7C3AED':'var(--err)',sign:marge>=0?'+':'−'},
          ].map((r,i)=>(
            <div key={i} style={{background:i===2?(marge>=0?'#F5EEFF':'#FFF0F0'):'var(--cream)',borderRadius:4,padding:'12px 16px',border:`1.5px solid ${i===2?(marge>=0?'#C4B5FD':'#FECACA'):'var(--cream2)'}`}}>
              <div style={{fontSize:11,color:'var(--muted)',marginBottom:4}}>{r.label}</div>
              <div style={{fontFamily:'Playfair Display,serif',fontSize:22,fontWeight:700,color:r.col}}>{r.sign}{r.val}€</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  </div>;
}

// ─── MON PROGRAMME (Élève : fusion Suivi + Bibliothèque) ───
function MonProgramme({user,users,cours,resources,compEtats,setCompEtats,customComps=[]}){
  const [selMat,setSelMat]=useState('Toutes');
  const [expandedChaps,setExpandedChaps]=useState({});
  const toggleChap=(key)=>setExpandedChaps(p=>({...p,[key]:!p[key]}));

  const myCours=cours.filter(c=>c.eleveIds.includes(user.id));
  const myMats=new Set(myCours.map(c=>c.matiere));

  // All templates for this student
  const myTemplates=[
    ...COMP_TEMPLATES.filter(t=>myMats.has(t.matiere)&&t.niveau===user.niveau),
    ...(customComps||[]).filter(t=>t.eleveId===user.id),
  ];

  // Resources filtered by student's matières
  const myCoursIds=new Set(myCours.map(c=>c.id));
  const myResources=resources.filter(r=>r.coursId?myCoursIds.has(r.coursId):(myMats.has(r.matiere)||r.matiere==='Multi'));

  const getEtat=(tid)=>(compEtats[user.id]||{})[tid]||{statut:'non_commence'};
  const requestWork=(tid)=>setCompEtats(p=>({...p,[user.id]:{...(p[user.id]||{}),[tid]:{...getEtat(tid),statut:'en_cours',date:new Date().toISOString().split('T')[0]}}}));

  const mats=['Toutes',...Array.from(myMats)];
  const visibleTemplates=selMat==='Toutes'?myTemplates:myTemplates.filter(t=>t.matiere===selMat);
  const visibleResources=selMat==='Toutes'?myResources:myResources.filter(r=>r.matiere===selMat||r.matiere==='Multi');

  // Stats
  const valide=myTemplates.filter(t=>getEtat(t.id).statut==='valide').length;
  const pct=myTemplates.length?Math.round((valide/myTemplates.length)*100):0;

  // Group competences by matière > chapitre
  const grouped={};
  visibleTemplates.forEach(t=>{
    if(!grouped[t.matiere])grouped[t.matiere]={};
    if(!grouped[t.matiere][t.chapitre])grouped[t.matiere][t.chapitre]=[];
    grouped[t.matiere][t.chapitre].push({...t,etat:getEtat(t.id)});
  });

  const StatDot=({st})=>{
    const s=COMP_STATUTS[st]||COMP_STATUTS.non_commence;
    return <span title={s.label} style={{width:18,height:18,borderRadius:2,background:s.bg,border:`2px solid ${s.color}60`,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:10,color:s.color,fontWeight:700,flexShrink:0}}>{s.icon}</span>;
  };

  return <>
    <TB title="Mon Programme"/>
    <div className="pg">
      {/* Welcome + global progress */}
      <div style={{background:'linear-gradient(135deg,var(--navy) 0%,#1A4080 100%)',borderRadius:0,padding:'20px 24px',marginBottom:20,color:'white'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:16}}>
          <div>
            <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:22,fontWeight:600}}>{user.name.split(' ')[0]} — {user.niveau}</div>
            <div style={{fontSize:13,opacity:.7,marginTop:4}}>{Array.from(myMats).join(' · ')} · {myTemplates.length} compétences</div>
          </div>
          <div style={{textAlign:'center',flexShrink:0}}>
            <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:36,fontWeight:600,lineHeight:1}}>{pct}%</div>
            <div style={{fontSize:11,opacity:.6,marginTop:2}}>{valide}/{myTemplates.length} validées</div>
          </div>
        </div>
        <div style={{height:6,background:'rgba(255,255,255,.15)',borderRadius:3,marginTop:16,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${pct}%`,background:pct===100?'#10B981':'#8b6b3a',borderRadius:3,transition:'width .8s'}}/>
        </div>
      </div>

      {/* Matière tabs */}
      <div className="tabs" style={{marginBottom:20,flexWrap:'wrap'}}>
        {mats.map(m=><button key={m} className={`tab ${selMat===m?'on':''}`} onClick={()=>setSelMat(m)} style={{fontSize:12}}>{m}</button>)}
      </div>

      {myMats.size===0&&<div className="emp"><div className="emp-icon">📖</div><h3>Aucun cours inscrit</h3><p>Demandez à votre administrateur de vous inscrire à des cours.</p></div>}

      {/* Matières > Chapitres */}
      {Object.entries(grouped).map(([mat,chaps])=>(
        <div key={mat} style={{marginBottom:24}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
            <span style={{...getCoursBadge(mat),fontSize:13}}>{mat}</span>
            {(()=>{const all=Object.values(chaps).flat();const v=all.filter(c=>c.etat.statut==='valide').length;return<span style={{fontSize:12,color:'var(--muted)'}}>{v}/{all.length}</span>})()}
          </div>
          {Object.entries(chaps).map(([chap,comps])=>{
            const chapKey=mat+'__'+chap;
            const isOpen=expandedChaps[chapKey]!==false; // open by default
            const chapV=comps.filter(c=>c.etat.statut==='valide').length;
            const chapPct=Math.round((chapV/comps.length)*100);
            // Resources matching this chapter (by matière)
            const chapRes=myResources.filter(r=>r.matiere===mat&&(r.chapitre===chap||!r.chapitre));
            return <div key={chap} style={{background:'white',border:'1.5px solid var(--cream2)',borderRadius:0,marginBottom:10,overflow:'hidden'}}>
              {/* Chapter header — clickable */}
              <div onClick={()=>toggleChap(chapKey)} style={{padding:'12px 16px',background:chapPct===100?'#ECFDF5':'var(--cream)',display:'flex',alignItems:'center',gap:12,cursor:'pointer',userSelect:'none'}}>
                <span style={{fontSize:13,opacity:.5,transition:'transform .2s',transform:isOpen?'rotate(90deg)':'rotate(0deg)'}}>▶</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13,color:'var(--navy)'}}>{chap}</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{chapV}/{comps.length} validée{chapV>1?'s':''}{chapRes.length>0?` · ${chapRes.length} ressource${chapRes.length>1?'s':''}`:''}
                  </div>
                </div>
                <div style={{width:80}}>
                  <div style={{height:5,background:'var(--cream2)',borderRadius:3,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${chapPct}%`,background:chapPct===100?'var(--ok)':'var(--gold)',borderRadius:3}}/>
                  </div>
                  <div style={{fontSize:10,textAlign:'right',color:'var(--muted)',marginTop:2}}>{chapPct}%</div>
                </div>
                {chapPct===100&&<span style={{fontSize:18}}>🏆</span>}
              </div>

              {isOpen&&<div>
                {/* Competences */}
                {comps.map(c=>{
                  const st=COMP_STATUTS[c.etat.statut]||COMP_STATUTS.non_commence;
                  return <div key={c.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 16px',borderBottom:'1px solid rgba(0,0,0,.035)'}}>
                    <StatDot st={c.etat.statut}/>
                    <div style={{flex:1,minWidth:0}}>
                      <span style={{fontSize:13,fontWeight:500}}>{c.nom}</span>
                      {c.etat.commentaire&&<div style={{fontSize:11,color:'var(--muted)',fontStyle:'italic',marginTop:2}}>💬 {c.etat.commentaire}</div>}
                    </div>
                    {c.etat.statut==='non_commence'&&<button className="btn btn-sm" style={{fontSize:11,padding:'3px 9px',background:'#EEF5FF',border:'1.5px solid #F0C080',color:'#D97706',flexShrink:0}} onClick={()=>requestWork(c.id)}>Je travaille ça</button>}
                    {c.etat.statut==='valide'&&<span style={{fontSize:11,color:'var(--ok)',fontWeight:600,flexShrink:0}}>✓ Validé</span>}
                    {c.etat.statut==='a_revoir'&&<span style={{fontSize:11,color:'var(--err)',fontWeight:600,flexShrink:0}}>↺ À revoir</span>}
                    {c.etat.statut==='en_cours'&&<span style={{fontSize:11,color:'#D97706',fontWeight:600,flexShrink:0}}>◑ En cours</span>}
                  </div>;
                })}

                {/* Inline resources for this chapter */}
                {chapRes.length>0&&<div style={{padding:'10px 16px',background:'#F7FAFF',borderTop:'1px solid #E8F0FE'}}>
                  <div style={{fontSize:11,fontWeight:700,color:'var(--gold)',marginBottom:8,display:'flex',alignItems:'center',gap:5}}>
                    <span>📚</span> Ressources associées
                  </div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                    {chapRes.slice(0,4).map(r=>(
                      <div key={r.id} style={{background:'white',border:'1.5px solid #C8D8F5',borderRadius:2,padding:'7px 11px',display:'flex',alignItems:'center',gap:8,maxWidth:280}}>
                        <span style={{fontSize:16,flexShrink:0}}>{r.type==='fiche'?'📄':r.type==='exercice'?'✏️':r.type==='cours'?'📘':'📝'}</span>
                        <div style={{minWidth:0}}>
                          <div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.title}</div>
                          <div style={{fontSize:10,color:'var(--muted)'}}>{r.niveau}</div>
                        </div>
                      </div>
                    ))}
                    {chapRes.length>4&&<div style={{fontSize:11,color:'var(--muted)',padding:'7px 0',alignSelf:'center'}}>+{chapRes.length-4} autres…</div>}
                  </div>
                </div>}
              </div>}
            </div>;
          })}

          {/* Resources not attached to a specific chapter */}
          {(()=>{
            const matRes=visibleResources.filter(r=>(r.matiere===mat||r.matiere==='Multi')&&!Object.keys(chaps).includes(r.chapitre||''));
            if(matRes.length===0)return null;
            return <div style={{background:'#F7FAFF',border:'1.5px dashed #C8D8F5',borderRadius:0,padding:'12px 16px',marginBottom:8}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--gold)',marginBottom:8}}>📚 Autres ressources — {mat}</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:8}}>
                {matRes.slice(0,6).map(r=>(
                  <div key={r.id} style={{background:'white',border:'1.5px solid #C8D8F5',borderRadius:2,padding:'8px 12px',display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:16,flexShrink:0}}>{r.type==='fiche'?'📄':r.type==='exercice'?'✏️':r.type==='cours'?'📘':'📝'}</span>
                    <div style={{minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.title}</div>
                      <div style={{fontSize:10,color:'var(--muted)'}}>{r.type} · {r.niveau}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>;
          })()}
        </div>
      ))}
    </div>
  </>;
}


function Bibliotheque({user,users,resources,setResources,cours=[],compEtats={}}){
  const [ft,setFt]=useState('Tous');
  const [fm,setFm]=useState('Toutes');
  const [q,setQ]=useState('');
  const [show,setShow]=useState(false);
  const [showGN,setShowGN]=useState(false);
  const [form,setForm]=useState({title:'',type:'trace',matiere:'Mathématiques',niveau:'3ème',desc:'',devoirs:'',commentaires:'',coursId:''});
  const [gnStep,setGnStep]=useState('upload');
  const [gnFile,setGnFile]=useState(null);
  const [gnPreview,setGnPreview]=useState(null);
  const [gnError,setGnError]=useState('');
  const canM=user.role==='admin'||user.role==='prof';
  const myGroupes=user.role==='admin'?cours:cours.filter(c=>c.profId===user.id);
  const coursLabelB=(id)=>{const c=cours.find(x=>x.id===id);return c?(c.matiere+' '+c.niveau+' — '+c.jour):'';};
  const myCoursIdsB=useMemo(()=>new Set(cours.filter(c=>c.eleveIds.includes(user.id)).map(c=>c.id)),[cours,user]);
  // Élève : ses matières + son niveau uniquement
  const myMatieres=useMemo(()=>{
    if(user.role!=='eleve')return null; // null = no filter
    const myCours=cours.filter(c=>c.eleveIds.includes(user.id));
    return new Set(myCours.map(c=>c.matiere));
  },[user,cours]);
  // Compétences en cours/à revoir pour l'élève — pour suggestions
  const myCompSuggestions=useMemo(()=>{
    if(user.role!=='eleve')return new Set();
    const etats=compEtats[user.id]||{};
    return new Set(
      COMP_TEMPLATES
        .filter(t=>{const s=etats[t.id]?.statut;return s==='en_cours'||s==='a_revoir';})
        .map(t=>t.matiere)
    );
  },[user,compEtats]);

  const TYPES=['Tous','fiche','exercice','trace','cours'];
  const filtered=useMemo(()=>resources.filter(r=>{
    // Élève : voir seulement ses matières
    if(myMatieres){ if(r.coursId){ if(!myCoursIdsB.has(r.coursId))return false; } else if(!myMatieres.has(r.matiere)&&r.matiere!=='Multi'&&r.matiere!=='Général')return false; }
    if(ft!=='Tous'&&r.type!==ft)return false;
    if(fm!=='Toutes'&&r.matiere!==fm)return false;
    if(q&&!r.title.toLowerCase().includes(q.toLowerCase()))return false;
    return true;
  }),[resources,ft,fm,q,myMatieres]);
  const add=()=>{if(!form.title.trim())return;setResources(p=>[...p,{id:'r'+Date.now(),...form,auteurId:user.id,date:new Date().toISOString().split('T')[0],dl:0}]);setShow(false);setForm({title:'',type:'trace',matiere:'Mathématiques',niveau:'3ème',desc:'',devoirs:'',commentaires:''});};
  const del=(id)=>{setResources(p=>p.filter(r=>r.id!==id));sbDelete('ressources',id);};
  const dl=(res)=>{setResources(p=>p.map(r=>r.id===res.id?{...r,dl:r.dl+1}:r));alert(`📥 "${res.title}"\n\nTéléchargement simulé.`);};
  const openGN=()=>{setGnStep('upload');setGnFile(null);setGnPreview(null);setGnError('');setShowGN(true);};
  const handleGNFile=(file)=>{
    if(!file)return;
    setGnFile(file);setGnError('');
    if(file.type.startsWith('image/')){const reader=new FileReader();reader.onload=e=>setGnPreview({type:'image',src:e.target.result});reader.readAsDataURL(file);}
    else{setGnPreview({type:'pdf',name:file.name});}
  };
  const analyzeWithClaude=async()=>{
    if(!gnFile){setGnError("Veuillez d'abord sélectionner un fichier.");return;}
    setGnStep('analyzing');
    try{
      const toBase64=f=>new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(f);});
      const b64=await toBase64(gnFile);
      const isImage=gnFile.type.startsWith('image/');
      const mediaType=isImage?gnFile.type:'application/pdf';
      const msgContent=[
        {type:isImage?'image':'document',source:{type:'base64',media_type:mediaType,data:b64}},
        {type:'text',text:'Tu es un assistant pédagogique. Analyse ce document (trace écrite, export GoodNotes) et extrais en JSON strict sans markdown :\n{"titre":"titre du cours","matiere":"Mathématiques|Physique|Français|Histoire|Multi","niveau":"5ème|4ème|3ème|Lycée|Terminale|Collège","description":"résumé 2-3 phrases","devoirs":"devoirs à faire ou chaine vide","commentaires":"commentaires du prof ou chaine vide"}\nRéponds UNIQUEMENT avec le JSON.'}
      ];
      const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:msgContent}]})});
      const data=await resp.json();
      const text=data.content?.find(c=>c.type==='text')?.text||'';
      let parsed;
      try{parsed=JSON.parse(text.replace(/```json|```/g,'').trim());}catch(e){throw new Error("Réponse inattendue. Réessayez.");}
      setForm({title:parsed.titre||'',type:'trace',matiere:parsed.matiere||'Mathématiques',niveau:parsed.niveau||'3ème',desc:parsed.description||'',devoirs:parsed.devoirs||'',commentaires:parsed.commentaires||''});
      setGnStep('result');
    }catch(e){setGnError(e.message||"Erreur lors de l'analyse.");setGnStep('upload');}
  };
  const publishFromGN=()=>{
    if(!form.title.trim())return;
    setResources(p=>[...p,{id:'r'+Date.now(),...form,auteurId:user.id,date:new Date().toISOString().split('T')[0],dl:0,gnImport:true}]);
    setShowGN(false);setGnStep('upload');
  };
  return <>
    <TB title="Bibliothèque">

      {canM&&<button className="btn btn-p" onClick={()=>setShow(true)}>＋ Ajouter</button>}
    </TB>
    <div className="pg">
      <div className="fb">
        <span style={{fontSize:11,fontWeight:600,color:'var(--muted)',alignSelf:'center',marginRight:3}}>Type :</span>
        {TYPES.map(t=><button key={t} className={`chip ${ft===t?'on':''}`} onClick={()=>setFt(t)}>{t==='Tous'?'Tous':`${TI[t]||''} ${TL[t]||t}`}</button>)}
      </div>
      <div className="fb">
        <span style={{fontSize:11,fontWeight:600,color:'var(--muted)',alignSelf:'center',marginRight:3}}>Matière :</span>
        {(myMatieres
          ?['Toutes',...Array.from(myMatieres)]

        ).map(m=><button key={m} className={`chip ${fm===m?'on':''}`} onClick={()=>setFm(m)}>{m}</button>)}
      </div>
      {user.role==='eleve'&&myCompSuggestions.size>0&&(()=>{
        const suggested=filtered.filter(r=>myCompSuggestions.has(r.matiere));
        return suggested.length>0?<div style={{background:'#EEF5FF',border:'1.5px solid rgba(26,111,212,.2)',borderRadius:0,padding:'12px 16px',marginBottom:16,fontSize:13}}>
          <div style={{fontWeight:600,color:'var(--navy)',marginBottom:4}}>💡 Suggérées pour toi</div>
          <div style={{color:'var(--muted)',fontSize:12}}>Ces ressources correspondent aux compétences que tu travailles actuellement : {[...myCompSuggestions].join(', ')}</div>
        </div>:null;
      })()}
      {filtered.length===0?<div className="emp"><div className="emp-icon">📚</div><h3>Aucune ressource disponible</h3><p>{user.role==='eleve'?'Aucune ressource pour tes matières pour le moment.':'Aucune ressource.'}</p></div>:(
        <div className="rg">{filtered.map(r=>{const a=users.find(u=>u.id===r.auteurId);return <div key={r.id} className="res-card">

              {r.gnImport&&<span className="rtag" style={{background:'#EEF5FF',color:'var(--gold)'}}>📲 GoodNotes</span>}
              {user.role==='eleve'&&myCompSuggestions.has(r.matiere)&&<span style={{background:'#ECFDF5',color:'#059669',padding:'1px 7px',borderRadius:0,fontSize:10,fontWeight:700}}>✨ Suggéré</span>}

      <div className="fg"><label className="fl">Groupe / cours</label><select className="fi" value={form.coursId||''} onChange={e=>{const id=e.target.value;const c=myGroupes.find(x=>x.id===id);setForm(f=>({...f,coursId:id,...(c?{matiere:c.matiere,niveau:c.niveau}:{})}));}}><option value="">— Ressource générale (par matière) —</option>{myGroupes.map(c=><option key={c.id} value={c.id}>{c.matiere} {c.niveau} — {c.jour}{c.salle?(' · '+c.salle):''}</option>)}</select></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div className="fg"><label className="fl">Type</label><select className="fi" value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>{['fiche','exercice','trace','cours'].map(t=><option key={t} value={t}>{TL[t]}</option>)}</select></div>
        <div className="fg"><label className="fl">Matière</label><select className="fi" value={form.matiere} onChange={e=>setForm({...form,matiere:e.target.value})}>{MATIERES.filter(m=>m!=='Toutes').map(m=><option key={m}>{m}</option>)}</select></div>
        <div className="fg"><label className="fl">Niveau</label><select className="fi" value={form.niveau} onChange={e=>setForm({...form,niveau:e.target.value})}>{NIVEAUX.filter(n=>n!=='Tous').map(n=><option key={n}>{n}</option>)}</select></div>
      </div>
      <div className="fg"><label className="fl">Description</label><textarea className="fi" value={form.desc} onChange={e=>setForm({...form,desc:e.target.value})}/></div>
      <div className="fg"><label className="fl">Fichier</label><input type="file" className="fi" accept=".pdf,.docx,.pptx"/></div>
      <div className="fa"><button className="btn btn-o" onClick={()=>setShow(false)}>Annuler</button><button className="btn btn-p" onClick={add}>Publier</button></div>

        <div className="gn-dropzone"
          onDragOver={e=>{e.preventDefault();e.currentTarget.classList.add('drag');}}
